l_english:
 qing_revenue.1.t:0 "The Salt Gabelle (鹽政)"
 qing_revenue.1.desc:0 "The salt monopoly is a vast source of revenue, but the salt-merchant networks are riddled with graft. [revenue_minister.GetName], Grand Minister of Revenue, proposes a thorough reform of the 鹽政: clean up the monopoly and bring honest revenue to the throne. But the salt merchants are powerful patrons — this will make enemies."
 qing_revenue.1.a:0 "Reform the salt gabelle — honest revenue, upsetting patronage."
 qing_revenue.1.a.tt:0 "The salt monopoly is reformed. Revenue increases, corruption falls, but the minister makes enemies."
 qing_revenue.1.b:0 "Milk the monopoly for quick cash — entrench the graft."
 qing_revenue.1.b.tt:0 "The throne takes a quick infusion of silver, but the salt-merchant networks entrench. Corruption rises."
 qing_revenue.1.c:0 "Defer the matter — the minister is unfit for this."
 qing_revenue.1.c.tt:0 "The salt gabelle remains unreformed. Modest graft continues."

 qing_revenue.2.t:0 "The Ever-Normal Granaries (常平倉)"
 qing_revenue.2.desc:0 "The harvest has been good in the Yellow River provinces. [revenue_minister.GetName] proposes stocking the ever-normal granaries (常平倉) — grain reserves to stabilise prices and buffer famine. This is the mark of wise administration, but it costs silver."
 qing_revenue.2.a:0 "Stock the granaries — wise administration."
 qing_revenue.2.a.tt:0 "A granary is built in a Yellow River province. Unrest falls as the people see the throne's care."
 qing_revenue.2.b:0 "Divert the surplus to the treasury."
 qing_revenue.2.b.tt:0 "The throne takes the silver, but forgoes the unrest control the granaries would have provided."
 qing_revenue.2.c:0 "The reserves are tested by famine."
 qing_revenue.2.c.tt:0 "A famine consumes a granary's reserves, but the blow is cushioned. The ever-normal system works."

 qing_revenue.3.t:0 "The Silver Crisis (銀荒)"
 qing_revenue.3.desc:0 "The opium drain is bleeding silver from the realm, and copper-cash inflation is ruining the taxpayers (銀貴錢賤 — silver dear, cash base). [revenue_minister.GetName] must act: can the Grand Minister of Revenue arrest this crisis, or will the throne's fisc collapse?"
 qing_revenue.3.a:0 "Decisive policy response — arrest the silver drain."
 qing_revenue.3.a.tt:0 "The minister's intervention reduces currency stress, but it costs silver and political capital."
 qing_revenue.3.b:0 "Half-measures — do what we can."
 qing_revenue.3.b.tt:0 "A partial intervention yields a modest reduction in currency stress."
 qing_revenue.3.c:0 "Botched response — the minister is unfit."
 qing_revenue.3.c.tt:0 "The intervention fails. Currency stress INCREASES, and the minister is discredited."
 qing_revenue.3.d:0 "Do nothing — the crisis continues."
 qing_revenue.3.d.tt:0 "The silver crisis worsens."

 qing_revenue.4.t:0 "The Treasury Audit"
 qing_revenue.4.desc:0 "Corruption has seeped into every corner of the realm, and the land-tax revenue does not match what the throne should receive. [revenue_minister.GetName] proposes a thorough audit of the provincial treasuries: will it uncover embezzlement, or will the graft prove too well-hidden?"
 qing_revenue.4.a:0 "Uncover the embezzlement — an honest audit."
 qing_revenue.4.a.tt:0 "The audit recovers embezzled funds and reduces corruption, but the minister makes powerful enemies."
 qing_revenue.4.b:0 "Find nothing — the graft is too deep, or the minister is complicit."
 qing_revenue.4.b.tt:0 "The audit finds nothing. Corruption persists, and the minister's reputation suffers."
 qing_revenue.4.c:0 "Partial recovery — some graft uncovered, but not all."
 qing_revenue.4.c.tt:0 "The audit recovers some embezzled funds and modestly reduces corruption."

 qing_salt_gabelle_reformed_mod:0 "Salt Gabelle Reformed (鹽政)"
 qing_salt_gabelle_reformed_mod_desc:0 "The salt monopoly has been cleaned up, bringing honest revenue to the throne."
 qing_salt_gabelle_graft:0 "Salt Gabelle Graft"
 qing_salt_gabelle_graft_desc:0 "The salt-merchant patronage networks are entrenched, and graft persists."
 qing_granaries_stocked:0 "Granaries Stocked (常平倉)"
 qing_granaries_stocked_desc:0 "The ever-normal granaries are full, buffering famine and stabilising grain prices."
 qing_granaries_cushioned_famine:0 "Granaries Cushioned Famine"
 qing_granaries_cushioned_famine_desc:0 "The grain reserves absorbed the famine's shock. The ever-normal system works."
 qing_silver_crisis_managed:0 "Silver Crisis Managed (銀荒)"
 qing_silver_crisis_managed_desc:0 "Effective policy has arrested the opium/silver drain."
 qing_silver_crisis_botched:0 "Silver Crisis Botched"
 qing_silver_crisis_botched_desc:0 "The failed intervention has worsened the silver crisis."
 qing_treasury_audit_success:0 "Treasury Audit Success"
 qing_treasury_audit_success_desc:0 "The audit has recovered embezzled funds and exposed corrupt officials."

 # ---- qing_revenue.5 — the treasury at its historic peak (盈庫之盛) [#372] ----
 qing_revenue.5.t:0 "The Fullest Coffers the Dynasty Has Known"
 qing_revenue.5.desc:0 "The Grand Minister of Revenue brings word that the silver treasury of the Board (戶部銀庫) has swollen to a height never before seen — better than eighty million taels lie in the vaults at Peking, the accumulated surplus of decades of peace, a reformed salt gabelle, the grain tribute of the canal, and the taxes of a teeming, prosperous empire. Not the Ming at its height, nor any dynasty before, kept so great a store. The court debates what such abundance is for: is it a reserve against the lean years and the wars that always come, to be locked away and husbanded — or is it the means, at last, to build on a scale worthy of the age, and to let the empire feast on its own success?"
 qing_revenue.5.a:0 "Lock it away — a war-chest against the lean years (盈庫備荒)."
 qing_revenue.5.a.tt:0 "The Yongzheng prudence: the treasure is husbanded against future dearth and war. #G +2 Stability#!, #G +5 Legitimacy#!, #G the Emperor is esteemed for his foresight#!."
 qing_revenue.5.b:0 "Build on a scale worthy of the age (大興土木)."
 qing_revenue.5.b.tt:0 "The expansive late-Qianlong magnificence: a share of the reserve funds grand works and largesse. #R Draws down 8,000千兩 (~8 million taels) of silver#!, but #G the Emperor is acclaimed#! (+10 popularity), #G +3 Legitimacy#!, and #G a new ever-normal granary is stocked#!."
