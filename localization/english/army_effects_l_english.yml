l_english:
 # [#347] Standing-army province effects — modifier display names + friction event.

 # --- province modifiers (name + desc) ---
 army_garrison_pacified:0 "Garrisoned"
 army_garrison_pacified_desc:0 "A standing garrison holds this province. Soldiers on the ground deter unrest."
 army_garrison_pacified_heavy:0 "Heavily Garrisoned"
 army_garrison_pacified_heavy_desc:0 "A full field host garrisons this province. Its visible strength strongly deters unrest — but a host this large also strains the countryside it billets upon."
 army_garrison_billeting_strain:0 "Billeting Strain"
 army_garrison_billeting_strain_desc:0 "A large army quartered here consumes the province's surplus and unsettles its people through foraging and requisition."

 # --- army_governor_friction.1: the billeting dispute ---
 army_governor_friction.1.t:0 "Billeting Dispute"
 army_governor_friction.1.desc:0 "The host under [scope:arm_commander.GetName] sits idle upon [scope:arm_province.GetName], and its billeting weighs heavily on the province. The governor, [scope:arm_governor.GetName], protests the foraging and requisition of a standing army on settled ground; the commander answers that his soldiers must be quartered and fed. The quarrel has reached the throne."
 army_governor_friction.1.a:0 "Back the general — the host stays; the province must bear it."
 army_governor_friction.1.b:0 "Back the governor — rein in the host and make it pay its way."
 army_governor_friction.1.c:0 "Impose a billeting compact — split the difference."
