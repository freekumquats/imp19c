l_english:
 qing_mandate.1.t:0 "A Great Fire (火災)"
 qing_mandate.1.desc:0 "Flames have swept through the crowded timber-and-paper wards of [scope:qing_fire_prov.GetName], leaving whole quarters in ash. In the cosmology of the throne such calamity is no mere accident — it is 天譴, a judgement of Heaven upon the dynasty's fitness to rule. The court looks to the Son of Heaven: will he open the treasury to the stricken, or spare the silver and trust the ward to rebuild itself?"
 qing_mandate.1.a:0 "荒政 — Open the treasury for relief"
 qing_mandate.1.a.tt:0 "Spend 80 treasury: rebuild the burnt ward (the local scar lifts within the season), and a caring throne answers Heaven's warning (#G +legitimacy, +stability#!)."
 qing_mandate.1.b:0 "Spare the silver — let the ward rebuild itself"
 qing_mandate.1.b.tt:0 "Save the treasury, but a calamity left unanswered deepens Heaven's displeasure (#R -legitimacy#!) and the ward's scar lingers a full year."
