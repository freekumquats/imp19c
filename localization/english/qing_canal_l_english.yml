l_english:
 # qing_canal_l_english.yml — [#323] the grain-tribute logistics (漕運).
 # se_QING_CANAL.txt + qing_canal_events.txt. BOM + LF.

 qing_canal.1.t:0 "The Granaries Run Empty (倉廩告罄)"
 qing_canal.1.desc:0 "The grain-tribute has faltered. Whether from a silted stretch of the Grand Canal, a shift in the Yellow River's treacherous course, or a season of graft among the transport superintendents, the barges have not come — and the capital's ever-normal granaries (常平倉) stand near-empty just as famine takes hold across the provinces. The Ministry of Revenue counts what remains and finds it will feed either the starving countryside or the capital and its banner garrisons, but not both. The throne must choose where the last of the grain shall go."
 qing_canal.1.a:0 "Open the granaries — relieve the famine (賑濟)."
 qing_canal.1.a.tt:0 "Redirect the tribute-grain to the starving provinces. #G +1 Stability#!, #G +5 Ruler Prestige#!, #G calms sectarian unrest#! — a fed peasantry does not rebel. #R But the capital reserves fall further#!."
 qing_canal.1.b:0 "Hoard the grain for the capital and the banners (實京倉)."
 qing_canal.1.b.tt:0 "Feed the capital and its garrisons first; the provinces must fend for themselves. #G The granaries firm#!. #R But the abandoned countryside starves — sectarian unrest and reform pressure climb (the Taiping's recruiting-ground), −1 Stability#!."

 # ---- .2 Open the Coastal Grain Route (海運) [#323 deferred] ------------------------
 qing_canal.2.t:0 "The Sea Route Debated (海運)"
 qing_canal.2.desc:0 "The Grand Canal has silted so badly that the grain-tribute barges can scarcely pass, and the memorialists are divided. The reformers urge what the Daoguang court did in 1826, when the canal last failed: ship the Jiangnan grain north by SEA, in the merchant junks that already ply the coast — faster, cheaper, and beyond the reach of the canal's silt and the Yellow River's floods. But the sea route threatens a whole world that lives by the canal: the hundreds of thousands of boatmen, the transport superintendents and their squeeze, the towns strung along the banks whose markets the grain fleet feeds. And the conservative mind mistrusts the open sea, where pirates and typhoons wait, and where the disciplined order of the canal gives way to the merchant's bargain. Shall the throne open the sea route?"
 qing_canal.2.a:0 "Open the sea route — let the grain go by sea (海運)."
 qing_canal.2.a.tt:0 "Revive the coastal shipping of the tribute-grain: #G a standing grain-delivery supplement that bypasses the silted canal#!, #G +1 Stability#!, #G eases reform pressure#!. #R But the canal boatmen and transport towns, thrown out of work, stir unrest (sectarian pressure +5)#!."
 qing_canal.2.b:0 "Keep to the canal — the canal interest cannot be cast down."
 qing_canal.2.b.tt:0 "Defer to the vast interest that lives by the canal: the boatmen's livelihoods are spared. #G +5 Political Influence#!. #R But the lifeline goes unmodernised and reform pressure builds#!."
