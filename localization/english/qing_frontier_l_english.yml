l_english:
 # [#346] Frontier-garrison overlay — modifiers + the War-Ministry vs Lifan-Yuan turf war.

 # --- modifiers ---
 qing_frontier_occupied:0 "Under Imperial Garrison"
 qing_frontier_occupied_desc:0 "A garrison commanded from Beijing sits on this dependency's soil — direct military occupation, not the light hand of a resident. Its loyalty to the overlord suffers under the bayonet."
 qing_frontier_occupation_opinion:0 "Occupied by an imperial garrison"

 # --- qing_frontier.1: the turf war ---
 qing_frontier.1.t:0 "The Frontier: Bayonet or Resident?"
 qing_frontier.1.desc:0 "A banner garrison under [qing_frontier_war_min.GetName], Grand Minister of War, holds ground in [qing_frontier_subject.GetName] — a dependency the Lifan Yuan governs through its resident, [qing_frontier_amban.GetName]. The Grand Director, [qing_frontier_lifan_dir.GetName], protests that direct military rule usurps the Court of Colonial Affairs' remit; the War Ministry answers that only the army holds the frontier. Whose hand governs here?"
 qing_frontier.1.a:0 "Govern by the army (兵部) — direct rule presses on."
 qing_frontier.1.b:0 "Govern by the resident (理藩院) — rein in the garrison."
 qing_frontier.1.c:0 "Divide authority — a joint civil-military condominium."
