l_english:
 # [#358] Hanlin Academy (翰林院) panel.
 QING_HANLIN_OPEN_BTN:0 "Hanlin Academy (翰林院)"
 QING_HANLIN_OPEN_TT:0 "Open the Hanlin Academy — the Grand Secretary (大學士), the elite corps of examination laureates, the vigour of the examinations (科舉), and how well the Academy is run."
 QING_HANLIN_PANEL_TITLE:0 "Hanlin Academy — 翰林院"
 QING_HANLIN_PANEL_DESC:0 "The Hanlin Academy (翰林院) is the summit of the scholar-official order — the corps of examination laureates (進士) from which the Grand Secretaries (大學士) and the inner-court drafters are chosen. It is at once the emperor's brains-trust and the reservoir from which the great offices are staffed. Its head, the Grand Secretary, answers to the Grand Council for the Academy's vigour: a deep bench of laureates and a healthy examination ladder lift his standing there, a hollow Academy drags it down."
 QING_HANLIN_SECRETARY_TITLE:0 "Grand Secretary (大學士)"
 QING_HANLIN_VACANT:0 "The Grand Secretariat stands vacant. The Academy heads no drafting office and the laureates go unplaced."
 QING_HANLIN_PERF_LABEL:0 "Academy Performance"
 QING_HANLIN_PERF_TT:0 "How well the Hanlin Academy is run (0–100), from the Grand Secretary's finesse, the depth of the waiting laureate corps, and the vigour of the examinations. Corruption in the drafting offices drags it down; a vacant Grand Secretariat floors it low."
 QING_HANLIN_BENCH_LABEL:0 "Waiting Laureates (翰林)"
 QING_HANLIN_BENCH_TT:0 "The number of examination laureates (進士/舉人) waiting in the Academy for a post — the bench from which the great offices are staffed. A deep bench is a vigorous scholar order; an empty one starves the bureaucracy of talent."
 QING_HANLIN_EXAM_LABEL:0 "Examination Vigour (科舉)"
 QING_HANLIN_EXAM_TT:0 "The health of the examination ladder (0–100) net of the corruption and sold-degree (捐納) drag — the rate at which fresh talent is recruited into the scholar-official pool that feeds the Academy."
 QING_HANLIN_ADMIN_TITLE:0 "The Academy's Talent"
 QING_HANLIN_DRAW_SCHOLAR_BTN:0 "Draw a Laureate to Office (掄才)"
 QING_HANLIN_DRAW_SCHOLAR_TT:0 "Raise the ablest waiting laureate from the Academy into the first vacant great office. Requires a laureate waiting in the Academy and a vacant office to fill; if every office is manned, the laureate keeps his place on the bench."
 QING_HANLIN_SECOND_TO_SS_BTN:0 "Second a Laureate to the Southern Study (入直南書房)"
 QING_HANLIN_SECOND_TO_SS_TT:0 "Draw the ablest waiting Academy laureate into the Southern Study (南書房) — the emperor's private literary cabinet at his own side. Requires the Study below its establishment (8) and an eligible laureate waiting; a tour at the throne's side binds the scholar closer."
 QING_HANLIN_ROSTER_TITLE:0 "The Waiting Laureates"
 QING_HANLIN_ROSTER_EMPTY:0 "No laureate waits in the Academy. The examination ladder has yielded no fresh talent."
 QING_HANLIN_COUNCIL_CONTRIB_LABEL:0 "The Hanlin Academy's net effect on the Grand Council"
