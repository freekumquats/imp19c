l_english:

 # ==========================================================================
 # row_buildings_l_english.yml — [bookmark-1763 #291] Rest-of-world specialty
 # production buildings (common/buildings/row_production_buildings.txt). Generic,
 # abstract counterparts to the Qing's five named specialty works — one manufactory
 # for finished/craft goods, one plantation for cash crops.
 # BOM / LF, matching the other localization/english/*.yml files.
 # ==========================================================================

 row_manufactory_building:0 "Manufactory"
 row_manufactory_building_desc:0 "A concentrated works of skilled looms, kilns and craft benches — the mills of Lancashire and Flanders, the Saxon and Bohemian workshops, the muslin houses of Bengal. It multiplies the province's output of finished and craft goods and swells the skilled middle and upper strata that staff it."

 row_plantation_building:0 "Plantation"
 row_plantation_building_desc:0 "A large commercial estate worked for export — Caribbean sugar, Chesapeake tobacco, Brazilian coffee, East-Indies spice. Labour-intensive: it multiplies the province's cash-crop output and draws in the lower strata and bound labour that worked the fields."

 # Build-menu / macro-builder tooltip strings (referenced by gui/shared/custom_tooltip.gui).
 tooltip_row_manufactory_building:0 "Multiplies the output of the province's finished- and craft-good industry (cloth, wool, silk, dye, textile fibres) and swells the skilled middle and upper strata. Buildable by any non-Chinese state on a matching good."
 tooltip_row_plantation_building:0 "Multiplies the output of the province's cash crop (sugar, tobacco, coffee, spices, opium) and draws in the lower and bound-labour strata that work the estate. Buildable by any non-Chinese state on a matching good."
 tooltip_macro_building_title_row_manufactory_building:0 "#T Build #L $row_manufactory_building$#!"
 tooltip_macro_building_title_row_plantation_building:0 "#T Build #L $row_plantation_building$#!"
