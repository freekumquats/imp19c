l_english:

 # ====================================================================
 # THE EMPEROR EMERITUS (太上皇): NAPOLEON AT THE QING COURT — task #65.
 # The counterfactual reform chain (qing_napoleon_events.txt). Napoleon is a
 # conjured character with a random GetName, so his real name is carried BOTH as
 # a pinned nickname (NICKNAME_QING_NAPOLEON, at the foot of this file) AND written
 # into the event text. The chain: .1 arrival → .2 reform hub → .3 backlash →
 # .4 the Daoguang Doctrine capstone.
 # Sources: the 太上皇 precedent (Qianlong's 1796 abdication to Jiaqing while
 # keeping power); standard Napoleonic historiography for the reform slate.
 # The sleeping-giant line ("Let China sleep...") is apocryphal, attributed to
 # Napoleon at St Helena — apt for the man himself to voice here.
 # ====================================================================

 # ---- .1  L'ARRIVÉE — THE EXILE OFFERED THE THRONE'S RIGHT HAND ------
 qing_napoleon.1.t:0 "The Sleeping Giant"
 qing_napoleon.1.desc:0 "'Let China sleep; when she wakes, she will shake the world.' So the Corsican is said to have murmured, gazing at a map in his exile.\n\nWaterloo is lost. But the man who remade Europe has not sailed for St Helena. A secret embassy has borne Napoleon Bonaparte eastward instead — and now he stands, improbably, in the halls of the Forbidden City, offering his sword and his statecraft to the Great Qing. He asks not for a throne, but for the ear of one: to serve as the dynasty's right hand, as a Retired Emperor of old once guided a young successor.\n\nThere is precedent the Grand Council cannot ignore. The Qianlong Emperor, abdicating in 1796 that he might not reign longer than his grandfather, took the title 太上皇 — Emperor Emeritus — and ruled in all but name three years more. The office could be revived. The barbarian genius could be seated in it.\n\nOr he could be sent, as Europe intends, to a rock in the southern ocean."
 qing_napoleon.1.a:0 "Revive the office of Emperor Emeritus (太上皇) for him."
 qing_napoleon.1.a.tt:0 "Receive Napoleon and confer the 太上皇 office upon him. #G He joins the Grand Council and opens a slate of radical reforms#! — but #R a foreign usurper-emperor forcing change enrages the conservative Manchu establishment#!, and he is loyal only while his revenge on Britain and Russia is served."
 qing_napoleon.1.b:0 "The Middle Kingdom needs no barbarian's sword."
 qing_napoleon.1.b.tt:0 "Turn him away. #G +1 Stability#! as the court's dignity is preserved; the chance passes for good."

 # ---- .2  LE GRAND ŒUVRE — THE REFORM COUNCIL -----------------------
 qing_napoleon.2.t:0 "The Reform Council"
 qing_napoleon.2.desc:0 "From the seat of the Emperor Emeritus, Napoleon lays his programme before the throne. He speaks of law codified so that every subject stands equal beneath it; of a bank of the state to master the empire's silver; of schools in every prefecture; of an army raised from the whole people and drilled in the new way. And always, beneath the reforms, the same cold purpose: to forge a China strong enough to break the powers that broke him.\n\nWhat shall the council take up?"
 qing_napoleon.2.a:0 "拿破崙法典 — Promulgate the Napoleonic Code."
 qing_napoleon.2.a.tt:0 "Codify the civil law. #G Cuts corruption; advances Self-Strengthening; +tax, +promotion#! from a rational, uniform administration."
 qing_napoleon.2.b:0 "中央銀行 — Found a central bank."
 qing_napoleon.2.b.tt:0 "Establish a modern fiscal-monetary institution. #G A grant to the treasury; advances Self-Strengthening; +commerce, +tax#!."
 qing_napoleon.2.c:0 "國民教育 — Establish primary education."
 qing_napoleon.2.c.tt:0 "Schools in every prefecture. #G Builds a school; advances Self-Strengthening; +research, +promotion#!."
 qing_napoleon.2.d:0 "全民皆兵 — Decree the levée en masse."
 qing_napoleon.2.d.tt:0 "Conscript and drill a modern army. #G Raises La Grande Armée de Chine at the capital under Napoleon; cuts banner decay; advances Self-Strengthening; +manpower, +morale#!."
 qing_napoleon.2.e:0 "以夷制夷 — Follow his line against Britain and Russia."
 qing_napoleon.2.e.tt:0 "Adopt the anti-British, anti-Russian, pro-French tilt. #R Raises tension with Britain and Russia#!; #G warms France and keeps the Emperor Emeritus loyal#! — his revenge is being served."
 qing_napoleon.2.f:0 "道光主義 — Consolidate the reforms into a lasting doctrine."
 qing_napoleon.2.f.tt:0 "Requires the reform slate substantially complete. #G Proclaim the Daoguang Doctrine#! — the permanent capstone of the whole enterprise."
 qing_napoleon.2.g:0 "Let the council rest for now."

 # ---- .3  LA RÉACTION — THE CONSERVATIVE MANCHU BACKLASH ------------
 qing_napoleon.3.t:0 "The Reaction of the Old Guard"
 qing_napoleon.3.desc:0 "It was inevitable. A foreign conqueror seated above the banners, tearing down the usages of the ancestors in the name of some Frankish 'enlightenment' — the staunch Manchu princes and the conservative censors are beside themselves. Memorials pile upon the throne denouncing the barbarian Emperor Emeritus; whispers of worse than memorials pass in the courtyards of the Eight Banners.\n\nThe throne must choose: stand with its dangerous, brilliant servant — or rein him in to appease the men whose loyalty the dynasty was built upon."
 qing_napoleon.3.a:0 "Stand with the Emperor Emeritus."
 qing_napoleon.3.a.tt:0 "Face down the reaction. #G Reform pressure eases and Napoleon is heartened#!; #R -1 Stability#! as the old guard seethes."
 qing_napoleon.3.b:0 "Rein him in to placate the old guard."
 qing_napoleon.3.b.tt:0 "Check the reforms. #G Ethnic tension eases, +1 Stability#!; #R Napoleon is estranged at being curbed#! and his loyalty falls."

 # ---- .4  道光主義 — THE DAOGUANG DOCTRINE (CAPSTONE) ---------------
 qing_napoleon.4.t:0 "The Daoguang Doctrine"
 qing_napoleon.4.desc:0 "The Prince Mianning — he who will reign as the Daoguang Emperor — has grown to manhood under the tutelage of the Emperor Emeritus, schooled as no Qing heir before him: in the new law, the new finance, the new war, and the cold logic of a foreign policy aimed like a gun at London and St Petersburg.\n\nNow he gathers the whole enterprise into a single doctrine of state and sets his seal to it — 道光主義, the Daoguang Doctrine — that the reforms may outlast the reformer and the strange old Corsican who wrought them. China has woken."
 qing_napoleon.4.a:0 "Proclaim the Daoguang Doctrine."
 qing_napoleon.4.a.tt:0 "#G Grant the permanent capstone modifier#! — +tax, +commerce, +morale, +research, +legitimacy and stability — and #G resolve the reform crisis in the reform direction#!. The chain is complete."

 # ---- Pinned nickname (the conjured character's GetName is random) ---
 NICKNAME_QING_NAPOLEON:0 "Napoleon Bonaparte"
