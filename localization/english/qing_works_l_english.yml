l_english:
 qing_dike_building:0 "河堤 River Dike"
 qing_dike_building_desc:0 "A section of the Yellow River dike system (黃河河堤), maintained by the Ministry of Works at enormous annual expense (河工). Reduces flood risk and supports local food production."
 qing_canal_depot_building:0 "漕運倉 Grand Canal Depot"
 qing_canal_depot_building_desc:0 "A grain-tribute granary and warehouse on the Grand Canal (大運河), part of the 漕運 system that moved rice north to the capital. Supports trade, food supply, and tax collection."
 qing_wall_section_building:0 "長城段 Great Wall Section"
 qing_wall_section_building_desc:0 "A restored monumental section of the Great Wall (長城). Militarily obsolete by the Qing but symbolically resonant — a demonstration of imperial majesty and defensive resolve."
 qing_great_wall_building:0 "長城 The Great Wall"
 qing_great_wall_building_desc:0 "The Great Wall (長城) proper — the monumental defensive wonder of the empire, far grander than a single restored section. A mighty bulwark on the northern frontier and a radiant mark of imperial majesty and civilisation. A great labour project, raised at the cost of both treasury and the corvée manpower of a generation."
 qing_grand_canal_building:0 "大運河 The Grand Canal"
 qing_grand_canal_building_desc:0 "The Grand Canal (大運河) proper — the empire's great movement-and-trade artery running from the Yangtze delta to the capital, far beyond a single depot. It speeds the passage of grain, troops and couriers, swells trade and feeds the north. A great labour project, cut at the cost of both treasury and the corvée manpower of a generation."

 qing_works.1.t:0 "The Yellow River Dike Breach"
 qing_works.1.desc:0 "A section of the Yellow River (黃河) dike system has failed, and floodwaters threaten the North China plain. The Ministry of Works (工部) advises immediate repairs, but the hydraulic-works budget (河工) is notoriously a sink of graft and overruns. A proper repair will be costly; a cheap one will feed corruption and risk recurring failures."
 qing_works.1.a:0 "Commission a proper dike repair."
 qing_works.1.a.tt:0 "The Ministry of Works will build a well-maintained river dike (河堤). Cost scaled by the minister's finesse."
 qing_works.1.b:0 "Cut corners and save the treasury."
 qing_works.1.b.tt:0 "A cheap repair feeds corruption and risks recurring floods."
 qing_works.1.c:0 "We cannot afford it."
 qing_works.1.c.tt:0 "The dike fails; flood damage (unrest, loyalty hit)."

 qing_works.2.t:0 "The Grand Canal Silts Up"
 qing_works.2.desc:0 "The Grand Canal (大運河) system is clogging with silt, threatening the grain-tribute lifeline (漕運) that feeds the capital. The Ministry of Works (工部) can dredge and maintain the canal, but the cost is high. Alternatively, we could shift to sea-borne grain transport, abandoning the old system — but that will cause unrest among the canal workers and dependent regions."
 qing_works.2.a:0 "Dredge the canal and maintain the tribute system."
 qing_works.2.a.tt:0 "The Ministry of Works will build a canal depot (漕運倉). Cost scaled by the minister's finesse."
 qing_works.2.b:0 "Dredge it cheaply."
 qing_works.2.b.tt:0 "A cheap dredge feeds corruption and risks decay."
 qing_works.2.c:0 "Shift to sea transport and abandon the canal."
 qing_works.2.c.tt:0 "The old system collapses; unrest and stability loss."

 qing_works.3.t:0 "Rebuild the Great Wall"
 qing_works.3.desc:0 "The Ministry of Works (工部) proposes restoring a monumental section of the Great Wall (長城) as a prestige project. Militarily obsolete — the Wall did not stop our own conquest from Manchuria — but symbolically resonant. It would demonstrate imperial majesty and defensive resolve, at considerable cost."
 qing_works.3.a:0 "Commission the Great Wall restoration."
 qing_works.3.a.tt:0 "The Ministry of Works will build a restored Wall section (長城段). Cost scaled by the minister's finesse. Prestige and defensive benefits."
 qing_works.3.b:0 "Do it on the cheap."
 qing_works.3.b.tt:0 "A cheap rebuild feeds corruption but still grants prestige."
 qing_works.3.c:0 "Decline the project."
 qing_works.3.c.tt:0 "Save the treasury, forgo the prestige."

 qing_works.4.t:0 "River-Works Embezzlement Scandal"
 qing_works.4.desc:0 "The Grand Minister of Works (工部尚書) has been caught siphoning funds from the hydraulic-works budget (河工). The Yellow River dike system is a notorious sink of graft; officials have enriched themselves on overruns for generations. [works_minister.GetName] is merely the latest. Do we punish him, or let it slide?"
 qing_works.4.a:0 "Confiscate the embezzled funds and brand him corrupt."
 qing_works.4.a.tt:0 "Recover part of the funds, reduce corruption, taint the minister."
 qing_works.4.b:0 "Look the other way."
 qing_works.4.b.tt:0 "The minister prospers; corruption deepens."

 qing_works.5.t:0 "The Shoddy Dike Fails"
 qing_works.5.desc:0 "The cheap dike repair we commissioned has failed. The Yellow River (黃河) has breached the makeshift levee, and floodwaters are spreading across the North China plain. We can pay to repair it properly this time, or accept the damage."
 qing_works.5.a:0 "Repair it properly this time."
 qing_works.5.a.tt:0 "Commission a well-maintained dike (cost scaled by the minister's finesse)."
 qing_works.5.b:0 "Accept the flood damage."
 qing_works.5.b.tt:0 "Flood damage (unrest, loyalty hit); corruption worsens."

 qing_works_dike_maintained:0 "河堤 Well-Maintained Dikes"
 qing_works_dike_maintained_desc:0 "The Yellow River dike system is in good repair, protecting the populace from floods."
 qing_works_dike_shoddy:0 "河堤 Shoddy Dikes"
 qing_works_dike_shoddy_desc:0 "The dikes were repaired on the cheap; they may fail again."
 qing_works_flood_damage:0 "黃河水患 Flood Damage"
 qing_works_flood_damage_desc:0 "The Yellow River has flooded, causing widespread damage."
 qing_works_canal_maintained:0 "漕運 Canal Maintained"
 qing_works_canal_maintained_desc:0 "The Grand Canal is well-maintained, and the grain tribute flows smoothly."
 qing_works_canal_decay:0 "漕運衰敗 Canal Decay"
 qing_works_canal_decay_desc:0 "The canal is deteriorating despite recent dredging."
 qing_works_canal_abandoned:0 "漕運廢棄 Canal Abandoned"
 qing_works_canal_abandoned_desc:0 "The Grand Canal tribute system has been abandoned; sea transport replaces it."
 qing_works_wall_restored:0 "長城重建 Great Wall Restored"
 qing_works_wall_restored_desc:0 "A monumental section of the Great Wall has been restored, demonstrating imperial majesty."
 qing_works_wall_shoddy:0 "長城草率 Shoddy Wall Work"
 qing_works_wall_shoddy_desc:0 "The Wall section was rebuilt on the cheap; prestige is diminished."
 qing_works_wall_deferred:0 "長城擱置 Wall Project Deferred"
 qing_works_wall_deferred_desc:0 "We declined the Great Wall restoration to conserve funds."
 qing_works_graft_tolerated:0 "河工貪腐 River-Works Graft Tolerated"
 qing_works_graft_tolerated_desc:0 "We turned a blind eye to embezzlement in the hydraulic-works budget; corruption has deepened."

 # [#188 task #188] .6 expand-state-industry event (specialty production works)
 qing_works.6.t:0 "A Memorial to Expand State Industry"
 qing_works.6.desc:0 "A memorial from the Ministry of Works reaches the throne. The empire's finest goods — the silk of the Jiangnan, the blue-and-white of Jingdezhen, the export tea of the Wuyi hills, the cotton cloth of Songjiang, the salt of the great yards — flow from provinces that as yet lack a proper state manufactory. The Grand Minister of Works proposes to raise one, drawing skilled labour to the craft and swelling the region's output. It will not be cheap."
 qing_works.6.silk:0 "Raise an Imperial Silk Manufactory (織造局)"
 qing_works.6.silk.tt:0 "Build a #Y qing_silk_filature_building#! in a silk-producing province, multiplying its output. Cost scales with the Works minister's finesse."
 qing_works.6.porcelain:0 "Found an Imperial Kiln (御窯廠)"
 qing_works.6.porcelain.tt:0 "Build a #Y qing_porcelain_kiln_building#! in a porcelain-producing province, multiplying its output. Cost scales with the Works minister's finesse."
 qing_works.6.tea:0 "Establish a Tea Works (茶廠)"
 qing_works.6.tea.tt:0 "Build a #Y qing_tea_workshop_building#! in a tea-producing province, multiplying its output. Cost scales with the Works minister's finesse."
 qing_works.6.cotton:0 "Open a Cotton Workshop (棉紡織坊)"
 qing_works.6.cotton.tt:0 "Build a #Y qing_cotton_workshop_building#! in a cotton-producing province, multiplying its output. Cost scales with the Works minister's finesse."
 qing_works.6.salt:0 "Commission a Salt Yard (鹽場)"
 qing_works.6.salt.tt:0 "Build a #Y qing_salt_yard_building#! in a salt-producing province, boosting output and tax revenue. Cost scales with the Works minister's finesse."
 qing_works.6.no:0 "The treasury cannot bear it now"
 qing_works.6.no.tt:0 "Defer the expense. The memorial is set aside."
