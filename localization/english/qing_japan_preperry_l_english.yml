 qing_jppre_loyalist_patron:0 "尊王攘夷 — Patron of the Loyalist Cause"
 qing_jppre_restoration_patron:0 "王政復古 — Godfather of the Restoration"
 qing_jppre_bakufu_friend:0 "佐幕 — Friend of the Bakufu"
 qing_jppre_bakufu_coast:0 "海防 — The Bakufu's Coastal Defences"
 qing_jppre_bakufu_stable:0 "黒船来航に備う — The Shogunate Steadied"

 # ---- mission ----------------------------------------------------------------
 qing_japan_preperry_mission:0 "幕末前夜 — The Eve of the Bakumatsu"
 qing_japan_preperry_mission_DESCRIPTION:0 "For two centuries the sea between the Middle Kingdom and the closed isles of Japan has been a silence, broken only by the Qing junks that trade at Nagasaki under the shogun's watchful eye. But the age is turning: the Western tide that batters our own coast will reach Edo too, and when it does, the question of what Japan becomes — a modernizing ally or a wary rival, an emperor restored or a shogunate endured — may be shaped by whose hand the Qing lends now. Open the channel, weigh the daimyo, and prepare for the black ships that must one day come."

 # ---- root: the Nagasaki channel ---------------------------------------------
 qing_jppre_nagasaki_channel:0 "長崎の唐人屋敷 — The Nagasaki China-House"
 qing_jppre_nagasaki_channel_DESC:0 "For all its seclusion, Japan is not wholly closed to us: the Qing junks trade at Nagasaki under the shogun's eye, and the merchants who ply that route carry more than silk and copper — they carry word. Set that traffic on a regular footing as a channel of intelligence, and learn what passes behind the closed door."
 qing_jppre_nagasaki_channel_tt:0 "Establish the #YNagasaki intelligence channel#! — the one legal Sino-Japanese contact. Deepens what the court knows of the closed isles and warms the informal relationship a touch. Gain the #GNagasaki China-House#! modifier (reputation, commerce)."
 qing_jppre_needs_japan_tt:0 "The Tokugawa Shogunate (#YTKG#!) must exist on the map."
 qing_jppre_needs_intel_tt:0 "Requires a Nagasaki intelligence depth of at least #Y20#!."
 qing_jppre_needs_intel_deep_tt:0 "Requires a Nagasaki intelligence depth of at least #Y40#!."

 qing_jppre_fusetsugaki:0 "風説書 — Read the News-Reports"
 qing_jppre_fusetsugaki_DESC:0 "The Fusetsugaki — the \"wind-rumour writings\" the Chinese and Dutch traders file at Nagasaki — are Edo's own window on the world. Read them as closely as Edo does, and they become our window upon Edo: the temper of the shogun's court, the pressure the Western powers bring to bear, the names of the men who might one day matter."
 qing_jppre_fusetsugaki_tt:0 "Read the Nagasaki news-reports closely. Deepens the intelligence channel further and readies the diplomacy to come. Gain the #GNews-Reports#! modifier (political influence, research)."

 qing_jppre_cautionary_tale:0 "前車之鑑 — The Cautionary Tale"
 qing_jppre_cautionary_tale_DESC:0 "The Middle Kingdom has felt the Western gun and signed the Western treaty. That lesson need not be Japan's alone to learn late: press it upon Edo now, as the Dutch and our own merchants already whisper it, and shape which counsel prevails across the sea — stubborn exclusion, or open-eyed reform."
 qing_jppre_cautionary_tale_tt:0 "Press upon Edo the lesson of the Opium War. Deepens the exchange and stirs the reform-minded across the sea. #YRequires that the unequal-treaty system has been imposed upon the Qing.#!"
 qing_jppre_needs_opium_lesson_tt:0 "The unequal-treaty system must first have been imposed upon the Qing (the Opium War fought and lost)."

 # ---- ARC R — the loyalist road ----------------------------------------------
 qing_jppre_back_daimyo:0 "薩長 — Back a Tozama Daimyo"
 qing_jppre_back_daimyo_DESC:0 "Among the great outer lords two chafe hardest under the Tokugawa yoke: Chōshū of the far west and Satsuma of the deep south — the same houses whose swords will, in another history, restore the emperor. Pour the court's silver behind one of them as a modernizing, imperial-loyalist power, and plant a friend of the Qing at the heart of Japan's coming turn."
 qing_jppre_back_daimyo_tt:0 "Choose and back one of the great outer lords — Chōshū or Satsuma — as a loyalist power. #YCommits the dynasty to the loyalist road#! (the bakufu road is then closed). A reform-minded councillor rises in the daimyo's court to carry the cause."
 qing_jppre_road_uncommitted_tt:0 "The dynasty must not already have committed to the other road — the loyalist and the bakufu roads are a single choice, not both."
 qing_jppre_needs_a_tozama_tt:0 "At least one of Chōshū (#YCSU#!) or Satsuma (#YSHZ#!) must exist on the map."
 qing_jppre_needs_faction_tt:0 "Requires a loyalist-faction strength of at least #Y40#!."

 qing_jppre_fan_sonno_joi:0 "尊王攘夷 — Fan the Loyalist Flame"
 qing_jppre_fan_sonno_joi_DESC:0 "\"Revere the emperor, expel the barbarian\" — the cry of the loyalist samurai. Fund the sonnō-jōi agitation in the han we have chosen, spread its pamphlets and its swordsmen, and let the shogun's writ fray at the edges as the domains look past Edo to Kyoto and the throne."
 qing_jppre_fan_sonno_joi_tt:0 "Fund the sonnō-jōi agitation and erode the shogun's grip. Reinforces the daimyo the court chose to back. Gain the #GPatron of the Loyalist Cause#! modifier (reputation, legitimacy)."

 qing_jppre_restoration:0 "王政復古 — The Restoration"
 qing_jppre_restoration_DESC:0 "The moment is come. The grip of the Tokugawa has broken, and the han we have armed and funded raises the banner of the restored emperor. The daimyo throws off its overlord and takes the field; the old order falls, and a new Japan — one that owes its birth in part to the Middle Kingdom — is born of the civil war. It is the Boshin turning, midwifed by the Qing."
 qing_jppre_restoration_tt:0 "The backed daimyo throws off the Tokugawa and raises the Restoration banner. #YFrees the daimyo from the shogunate and begins the civil war behind the loyalist leader.#! A Japan restored with Qing backing enters the modern age an ally. Gain the #GGodfather of the Restoration#! modifier (reputation, commerce, legitimacy) and #G+40 prestige#!."
 qing_jppre_needs_restoration_tt:0 "Requires a loyalist-faction strength of at least #Y70#! and the shogun's grip fallen below #Y40#!."

 # ---- ARC B — the bakufu road ------------------------------------------------
 qing_jppre_shore_bakufu:0 "佐幕 — Shore Up the Shogunate"
 qing_jppre_shore_bakufu_DESC:0 "A revolution across the sea is a fire that leaps. Better, some at court argue, a stable and conservative neighbour than an untested new order — better the shogun we know. Lend Edo the Qing's silver and counsel, prop up the Tokugawa authority, and cool the loyalist agitation before it catches."
 qing_jppre_shore_bakufu_tt:0 "Back Tokugawa authority for a stable, conservative neighbour. #YCommits the dynasty to the bakufu road#! (the loyalist road is then closed). Restores the shogun's grip and cools the loyalist camp. Gain the #GFriend of the Bakufu#! modifier (commerce, reputation)."
 qing_jppre_needs_grip_tt:0 "Requires the shogun's grip at #Y75#! or above."
 qing_jppre_needs_strong_grip_tt:0 "Requires the shogun's grip at #Y85#! or above."

 qing_jppre_ready_bakufu:0 "海防 — Ready the Bakufu's Coast"
 qing_jppre_ready_bakufu_DESC:0 "The Qing learned the price of an undefended coast the hard way. Lend the shogunate what that lesson bought: engineers and cannon-founders, the drawings of shore batteries, the drill of the coastal garrison. A Japan whose coast is ready is a neighbour that will not panic when the black ships come."
 qing_jppre_ready_bakufu_tt:0 "Lend the shogunate coastal works and cannon. Strengthens Tokugawa authority further. Gain the #GThe Bakufu's Coastal Defences#! modifier (naval and land morale)."

 qing_jppre_meet_perry:0 "黒船来航 — Meet the Black Ships"
 qing_jppre_meet_perry_DESC:0 "The black ships come — as we knew they must. But a shogunate braced by Qing counsel meets them in good order: no panic in Edo, no collapse of the old order, a neighbour that receives the Western demand warily and endures. It meets the modern age on its feet, and the Qing stands beside it, wary of the same tide."
 qing_jppre_meet_perry_tt:0 "A shogunate steadied by the Qing meets Perry in good order — a wary, enduring neighbour. Gain the #GThe Shogunate Steadied#! modifier (reputation, manpower, legitimacy) and #G+30 prestige#!."

 # ---- .1  the cautionary tale ------------------------------------------------
 qing_japan_preperry.1.t:0 "前車之鑑 — The Lesson of the Overturned Cart"
 qing_japan_preperry.1.desc:0 "Word of the Middle Kingdom's humiliation has crossed the narrow sea. In Edo the scholars of Dutch learning and the men of the domains argue over what China's fate portends: some cry that the barbarian must be barred all the more fiercely; others whisper that resistance alone availed us nothing, and that Japan must learn what it can from the very West it fears. Our merchants at Nagasaki can shape which counsel prevails. What word shall we send?"
 qing_japan_preperry.1.a:0 "Send a stark warning — the barbarian must be kept out."
 qing_japan_preperry.1.a.tt:0 "Inflame the loyalist and expulsionist camp with a blunt account of the Western menace."
 qing_japan_preperry.1.b:0 "Counsel measured reform — learn from the West, do not merely resist."
 qing_japan_preperry.1.b.tt:0 "Deepen the exchange of knowledge more than the alarm — a Japan that reforms with open eyes."

 # ---- .2  choose the daimyo --------------------------------------------------
 qing_japan_preperry.2.t:0 "薩長の選択 — The Choice of Satsuma and Chōshū"
 qing_japan_preperry.2.desc:0 "The court's silver and its favour must fall on one house. Two of the great outer lords chafe most under the Tokugawa yoke: Chōshū of the far west, and Satsuma of the deep south — the same houses whose swords will one day, in another history, restore the emperor. Which shall the Middle Kingdom cultivate as its instrument and its friend?"
 qing_japan_preperry.2.choshu:0 "長州 — Chōshū, the western han."
 qing_japan_preperry.2.choshu.tt:0 "Back Chōshū (#YCSU#!) as the loyalist power. A reform-minded councillor rises in Hagi to carry the cause."
 qing_japan_preperry.2.satsuma:0 "薩摩 — Satsuma, the southern han of the Shimazu."
 qing_japan_preperry.2.satsuma.tt:0 "Back Satsuma (#YSHZ#!) as the loyalist power. A reform-minded councillor rises in Kagoshima to carry the cause."

 # ---- .10  the black ships ---------------------------------------------------
 qing_japan_preperry.10.t:0 "黒船来航 — The Coming of the Black Ships"
 qing_japan_preperry.10.desc:0 "It has come to pass as our watchers at Nagasaki foretold. An American squadron of black-hulled steamers under one Commodore Perry has anchored in the bay of Edo, and the shogunate — for all its edicts — has no answer but to receive them. The seclusion of two centuries is broken; Japan is forced open as we were forced open before her. Whatever we have built across the narrow sea, the age of silence is over, and the modern reckoning between our two empires begins."
 qing_japan_preperry.10.a:0 "So turns the age."
 qing_japan_preperry.10.a.tt:0 "The pre-Perry arc closes; the modern Japan relationship (the post-Perry mission tree) opens, carrying forward whatever accord or rivalry the court has built."
