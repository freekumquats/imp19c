# --- Government-view panel header + per-button tooltips -------------------
 QING_STATECRAFT_HEADER:0 "Statecraft of the Great Qing"
 QING_ACTION_STANCE_DYARCHY_TT:0 "#Y Hold the Manchu-Han Dyarchy (滿漢)#!\nThe costly middle path: paired appointments and a balanced court. #G Lowers ethnic tension over time#! and steadies the realm, but wins neither the banners' full loyalty nor the Han literati's full purse. Sets the balanced-dyarchy stance."
 QING_ACTION_STANCE_BANNER_TT:0 "#Y Favour the Banners (旗)#!\nLean on the Manchu martial caste. #G +manpower, +infantry discipline#!, but #R -tax and Han unrest#! as the conquered majority is slighted. Sets the banner-favouring stance."
 QING_ACTION_STANCE_HAN_TT:0 "#Y Favour the Han Literati (漢)#!\nCourt the scholar-gentry who staff the ministries and fill the treasury. #G +tax, +promotion speed#!, but #R -manpower and banner resentment#! as the founding caste is eclipsed. Sets the Han-favouring stance."
 QING_ACTION_AUDIT_TT:0 "#Y Anti-Corruption Audit (養廉銀)#!\nSpend #R £100#! on Yongzheng's 'nourish-honesty' remedy: #G sharply cut the corruption meter#!, at the cost of #R +3 Tyranny#! as the purge bites. Requires £100."
 QING_ACTION_SELL_OFFICES_TT:0 "#Y Sell Offices (捐納)#!\nRaise #G ~£80#! at a stroke by selling ranks and degrees — but #R corruption climbs sharply#! and the bureaucracy fills with purchase-minded officials (a lasting admin malus)."
 QING_ACTION_SUPPRESS_SECTS_TT:0 "#Y Suppress the Secret Societies (保甲)#!\nSpend #R £70#! on surveillance and the mutual-responsibility system to root out the heterodox sects: #G markedly cut sect pressure#!. Requires £70."
 QING_ACTION_BANNER_DRILL_TT:0 "#Y Banner Reform Drill (國語騎射)#!\nSpend #R £60#! to drill the banners in Manchu and mounted archery: #G restore martial vigour and cut banner decay#!, for a temporary upkeep bump. Requires £60."
 QING_ACTION_PROMOTE_CIVIC_TT:0 "#Y Promote Civic Identity (中華)#!\nSpend #R £90#! on national schools and a common press to forge a shared civic “Chinese” identity above the empire’s ethnic lines: #G builds civic identity#! (which cools ethnic tension and, in time, binds the realm’s peoples into one nation) and nudges self-strengthening. Requires the movement to be underway, and £90."
 QING_ACTION_GRANARY_INVEST_TT:0 "#Y Stock the Ever-Normal Granaries (常平倉)#!\nSpend #R £80#! to buy grain against the lean years: #G builds granary stock#! that buffers famine and can be released to quell unrest. Requires £80."
 QING_ACTION_STATECRAFT_INVEST_TT:0 "#Y Statecraft Investment (振興庶政)#!\nSpend #R £120#! and #R 10 political influence#! to raise the sinews of the state at a stroke: #G build schools in the three most populous cities and administration districts in the two largest#!, thickening administrative capacity from the 1815 start. The effort #G nudges the bureau-capacity meter#!. What can be built depends on the reforms already known — #Y Education#! for schools, #Y Central Administration#! for administration districts. Requires £120 and 10 political influence."
 QING_ACTION_SUPPRESS_OPIUM_TT:0 "#Y Suppress the Opium Trade#!\nThe Lin Zexu path: seize and destroy the foreign opium to stem the silver drain. #G Eases reserve stress and restores the specie reserve#!, but #R +5 Aggressive Expansion#! — the road to war. Available while currency stress is high."
 QING_ACTION_CANTON_OPEN_TT:0 "#Y Open the Canton Trade (公行)#!\nLicense the Cohong merchants to expand the foreign trade: a lasting #G commerce boom#!, at the risk of more silver churn and opium ingress. Sets the Canton regime to open."
 QING_ACTION_CANTON_CLOSE_TT:0 "#Y Close the Canton Trade (海禁)#!\nRestrict the foreign trade in the Qianlong manner: #G tighter control and less silver outflow#!, but #R -commerce#!. Sets the Canton regime to closed."

