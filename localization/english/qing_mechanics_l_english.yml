 QING_ACTION_COURT_BRITAIN_TT:0 "#Y Court Great Britain (親英)#!\nSeek a full accommodation with the foremost sea power: #G deeply eases British tension and wins London's goodwill#!. But partisanship has a price — #R France and Russia take offence, and tension with both edges up#!.\n\nCost: #R 50 Treasury#!."
 QING_ACTION_COURT_FRANCE_TT:0 "#Y Court France (親法)#!\nSeek a full accommodation with Paris: #G deeply eases French tension and wins French goodwill#!. But partisanship has a price — #R Britain and Russia take offence, and tension with both edges up#!.\n\nCost: #R 50 Treasury#!."
 QING_ACTION_COURT_RUSSIA_TT:0 "#Y Court Russia (親俄)#!\nSeek a full accommodation with St. Petersburg, the great neighbour on the northern frontier: #G deeply eases Russian tension and wins Russian goodwill#!. But partisanship has a price — #R Britain and France take offence, and tension with both edges up#!.\n\nCost: #R 50 Treasury#!."

