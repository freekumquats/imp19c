l_english:

# ============================================================================
# Localization for the Qing player-experience mechanics suite.
#   events:  qing_decline.* / qing_reform.* / qing_frontier.* / qing_char.* /
#            qing_urn.* (events/imp19c_mod_events/qing_*.txt)
#   modifiers: common/modifiers/qing_mechanics_modifiers.txt
#   scripted GUI tooltips: common/scripted_guis/QING_mechanics_actions.txt
# Flavor is grounded in real Qing history and cites its sources inline, matching
# qing_subject_integration_l_english.yml. [scope:target.GetName] = a subject;
# [scope:qing_char.GetName] = the courtier an event concerns.
# ============================================================================

# ####################################################################
# DECLINE ENGINE REACTION EVENTS (qing_decline.*)
# ####################################################################

# --- .10  SYSTEMIC CORRUPTION SCANDAL -------------------------------------
 qing_decline.10.t:0 "Rot at the Heart of the Bureaucracy"
 qing_decline.10.desc:0 "The censors lay a memorial before the throne: peculation has spread through the provincial administration like damp through a granary. Magistrates pad their 'meltage fees' (火耗), sub-officials sell their signatures, and the customary 'gifts' that oil every transaction have swollen into open extortion.\n\nThe court cannot forget Heshen (和珅), the Qianlong Emperor's favourite whose graft was reckoned the most brazen in the dynasty's history — the fortune confiscated at his fall in 1799 was said to equal twelve years of imperial revenue (議罪銀). What was tolerated in one man has become the habit of an entire order. How shall the throne answer?"
 qing_decline.10.a:0 "Launch a grand audit and restore 'nourish-honesty' stipends (養廉銀)."
 qing_decline.10.a.tt:0 "Spend #R £100#! on Yongzheng's remedy: #G sharply cut corruption#!, at the cost of #R +3 Tyranny#! as the purge bites."
 qing_decline.10.b:0 "Make an example — impeach the worst and confiscate their fortunes."
 qing_decline.10.b.tt:0 "Seize the grandees' estates: #G +£120 treasury, +2 Stability#!, a step off the corruption meter, but #R +5 Tyranny#!."
 qing_decline.10.c:0 "Turn a blind eye; the machinery still turns."
 qing_decline.10.c.tt:0 "Change nothing: #G +1 Stability#! now, but #R corruption deepens#! and the rot spreads."

# --- .11  SECTARIAN UNREST ------------------------------------------------
 qing_decline.11.t:0 "Sedition in the Villages"
 qing_decline.11.desc:0 "In the crowded prefectures of [scope:sect_province.GetName], preachers of the heterodox sects gather the desperate by lamplight. They promise the coming of the Buddha Maitreya, an end to the taxes, and the fall of the alien dynasty.\n\nThe court knows these currents. The White Lotus (白蓮教) rose across the Han River highlands from 1794 and took eight years and untold silver to quell; its Eight Trigrams (天理教) offshoot breached the very walls of the Forbidden City in 1813. The Heaven-and-Earth Society (天地會) spins the same thread in the south. Left alone, a whisper becomes a rising."
 qing_decline.11.a:0 "Mount surveillance and root out the cells (保甲)."
 qing_decline.11.a.tt:0 "Spend #R £70#! on the mutual-surveillance system: #G markedly cut sect pressure#! and steady the realm."
 qing_decline.11.b:0 "Relieve the grievance — open the granaries and remit the taxes."
 qing_decline.11.b.tt:0 "Release #R granary stock#!: #G cut sect pressure#! and win goodwill without a crackdown. Requires stocked granaries."
 qing_decline.11.c:0 "Send the Green Standard Army to crush them."
 qing_decline.11.c.tt:0 "Suppress by force: #R -2 Stability#! and harsh unrest in [scope:sect_province.GetName], but the pressure drops."

# --- .12  YELLOW RIVER FLOOD ----------------------------------------------
 qing_decline.12.t:0 "The Yellow River Breaks Its Dikes"
 qing_decline.12.desc:0 "The waters of the Yellow River (黃河) have burst the embankments and drowned the fields of [scope:flood_province.GetName]. Whole prefectures are under water; the bodies of the poor drift among the ruined bunds.\n\nRiver conservancy (河工) was among the greatest charges on the treasury — and the deepest sink of graft. It was said that of every tael voted for the dikes, a fraction reached the works and the rest lined the pockets of the conservancy officials. The corruption the court has tolerated now returns as a flood. Relief cannot wait."
 qing_decline.12.a:0 "Fund emergency dike repair and famine relief."
 qing_decline.12.a.tt:0 "Spend #R £120#!: repair the works (a lasting #G hydraulic-works bonus#!) and ease the suffering, cutting sect pressure."
 qing_decline.12.b:0 "Release the ever-normal granaries to the flooded prefectures."
 qing_decline.12.b.tt:0 "Draw down #R granary stock#! to feed the victims and cut sect pressure. Requires stocked granaries."
 qing_decline.12.c:0 "The treasury cannot bear it; let the waters recede on their own."
 qing_decline.12.c.tt:0 "Do nothing: #R -2 Stability#!, rising sect pressure, and #R deepening corruption#! as the cause goes unaddressed."

# --- .13  BANNER-DECAY INCIDENT -------------------------------------------
 qing_decline.13.t:0 "The Banners Have Forgotten the Saddle"
 qing_decline.13.desc:0 "A review of the metropolitan garrison brings shameful news: bannermen who cannot draw a bow, officers illiterate in Manchu, muster rolls padded with the dead so that captains may draw their stipends. The martial caste that conquered the empire has become a pensioned urban rabble.\n\nThe Qianlong Emperor lamented this decay and ordered the 'national skills' — Manchu and mounted archery (國語騎射) — restored again and again, to little effect. In 1813 a few hundred sectarians walked into the palace precincts against a garrison too soft to stop them. The stipends bleed the treasury; the swords have rusted in their scabbards."
 qing_decline.13.a:0 "Fund a rigorous banner-reform drill (國語騎射)."
 qing_decline.13.a.tt:0 "Spend #R £60#!: #G restore martial vigour#! and cut banner decay, for a temporary upkeep bump."
 qing_decline.13.b:0 "Strike the padded rolls and cut the idle stipends."
 qing_decline.13.b.tt:0 "Reclaim #G ~£40#! of wasted pay, but the affronted bannermen stew: #R +ethnic tension#!."
 qing_decline.13.c:0 "The banners are the dynasty's foundation; let it slide."
 qing_decline.13.c.tt:0 "Change nothing: #R banner decay worsens#!."

# --- .14  ETHNIC TENSION FLARES -------------------------------------------
 qing_decline.14.t:0 "Manchu and Han"
 qing_decline.14.desc:0 "A quarrel at court over an appointment has laid bare the old fault line. The banner nobility grumble that the Han fill the ministries; the Han literati resent the reserved posts, the separate law, the garrison quarters walled off in every great city (旗民分治).\n\nThe dynasty has always ruled as a dyarchy — paired Manchu and Han appointments to every board, the emperor at once a Confucian sovereign, a Manchu khan, and a Buddhist patron. It is a balance, never a settlement (Elliott, *The Manchu Way*). Which way shall the throne lean?"
 qing_decline.14.a:0 "Reaffirm the balanced dyarchy (滿漢複職)."
 qing_decline.14.a.tt:0 "Hold the middle path: #G cool ethnic tension#! and set the balanced-dyarchy stance."
 qing_decline.14.b:0 "Favour the banners — they are the sword of the dynasty."
 qing_decline.14.b.tt:0 "Set the banner-favouring stance: #G +manpower, +discipline#! but #R -tax and Han unrest#!."
 qing_decline.14.c:0 "Favour the Han literati — they are its treasury and its pen."
 qing_decline.14.c.tt:0 "Set the Han-favouring stance: #G +tax, +promotion#! but #R -manpower and banner resentment#!."

# --- .20  A GOOD YEAR -----------------------------------------------------
 qing_decline.20.t:0 "A Year of Great Peace"
 qing_decline.20.desc:0 "The rains came in season, the harvest is heavy, and the frontier is quiet. The magistrates' reports for once carry no calamity. In such a year a prudent throne looks to the lean years it knows must follow.\n\nThe ever-normal granary system (常平倉) was the dynasty's boast — buying grain cheap in plenty to sell dear in dearth, so that the price never ruined either farmer or townsman. A full granary is a rebellion prevented before it begins."
 qing_decline.20.a:0 "Bank grain into the ever-normal granaries (常平倉)."
 qing_decline.20.a.tt:0 "Spend #R £80#! to build #G granary stock#! against future famine."
 qing_decline.20.b:0 "Lower the taxes and let the people prosper."
 qing_decline.20.b.tt:0 "Remit taxes: #G +2 Stability#! and lower sect pressure."

# ####################################################################
# REFORM TRACK EVENTS (qing_reform.*)
# ####################################################################

# --- .10  STATECRAFT MEMORIAL (#9a) ---------------------------------------
 qing_reform.10.t:0 "A Memorial on Practical Statecraft"
 qing_reform.10.desc:0 "A scholar of the 'statecraft' school (經世致用) submits a memorial of unusual force. He does not preach empty classical commentary but practical reform: the salt monopoly reorganised, the grain transport put to sea, the tax registers redrawn, corrupt sub-clerks swept out.\n\nThis is the current of Hong Liangji (洪亮吉), banished in 1799 for a memorial too blunt about the court's failings, and of Bao Shichen (包世臣) and later Wei Yuan (魏源) — men who sought renewal within the Confucian order, not outside it. Their reforms cost money and gore the oxen of entrenched interests, but they answer the rot with something other than despair."
 qing_reform.10.a:0 "Adopt the reforms in full."
 qing_reform.10.a.tt:0 "Spend #R £80#!: a lasting #G statecraft-reform#! bonus (#G +tax, -corruption, +research#!) and cut corruption."
 qing_reform.10.b:0 "Take only the anti-corruption thrust."
 qing_reform.10.b.tt:0 "A cautious start: #G cut corruption#! and #G +1 Stability#! at no cost."
 qing_reform.10.c:0 "Reject it as impractical meddling in the ancestral system."
 qing_reform.10.c.tt:0 "Refuse reform: #G +1 Stability#! now, but frustrated reformers add to #R reform pressure#!."

# --- .11  ANTI-CORRUPTION DRIVE (#9a) -------------------------------------
 qing_reform.11.t:0 "A Drive Against the Squeeze"
 qing_reform.11.desc:0 "Reform-minded officials press the throne to make an example of the 'customary fees' that have become open theft — to publish the true schedule of taxes, forbid the surcharges, and cashier the magistrates who grow fat on the difference.\n\nIt is the perennial Qing struggle: Yongzheng's 'return the meltage to the public purse' (火耗歸公) tried exactly this a century before, and the fees crept back the moment vigilance slackened. Vigilance is expensive; its absence is more so."
 qing_reform.11.a:0 "Fund a rigorous audit across the provinces."
 qing_reform.11.a.tt:0 "Spend #R £100#!: #G sharply cut corruption#! at the cost of #R +3 Tyranny#!."
 qing_reform.11.b:0 "The system is too entrenched to fight; let it be."
 qing_reform.11.b.tt:0 "Do nothing: #G +1 Stability#!, but #R corruption creeps up#!."

# --- .30  THE REFORM TRACK OPENS (#9b unlock) -----------------------------
 qing_reform.30.t:0 "The Empire at a Crossroads"
 qing_reform.30.desc:0 "The accumulated crises of the reign — the drained treasury, the risings, the humiliations, the whispered contempt for the ancestral ways — have crystallised into a single question that the throne can no longer defer. Memorials pour in. Some beg the emperor to seal the realm against the corrosive foreign learning and rule as his forefathers did. Others, greatly daring, speak of what the Japanese and the Westerners possess: a written constitution, a deliberative assembly, ministers answerable to more than the throne alone.\n\nThe court remembers Wei Yuan's *Illustrated Treatise on the Maritime Kingdoms* (海國圖志, 1843) and its call to 'learn the superior techniques of the barbarians to control the barbarians' (師夷長技以制夷). It does not yet know the names Kang Youwei (康有為) or Sun Yat-sen (孫中山). The direction the dynasty now chooses may decide whether it renews itself — or ends."
 qing_reform.30.a:0 "Renew the ancestral system itself — a Confucian restoration (同治中興)."
 qing_reform.30.a.tt:0 "The road of RENEWAL, not replacement: make the autocracy work again. #G +1 Stability#! now; if the realm is truly set in order, it can be sealed as a #Y revitalised absolute monarchy#! (the first golden-age end-state)."
 qing_reform.30.b:0 "Embrace cautious constitutional reform (君主立憲)."
 qing_reform.30.b.tt:0 "Open the constitutionalist path: a #G constitutionalist#! bonus (#G +stability, -unrest#!) toward a #Y constitutional monarchy#! — the emperor preserved, a parliament granted."
 qing_reform.30.c:0 "Reaffirm the Mandate of Heaven and clamp down."
 qing_reform.30.c.tt:0 "The reactionary path: a #G legitimacy#! bonus and #R +5 Tyranny#!, but suppression only builds the pressure beneath — leading toward open republican ferment."
 qing_reform.30.d:0 "Come to terms with the Heavenly Kingdom — walk the Christian road (天國)."
 qing_reform.30.d.tt:0 "Only if the throne has opened a channel to the Taiping movement. The hardest, most heterodox path: #G ease the sects#! and set out toward a #Y Christian theocracy#! (the fourth golden-age end-state)."

# --- .31  CONSTITUTIONALIST PRESSURE --------------------------------------
 qing_reform.31.t:0 "The Call for a Parliament"
 qing_reform.31.desc:0 "The constitutionalists will no longer be put off with study commissions. Provincial assemblies, gentry petitions, and reforming officials all press the same demand: a real constitution, a national parliament, and a cabinet responsible to it — the emperor preserved as sovereign, but the autocracy ended (君主立憲).\n\nThis was the road Kang Youwei (康有為) and Liang Qichao (梁啟超) urged in the Hundred Days' Reform (戊戌變法, 1898) before the Empress Dowager crushed it, and that a chastened court took up too late after 1906. To grant it is to give up the absolute power of the throne; to refuse it is to hand the initiative to those who would abolish the throne altogether."
 qing_reform.31.a:0 "Grant a constitution and a national parliament (君主立憲)."
 qing_reform.31.a.tt:0 "Become a #Y constitutional monarchy#!: #G +2 Stability#!, sharply lower reform pressure, and a lasting constitutionalist settlement — but the autocracy is ended."
 qing_reform.31.b:0 "Refuse; the sacred power of the throne is not divisible."
 qing_reform.31.b.tt:0 "Reject the parliament: #R reform pressure rises#! and #R republican ferment#! begins to spread, leading toward crisis."

# --- .32  REPUBLICAN FERMENT ----------------------------------------------
 qing_reform.32.t:0 "The Dynasty in the Balance"
 qing_reform.32.desc:0 "It has gone beyond parliaments now. Revolutionary societies proclaim the 'Three Principles of the People' (三民主義) — nationalism, democracy, the people's livelihood — and openly call for the expulsion of the alien Manchu house and the founding of a republic. The New Army garrisons are riddled with their sympathisers; a single mutiny could bring the whole edifice down.\n\nThis is the shadow of 1911: the Wuchang Uprising, the provinces declaring one after another, and the abdication that ended two thousand years of monarchy. The throne has run out of easy choices. What remains of the Great Qing hangs on the next command."
 qing_reform.32.a:0 "Yield to a republic and abdicate the dynasty's absolute claim."
 qing_reform.32.a.tt:0 "Become a #Y constitutional republic#!: the Qing endures as a state but the monarchy's autocratic claim ends. Reform pressure collapses; #G +1 Stability#! as the crisis resolves."
 qing_reform.32.b:0 "Concede a constitutional monarchy instead, while there is still time."
 qing_reform.32.b.tt:0 "A last compromise: become a #Y constitutional monarchy#! and cut reform pressure. Available only if not already constitutional."
 qing_reform.32.c:0 "Crush the revolutionaries — a last stand for the ancestral order."
 qing_reform.32.c.tt:0 "Suppress by force: #R -3 Stability, +3 War Exhaustion, +8 Tyranny#!. It buys time at a terrible price; the pressure is not gone."

# --- .33  THE HEAVENLY-KINGDOM PATH (Christian theocracy end-state) --------
 qing_reform.33.t:0 "The Unthinkable Accommodation"
 qing_reform.33.desc:0 "The channel to the God-Worshipping Society (拜上帝會) has stayed open, and what began as a truce has become something stranger. Their preachers speak of one God and of the Heavenly King (天王) sent to sweep the age clean; their discipline is fierce and their faith is real. The court that once vowed to exterminate the heresy now finds itself weighing whether to make it the faith of the realm.\n\nThis is the road not taken in history — where Zeng Guofan's Xiang Army broke the Taiping at Nanjing in 1864. Here the throne contemplates the opposite: a Heavenly Kingdom of Great Peace (太平天國) founded in earnest, a China remade around an imported and radicalised Christianity, with the Western powers who once officered the Ever-Victorious Army now courted as its sponsors. It is heresy, revolution, and salvation in one — and the hardest crown of all to seize."
 qing_reform.33.a:0 "Proclaim the Heavenly Kingdom (天國)."
 qing_reform.33.a.tt:0 "Requires the Christian path to have genuinely ripened (a high Taiping-path progress). Become a #Y Christian theocracy#! (militant theocracy, the syncretic Christian faith) — the fourth and rarest golden-age end-state. The Great Qing becomes something wholly new."
 qing_reform.33.b:0 "Deepen the accommodation, but do not yet take the leap."
 qing_reform.33.b.tt:0 "Walk further down the road: #G advance the Christian path#! toward the threshold, at the cost of #R rising reform pressure and instability#!."
 qing_reform.33.c:0 "Recoil from the heresy; abandon the Christian road."
 qing_reform.33.c.tt:0 "Turn back to orthodoxy: the Christian path is closed and reset, #R +3 Tyranny#! and #R the affronted sects stir#!."

# --- .34  THE RESTORATION PATH (revitalised absolute monarchy end-state) ---
 qing_reform.34.t:0 "The Mandate Renewed?"
 qing_reform.34.desc:0 "The throne has chosen renewal over surrender: not a parliament, not a republic, but the ancestral system made to work again — the dream of a true 中興, a mid-dynastic restoration such as the Han and Tang once achieved. But a restoration cannot be decreed into being; it must be earned in the granaries, the law-courts, and the honesty of the magistrates.\n\nThe historical Tongzhi Restoration (同治中興) of the 1860s flickered brightly and then guttered, undone by the very corruption and factional rot it had meant to cure. The question the throne now faces is simple and merciless: is the realm actually in order — or is this 'restoration' merely a fine phrase over the same decay?"
 qing_reform.34.a:0 "Seal the restoration; the Mandate is renewed (同治中興)."
 qing_reform.34.a.tt:0 "Requires a realm truly in order (high stability, corruption tamed). Seal the #Y revitalised absolute monarchy#! — the first golden-age end-state: the Confucian autocracy renewed rather than replaced, #G +3 Stability, +legitimacy#! and a lasting restoration."
 qing_reform.34.b:0 "Not yet — redouble the effort to set the house in order."
 qing_reform.34.b.tt:0 "The restoration is unearned. #G Cut corruption, +1 Stability#!, and return to the question in a few years."
 qing_reform.34.c:0 "Let the moment pass; the task is beyond us."
 qing_reform.34.c.tt:0 "Abandon the restoration: #R reform pressure builds#! as the wider crisis reasserts itself."
 qing_reform.35.t:0 "A Reckoning of Arms"
 qing_reform.35.desc:0 "On paper the New China is formidable: arsenals, dockyards, a fleet of ironclads, colleges of engineers. Yet a frontier clash — or merely a grand review before the court — lays bare an ugly truth the memorials had glossed over. The guns want shells of the right calibre; the gunners want training; the fleet's coal money has been quietly diverted; the staff-work that should knit arsenal to army to treasury simply does not exist.

This is the danger Benjamin Elman named the #R refraction#! of self-strengthening: progress bought and displayed, but never matched by the dull, unglamorous machinery — honest accounts, trained cadres, central coordination — that alone can wield it. History let the reckoning come at the Yalu in 1894, where the Beiyang Fleet was shattered in an afternoon. The throne is warned in time. What will it do?"
 qing_reform.35.a:0 "Close the gap: fund the staff-work, the accounts, the cadres."
 qing_reform.35.a.tt:0 "Requires a treasury of 80. #G Spend 80 to lift bureau capacity and council effectiveness and cut corruption#! — converting hollow progress into genuine strength. If the machinery now backs the movement, the #Y Hollow Modernization#! malus lifts."
 qing_reform.35.b:0 "Drill and review, but spend nothing we need not."
 qing_reform.35.b.tt:0 "A partial steadying: #G a small rise in council effectiveness#! narrows the gap a little. If that alone is enough to back the movement the #Y Hollow Modernization#! malus lifts; otherwise it persists until you close the gap in full."
 qing_reform.35.c:0 "Trust the paper strength; stage a show of force."
 qing_reform.35.c.tt:0 "Paper over the cracks: #G +25 Prestige#! and a little false momentum, but the #R brittle modernization persists and reform pressure builds#! — the reckoning is only deferred."

# ####################################################################
# FRONTIER / SEA / CANTON EVENTS (qing_frontier.*)
# ####################################################################

# --- .10  ORDERS ARRIVED TOO LATE (#2/#3) ---------------------------------
 qing_frontier.10.t:0 "The Frontier Cannot Wait for Peking"
 qing_frontier.10.desc:0 "Word comes from [scope:target.GetName] of a crisis already resolved. The frontier commander, faced with a raid — or a rebellion, or a foreign envoy — and unable to wait the many weeks a memorial takes to reach the capital and return, acted on his own authority.\n\nThis was the iron fact of ruling an empire the size of a continent. A memorial from Canton took a month or more each way; the Ili General, the Lhasa amban, and the southern viceroys governed on long leashes because real-time command was impossible (Bartlett, *Monarchs and Ministers*; Millward, *Beyond the Pass*). Add the tangle of tongues — decayed court Manchu, Turkic and Tibetan interpreters, Han clerks — and the throne learns of events only after they are history. Was the commander a loyal servant or a dangerous precedent?"
 qing_frontier.10.a:0 "Endorse his initiative — a good servant reads the throne's mind."
 qing_frontier.10.a.tt:0 "Reward the initiative: ruler #G +10 Prestige#!, but the frontier lag persists (#R -integrate speed, -subject loyalty#! for a time)."
 qing_frontier.10.b:0 "Recall and punish him — no viceroy may usurp the throne's word."
 qing_frontier.10.b.tt:0 "Assert control: #R +3 Tyranny#!, a longer spell of frontier lag, and #R +ethnic tension#! on the alienated frontier."
 qing_frontier.10.c:0 "Invest in faster couriers and better interpreters."
 qing_frontier.10.c.tt:0 "Spend #R £60#!: a lasting #G memorial-network#! bonus that speeds integration and steadies this subject."

# --- .11  THE PALACE-MEMORIAL NETWORK (I) ---------------------------------
 qing_frontier.11.t:0 "The Emperor's Secret Ears"
 qing_frontier.11.desc:0 "A grand councillor proposes to widen the palace-memorial system: to license more trusted officials to send sealed reports (奏摺) directly to the throne, bypassing the boards and the censorate, so that the emperor hears the frontier's truth unfiltered by the men who might wish to hide it.\n\nThis was Yongzheng's great instrument. The secret palace memorials and the Grand Council (軍機處) he built around them gave the throne a private intelligence network and pulled the sinews of empire into the emperor's own hands — the one real answer to distance and to the bureaucracy's habit of comfortable lies. It costs silver and it makes enemies of the men it watches."
 qing_frontier.11.a:0 "Fund the network in full."
 qing_frontier.11.a.tt:0 "Spend #R £80#!: a permanent #G memorial-network#! bonus (#G +integrate speed, +loyalty, +influence#!) and #G lower corruption#!."
 qing_frontier.11.b:0 "The old routes will suffice."
 qing_frontier.11.b.tt:0 "Decline: #G +1 Stability#! and no cost."

# --- .20  A EUROPEAN DELEGATION AT CANTON (H) -----------------------------
 qing_frontier.20.t:0 "Barbarian Merchants at Canton"
 qing_frontier.20.desc:0 "A European delegation waits at Canton, pressing for wider trade, resident envoys, and ports beyond the single southern gate the dynasty permits them.\n\nAll their commerce is funnelled through the Canton System (廣東十三行, from 1757), managed by the licensed Cohong merchants (公行) under the Hoppo's watchful and lucrative supervision. The system brought a river of silver — and it was precisely here, over trade and the swelling opium traffic, that the Qianlong Emperor's serene rebuff of the Macartney embassy ('we possess all things') curdled, a lifetime later, into war. To open the door is to profit and to risk; to bar it is to keep control and forgo the revenue."
 qing_frontier.20.a:0 "Expand the licensed trade (公行)."
 qing_frontier.20.a.tt:0 "Open the Canton trade: a lasting #G commerce boom#!, but more silver churn and #R rising currency stress#! as opium flows in with the trade."
 qing_frontier.20.b:0 "Keep them at arm's length, as the Qianlong Emperor did."
 qing_frontier.20.b.tt:0 "Rebuff the delegation: close the trade for control, and ruler #G +10 Prestige#! for upholding the ancestral order."

# --- .21  A TRIBUTE MISSION (H) -------------------------------------------
 qing_frontier.21.t:0 "A Tribute Mission Arrives"
 qing_frontier.21.desc:0 "Envoys from a tributary state — bearing local products, memorials of submission, and their ruler's request for investiture — have arrived to perform the rites before the throne.\n\nKorea, Vietnam, Ryukyu, Siam, and Burma sent such missions under elaborate protocol; they were the ceremonial heart of the tributary order (朝貢體系), by which the Middle Kingdom ordered the world around it and returned gifts often worth more than the tribute received. A mission well received is a border kept quiet without a soldier."
 qing_frontier.21.a:0 "Receive them with full imperial honours."
 qing_frontier.21.a.tt:0 "Spend #R £40#!: ruler #G +20 Prestige#! and a spell of #G trade boom#! from the goodwill and the exchange."
 qing_frontier.21.b:0 "Accept the tribute and return the customary gifts."
 qing_frontier.21.b.tt:0 "A modest reception: gain #G ~£20#! in tribute goods, net of the return gifts."

# --- .30  REVIVE THE TREASURE FLEETS (#6) ---------------------------------
 qing_frontier.30.t:0 "Shall the Dragon Throne Take to the Sea?"
 qing_frontier.30.desc:0 "A bold official lays before the throne a proposal without precedent in the dynasty: to build a great ocean fleet, not for coastal defence, but to project the empire's majesty across the southern seas — to overawe the tributaries, secure the sea lanes, and meet the maritime barbarians on their own element.\n\nHe invokes the treasure voyages of Zheng He (鄭和), whose vast 'treasure ships' (寶船) carried the Ming flag to Africa between 1405 and 1433 before a frugal, inward-looking court burned the shipyards and turned its back on the ocean (Dreyer, *Zheng He*). The Qing deepened that turn with sea-bans (海禁) and the Canton gate. To reverse two centuries of maritime retreat would be ruinously costly and would enrage the Confucian officials who hold the sea beneath the empire's dignity — a true gamble on an alternate destiny."
 qing_frontier.30.a:0 "Commission a new treasure fleet (寶船)."
 qing_frontier.30.a.tt:0 "Spend #R £250#!: #R -3 Stability#! and #R +reform pressure#! as the officials rage, but ruler #G +40 Prestige#! and a permanent #G commerce boom#! as the sea lanes open."
 qing_frontier.30.b:0 "The Middle Kingdom has no need of ocean ventures."
 qing_frontier.30.b.tt:0 "Decline the gamble: #G +1 Stability#! and the ancestral course held."

# ####################################################################
# CHARACTER-LEVEL EVENTS (qing_char.*)
# ####################################################################

# --- .10  A HAN MARRIAGE (#8) ---------------------------------------------
 qing_char.10.t:0 "A Marriage Across the Divide"
 qing_char.10.desc:0 "[scope:qing_char.GetName], a bannerman of good family, seeks the throne's blessing for a marriage into a wealthy Han gentry house. It is a match of mutual advantage — Manchu prestige and access wedded to Chinese land and learning — and it is, strictly, against the prohibition on banner intermarriage.\n\nSuch unions, and the slow forgetting of the Manchu tongue in the garrisons, were exactly the erosion the court feared: within a few generations many bannermen were Manchu in name and stipend only, Chinese in speech and habit (Elliott, *The Manchu Way*). Heshen himself embodied the type — a bannerman who traded on both worlds. To bless it is to gain a loyal, capable servant while the banner identity dissolves a little more."
 qing_char.10.a:0 "Bless the marriage — a capable servant is worth more than a rule."
 qing_char.10.a.tt:0 "Ruler #G +10 Prestige#! and [scope:qing_char.GetName] rises in favour, but his family #R sinicizes#! (identity shifts toward Han)."
 qing_char.10.b:0 "Forbid it; uphold banner endogamy."
 qing_char.10.b.tt:0 "[scope:qing_char.GetName] #G holds staunchly to Manchu identity#!, but the affront adds #R +ethnic tension#!."

# --- .11  MANCHU-LANGUAGE EXAMINATIONS (#8) -------------------------------
 qing_char.11.t:0 "Restore the National Skills (國語騎射)"
 qing_char.11.desc:0 "The banner schools report what the court has long feared to hear: the young bannermen can barely speak Manchu, and fewer still can shoot from the saddle. Officials propose to make the 'national skills' — the Manchu language and mounted archery — a hard requirement again, tested by examination, with stipends and promotions hanging on the result.\n\nThe Qianlong and Jiaqing Emperors issued exactly such decrees, again and again, railing at banner officers who could not read a Manchu memorial. The drives largely failed and chiefly irritated the comfortable, sinicized bannermen they were meant to reform. But to abandon the effort is to concede that the conquest elite has become indistinguishable from the conquered."
 qing_char.11.a:0 "Impose the examinations across the banners."
 qing_char.11.a.tt:0 "Spend #R £50#!: every Manchu courtier is pushed back toward #G staunch identity#! and #G banner decay falls#! — but sinicized grandees resent it."
 qing_char.11.b:0 "Let the old tongue fade; the empire is ruled in Chinese now."
 qing_char.11.b.tt:0 "Accept assimilation: #G +1 Stability#! from the eased pressure, but #R banner decay worsens#!."

# --- .20  PRINCELY FACTIONS (#4) ------------------------------------------
 qing_char.20.t:0 "The Princes Gather Their Parties"
 qing_char.20.desc:0 "The emperor ages, and the court holds its breath. No heir has been named, and the imperial princes have begun — discreetly at first, then less so — to gather factions of officials, generals, and censors about them, each camp advancing its master toward the throne.\n\nThe dynasty knows this poison too well. The Nine Lords' Struggle (九子奪嫡) tore the Kangxi Emperor's last years apart: the heir-apparent Yinreng twice raised and twice cast down, the 'eight lords' party' against the fourth prince's men, and an accession in 1722 so murky that it fed conspiracy theories for centuries (Silas Wu, *Passage to Power*). An open struggle can wreck a reign before it begins."
 qing_char.20.a:0 "Adopt the secret succession system (秘密立儲)."
 qing_char.20.a.tt:0 "Take up Yongzheng's remedy — seal the heir's name away and deny the factions a candidate to back. (Opens the next decision.)"
 qing_char.20.b:0 "Name an heir openly and be done with the uncertainty."
 qing_char.20.b.tt:0 "Declare an heir: #R -2 Stability#! and #R +ethnic tension#! as the passed-over princes and their backers seethe; the succession is marked contested."
 qing_char.20.c:0 "Let the princes contend; the worthiest will prevail."
 qing_char.20.c.tt:0 "Allow the struggle: #R -1 Stability#! and a real risk it curdles into an open succession crisis."

# --- .21  THE SECRET SUCCESSION SYSTEM (#5) -------------------------------
 qing_char.21.t:0 "Behind the Plaque of Rectitude"
 qing_char.21.desc:0 "The counsel is Yongzheng's own: write the chosen heir's name in the emperor's hand, seal it in a casket, and place it behind the tablet reading 'Rectitude and Brightness' (正大光明) above the throne in the Palace of Heavenly Purity — to be opened only at the emperor's death.\n\nWith no declared heir, the princes have no candidate to rally behind and no reason to intrigue; the choice remains wholly the emperor's until the last breath. The system Yongzheng devised (about 1723) gave the dynasty three smooth, uncontested successions in a row — Qianlong in 1735, Jiaqing in 1796, Daoguang in 1820 — a stability the open struggles of the founding reigns never knew."
 qing_char.21.a:0 "Seal the edict behind the 正大光明 plaque."
 qing_char.21.a.tt:0 "Adopt secret succession: #G +3 Stability#! and a lasting keel against factional struggle; any contested-succession crisis is defused."
 qing_char.21.b:0 "Reconsider; keep the open system for now."
 qing_char.21.b.tt:0 "Decline: #R -1 Stability#! as the uncertainty lingers."

# --- .22  SUCCESSION CRISIS (#4) ------------------------------------------
 qing_char.22.t:0 "The Succession Turns to Knives"
 qing_char.22.desc:0 "The open contest the throne permitted has curdled into something deadly. The princely factions no longer merely intrigue; they suborn generals, forge edicts, and whisper of coups. One camp must be broken, or the court will tear itself apart.\n\nThis was the aftermath the fourth prince — the Yongzheng Emperor — met on his contested accession: rival brothers imprisoned, their partisans purged, some dead in confinement, the throne secured by a ruthlessness that shadowed his whole reign. Mercy and severity each carry a price."
 qing_char.22.a:0 "Purge the rival faction, as Yongzheng did."
 qing_char.22.a.tt:0 "Strike hard: #R +8 Tyranny#! but #G +1 Stability#!, and a disloyal courtier is cast into prison."
 qing_char.22.b:0 "Reconcile the factions with honours and offices."
 qing_char.22.b.tt:0 "Buy peace: spend #R £60#! and gain #G +2 Stability#!, but the flood of bought loyalty deepens #R corruption#!."

# ####################################################################
# GOLDEN URN (qing_urn.*)
# ####################################################################

# --- .1  A HIGH LAMA HAS DIED ---------------------------------------------
 qing_urn.1.t:0 "The Golden Urn (金瓶掣籤)"
 qing_urn.1.desc:0 "A high lama of [scope:target.GetName] has died, and the search for his reincarnation has begun. The question reaches the throne: shall the amban enforce the golden urn, or shall the traditional search by oracle and sign be allowed to run its course?\n\nThe Qianlong Emperor imposed the urn in 1793 (欽定藏內善後章程二十九條): the names of the candidate infants were to be written on lots, sealed in a golden urn, and drawn under the amban's supervision — bureaucratising reincarnation itself to assert Qing sovereignty and to break the Tibetan noble houses' habit of finding the new lama conveniently among their own kin (Oidtmann, *Forging the Golden Urn*). To enforce it is to rule; to waive it — as the court did in 1860 and 1879 — is to keep Tibetan goodwill at the cost of control."
 qing_urn.1.a:0 "Enforce the urn — the reincarnation is a matter of imperial sovereignty."
 qing_urn.1.a.tt:0 "Assert control: #G cool ethnic tension#! and ruler #G +15 Prestige#!, but the Tibetan elite resents the imposition (#R frontier resentment#!)."
 qing_urn.1.b:0 "Grant an exemption; defer to the traditional search."
 qing_urn.1.b.tt:0 "Win Tibetan goodwill (#G imperial favour#!), but Qing authority slips and #R ethnic tension rises#!."
 qing_urn.1.c:0 "Hold a grand confirmation ceremony in Beijing (雍和宮)."
 qing_urn.1.c.tt:0 "Spend #R £80#!: both control and goodwill — ruler #G +25 Prestige#!, #G cool tension#!, and #G imperial favour#! — at the Yonghe Gong."

