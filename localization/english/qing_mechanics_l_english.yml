 # ---- #65 THE EMPEROR EMERITUS: NAPOLEON AT THE QING COURT ----------
 # Modifier display names for the reform chain (qing_mechanics_modifiers.txt +
 # se_QING_NAPOLEON.txt). See qing_napoleon_l_english.yml for the event text.
 qing_office_emeritus_active:0 "Emperor Emeritus Seated (太上皇)"
 qing_office_emeritus_active_desc:0 "The revived office of Retired Emperor — the title Qianlong held after his 1796 abdication — now conferred on Napoleon Bonaparte. From it he drives the reform of the state and the war-craft of its armies."
 qing_emeritus_conservative_backlash:0 "Conservative Backlash (守舊反動)"
 qing_emeritus_conservative_backlash_desc:0 "A foreign usurper-emperor tearing down the usages of the ancestors has enraged the staunch Manchu establishment. The reaction bleeds legitimacy, breeds unrest, and estranges the old guard — the price of Napoleon's reforms."
 qing_reform_napoleonic_code:0 "The Napoleonic Code (拿破崙法典)"
 qing_reform_napoleonic_code_desc:0 "Civil law codified and made uniform beneath the throne — a rational administration that cuts corruption and lifts revenue and the promotion of talent."
 qing_reform_central_bank:0 "The Central Bank (中央銀行)"
 qing_reform_central_bank_desc:0 "A bank of the state to master the empire's silver — modern fiscal-monetary machinery lifting commerce and the treasury's reach."
 qing_reform_primary_education:0 "Primary Education (國民教育)"
 qing_reform_primary_education_desc:0 "Schools in every prefecture — mass literacy and numeracy feeding research and the promotion of talent."
 qing_reform_levee_en_masse:0 "The Levée en Masse (全民皆兵)"
 qing_reform_levee_en_masse_desc:0 "An army raised from the whole people and drilled in the new way — a flood of manpower and the morale of a nation in arms."
 qing_napoleon_daoguang_doctrine:0 "The Daoguang Doctrine (道光主義)"
 qing_napoleon_daoguang_doctrine_desc:0 "The reforms and the anti-British, anti-Russian, pro-French line made a lasting doctrine of state by the heir Napoleon tutored — the durable capstone of the whole enterprise. 'China has woken.'"
