l_english:
 # [#366] Silver / Opium balance-of-trade monetary model (白銀外流 / 鴉片貿易).
 QING_OPIUM_OPEN_BTN:0 "Silver & Opium (白銀外流)"
 QING_OPIUM_OPEN_TT:0 "Open the silver-and-opium ledger (白銀外流 / 鴉片貿易): the balance of trade that once flooded the empire with New World silver and now, as the foreign opium trade grows, threatens to bleed it back out. Watch the import index, the addiction spreading among the people, and the net flow of silver — and set the prohibition policy that the Board of Revenue (戶部) will answer for."
 QING_OPIUM_PANEL_TITLE:0 "Silver & Opium — 白銀外流"
 QING_OPIUM_PANEL_DESC:0 "For a century the trade of Canton ran one way: the West craved the empire's tea, silk and porcelain, and paid in silver, until the vaults of the realm brimmed with foreign bullion and the copper-silver exchange held firm. Then the British Bengal traders found their counter-commodity — opium — and the flow reversed. Chest by chest the poison came in and the silver went out, the exchange turned against the common people, and the land tax bit ever harder in real terms. This is the gathering silver crisis (銀荒), and the Board of Revenue (戶部) is judged on it: the currency stress the drain feeds folds directly into the Revenue Minister's standing on the Grand Council. Prohibit the trade and enforce it, tolerate it for the customs revenue, or — when the wars are lost — accept the treaty that legalises it. Each choice writes itself into the ledger below."
 QING_OPIUM_STATE_TITLE:0 "The State of the Trade"
 QING_OPIUM_INDEX_LABEL:0 "Opium Import Index (鴉片輸入)"
 QING_OPIUM_INDEX_TT:0 "The intensity of the foreign opium trade (0–100), climbing on its own historical schedule as the British country-trade expands — a trickle in the High Qing, a flood by the 1830s. A firm prohibition under an Imperial Commissioner suppresses it; tolerating or legalising the trade lets it run; unlocking domestic production pulls the imported share down (but not the addiction). This is the engine of the silver drain."
 QING_OPIUM_ADDICT_LABEL:0 "Addicted Share (煙癮)"
 QING_OPIUM_ADDICT_TT:0 "The share of the population fallen to the pipe (0–100), drifting up with the supply of opium — imported or home-grown — and down only when the drug is choked off. A high share hollows the labour force, breeds unrest, and swells the secret societies (the White Lotus and, later, the Taiping) with the ruined and the destitute."
 QING_OPIUM_NETFLOW_LABEL:0 "Net Silver Flow, last quarter"
 QING_OPIUM_NETFLOW_TT:0 "The balance of trade last quarter: the silver earned by exporting tea, silk and porcelain, less the silver drained out to pay for opium. A positive figure means bullion flowing in (the High-Qing surplus that backed the currency); a negative one means the drain of the crisis years. This net flow is fed straight into the currency-stress meter below."
 QING_OPIUM_STRESS_LABEL:0 "Currency Stress (銀荒)"
 QING_OPIUM_STRESS_TT:0 "The strain on the silver currency (0–100), driven both by the treasury's reserve ratio and by this trade balance. A surplus eases it; the opium drain drives it up. This is the shared silver-crisis meter: at 40 it triggers the reformers' reckoning, and one-sixth of it is subtracted from the Board of Revenue Minister's performance on the Grand Council — so the drain is his burden to answer for."
 QING_OPIUM_POLICY_TITLE:0 "The Prohibition Policy"
 QING_OPIUM_POLICY_NOTE:0 "The throne may prohibit the trade outright and appoint a commissioner to enforce it, tolerate it for the customs revenue it brings, or — once a treaty has forced the empire's hand — accept its legal, tariffed import. Domestic cultivation can substitute home-grown opium for the imported drug, staunching the silver drain at the cost of a deeper epidemic."
 QING_OPIUM_PROHIBIT_BTN:0 "Prohibit the Trade (嚴禁)"
 QING_OPIUM_PROHIBIT_TT:0 "Ban the opium traffic outright. Prohibition holds the moral high ground and, paired with an Imperial Commissioner, suppresses the import index — but smuggling never wholly stops, and the drain rolls on until the trade is truly broken. Unavailable once a treaty has legalised the trade."
 QING_OPIUM_TOLERATE_BTN:0 "Tolerate for Revenue (弛禁徵稅)"
 QING_OPIUM_TOLERATE_TT:0 "Wink at the trade and tax it instead. The customs take eases the fisc, but the silver drain and the addiction run unchecked, and the graft the traffic breeds deepens corruption. Unavailable once a treaty has legalised the trade."
 QING_OPIUM_COMMISSIONER_BTN:0 "Appoint an Imperial Commissioner (欽差大臣)"
 QING_OPIUM_COMMISSIONER_TT:0 "Send a famed incorruptible official — a Lin Zexu — to Canton with plenary powers to stamp out the traffic. A resolute appointment steadies the throne's legitimacy and suppresses the import ramp while prohibition holds; it also sets the stage for the confrontation at Humen. Requires an active prohibition and no commissioner already in place."
 QING_OPIUM_DOMESTIC_BTN:0 "Unlock Domestic Production (以土抵洋)"
 QING_OPIUM_DOMESTIC_TT:0 "Permit the cultivation of the poppy in Yunnan and Sichuan: hill provinces there turn to opium, and you may raise #Y Poppy Farms (罌粟田)#! on them. Home-grown opium substitutes for the imported drug, so the silver drain eases in proportion to what the empire grows for itself (以土抵洋) — but the epidemic deepens, the drug now cheaper and everywhere. An irreversible turn."
 # --- .1 the silver-drain memorial ---
 qing_opium.1.t:0 "The Silver Drain (銀荒之憂)"
 qing_opium.1.desc:0 "A censor of the Board of Revenue memorialises the throne in alarm. The foreign opium trade, he warns, has reversed the flow of silver: where once the West's hunger for tea and silk filled the empire's vaults, now chest upon chest of the poison drains that same silver back out through Canton. The copper-silver exchange turns against the common people, who pay their taxes in silver but earn in copper cash; the land revenue bites harder in real terms though the rate is unchanged; and the reserves thin. He begs the throne to act before the drain becomes a haemorrhage — either to break the traffic by force of prohibition, or, if that cannot be, to tax it and recoup what silver it can."
 qing_opium.1.prohibit:0 "Enforce the prohibition (嚴禁)"
 qing_opium.1.prohibit.tt:0 "Heed the memorial: appoint an Imperial Commissioner with plenary powers to stamp out the traffic at its source. The throne's resolve firms its legitimacy and suppresses the trade — and sets the stage for the reckoning at Canton."
 qing_opium.1.tolerate:0 "Tax it instead (弛禁徵稅)"
 qing_opium.1.tolerate.tt:0 "Judge prohibition unenforceable and tolerate the trade under a customs duty. A welcome sum flows into the treasury now — but the silver drain and the addiction run on unchecked, and the graft the traffic breeds deepens the corruption of the customs and the coast."
 # --- .2 the Humen decision ---
 qing_opium.2.t:0 "The Reckoning at Humen (虎門銷煙)"
 qing_opium.2.desc:0 "The Imperial Commissioner has done his work. He has blockaded the foreign factories at Canton, cut off their supplies, and forced the surrender of some twenty thousand chests of opium — the whole of the merchants' stock. Now the poison sits under guard, and the throne must decide its fate. To destroy it — to dissolve it in the great pits at Humen and flush it into the sea — would be a thunderclap of imperial resolve, a declaration to the whole realm and the barbarians alike that the trade is finished. But the British will not suffer the loss of their property meekly; their men-of-war are not far, and such an affront may well answer in gunfire. To return the chests would spare that danger — and confess before all that the throne's own commissioner may be overruled by foreign merchants."
 qing_opium.2.destroy:0 "Destroy it at Humen (銷煙)"
 qing_opium.2.destroy.tt:0 "Order the twenty thousand chests destroyed in the pits at Humen. A sharp blow to the traffic and a surge of legitimacy — the throne stands resolute against the barbarian poison — but Britain's fury is certain, and the road from here leads to war."
 qing_opium.2.release:0 "Return the chests (妥協)"
 qing_opium.2.release.tt:0 "Return the seized opium and avert the confrontation. No war is provoked — but the drain rolls on, and the court loses face before the whole realm, its own commissioner overruled."
 # --- .3 the treaty legalization ---
 qing_opium.3.t:0 "The Treaty Demand (條約弛禁)"
 qing_opium.3.desc:0 "The wars are lost, the treaties signed, the ports thrown open. And now the victors demand what they came for all along: not merely trade, but the legal, tariffed import of the very drug the empire fought to keep out. The throne can no longer refuse — the gunboats have seen to that. It can only choose how to bear the defeat. To accept the tariff is at least to recoup in customs some fraction of the silver the trade drains, and to end the ruinous pretence of a prohibition that the treaty powers will not permit. But it is also to surrender the moral ground entirely: opium legal, taxed, and everywhere, and the epidemic free to spread with no barrier left even in name."
 qing_opium.3.accept:0 "Accept the tariff (抽釐徵稅)"
 qing_opium.3.accept.tt:0 "Legalise and tax the opium trade as the treaty demands. The tariff revenue offsets the fisc — the drain is at least partly recouped as customs — but the epidemic, no longer checked even in name, is free to spread."
 # --- .4 the epidemic crisis ---
 qing_opium.4.t:0 "The Poison Spreads (煙毒蔓延)"
 qing_opium.4.desc:0 "A generation of the trade has hollowed the realm from within. There are addicts in every county now — in the yamens and the barracks as much as the wharves and the market towns — and the pipe has taken a fearful toll: fields untended, looms idle, sons who will not work and fathers who have sold the family land for another day's smoke. The secret societies swell with the ruined; the magistrates report that a growing part of the labour of whole prefectures is simply lost to the drug. This is no longer a question of the balance of trade; it is a sickness in the body of the people. The throne must decide whether to throw the whole weight of the state against it — or to bow to the reality and let the poppy at least be grown at home."
 qing_opium.4.suppress:0 "Suasion and suppression (勸戒并禁)"
 qing_opium.4.suppress.tt:0 "Mount a great campaign against the epidemic itself: interdiction, rehabilitation edicts, the gentry mobilised in every county. It costs dearly in silver and stirs unrest among the ruined who resist — but the addicted share is cut back, and the throne's resolve is seen. Requires a treasury to fund it."
 qing_opium.4.domestic:0 "Let the poppy pay (以土抵洋)"
 qing_opium.4.domestic.tt:0 "Bow to the reality and permit the cultivation of the poppy in Yunnan and Sichuan. Home-grown opium undercuts the foreign import and eases the silver drain — but the drug is now cheaper and closer than ever, and the epidemic deepens."
