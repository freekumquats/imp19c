 # ====================================================================
 # THE ANACHRONISTIC HISTORICAL-CHARACTER ROSTER (qing_roster_events.txt).
 # Task #13. Real late-Qing figures arrive keyed to mechanic context, not
 # to their birth date. Each figure's real name is carried BOTH as a pinned
 # nickname (the NICKNAME_QING_* keys at the foot of this file) AND written
 # into the event text, since the engine gives conjured characters a random
 # GetName. Sources cited across the suite (Spence; Fairbank & Liu, Cambridge
 # History of China v.10-11; Elliott, The Manchu Way).
 # ====================================================================

 # ---- .1  和珅 HESHEN ------------------------------------------------
 qing_roster.1.t:0 "A Favourite Rises"
 qing_roster.1.desc:0 "A young Manchu guardsman of the Plain Red Banner has caught the imperial eye. Heshen (和珅) is quick, charming, and preternaturally gifted with figures and administration — and, the wary say, with the arts of flattery and self-enrichment in equal measure.\n\nHistory knows the type: the favourite whom an ageing emperor raised over the whole apparatus of state, until his confiscated fortune was reckoned at more than a decade of imperial revenue. 'Heshen fell, and Jiaqing ate his fill' (和珅跌倒，嘉慶吃飽). Such a man can run the government with brilliant efficiency — and hollow it out from within."
 qing_roster.1.a:0 "Raise him over the apparatus of state."
 qing_roster.1.a.tt:0 "Make Heshen chief grand councillor. #G The council runs with brilliant efficiency#! — but #R corruption deepens sharply#! and an overmighty favourite now stands at the summit. Requires a free seat."
 qing_roster.1.b:0 "Keep him at a wary distance."
 qing_roster.1.b.tt:0 "Employ his talents in a minor post only. #G +5 Political Influence#!; he is mildly gratified, and the danger is contained."

 # ---- .2  林則徐 LIN ZEXU --------------------------------------------
 qing_roster.2.t:0 "An Incorruptible Official"
 qing_roster.2.desc:0 "The court's attention falls on Lin Zexu (林則徐), a Han official of Fujian whose reputation for absolute integrity precedes him. He is that rarest of things in a venal age: a man who cannot be bought, and who says so to the faces of those who would buy him.\n\nHistory would remember him as the commissioner who destroyed twenty thousand chests of British opium at Humen in 1839 — the spark of the first war with the West, and the emblem of a Confucian official's unbending duty. Such a man is a scourge to the corrupt and a treasure to a throne that means to clean its own house."
 qing_roster.2.a:0 "Appoint him imperial commissioner against the rot."
 qing_roster.2.a.tt:0 "Set Lin Zexu over the Censorate. #R Costs 10 Political Influence#!; #G corruption is cut sharply, +1 Stability#!."
 qing_roster.2.b:0 "Send him south to break the opium trade."
 qing_roster.2.b.tt:0 "The 1839 mission. #G Ease the silver drain#! as the trade is suppressed — but #R the confrontation with the West raises reform pressure#!. He is bound to the throne."

 # ---- .3  恭親王奕訢 PRINCE GONG -------------------------------------
 qing_roster.3.t:0 "A Prince of the Reform Party"
 qing_roster.3.desc:0 "Prince Gong (恭親王奕訢), a brother of the imperial house, has emerged as the ablest and most clear-eyed of the princes. Where the court clings to the fiction that the Western powers are tributary barbarians, he sees plainly that they are here to stay and must be dealt with as they are.\n\nHistory would make him the founder of the Zongli Yamen (總理衙門) and the steersman of the Tongzhi Restoration — the imperial kinsman who gave the Self-Strengthening movement a patron at the very summit. A prince who understands the age is a gift a dynasty rarely receives twice."
 qing_roster.3.a:0 "Make him head of the Zongli Yamen and the reform party."
 qing_roster.3.a.tt:0 "Seat Prince Gong and give him the foreign-affairs yamen. #R Costs 15 Political Influence#!; #G reform pressure eases and Self-Strengthening advances#!. Requires a free seat."
 qing_roster.3.b:0 "A council seat, but keep the yamen in abeyance."
 qing_roster.3.b.tt:0 "Seat him among the councillors without founding the yamen. #G He is gratified#! and the council gains an able head. Requires a free seat."

 # ---- .4  李鴻章 LI HONGZHANG ----------------------------------------
 qing_roster.4.t:0 "The Indispensable Man"
 qing_roster.4.desc:0 "A protégé of the great provincial armies has risen to prominence: Li Hongzhang (李鴻章), a Han scholar-general of formidable energy and worldly cunning, whom foreigners would call 'the Oriental Bismarck'. He grasps at once what Self-Strengthening requires — arsenals, steamships, telegraphs, a modern fleet — and the political arts to make them happen.\n\nHistory would credit him with the greater part of the whole Self-Strengthening enterprise: the Jiangnan Arsenal, the China Merchants' Steam Navigation Company, and the Beiyang Fleet. He would also build a personal army and a personal fortune to match. Indispensable, and never quite safe."
 qing_roster.4.a:0 "Make him the patron of Self-Strengthening."
 qing_roster.4.a.tt:0 "Seat Li Hongzhang and give him the Ministry of War. #R Costs 15 Political Influence#!; #G Self-Strengthening surges#!. He builds a formidable following of his own (the Huai Army). Requires a free seat."
 qing_roster.4.b:0 "A governor-general's post in the provinces."
 qing_roster.4.b.tt:0 "Send him to govern a great province. #G Self-Strengthening advances, +1 Stability#!; he builds a loyal following and is bound to the throne."

 # ---- .5  曾國藩 ZENG GUOFAN -----------------------------------------
 qing_roster.5.t:0 "The Scholar Who Takes Up the Sword"
 qing_roster.5.desc:0 "Zeng Guofan (曾國藩), a Confucian scholar-official of the deepest orthodoxy, has come forward in the empire's hour of need. He is no soldier by training, yet he proposes to raise a new kind of army — gentry-led, drilled in Confucian loyalty, bound to its commanders by personal ties — to do what the decayed banners cannot.\n\nHistory would make his Xiang Army (湘軍) the instrument that broke the Taiping and saved the dynasty, and his Jiangnan Arsenal a seed of its modernization. He is the model of the statesman-general: austere, ruthless, and utterly loyal."
 qing_roster.5.a:0 "Commission the Xiang Army against the rebels."
 qing_roster.5.a.tt:0 "Let Zeng Guofan raise his gentry militia. #R Costs 10 Political Influence#!; #G the tide turns against the sects, +3 Manpower#!. He commands a real and loyal army, and is bound to the throne."
 qing_roster.5.b:0 "Seat him on the council as the model official."
 qing_roster.5.b.tt:0 "Bring his orthodoxy to the summit. #G He is elevated and Self-Strengthening advances#!. Requires a free seat."

 # ---- .6  左宗棠 ZUO ZONGTANG ----------------------------------------
 qing_roster.6.t:0 "The Stubborn General"
 qing_roster.6.desc:0 "Zuo Zongtang (左宗棠), a self-made strategist of legendary obstinacy, has made his name in the campaigns against rebellion. He is a builder as well as a soldier — a man who would found a modern navy yard and then march an army a thousand miles into the western deserts to hold the frontier.\n\nHistory would credit him with the Fuzhou Navy Yard (福州船政局) and, most famously, the reconquest of Xinjiang in 1878 — carrying his own coffin to the front to show he would not return in defeat. Where others counted the western marches lost, he took them back."
 qing_roster.6.a:0 "Send him to reconquer the western frontier."
 qing_roster.6.a.tt:0 "Unleash Zuo Zongtang on the frontier (the Xinjiang reconquest). #R Costs 10 Political Influence#!; #G ethnic tension eases, +2 Manpower#!. He commands a loyal army and is bound to the throne."
 qing_roster.6.b:0 "Set him to the Fuzhou Navy Yard."
 qing_roster.6.b.tt:0 "Found the Fuzhou Navy Yard (福州船政局) under his hand: #G the ability to build modern ships cheaply#! and naval Self-Strengthening. He is bound to the throne."

 # ---- .7  張之洞 ZHANG ZHIDONG ---------------------------------------
 qing_roster.7.t:0 "The Ti-Yong Viceroy"
 qing_roster.7.desc:0 "Zhang Zhidong (張之洞), a brilliant examination laureate turned reforming viceroy, has become the foremost exponent of a doctrine that seeks to have it both ways: 'Chinese learning for the essence, Western learning for practical use' (中學為體，西學為用). Keep the Confucian soul of the realm, he argues, and bolt onto it the ironworks and railways of the West.\n\nHistory would build him the Hanyang Ironworks (漢陽鐵廠) and a web of modern schools, and would make him — for all his conservatism — one of the men who in 1905 abolished the thousand-year examination system itself. A moderniser the traditionalists could trust."
 qing_roster.7.a:0 "Back his heavy-industry programme."
 qing_roster.7.a.tt:0 "Fund the Hanyang iron and steel works and the railways. #R Costs 60 Treasury#!; #G the ability to build cheaply plus rail, coal and iron#!. He is bound to the throne."
 qing_roster.7.b:0 "Set him to reform the schools."
 qing_roster.7.b.tt:0 "Let him build the modern colleges (ti-yong education). #G Schools and a university, and reform pressure eases#!."

 # ---- .8  赫德 ROBERT HART -------------------------------------------
 qing_roster.8.t:0 "The Honest Foreigner"
 qing_roster.8.desc:0 "An offer arrives from an unexpected quarter. Robert Hart (赫德), a young Ulsterman already in the empire's service, proposes to organise the maritime customs on Western lines — professional, salaried, and above all honest — and to hand the throne a clean and rising stream of revenue that no official's sleeve can skim.\n\nHistory would keep him at the head of the Imperial Maritime Customs (海關) for nearly half a century, the most trusted foreigner in China and the guarantor of the revenue that underwrote every reform. A barbarian in the counting-house — but an incorruptible one, and worth a province of native officials."
 qing_roster.8.a:0 "Make him Inspector-General of the Maritime Customs."
 qing_roster.8.a.tt:0 "Establish the #Y Imperial Maritime Customs Service#! and make Hart its Inspector-General. #G A large clean revenue, corruption cut, and the silver drain eased#! — but the service runs under #R foreign management#!, and heavy foreign control is a standing reproach to sovereignty that feeds reform pressure until you reclaim it (收回關權)."
 qing_roster.8.b:0 "Decline the barbarian's service."
 qing_roster.8.b.tt:0 "Guard the old order against foreign hands. #R Reform pressure builds a little#! as an opportunity passes."

 # ---- .9  戈登 CHARLES GORDON ----------------------------------------
 qing_roster.9.t:0 "The Ever-Victorious Officer"
 qing_roster.9.desc:0 "A British officer of extraordinary courage and even more extraordinary stubbornness has offered his sword: Charles Gordon (戈登), whom the treaty-port foreigners already call 'Chinese Gordon'. He proposes to take the ragged foreign-officered militia of the coast, drill it into a modern striking force, and turn it against the rebels — accepting no bribe and, it must be said, no order he disagrees with.\n\nHistory would make his Ever-Victorious Army (常勝軍) the model of a Western-drilled Chinese force and a seed of the modernization of the whole army. An incorruptible, insubordinate, invaluable instrument."
 qing_roster.9.a:0 "Give him command of the Ever-Victorious Army."
 qing_roster.9.a.tt:0 "Found the Ever-Victorious Army (常勝軍): #G the ability to build modern land units cheaply#! and a hard blow to the sects. He commands a loyal force."
 qing_roster.9.b:0 "Take his drillmasters but not his command."
 qing_roster.9.b.tt:0 "Learn the Western drill without the foreign commander. #G Self-Strengthening advances, +2 Manpower#!."

 # ---- .10 康有為 KANG YOUWEI -----------------------------------------
 qing_roster.10.t:0 "The Radical Reformer"
 qing_roster.10.desc:0 "A scholar of dangerous brilliance has forced his way to the throne's notice. Kang Youwei (康有為) argues, with the fervour of a prophet and a reinterpreted Confucius at his back, that the dynasty must remake itself from top to bottom — a constitution, a parliament, a modern state — or perish.\n\nHistory would give him a hundred days at the Guangxu Emperor's side in 1898 before the conservatives crushed the reform and sent him into exile. He is a vision of what the Qing might become, and a threat to everything it is. To heed him is to gamble the mandate on transformation."
 qing_roster.10.a:0 "Summon him to lead a reform of the state."
 qing_roster.10.a.tt:0 "Give Kang Youwei his hundred days. #R Costs 10 Political Influence#!; #R reform pressure surges#! and Self-Strengthening advances as the constitutionalist cause gains its prophet. He is bound to the throne."
 qing_roster.10.b:0 "Hear him, but bind him to gradual measures."
 qing_roster.10.b.tt:0 "Take the counsel, restrain the man. #G Reform pressure eases#! as change is channelled into safe, incremental steps."
 qing_roster.10.c:0 "Suppress the radical and scatter his followers."
 qing_roster.10.c.tt:0 "Crush the reform party (the 1898 solution). #R +Tyranny#!, and driving the movement underground #R only builds the pressure#!. He becomes the throne's enemy."

 # ---- .11 孫中山 SUN YAT-SEN -----------------------------------------
 qing_roster.11.t:0 "The Prophet of the Republic"
 qing_roster.11.desc:0 "A figure has appeared whom no dynasty should ever have to face: a man who does not wish to reform the empire but to end it. Sun Yat-sen (孫中山), mission-educated and tireless, preaches a doctrine he calls the Three Principles of the People (三民主義) — nationalism, democracy, the people's livelihood — and a China with no emperor at all.\n\nHistory would make him the father of the republic that swept the Qing away in 1911. That he should stand before the throne at all is an impossibility, a shadow thrown backward from a future the dynasty is racing to avoid. He can perhaps be co-opted; he cannot be ignored."
 qing_roster.11.a:0 "Co-opt the visionary into the imperial reform project."
 qing_roster.11.a.tt:0 "Bring Sun Yat-sen inside the tent. #R Costs 15 Political Influence#!; his energy is turned to reform within the monarchy (#R reform pressure rises#! but he is bound to the throne rather than against it)."
 qing_roster.11.b:0 "Turn him away — and make an enemy of the coming age."
 qing_roster.11.b.tt:0 "Refuse the impossible man. He becomes the throne's rival and #R raises a revolutionary following of his own#! (the Tongmenghui); #R reform and sectarian pressure both rise#!."

 # ---- .12 袁世凱 YUAN SHIKAI -----------------------------------------
 qing_roster.12.t:0 "The Man with the Army"
 qing_roster.12.desc:0 "Yuan Shikai (袁世凱) has risen through the new military as the one man who can build the Qing a modern army — and, the shrewd observe, the one man most likely to use it for himself. Capable, ruthless, and loyal to no cause but his own advancement, he is the very model of the overmighty subject the dynasty has always feared.\n\nHistory would give him the Beiyang Army, the most modern force in China; he would betray the reformers in 1898, force the last emperor's abdication in 1912, take the republic's presidency, and then try to make himself emperor. To arm him is to grasp a sword by the blade."
 qing_roster.12.a:0 "Give him the New Army to modernise."
 qing_roster.12.a.tt:0 "Let Yuan Shikai build the Beiyang Army. #R Costs 10 Political Influence#!; #G Self-Strengthening surges, +3 Manpower#! — but he commands the most modern force in China, and it is #R loyal to him#!. A dangerously powerful subject."
 qing_roster.12.b:0 "Employ him, but keep his command small."
 qing_roster.12.b.tt:0 "Use his talent without arming him fully. #G Self-Strengthening advances#!; his following stays modest and he is bound to the throne."

 # ---- .13 洪秀全 HONG XIUQUAN ----------------------------------------
 qing_roster.13.t:0 "The Heavenly King"
 qing_roster.13.desc:0 "From the villages of Guangdong comes word of a prophet and a rising. Hong Xiuquan (洪秀全), a scholar four times failed at the provincial examinations, read a Christian tract in his despair, fell into a fever, and rose declaring himself the younger brother of Jesus Christ, sent to sweep away the demon Manchu dynasty and found a Heavenly Kingdom of Great Peace.\n\nHistory would make his Taiping Heavenly Kingdom (太平天國) the most catastrophic civil war in human history — twenty million dead, the empire cloven in two, the God-Worshipping Society (拜上帝會) enthroned at Nanjing as the Heavenly Capital. He is the dynasty's mortal enemy — unless the throne dares to think the unthinkable and come to terms with the movement he leads."
 qing_roster.13.a:0 "Marshal the empire against the heresy."
 qing_roster.13.a.tt:0 "The historical course: total war on the Taiping. #G +1 Stability, +3 Manpower#! as the empire mobilises, though #R the sects surge before they can be crushed#!."
 qing_roster.13.b:0 "Consider coming to terms with the movement."
 qing_roster.13.b.tt:0 "The unthinkable option: open a channel to the Heavenly Kingdom rather than fight it to the death. #G The immediate sectarian pressure eases#!, but #R the ferment of a new faith rises#! — and a door opens that later reforms may widen (the Christian path)."

 # ====================================================================
 # NICKNAMES — the pinned historical names (add_nickname). Conjured
 # characters get a random GetName; these epithets make each figure
 # identifiable in the court list as e.g. <random name> "Li Hongzhang".
 # ====================================================================
 NICKNAME_QING_HESHEN:0 "Heshen"
 NICKNAME_QING_LINZEXU:0 "Lin Zexu"
 NICKNAME_QING_PRINCE_GONG:0 "Prince Gong"
 NICKNAME_QING_LI_HONGZHANG:0 "Li Hongzhang"
 NICKNAME_QING_ZENG_GUOFAN:0 "Zeng Guofan"
 NICKNAME_QING_ZUO_ZONGTANG:0 "Zuo Zongtang"
 NICKNAME_QING_ZHANG_ZHIDONG:0 "Zhang Zhidong"
 NICKNAME_QING_HART:0 "Robert Hart"
 NICKNAME_QING_GORDON:0 "Chinese Gordon"
 NICKNAME_QING_KANG_YOUWEI:0 "Kang Youwei"
 NICKNAME_QING_SUN_YATSEN:0 "Sun Yat-sen"
 NICKNAME_QING_YUAN_SHIKAI:0 "Yuan Shikai"
 NICKNAME_QING_HONG_XIUQUAN:0 "Hong Xiuquan"
 # task #90 - generic epithet for a conjured yongying founder (no single historical
 # name; the sanctioned regional magnate stands for the Zeng/Li pattern collectively).
 NICKNAME_QING_REGIONAL_MAGNATE:0 "the Regional Commander (勇營)"

 # ==== New#40 additions: Ward, Giquel, Guo Songtao, Burlingame, Yung Wing, Sheng
 # Xuanhuai, William Lang, Zeng Jize ====

 # ---- .14 Frederick Townsend Ward (華爾) ----
 qing_roster.14.t:0 "The Salem Adventurer (華爾)"
 qing_roster.14.desc:0 "A brash young American, #YFrederick Townsend Ward#! (華爾), has appeared in the treaty ports of the south, offering to raise a corps of foreign-officered men to fight the Taiping where Our green-standard troops have failed. He is a soldier of fortune, careless of his own hide — but the little army he has drilled wins its battles, and Shanghai's merchants will pay for it."
 qing_roster.14.a:0 "Commission his corps — the Ever-Victorious Army (常勝軍)"
 qing_roster.14.a.tt:0 "Pay for his foreign-officered corps (#R40#!). It becomes the #YEver-Victorious Army#! (#Gfounds the modern land-drill ability#!) and turns the tide against the sects (#Gsect pressure eased#!); Ward is #Gbound to the throne#!."
 qing_roster.14.b:0 "Pay his men, but keep him a hired sword"
 qing_roster.14.b.tt:0 "Take his soldiers into Our pay without founding the corps proper — a lift to #Gmanpower#!, but no lasting institution."

 # ---- .15 Prosper Giquel (日意格) ----
 qing_roster.15.t:0 "The French Engineer (日意格)"
 qing_roster.15.desc:0 "#YProsper Giquel#! (日意格), a French naval officer, proposes to build for Us a modern dockyard and naval school at Fuzhou — slipways, engine-shops, and a college where the sons of China would learn to design and sail steam warships. He asks for foreign engineers and a free hand; in return, he says, he will give the empire a navy of its own making."
 qing_roster.15.a:0 "Set him to build the Fuzhou Navy Yard (福州船政局)"
 qing_roster.15.a.tt:0 "Fund the yard (#R50#!). Giquel #Gfounds the Fuzhou Navy Yard#! and enters Our service as a #Gnaval advisor#! of France — a leap in naval Self-Strengthening."
 qing_roster.15.b:0 "Take his engineers, not the whole yard"
 qing_roster.15.b.tt:0 "A cheaper, partial measure — some #Gself-strengthening progress#!, but no arsenal founded."

 # ---- .16 Guo Songtao (郭嵩燾) ----
 qing_roster.16.t:0 "The First Envoy to the West (郭嵩燾)"
 qing_roster.16.desc:0 "#YGuo Songtao#! (郭嵩燾), a scholar of rare candour, urges that We do as the barbarians do and station a resident minister in their capitals — the better to know them and to plead Our cause. The conservatives at court are aghast: to send a mandarin to dwell among the foreigners, they cry, is a disgrace beyond bearing. Yet no man sees the Western states more clearly than he."
 qing_roster.16.a:0 "Send him as resident minister to Britain"
 qing_roster.16.a.tt:0 "Guo opens the #Ylegation in London#! (#Gopens the British legation#!) and endures the #Rconservative vilification#! his real embassy suffered. A modern diplomatic presence abroad; Guo is #Gbound to the throne#!."
 qing_roster.16.b:0 "Heed his memorials, but keep him at home"
 qing_roster.16.b.tt:0 "Seat him on the council as a voice of reform — his counsel #Geases reform pressure#! without the scandal of an embassy."
 qing_roster.16.c:0 "Let the censors have him — burn his journal"
 qing_roster.16.c.tt:0 "Yield to the conservatives: Guo is #Rdisgraced#! and his travel-journal burned by edict. The reformers seethe (#Rreform pressure rises#!) and the arbitrary act stains the throne (#Rtyranny#!)."

 # ---- .17 Anson Burlingame (蒲安臣) ----
 qing_roster.17.t:0 "The Barbarian Who Would Serve Us (蒲安臣)"
 qing_roster.17.desc:0 "#YAnson Burlingame#! (蒲安臣), the departing American minister, has so won the trust of the Zongli Yamen that a startling notion arises: that We appoint him — a foreigner — as #Your own envoy#! to the courts of the West, to negotiate on the empire's behalf as an equal among equals. It is unheard-of. It might also win Us the first treaty in a generation that is not a humiliation."
 qing_roster.17.a:0 "Appoint him Our envoy to the Western powers"
 qing_roster.17.a.tt:0 "Fund the mission (#R40#!). Burlingame negotiates an #Gequal treaty#! in Our name — a windfall of #Gprestige#!, a spur that #Geases reform pressure#! and #Gsoftens friction with Britain#!. He is #Gbound to the throne#!."
 qing_roster.17.b:0 "Decline — a barbarian cannot speak for the Middle Kingdom"
 qing_roster.17.b.tt:0 "Refuse the strange proposal. The conservatives are satisfied, but the chance is lost and the reformers chafe (#Rreform pressure#!)."

 # ---- .18 Yung Wing (容閎) ----
 qing_roster.18.t:0 "The Yale Man (容閎)"
 qing_roster.18.desc:0 "#YYung Wing#! (容閎, Rong Hong) — the first son of China to take a degree from an American college — lays before the throne a bold design: to send a company of boys to be schooled in the arts and sciences of the West, that they might return to serve the empire with knowledge no examination hall can teach. It is an investment in a generation not yet grown, and a wager that the West's learning can be borrowed without its soul."
 qing_roster.18.a:0 "Entrust him with the Educational Mission (留學生)"
 qing_roster.18.a.tt:0 "Fund the mission (#R40#!). Yung Wing #Glaunches the Chinese Educational Mission#! — students sail for the West. He is #Gbound to the throne#!. (Beware the conservative recall crisis the mission may later face.)"
 qing_roster.18.b:0 "Hear him, but keep the sons of China at home"
 qing_roster.18.b.tt:0 "Decline the mission — the conservatives approve, but the reformers press harder (#Rreform pressure#!)."

 # ---- .19 Sheng Xuanhuai (盛宣懷) ----
 qing_roster.19.t:0 "The Official-Entrepreneur (盛宣懷)"
 qing_roster.19.desc:0 "#YSheng Xuanhuai#! (盛宣懷) is a new kind of servant: a mandarin who thinks like a merchant. He proposes to raise great enterprises — steamship lines, telegraphs, mines, mills — on the #Y官督商辦#! model: official supervision, merchant capital and management. Such concerns could clothe the empire in modern industry. They could also make a few men, Sheng foremost, immensely rich at the state's expense."
 qing_roster.19.a:0 "Back his official-supervised, merchant-managed concerns"
 qing_roster.19.a.tt:0 "Fund the venture (#R50#!). Sheng #Gfounds the merchant-conglomerate strand#! of Self-Strengthening — but the guandu-shangban model #Rconcentrates patronage#! (corruption rises). He is #Gbound to the throne#!."
 qing_roster.19.b:0 "Have him raise the Imperial Telegraph instead"
 qing_roster.19.b.tt:0 "Set him to the narrower, cleaner task of the #YImperial Telegraph Administration#! (#Gfounds the telegraph#!)."

 # ---- .20 William Lang (琅威理) ----
 qing_roster.20.t:0 "The Royal Navy Drillmaster (琅威理)"
 qing_roster.20.desc:0 "#YWilliam Lang#! (琅威理), an officer lent from the Royal Navy, has taken the Beiyang Fleet in hand and drilled it to a pitch of efficiency that astonishes foreign observers. But he is an exacting man who will brook no divided command — and Our own admirals bristle at taking orders from a foreigner. How much authority shall he be given?"
 qing_roster.20.a:0 "Give him a free hand to drill the Beiyang Fleet"
 qing_roster.20.a.tt:0 "Fund the programme (#R40#!). Lang #Gfounds the Beiyang Fleet#! at full efficiency and serves as a #Gnaval advisor#! of Britain — a formidable modern navy."
 qing_roster.20.b:0 "Employ him under a Chinese admiral's authority"
 qing_roster.20.b.tt:0 "Bow to the command friction the real Lang chafed against — cheaper, some #Gself-strengthening progress#!, but the fleet is drilled less hard."

 # ---- .21 Zeng Jize (曾紀澤) ----
 qing_roster.21.t:0 "The Marquis Who Won Back Ili (曾紀澤)"
 qing_roster.21.desc:0 "#YZeng Jize#! (曾紀澤, the Marquis Zeng), son of the great Zeng Guofan, is a diplomat of steel behind a scholar's courtesy — fluent in the Westerners' ways, unawed by their power. Where the hapless Chonghou signed away the Ili valley, Zeng believes he can win it back at the negotiating table. He is precisely the envoy a hard bargain demands."
 qing_roster.21.a:0 "Send him to St Petersburg to hold the line"
 qing_roster.21.a.tt:0 "Zeng opens the #Ylegation in St Petersburg#! (#Gopens the Russian legation#!) and his skill #Geases tension with Russia#! — steadying the Ili question. He is #Gbound to the throne#!."
 qing_roster.21.b:0 "Seat him at the Zongli Yamen as chief negotiator"
