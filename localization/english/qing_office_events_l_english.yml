l_english:

 # ====================================================================
 # THE GRAND COUNCIL & GREAT OFFICES event roster (qing_office_events.txt)
 # and THE IMPERIAL EXAMINATION (qing_keju_events.txt). Task #9/#10.
 # Sources cited in the event files (Bartlett, Elman, Miyazaki, Kaske,
 # Spence, Fairbank & Teng).
 # ====================================================================

 # ####################################################################
 # .1  THE OVERMIGHTY GRANDEE (權臣當國) — the Heshen pattern
 # ####################################################################
 qing_office.1.t:0 "An Overmighty Grand Councillor"
 qing_office.1.desc:0 "The chief councillor [grandee.GetName] has gathered the threads of power into his own hands. Memorials pass through him before they reach the throne; appointments wait upon his word; his household grows fat while the treasury runs dry.\n\nThe court remembers Heshen (和珅), the Manchu guardsman whom the aged Qianlong Emperor raised to command the whole apparatus of state — and whose confiscated fortune, when the Jiaqing Emperor purged him in 1799, was reckoned at more than a decade of imperial revenue. 'Heshen fell, and Jiaqing ate his fill' (和珅跌倒，嘉慶吃飽). A councillor who answers to no one is efficient until the day he is not."
 qing_office.1.a:0 "Purge him and confiscate the fortune."
 qing_office.1.a.tt:0 "The Jiaqing solution. Strip and disgrace him (#R shattering his power base#!), seize his hoard (#G +150 Treasury#!), and #G cut corruption sharply#! — but the purge breeds fear (#R +Tyranny, -Stability#!)."
 qing_office.1.b:0 "Clip his wings — strip the chiefship, leave him seated."
 qing_office.1.b.tt:0 "A measured rebuke: demote him from chief councillor but keep him at the table. Corruption eases somewhat; the council loses a little effectiveness in the shuffle."
 qing_office.1.c:0 "Indulge him, as Qianlong did."
 qing_office.1.c.tt:0 "Take his 'gift' (#G +40 Treasury#!) and look away. He is content (#G +loyalty#!) — but #R corruption deepens#! and the rot feeds the pressure for reform."

 # ####################################################################
 # .2  A CENSOR'S IMPEACHMENT MEMORIAL (都察院)
 # ####################################################################
 qing_office.2.t:0 "A Censor's Impeachment"
 qing_office.2.desc:0 "A censor of the Censorate (都察院) has laid an impeachment before the throne, naming a highly placed official and the network of 'customary fees' (陋規) that sustains him. The remonstrance censors (言官) hold an ancient and dangerous duty: to speak the truth to power, and to impeach the corrupt however exalted their rank.\n\nTo uphold the memorial is to make enemies of a whole faction; to bury it is to teach every censor that honesty is folly. The emperor's brush will decide which lesson the court learns."
 qing_office.2.a:0 "Uphold the impeachment in full."
 qing_office.2.a.tt:0 "Vindicate the censor. #G Cut corruption#!, #G +1 Stability#!, and embolden the Censorate (#G a lasting oversight bonus#!)."
 qing_office.2.b:0 "A show trial — punish a scapegoat, spare the network."
 qing_office.2.b.tt:0 "A gesture that satisfies no one and offends few. #G A small cut to corruption#!, at the price of #R some tyranny#!."
 qing_office.2.c:0 "Suppress the memorial; punish the censor for insolence."
 qing_office.2.c.tt:0 "Silence the remonstrance. #R Corruption rises#!, #R tyranny rises#!, and the frustrated demand for reform builds beneath the surface."

 # ####################################################################
 # .3  A COUNCIL PARALYSED (vacancy / dysfunction)
 # ####################################################################
 qing_office.3.t:0 "The Council Falls Silent"
 qing_office.3.desc:0 "The Grand Council (軍機處) is not doing its work. Seats sit empty, the councillors who remain feud or dither, and memorials that should be answered in days pile up for seasons. The empire is governing half-blind, and the provinces have begun to notice that Beijing's edicts come late and contradict one another.\n\nThe throne can convene a fresh council in haste, or rule from the inner court a while longer and let the machinery seize."
 qing_office.3.a:0 "Convene the council in haste — fill every seat."
 qing_office.3.a.tt:0 "Summon the ablest available men to the Grand Council at once and recompute its effectiveness. #R Costs 20 Political Influence#!."
 qing_office.3.b:0 "Rule from the inner court a while longer."
 qing_office.3.b.tt:0 "Govern by autocratic fiat. #R +Tyranny#!, and the council drifts further into disuse."

 # ####################################################################
 # .4  A STATESMAN COMES FORWARD
 # ####################################################################
 qing_office.4.t:0 "A Statesman Comes Forward"
 qing_office.4.desc:0 "[statesman.GetName] has distinguished himself — a memorial of unusual clarity, a province well governed, a crisis quietly resolved. The court speaks of him as a man for great things. Such talent is the throne's to use: at the summit of the state on the Grand Council, or sent down to steady a troubled province where his ability will be felt directly."
 qing_office.4.a:0 "Seat him on the Grand Council."
 qing_office.4.a.tt:0 "Bring his talent to the summit of government (#G seat him as a councillor#!). #R Costs 10 Political Influence#!; requires a free seat."
 qing_office.4.b:0 "Send him to steady a troubled province."
 qing_office.4.b.tt:0 "A provincial posting. #G +1 Stability#!, and he builds a loyal following of his own (#G a power base bound by gratitude#!)."
 qing_office.4.c:0 "Take him into the imperial household and tutelage."
 qing_office.4.c.tt:0 "Cultivate the man himself: #G sharpen his statecraft and courtly charm#!, draw him into the throne's #G culture and faith#!, and #G raise his house#! (#R Costs 15 Political Influence#!). Realigning what makes a man congenial, this can bind an able outsider to the throne as a devoted insider."

 # ####################################################################
 # .5  FACTIONAL STRIFE ON THE COUNCIL (滿漢 / literati blocs)
 # ####################################################################
 qing_office.5.t:0 "Factions at the Council Table"
 qing_office.5.desc:0 "The council has split along the old fault line. The Manchu grandees — bannermen, imperial kinsmen, the conquest elite — pull one way; the Han literati, risen through the examinations and steeped in the Confucian canon, pull the other. The dyarchy of dual appointment (滿漢複職) was the founding compact of the Qing state: at its best it draws on the whole talent of the realm, at its worst it grinds to a halt in mutual suspicion.\n\nThe throne must hold the balance, or tip it."
 qing_office.5.a:0 "Hold the balance (滿漢一體)."
 qing_office.5.a.tt:0 "Reward the dyarchy. #R Costs 15 Political Influence#!; #G +1 Stability#!, #G cut ethnic tension#!, and #G the council works better#!."
 qing_office.5.b:0 "Favour the Manchu bloc — the banner interest."
 qing_office.5.b.tt:0 "Lean on the conquest elite. #G The council gains a temporary edge#! at the cost of #R rising ethnic tension#!."
 qing_office.5.c:0 "Favour the Han literati — the examination elite."
 qing_office.5.c.tt:0 "Lean on the scholar-officials. #G Cut ethnic tension and corruption#! — but #R the banners decay further#! as the martial elite is sidelined."

 # ####################################################################
 # .6  FOUND THE ZONGLI YAMEN (總理衙門, 1861)
 # ####################################################################
 qing_office.6.t:0 "A Ministry for the Barbarians?"
 qing_office.6.desc:0 "The Western powers will not go away, and the old fiction — that they are tributary barbarians to be managed by the Ministry of Rites and the frontier officials — grows harder to sustain with every treaty and every gunboat. Some at court urge what Prince Gong (恭親王奕訢) would establish in 1861: a dedicated Office for the General Management of Affairs with Foreign Nations (總理各國事務衙門), a foreign ministry in all but name.\n\nTo found it is to admit that the powers are here to stay and must be dealt with as equals — a bitter admission, and the first machinery of a modern diplomacy."
 qing_office.6.a:0 "Establish it, and appoint the ablest man to head it."
 qing_office.6.a.tt:0 "Found the Zongli Yamen (#G a lasting diplomacy & commerce institution#!) and appoint its director. #G Eases reform pressure, +1 Stability#!. #R Costs 25 Political Influence#!; requires an able courtier."
 qing_office.6.b:0 "Not yet — the Middle Kingdom treats with no equals."
 qing_office.6.b.tt:0 "Cling to the old order. The demand for reform builds a little more (#R +reform pressure#!)."

 # ####################################################################
 # .7  THE SALE OF OFFICES (捐納)
 # ####################################################################
 qing_office.7.t:0 "The Sale of Offices"
 qing_office.7.desc:0 "The treasury is short, and the ministers of revenue press the old expedient: throw open the sale of degrees and posts (捐納) for ready silver. It is a proven remedy for an empty coffer — and a slow poison for the bureaucracy, filling the 'irregular path' (異途) with men who bought their rank and mean to recoup the investment out of the people they govern.\n\nEvery Qing reign leaned on it in a crisis; every reign paid for it afterward in corruption."
 qing_office.7.a:0 "Open the sales wide — silver now."
 qing_office.7.a.tt:0 "Fill the coffers fast. #G A large treasury infusion#! now, at the cost of #R deepening corruption and purchased-rank rot#! later."
 qing_office.7.b:0 "A limited, controlled sale."
 qing_office.7.b.tt:0 "A measured compromise: #G +60 Treasury#!, #R a modest rise in corruption#!."
 qing_office.7.c:0 "Refuse — keep the examination path pure."
 qing_office.7.c.tt:0 "Defend the merit ideal. #G Cut corruption#! and #G +10 Political Influence#! as the literati applaud, but the treasury goes unhelped."

 # ####################################################################
 # .8  A GRAND COUNCILLOR'S MEMORIAL (an effective council's reward)
 # ####################################################################
 qing_office.8.t:0 "A Well-Argued Memorial"
 qing_office.8.desc:0 "The council is working as the Yongzheng Emperor meant it to. [councillor.GetName] lays before the throne a memorial of real substance — the fruit of a body that deliberates before it drafts. It offers the emperor a clear choice of remedies, each carefully costed, on the matters that most press the realm.\n\nAn able council is a rare gift. The throne need only decide which counsel to act upon."
 qing_office.8.a:0 "Act on the fiscal reform (streamline the revenue)."
 qing_office.8.a.tt:0 "#G Cut corruption#! and #G +40 Treasury#! as waste is trimmed from the revenue apparatus."
 qing_office.8.b:0 "Act on the military reform (drill the banners)."
 qing_office.8.b.tt:0 "#G Reverse some banner decay#! and #G +2 Manpower#! as the forces are put back in order."
 qing_office.8.c:0 "Commend him and file it."
 qing_office.8.c.tt:0 "#G +1 Stability#! and the councillor is gratified (#G +loyalty#!)."

 # ####################################################################
 # .9  BICKERING AT THE COUNCIL TABLE (兩虎相爭)
 # ####################################################################
 qing_office.9.t:0 "Two Tigers in One Cage"
 qing_office.9.desc:0 "The council chamber has become a battlefield. [feud_a.GetName] and [feud_b.GetName] can no longer be in one room without the business of the empire grinding to a halt in accusation and counter-accusation. Their quarrel may be the old one of Manchu against Han, of the pious against the worldly, or simply of two proud men who each believe the throne's ear is theirs alone.\n\n'Two tigers cannot share one mountain' (一山不容二虎). The Yongzheng Emperor built the Grand Council precisely so that a handful of trusted men would deliberate as one — a council at war with itself serves no one but the empire's enemies. The throne must decide how much of its own authority to spend restoring the peace."
 qing_office.9.a:0 "Summon them both and impose a reconciliation."
 qing_office.9.a.tt:0 "Spend the throne's authority to make peace. #R Costs 10 Political Influence#!; #G the council recovers, ethnic tension eases#!, and both men, chastened by the emperor's grace, warm to him (#G +loyalty#!)."
 qing_office.9.b:0 "Back the abler man; dismiss the other from the council."
 qing_office.9.b.tt:0 "End the quarrel by removing one party. #G The abler councillor is affirmed#! (#G +loyalty#!); the lesser is unseated and embittered (#R -loyalty#!). #R +Tyranny#!."
 qing_office.9.c:0 "Let them fight it out."
 qing_office.9.c.tt:0 "Stand back and let the feud run its course. #R The council's effectiveness suffers and ethnic tension rises#! as the quarrel festers into a lasting personal rivalry between the two men."

 # ####################################################################
 # .10  A CLIQUE FORMS AGAINST THE CHIEF (朋黨)
 # ####################################################################
 qing_office.10.t:0 "The Peril of Factions"
 qing_office.10.desc:0 "Word reaches the inner court that the councillors have ceased to serve as individuals answerable to the throne and begun to band together. A clique has formed, and at its head stands [clique_head.GetName], who has set himself against the chief grand councillor [clique_chief.GetName] — gathering allies, coordinating memorials, turning the council into a parliament of factions.\n\nThe dread of 'factions and cliques' (朋黨) runs through the whole Confucian tradition of statecraft: the Song statesman Ouyang Xiu wrote a famous essay defending them, and every emperor since read it as a warning. A bureaucracy that splits into camps answers to its patrons, not its sovereign. The Kangxi and Yongzheng Emperors broke such cliques ruthlessly — and sometimes played them against one another."
 qing_office.10.a:0 "Break the clique — uphold the chief's authority."
 qing_office.10.a.tt:0 "Crush the faction and stand behind your chief councillor. #R Costs 15 Political Influence#!; #G the council's discipline recovers#!; the ringleader is unseated and embittered (#R -loyalty#!). #R +Tyranny#!."
 qing_office.10.b:0 "Sacrifice the chief to appease the clique."
 qing_office.10.b.tt:0 "Bow to the faction: strip the chiefship. The fallen chief is embittered and diminished (#R -loyalty, -prominence#!); #R the council falters and reform pressure builds#! as the throne is seen to yield."
 qing_office.10.c:0 "Play them against one another (divide and rule)."
 qing_office.10.c.tt:0 "The Kangxi tactic. Set the ringleader and the chief at each other's throats (#R a lasting rivalry between them#!); the throne's freedom of action grows (#G +10 Political Influence#!) even as #R the divided council works a little worse#!."

 # ####################################################################
 # THE IMPERIAL EXAMINATION (科舉) — qing_keju_events.txt
 # ####################################################################

 # ---- .1  THE TRIENNIAL EXAMINATION CONVENES ------------------------
 qing_keju.1.t:0 "The Examinations Convene"
 qing_keju.1.desc:0 "The triennial cycle comes round again. Across the empire the candidates gather — the licentiates (生員) at the provincial capitals for the great provincial examination (鄉試), the newly-minted provincial graduates (舉人) travelling to Beijing for the metropolitan examination (會試). Behind them stretches the whole ladder: the county and prefectural tests (院試) that a boy must pass merely to wear the scholar's gown.\n\nIt is the empire's engine of legitimacy and its instrument for binding the gentry to the throne — and it runs on silver. How the throne funds and oversees this cycle will echo through the ranks for a generation."
 qing_keju.1.a:0 "Host it in full state, strictly by the book."
 qing_keju.1.a.tt:0 "Fund the halls properly at every level. #R Costs 90 Treasury#!; #G a lasting merit-intake bonus#!, #G cut corruption#!, #G clear the lower ladder (生員/舉人)#!, #G +1 Stability#!. Culminates in the palace examination."
 qing_keju.1.b:0 "Hold a modest examination — adequate, unglamorous."
 qing_keju.1.b.tt:0 "Run the cycle on a thrifty budget. #R Costs 30 Treasury#!; #G +10 Political Influence#!. Still culminates in the palace examination."
 qing_keju.1.c:0 "Sell degrees to fill the war chest (捐納)."
 qing_keju.1.c.tt:0 "Turn the cycle into a fundraiser. Silver now, but #R corruption rises#! and #R the lower ladder clogs with bought places#!."

 # ---- .2  THE PALACE EXAMINATION & THE 狀元 -------------------------
 qing_keju.2.t:0 "The Palace Examination"
 qing_keju.2.desc:0 "The metropolitan graduates assemble in the palace for the final ranking — the palace examination (殿試), presided over by the emperor himself. Here the successful become jinshi (進士), 'presented scholars', and the first among them is named zhuangyuan (狀元), optimus of the realm, his name to be remembered for centuries.\n\nBy ancient custom the examiner is the master and the graduate his disciple; a jinshi ranked by the emperor's own hand is the Son of Heaven's disciple (天子門生), bound to the throne by the deepest tie the Confucian order knows. [laureate.GetName] stands first among this year's cohort."
 qing_keju.2.a:0 "Confer the jinshi degree and name him zhuangyuan."
 qing_keju.2.a.tt:0 "Make him a #G jinshi (進士)#!, bound to the throne (#G loyalty, popularity, a clientele of protégés#!) and seasoned in office (#G +experience#!). #G +1 Stability#!."
 qing_keju.2.b:0 "Confer it, and seat the laureate on the Grand Council."
 qing_keju.2.b.tt:0 "As above, and #G seat him among the councillors#! at once. #R Costs 15 Political Influence#!; requires a free council seat."

 # ---- .3  AN EXAMINATION SCANDAL ------------------------------------
 qing_keju.3.t:0 "Fraud in the Examination Halls"
 qing_keju.3.desc:0 "The reports are damning: sealed questions leaked in advance, answer-papers swapped by bribed clerks, rankings sold to the highest bidder. The examination — the one institution that is supposed to stand above corruption, the ladder on which the whole gentry's faith in the dynasty rests — has been fouled at its heart.\n\nThe court remembers 1858, when the Xianfeng Emperor had a serving Grand Secretary, Bo Jun (柏葰), executed for his part in the Shuntian examination fraud. The precedent for severity is written in blood."
 qing_keju.3.a:0 "Prosecute to the utmost — execute the graders."
 qing_keju.3.a.tt:0 "The 1858 precedent. #G Cut corruption sharply#!, #G +1 Stability#!, #G embolden the Censorate#! — at the cost of #R tyranny#!. A corrupt examiner among your courtiers is disgraced."
 qing_keju.3.b:0 "Quietly annul the tainted results and re-sit the exam."
 qing_keju.3.b.tt:0 "Contain it without a bloodbath. #R Costs 40 Treasury#!; #G cut corruption modestly#!."
 qing_keju.3.c:0 "Hush it up — the degrees stand."
 qing_keju.3.c.tt:0 "Protect the guilty to protect the institution's face. #R A lasting scandal stain#!, #R corruption rises#!, and #R reform pressure builds#!."

 # ---- .4  A BRILLIANT SCHOLAR PASSED OVER ---------------------------
 qing_keju.4.t:0 "A Scholar Passed Over"
 qing_keju.4.desc:0 "[failed_scholar.GetName] has failed the examinations — a young man of evident brilliance, undone by ill luck, a rigged grade, or the simple brutal arithmetic of a system that passes perhaps one candidate in a hundred. He is not the first, and the empire has learned to its cost what such men can become.\n\nThe warning has a name: Hong Xiuquan (洪秀全), four times failed at the Canton provincial examination, who in his fevered despair read a Christian tract, declared himself the younger brother of Jesus Christ, and raised the Taiping Heavenly Kingdom over a rebellion that would cost twenty million lives. A passed-over scholar is a dangerous thing to waste."
 qing_keju.4.a:0 "A special appointment — recognise the talent outside the ladder."
 qing_keju.4.a.tt:0 "Grant him a juren degree and take him into your service (#G a grateful, loyal follower#!). #R Costs 15 Political Influence#!; #G +1 Stability#!."
 qing_keju.4.b:0 "Grant him a fair re-examination."
 qing_keju.4.b.tt:0 "A second chance by the rules. #R Costs 30 Treasury#!; he gains the shengyuan degree, and the gentry see the ladder still works (#G lift the lower ladder, ease reform pressure#!)."
 qing_keju.4.c:0 "Turn him away — he failed."
 qing_keju.4.c.tt:0 "Let the rules stand, and reap the bitterness. He becomes your rival and raises a following of his own (#R a hostile power base#!); #R sectarian unrest and reform pressure rise#! — the Hong Xiuquan road."

 # ---- .5  A GRACE EXAMINATION (恩科) --------------------------------
 qing_keju.5.t:0 "A Grace Examination Proclaimed"
 qing_keju.5.desc:0 "The court proposes an act of imperial largesse: a grace examination (恩科), held over and above the regular triennial cycle to mark a jubilee, an accession, or the emperor's birthday. It opens the road to office for an extra cohort of candidates, and there is no cheaper way to win the gratitude of the scholar-gentry across the whole realm — nor any that so pleasingly displays the benevolence of the throne."
 qing_keju.5.a:0 "Proclaim the grace examination."
 qing_keju.5.a.tt:0 "An act of largesse. #R Costs 60 Treasury#!; #G a lasting legitimacy & goodwill bonus#!, #G +15 Ruler Prestige#!, #G +1 Stability#!, #G cut ethnic tension#!."
 qing_keju.5.b:0 "Keep to the regular cycle."
 qing_keju.5.b.tt:0 "Thrift over spectacle. #G +5 Political Influence#!."

 # [#321] .6 — a pool scholar raised to a vacant office (the examination pipeline pays off)
 qing_keju.6.t:0 "Talent Awaits a Post (掄才)"
 qing_keju.6.desc:0 "A great office of state stands empty — and in the antechambers of the Ministry of Civil Appointments there wait #Y degree-holders#! the examinations have already produced, jinshi and juren who have passed the halls but not yet been given a charge. The Grand Secretariat submits their names. Here is the whole promise of the examination order made good: that merit, tested and proven, should fill the offices of the empire — not a stranger raised on a whim, nor a place sold for silver. Will the throne draw on the talent it has cultivated?"
 qing_keju.6.a:0 "Raise the ablest to the vacant seat."
 qing_keju.6.a.tt:0 "Draw the #Y ablest waiting graduate#! from the hiring pool and appoint him to the first vacant great office. #G The examination pipeline fills the government with proven merit#!; #G +1 Stability#!."
 qing_keju.6.b:0 "Let the seat wait; his turn will come."
 qing_keju.6.b.tt:0 "Leave the office vacant for now — the scholar keeps his place in the pool (though a graduate too long un-placed drifts back to the gentry). #G +5 Political Influence#!."

 # ---- .7 The Abolition of 捐納 Pressed [#321 deferred] ------------------------------
 qing_keju.7.t:0 "The Sale of Offices Assailed (捐納)"
 qing_keju.7.desc:0 "The memorials pile up upon the throne's desk, and their burden is one: that the sale of offices (#Y 捐納#!) — degrees and posts bought for silver to fill the war chest — is rotting the examination order from within. For every place purchased, a degree-holder tested and proven in the halls is turned away; the ladder of merit clogs from the base, and the reform-minded gentry grow loud. Yet the silver is real, and the treasury has learned to lean upon it.\n\nThe throne must weigh the integrity of the ladder against the convenience of the purse."
 qing_keju.7.a:0 "Abolish it — restore the ladder of merit."
 qing_keju.7.a.tt:0 "End the sale of offices outright: #G lift the purchased-ranks corruption on the bureaucracy#!, #G corruption -8#!, #G reform pressure -6#!, #G the examination pass-rate recovers#!, #G +1 Stability#!, #G +5 Legitimacy#!. The war chest loses a crutch."
 qing_keju.7.b:0 "Reform the worst abuses, but keep the practice."
 qing_keju.7.b.tt:0 "A half-measure. #R Costs 40 Treasury#! to buy back the grossest abuses: #G corruption -4#!, #G reform pressure -2#!. The purchased-ranks regime endures."
 qing_keju.7.c:0 "Keep the silver flowing — the war chest needs it."
 qing_keju.7.c.tt:0 "Entrench the sale of offices further for the ready silver: #G a fiscal windfall#!, but #R corruption +5#!, #R reform pressure +6#!, #R the examination ladder clogs (-8)#!."

 # ####################################################################
 # [#91 item F]  THE OVERMIGHTY GRANDEE'S PERSONAL ARMY (rebel-army seed)
 # [#91-fix task #91] loc key retired: the create_unit now uses a quoted literal
 # display name ("A Grandee's Private Army") per the proven SELFSTR/Invictus idiom,
 # so this auto-resolve key is no longer referenced. Left as a comment for traceability.
 # ####################################################################

 # ---- .30 A Foreign Consort's Petition (聯姻外戚干政) [#330 user] --------------------
 qing_office.30.t:0 "A Consort's Quiet Word"
 qing_office.30.desc:0 "#I [qing_lobby_councillor.GetName]#!, wed into our imperial house from #Y [qing_lobby_homeland.GetName]#! and now seated upon the Grand Council, has sought a private audience. With graceful deference she speaks — of her father's court, of an old kindness owed, of how a small favour to #Y [qing_lobby_homeland.GetName]#! would honour the marriage that binds our houses.\n\nIt is the oldest danger of a dynastic match: a foreign hand, however gentle, upon the tiller of Qing policy. The tie is real — but so is the court's suspicion of an outside faction whispering at the council table."
 qing_office.30.a:0 "Honour the tie — grant the favour."
 qing_office.30.a.tt:0 "A gracious gesture to #Y [qing_lobby_homeland.GetName]#!: standing #G goodwill#! both ways and a #Y gift#! (#R -40 treasury#!). But a foreign hand on the purse is #R corruption (+5)#! and the council resents the meddling (#R effectiveness -3#!). The consort is #G gratified#!."
 qing_office.30.b:0 "Hear her, then weigh it on its merits."
 qing_office.30.b.tt:0 "The statesmanlike middle: the petition is heard and set aside on its merits. A little #G goodwill#! toward her homeland; #R -10 political influence#! spent smoothing it over. The consort is neither elevated nor estranged."
 qing_office.30.c:0 "Rebuff her — no foreign hand on our policy."
 qing_office.30.c.tt:0 "The throne brooks no foreign faction at the council table. The petition is refused: the consort is #R stung#! (her loyalty falls) and #Y [qing_lobby_homeland.GetName]#! is #R slighted#!. But the council's integrity is affirmed — #G corruption -4, effectiveness +2#!."
 # [#331 user] .31 War Minister's Report (periodic officer dilemma)
 qing_office.31.t:0 "The War Minister's Report"
 qing_office.31.desc:0 "#I [officer_report_minister.GetName]#! lays a report before the throne on #Y [officer_report_commander.GetName]#!, a commander of our banners and green standard. The officer's garrison is drilled and his men are fed — yet in the endless peace of the High Qing, the line between a diligent general and an overmighty one is thin, and a minister who vouches too warmly for a subordinate binds his own name to that man's fortunes.\n\nHow shall the throne answer the 兵部's report?"
 qing_office.31.a:0 "Commend the officer — the minister vouches for him."
 qing_office.31.a.tt:0 "The throne rewards a good soldier: #Y [officer_report_commander.GetName]#! is #G commended#! (loyalty and standing rise) and the officer corps is the sharper for it — #G council effectiveness +2#!."
 qing_office.31.b:0 "Rebuke him — discipline before ambition."
 qing_office.31.b.tt:0 "A public reprimand tightens discipline across the corps (#G corruption -3#!) but #Y [officer_report_commander.GetName]#! is #R estranged#! by the slight to his honour."
 qing_office.31.c:0 "Leave it to the minister's judgement."
 qing_office.31.c.tt:0 "The throne trusts the 兵部 to manage its own: #I [officer_report_minister.GetName]#! is #G gratified#! by the confidence shown him, and the crown gains #G +5 political influence#! for the deft delegation."
 # [#331 user] .32 A Commander Falls — the War Minister Recommends (lifecycle)
 qing_office.32.t:0 "A Commander Falls"
 qing_office.32.desc:0 "A commander of the imperial forces has died at his post, and a garrison stands without its general. #I [officer_report_minister.GetName]#! comes before the throne with a name already in hand — a capable officer, well-connected, ready to take up the seal. The recommendation is sound. It is also the 兵部's hand quietly shaping the officer corps, one appointment at a time."
 qing_office.32.a:0 "Approve the minister's man."
 qing_office.32.a.tt:0 "A smooth succession keeps the corps intact and affirms #I [officer_report_minister.GetName]#!'s authority (he is #G gratified#!) — #G council effectiveness +2#!."
 qing_office.32.b:0 "Appoint our own choice."
 qing_office.32.b.tt:0 "The throne asserts its prerogative over the 兵部: #G +3 legitimacy#! for the show of command, though #I [officer_report_minister.GetName]#! is #R estranged#! at being overruled."
 qing_office.32.c:0 "Leave the post vacant for now."
 qing_office.32.c.tt:0 "Frugality wins the day: #G +15 treasury#! saved on a general's stipend and staff — but the corps thins and its command frays (#R council effectiveness -2#!)."
