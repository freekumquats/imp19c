 # Diplomatic play interface >>>
 START_DIPLOMATIC_PLAY_BUTTON:0 "Start diplomatic play"
 # [#210] Start-button labels that preview the SELECTED play goal (set by the type buttons).
 START_DIPLOMATIC_PLAY_BUTTON_GET_TERRITORY:0 "Start play: Press claim"
 START_DIPLOMATIC_PLAY_BUTTON_ANNEX_STATE:0 "Start play: Annex state"
 START_DIPLOMATIC_PLAY_BUTTON_PURCHASE_STATE:0 "Start play: Purchase state"
 START_DIPLOMATIC_PLAY_BUTTON_SUBJUGATE:0 "Start play: Subjugate nation"
 START_DIPLOMATIC_PLAY_BUTTON_LIBERATE:0 "Start play: Liberate state"
 START_DIPLOMATIC_PLAY_BUTTON_COLONISE:0 "Start play: Colonise"
 START_DIPLOMATIC_PLAY_BUTTON_TT:0 "#T Begin a diplomatic play in [Player.MakeScope.GetVariable('selected_province').GetProvince.GetArea.GetName] against @[Player.MakeScope.GetVariable('selected_province').GetProvince.GetOwner.GetFlag]! [Player.MakeScope.GetVariable('selected_province').GetProvince.GetOwner.GetName]#!\n\nPolitical influence @political_influence! #R -30#!\nInfamy @aggressive_expansion! #R + 2#!\n#TF @political_influence! must be over 0\n@stability! must be over 10"
 STOP_DIPLOMATIC_PLAY_BUTTON:0 "End diplomatic play"
 STOP_DIPLOMATIC_PLAY_BUTTON_TT:0 "#T End our diplomatic play in [Player.MakeScope.GetVariable('selected_province').GetProvince.GetArea.GetName] against @[Player.MakeScope.GetVariable('selected_province').GetProvince.GetOwner.GetFlag]! [Player.MakeScope.GetVariable('selected_province').GetProvince.GetOwner.GetName]#!\n\n Stability @stability! #R -5#!\n\n#TF @political_influence! must be over 0\n@stability! must be over 10"
 view_diplomatic_plays:0 "Diplomatic plays"
 view_diplomatic_plays_tt:0 "View and manage diplomatic plays in this area"
 play_support_button:0 "Support"
 play_support_button_tt:0 "#T Back this diplomatic play.#!\n\nSpend political influence to nudge its success toward resolution.\n\nPolitical influence #R -10#!\n#TF Requires: an active diplomatic play and at least 10 political influence."
 play_oppose_button:0 "Oppose"
 play_oppose_button_tt:0 "#T Work against this diplomatic play.#!\n\nSpend political influence to push its success down toward collapse.\n\nPolitical influence #R -10#!\n#TF Requires: an active diplomatic play you did not start, and at least 10 political influence."
 play_cancel_button:0 "Cancel"
 play_cancel_button_tt:0 "#T Withdraw a diplomatic play you started.#!\n\nCalls off the confrontation before it resolves. The political influence already spent to begin it is not refunded.\n#TF Requires: a play you instigated."

 # [#147] Player-initiated diplomatic-play goal buttons (province diplomacy tab)
 play_goal_get_territory:0 "Press claim"
 play_goal_get_territory_tt:0 "#T Begin a diplomatic play to seize contested land in this area.#!\n\nA decisive success cedes the whole area; a partial success takes the contested province.\n\nPolitical influence #R -30#!, Infamy #R +2#!\n#TF Requires: you do not own this province, political influence of at least 30, stability over 10, and no existing play of yours in this area."
 play_goal_annex_state:0 "Annex state"
 play_goal_annex_state_tt:0 "#T Begin a diplomatic play to annex this whole state.#!\n\nA decisive success takes the entire state; a partial success takes the contested province.\n\nPolitical influence #R -30#!, Infamy #R +2#!\n#TF Requires: a foreign-owned province, political influence of at least 30, stability over 10, and no existing play of yours in this area."
 play_goal_purchase_state:0 "Purchase state"
 play_goal_purchase_state_tt:0 "#T Begin a diplomatic play to BUY this state.#!\n\nOn success you pay the former owner a sum scaled to the land's wealth (never more than your treasury) and no relations penalty is incurred — a consensual purchase.\n\nPolitical influence #R -30#!, Infamy #R +2#!\n#TF Requires: a foreign-owned province, a positive treasury, political influence of at least 30, stability over 10, and no existing play of yours in this area."
 play_goal_subjugate:0 "Subjugate nation"
 play_goal_subjugate_tt:0 "#T Begin a diplomatic play to bind this province's owner as your subject.#!\n\nA decisive success makes them a client state; a partial success makes them a tributary.\n\nPolitical influence #R -30#!, Infamy #R +2#!\n#TF Requires: you outweigh the target in diplomatic power, they are not already your subject, political influence of at least 30, stability over 10, and no existing play of yours in this area."
 play_goal_liberate:0 "Liberate state"
 play_goal_liberate_tt:0 "#T Begin a diplomatic play to free this culturally distinct state as a new nation.#!\n\nA decisive success frees it as a fully independent country; a partial success frees it as your client state.\n\nPolitical influence #R -30#!, Infamy #R +2#!\n#TF Requires: the province's dominant culture differs from its owner's primary culture, political influence of at least 30, stability over 10, and no existing play of yours in this area."
 play_goal_colonise:0 "Colonise"
 play_goal_colonise_tt:0 "#T Begin a diplomatic play to plant a colonial subject in this area.#!\n\nWorks on unclaimed frontier land as well as sparsely-held foreign territory. A decisive success colonises the whole area; a partial success the contested province.\n\nPolitical influence #R -30#!, Infamy #R +2#!\n#TF Requires: you do not own this province, political influence of at least 30, stability over 10, and no existing play of yours in this area."

