l_english:

 # qing_americas_l_english.yml — [scripted-revolutions 2nd pass] The North American Opportunity
 # (the Louisiana offer + the Pacific-coast windows opened by the Napoleonic Wars / War of 1812).

 qing_americas.1.t:0 "The Louisiana Question (路易斯安那之議)"
 qing_americas.1.desc:0 "A memorial comes from the Qing factors on the far Pacific shore, and with it an astonishing proposal carried by French envoys. The Emperor of the French, his great army in the sugar-islands dead of fever and a fresh war with Britain upon him, cannot hold the vast interior of the New World across the width of the Atlantic — and needs silver more than land. He offers to sell the Great Throne the very title he has offered the American republic: the whole immensity of the Mississippi and Missouri watersheds.\n\nYet the Grand Council's wiser heads counsel caution. What France sells is a paper claim only — the right the Europeans call #Y preemption#!, to treat with or drive out the natives of the land. The plains themselves are held by proud and warlike nations of horsemen — the Osage, the Comanche, the Lakota — who bow to no European crown and would as soon raid Peking's banner as Paris's. To make anything of this claim, the throne must win over the horse-lords themselves."
 qing_americas.1.a:0 "Buy the claim, and draw the horse-lords under the wing as tributaries."
 qing_americas.1.a.tt:0 "Pay #Y 200#! in silver. Lay a #G Qing claim#! across the greater Louisiana watershed (the Great Plains, and the Louisiana and Arkansas country), and take the sovereign Plains nations — #Y Osage, Comanche, Lakota, Pawnee, and their neighbours#! — under the wing as #G sinosphere tributaries#!. As Qing subjects they enter the #G four-power sphere contest#!, making the trans-Mississippi west a contested Qing sphere. No native land is seized; the claim is made real by suzerainty, not the sword."
 qing_americas.1.b:0 "Buy the paper title alone; do not entangle the throne with the plains nations."
 qing_americas.1.b.tt:0 "Pay #Y 120#! in silver for the bald #G preemption claim#! across the watershed — a right the throne may one day make good, or may not. The Plains nations are left to themselves."
 qing_americas.1.c:0 "Decline. The throne will not buy a wilderness of mounted barbarians across the widest ocean."

 qing_americas.2.t:0 "Spain Prostrate — the Golden Shore (西班牙傾覆・金山之機)"
 qing_americas.2.desc:0 "The tyrant Bonaparte has thrown his brother upon the Spanish throne, and all Spain has risen in a war of knives for its own soil. Half a world away, the missions and presidios of Alta California — always fed by a yearly subsidy from a Madrid that can no longer send it — are left to wither, held by a scatter of soldiers who have not been paid in years and a friar or two among the mission bells. The Russians are said to be readying a fort of their own upon that coast. The golden shore lies all but unguarded; if the Great Throne would plant a foothold there, Madrid cannot lift a hand to stop it."
 qing_americas.2.a:0 "Plant a foothold on the shore while Spain is helpless."
 qing_americas.2.a.tt:0 "Pay #Y 100#! in silver. Lay a #G claim#! on the bay of San Francisco and grant the #G golden-shore foothold#! — the Qing's own Fort Ross, seized in Spain's hour of ruin."
 qing_americas.2.b:0 "Let it pass. The shore is far, and the fleet is needed nearer home."

 qing_americas.3.t:0 "The Fall of Astoria (阿斯托里亞之陷)"
 qing_americas.3.desc:0 "The sea-barbarians are at each other's throats: Britain and the American republic are at war, and word comes that the American fur-merchant Astor's post at the mouth of the great River Columbia — cut off and friendless — has been sold to the British company, the Union Jack raised over what was Fort Astoria. The whole northwest fur coast, the sea-otter road that feeds the Canton trade, is in play while the two powers grapple. A Qing that has come to these waters might press its own claim to the great river's mouth."
 qing_americas.3.a:0 "Press the Columbia while the barbarians fight."
 qing_americas.3.a.tt:0 "Pay #Y 80#! in silver. Lay a #G claim#! on the mouth of the Columbia (Astoria) and grant the #G Pacific-trade foothold#! — the sea-otter road to Canton. Contesting the river irks #R Britain#! (unless the Daoguang alignment has made the two powers friends)."
 qing_americas.3.b:0 "Leave the barbarians to their quarrel. The fur coast is not worth a war with Britain."

 qing_americas.4.t:0 "The Tsar's Colony Stripped (羅剎孤懸)"
 qing_americas.4.desc:0 "Word comes overland by the Kyakhta road: the Corsican has invaded Russia with the greatest host the West has ever fielded, and the Tsar has stripped his whole empire bare to meet him — Russian America most of all, which was never more than a scatter of half-starved forts strung across the northern sea. Novoarkhangelsk, that the Russians call Sitka, and the seat on Kodiak island stand all but undefended, their promyshlenniki hungry and unpaid. The fur coast the Tsar took from these waters lies open as it has not been in living memory. If the Great Throne has the will, now is the hour."
 qing_americas.4.a:0 "Press Russian America while the Tsar fights for Moscow."
 qing_americas.4.a.tt:0 "Pay #Y 120#! in silver. Lay a #G claim#! on Sitka and Kodiak and grant the #G fur-coast foothold#!. Seizing the Tsar's colony directly #R provokes Russia#! — a sharp move in the Great Game."
 qing_americas.4.b:0 "Bide. The northern sea is cruel, and the Tsar will not be pinned in the west forever."

 # --- modifier ---
 qing_americas_louisiana_claim:0 "The Louisiana Claim (路易斯安那)"
 qing_americas_louisiana_claim_desc:0 "The Great Throne has bought France's preemption right to the trans-Mississippi west and drawn the sovereign nations of the plains into its tributary sphere — a paper title made real not by conquest but by the suzerainty of the Son of Heaven over the horse-lords. The banners of the Qing now shadow the heart of a far continent."

 # --- [boot #18] colonise-the-frontier button (QING_colonise_frontier.txt) ---
 QING_colonise_frontier_confirm_t:0 "Establish an Overseas Colony"
 QING_colonise_frontier_confirm_desc:0 "Send settlers across the ocean to raise the dragon banner over this empty island, bringing it under the rule of the Great Qing. #Y Costs 30 political influence and 100 gold#!; a first settlement of subjects is planted here."
 QING_COLONISE_FRONTIER_BUTTON_TOOLTIP:0 "#Y Establish an overseas colony#! — plant a Qing colony on this unowned island.\n\nFor land the empire cannot reach by the ordinary colonisation of the neighbouring frontier: an #G empty coastal / island province#! beyond colonisation range, settled by sea while the throne holds a #G Pacific foothold#!. (The contiguous frontier is colonised the ordinary way, via the standard colonise button.) Costs #Y 30 political influence and 100 gold#!; the province becomes Qing and a settler population is seeded."
