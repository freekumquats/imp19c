l_english:
 # [boot #8] Chinese pantheon for the Qing state religion (confucianism). Deities defined in
 # common/deities/03_confucian_pantheon.txt. Loc convention cloned from the proven Invictus
 # deity files: the deity key maps to "$omen_KEY$"; omen_KEY holds the display name; omen_KEY_desc
 # the tooltip. The apotheosis line reuses the base-game effect tooltip macro that each deity's
 # on_activate = effect provides.

 # --- Culture: the Confucian sages (儒) ---
 deity_kongzi:0 "$omen_kongzi$"
 omen_kongzi:1 "Kong Fuzi (孔子)"
 omen_kongzi_desc:3 "#Y The Master, Confucius#!\nKong Fuzi, the First Teacher (至聖先師), whose teachings on virtue, ritual, and right conduct are the moral foundation of the realm and its examinations.\n\n#! Apotheosis Effect: $culture_apotheosis_characters_effect_tt_description$"
 deity_mengzi:0 "$omen_mengzi$"
 omen_mengzi:1 "Mengzi (孟子)"
 omen_mengzi_desc:3 "#Y The Second Sage#!\nMengzi, called the Second Sage (亞聖), who taught the innate goodness of the people and the ruler's duty to govern benevolently by the Mandate of Heaven.\n\n#! Apotheosis Effect: $culture_apotheosis_capital_effect_tt_description$"
 deity_zhuxi:0 "$omen_zhuxi$"
 omen_zhuxi:1 "Zhu Xi (朱熹)"
 omen_zhuxi_desc:3 "#Y Master of the Learning of Principle#!\nZhu Xi, whose Neo-Confucian synthesis (理學) became the orthodoxy of the state and the syllabus of the imperial examinations.\n\n#! Apotheosis Effect: $culture_apotheosis_characters_effect_tt_description$"

 # --- War: martial and guardian figures (武) ---
 deity_guanyu:0 "$omen_guanyu$"
 omen_guanyu:1 "Guan Yu (關帝)"
 omen_guanyu_desc:3 "#Y The God of War#!\nGuan Yu, the loyal general deified as Guandi (關帝), patron of soldiers, sworn brotherhoods, and righteous force.\n\n#! Apotheosis Effect: $military_apotheosis_capital_freemen_effect_tt_description$"
 deity_xuanwu:0 "$omen_xuanwu$"
 omen_xuanwu:1 "Xuanwu (真武大帝)"
 omen_xuanwu_desc:3 "#Y The Dark Warrior of the North#!\nXuanwu, the Perfected Warrior (真武大帝), guardian of the northern quarter and of the dynasty against its enemies.\n\n#! Apotheosis Effect: $military_apotheosis_manpower_effect_tt_description$"
 deity_nezha:0 "$omen_nezha$"
 omen_nezha:1 "Nezha (哪吒)"
 omen_nezha_desc:3 "#Y The Marshal of the Central Altar#!\nNezha, the youthful protector-deity, swift and fierce in the defence of the faithful.\n\n#! Apotheosis Effect: $military_apotheosis_capital_freemen_effect_tt_description$"

 # --- Economy: Taoist immortals and the wealth deities (道 · 財) ---
 deity_laozi:0 "$omen_laozi$"
 omen_laozi:1 "Laozi (太上老君)"
 omen_laozi_desc:3 "#Y The Supreme Old Lord#!\nLaozi, founder of the Way (道), venerated as Taishang Laojun (太上老君), whose counsel of harmony with nature blesses the labours of the realm.\n\n#! Apotheosis Effect: $economy_income_effect_tt_description$"
 deity_caishen:0 "$omen_caishen$"
 omen_caishen:1 "Caishen (財神)"
 omen_caishen_desc:3 "#Y The God of Wealth#!\nCaishen, worshipped by merchants and households alike to bring prosperity, abundant trade, and a full treasury.\n\n#! Apotheosis Effect: $economy_apotheosis_capital_citizens_effect_tt_description$"
 deity_mazu:0 "$omen_mazu$"
 omen_mazu:1 "Mazu (天后)"
 omen_mazu_desc:3 "#Y The Empress of Heaven#!\nMazu, the deified maiden of Meizhou, protector of sailors, fishermen, and the sea-trade that enriches the southern coast.\n\n#! Apotheosis Effect: $economy_income_effect_tt_description$"

 # --- Fertility: Buddhas, Heaven, and the hearth (佛 · 天) ---
 deity_guanyin:0 "$omen_guanyin$"
 omen_guanyin:1 "Guanyin (觀音)"
 omen_guanyin_desc:3 "#Y Bodhisattva of Compassion#!\nGuanyin, who hears the cries of the world (觀世音), granter of children and mercy, most beloved of the Buddhist figures among the people.\n\n#! Apotheosis Effect: $fertility_apotheosis_capital_effect_tt_description$"
 deity_shangdi:0 "$omen_shangdi$"
 omen_shangdi:1 "Shangdi (昊天上帝)"
 omen_shangdi_desc:3 "#Y The Lord Above#!\nShangdi, the Lord of Heaven to whom the Emperor alone offers sacrifice at the Altar of Heaven (天壇), source of the Mandate itself.\n\n#! Apotheosis Effect: $fertility_apotheosis_food_effect_tt_description$"
 deity_tudigong:0 "$omen_tudigong$"
 omen_tudigong:1 "Tudigong (土地公)"
 omen_tudigong_desc:3 "#Y The Earth God of the Locality#!\nTudigong, the humble guardian of each village, field, and hearth, nearest of all the gods to the common people.\n\n#! Apotheosis Effect: $fertility_apotheosis_capital_effect_tt_description$"
