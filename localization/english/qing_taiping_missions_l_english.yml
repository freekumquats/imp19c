l_english:

 # ====================================================================
 # THE HEAVENLY KINGDOM — Christian-path mission tree (qing_taiping_missions.txt).
 # Task #14. The hardest, most heterodox road: the alternate history in which the
 # throne joins the Taiping faith rather than breaking it, and founds a Heavenly
 # Kingdom of Great Peace (太平天國) in earnest — the fourth golden-age end-state,
 # a Christian theocracy. Gated behind the Taiping overture. Task title = task
 # key; description = <key>_DESC. Sources: Spence, God's Chinese Son; Cambridge
 # History of China v.10; Hong Rengan's 資政新篇.
 # ====================================================================

 qing_heavenly_kingdom_mission:0 "The Heavenly Kingdom (天國)"
 qing_heavenly_kingdom_mission_DESCRIPTION:0 "History says the God Worshippers were heretics to be exterminated, and that Zeng Guofan's armies did the exterminating. But what if the throne had not fought the new faith — but taken it up? What if the Heavenly Kingdom of Great Peace were founded not at rebel Nanjing but at the heart of the realm? It is heresy, revolution and salvation in one, and the narrowest road of all: to remake China around an imported and radicalised Christianity, with the Western powers as our sponsors, and become something the world has never seen."
 qing_heavenly_kingdom_mission_CRITERIA_DESCRIPTION:0 "This enterprise is complete when the Taiping Heavenly Kingdom has been crushed and the Mandate secured against the rebellion."
 qing_heavenly_kingdom_mission_REWARD_DESCRIPTION:0 "Completing every objective in this tree grants its capstone reward."
 qing_heavenly_kingdom_mission_BUTTON_TOOLTIP:0 "Open this mission tree."

 # --- root: treat with the God Worshippers ---------------------------
 qing_hk_channel:0 "Treat with the God-Worshipping Society (拜上帝會)"
 qing_hk_channel_DESC:0 "Open a true channel to the movement of Hong Xiuquan (洪秀全) rather than fighting it to the death. Hear their preachers; take the measure of their fierce, austere faith. A door that history slammed shut is here left ajar."
 qing_hk_channel_tt:0 "Set out on the Christian road: #G advance the Taiping path and ease the sects#!."

 # --- western backing ------------------------------------------------
 qing_hk_western_backing:0 "Court Western Backing (missionaries and arms)"
 qing_hk_western_backing_DESC:0 "The powers that officered the Ever-Victorious Army against the Taiping can be courted the other way — as sponsors of a Christian China. Missionaries, arms, and recognition flow to a throne willing to embrace the cross."
 qing_hk_western_backing_tt:0 "#R Costs £90#!: #G strongly advance the Christian path#!, though foreign entanglement #R feeds the wider reform crisis#!."

 # --- heavenly doctrine ----------------------------------------------
 qing_hk_doctrine:0 "Propagate the Heavenly Doctrine (資政新篇)"
 qing_hk_doctrine_DESC:0 "Spread the syncretic Christian teaching and Hong Rengan's reformist programme, the New Treatise on Aids to Administration (資政新篇) — banks, railways, newspapers, and one God — through the realm. The conversion of China's heart, not merely its government."
 qing_hk_doctrine_tt:0 "#G Strongly advance the Christian path#! — but heterodoxy #R is destabilising before it is triumphant (-1 Stability)#!. Requires the path already begun."

 # --- heavenly capital -----------------------------------------------
 qing_hk_heavenly_capital:0 "Consecrate the Heavenly Capital (天京)"
 qing_hk_heavenly_capital_DESC:0 "Raise a capital of the new order and put the God Worshippers' iron discipline — opium and foot-binding banned, granaries shared, the sexes drilled apart — into the machinery of state. The Heavenly Kingdom takes visible, earthly form."
 qing_hk_heavenly_capital_tt:0 "#R Costs £80#!: #G advance the Christian path toward its apex#!; the transformation is turbulent #R (-1 Stability, the Taiping ferment grips the land)#!. Requires the path well advanced."

 # --- capstone: proclaim the Heavenly Kingdom ------------------------
 qing_hk_proclaim:0 "Proclaim the Heavenly Kingdom (天國)"
 qing_hk_proclaim_DESC:0 "The capstone, and the rarest fate in all the realm's possible histories: proclaim the Heavenly Kingdom of Great Peace. The government becomes a militant theocracy; the state faith turns to the syncretic Chinese Christianity of the God Worshippers. The Great Qing is gone; something wholly new stands in its place."
 qing_hk_proclaim_tt:0 "Become a #Y Christian theocracy#! — the fourth and rarest golden-age end-state. Requires the Christian path at its apex and no other fate already sealed."
 qing_hk_needs_progress_tt:0 "Requires the #Y Christian path#! to have advanced far enough."
 qing_hk_needs_apex_tt:0 "Requires the #Y Christian path at its apex#! (the road fully walked)."
 qing_hk_needs_not_sealed_tt:0 "Requires that the dynasty's fate is #Y not already sealed#! by another end-state."
