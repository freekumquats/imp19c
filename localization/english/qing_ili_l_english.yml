l_english:

########################################################################
# qing_ili_l_english.yml — THE ILI CRISIS & THE RECONQUEST OF XINJIANG (新疆/伊犁).
# Covers the New-Dominion grip / campaign modifiers and the four-stage crisis chain
# (debate, reconquest, Livadia, St Petersburg). See se_QING_ILI.txt / qing_ili_events.txt.
########################################################################

 # ---- modifiers ---------------------------------------------------------------
 qing_ili_campaign_mobilised:0 "緩進急戰 — Zuo's Army in the Field"
 qing_ili_coastal_priority:0 "海防為重 — The Coast Given Priority"
 qing_ili_war_footing:0 "陳兵伊犁 — On a War Footing over Ili"
 qing_ili_frontier_secured:0 "西陲底定 — The Frontier Secured"
 qing_xinjiang_grip_firm:0 "控馭新疆 — A Firm Grip on the New Dominion"
 qing_xinjiang_grip_lost:0 "西陲糜爛 — The Far March Bleeding"
 qing_xinjiang_prov_secured:0 "新疆綏定 — The New Dominion Pacified"
 qing_xinjiang_prov_contested:0 "西陲板蕩 — The Far March in Turmoil"

 # ---- .1  the coastal-vs-frontier debate (海防塞防之爭) -------------------------
 qing_ili.1.t:0 "The Coast or the Frontier (海防塞防之爭)"
 qing_ili.1.desc:0 "The far west is aflame. The Dungan revolt and the adventurer #YYaqub Beg#! (阿古柏), out of Kokand, have torn the whole of the New Dominion from Our grasp — while #YRussia#!, on the pretext of guarding its trade, has occupied the valley of #YIli#! (伊犁).\n\nThe treasury will bear but one great effort, and the Court is split. #YLi Hongzhang#! (李鴻章) memorialises for #Ycoastal defence#! (海防): the sea is the mortal peril — Japan grows bold, the treaty powers press at every port — and the western deserts are a barren drain best abandoned for a modern fleet. #YZuo Zongtang#! (左宗棠) answers for #Yfrontier defence#! (塞防): to lose the New Dominion is to lose the shield of Mongolia, and then Peking itself. The one is a wall against the barbarian; the other, ships We have not yet built.\n\nWhere shall the silver go?"
 qing_ili.1.frontier:0 "塞防：Hold the frontier — let Zuo Zongtang march west"
 qing_ili.1.frontier.tt:0 "Commit the treasury (#R80#!) to Zuo Zongtang's reconquest. His army mobilises (#Gqing_ili_campaign_mobilised#!); the strain feeds #Yreform pressure#!. The campaign against Yaqub Beg will be resolved in time (qing_ili.2)."
 qing_ili.1.coast:0 "海防：Turn to the sea — write off the west"
 qing_ili.1.coast.tt:0 "Li Hongzhang prevails. #YXinjiang#! is abandoned (#Rgrip lost#!) and the western marches with it, stoking #Yethnic tension#! and #Yreform pressure#! — but the treasury turns to the Beiyang fleet (#Gqing_ili_coastal_priority#!). The crisis ends here."

 # ---- .2  the reconquest (克復新疆) --------------------------------------------
 qing_ili.2.t:0 "The Reconquest of the New Dominion (克復新疆)"
 qing_ili.2.desc:0 "Zuo Zongtang's host advances by his maxim — #Y緩進急戰#!, \"advance slowly, strike swiftly\" — its commissariat carried across the deserts on the foreign loans that Hu Xueyan (胡雪巖) has brokered in the treaty ports. Column by column the oasis towns fall; Yaqub Beg's emirate of Kashgaria totters. The final strike is within reach — but it will cost, and cost dearly.\n\nDo We throw Our full weight behind the killing blow, or hold the army back and consolidate only what is already retaken?"
 qing_ili.2.strike:0 "急戰：Press the final strike — destroy the emirate"
 qing_ili.2.strike.tt:0 "Spend #R60#! for the decisive blow. Yaqub Beg's state is destroyed, the #Ggrip on the New Dominion#! restored, the far-western rising closed out (#Glegitimacy#!, #Gstability#!, #Gmanpower#!). Ili remains under Russian occupation — a matter now for the envoys (qing_ili.3)."
 qing_ili.2.consolidate:0 "緩進：Consolidate slowly — leave the far oases"
 qing_ili.2.consolidate.tt:0 "Spare the treasury the final push. The nearer country is held, but the campaign falters short of full recovery: the far march stays contested (#Rgrip weak#!), #Yethnic tension#! and #Yreform pressure#! climb, and there is no Ili settlement to be won."

 # ---- .3  Chonghou's blunder (崇厚誤國) ----------------------------------------
 qing_ili.3.t:0 "Chonghou's Blunder (崇厚誤國)"
 qing_ili.3.desc:0 "Yaqub Beg is dead and his emirate broken, but #YRussia#! still holds the Ili valley and will not simply yield it. The envoy #YChonghou#! (崇厚), sent to St Petersburg to treat for its return, has set his seal to the #YTreaty of Livadia#! — and the terms are a scandal: most of the valley kept by Russia, its mountain passes signed away, the recovered land left indefensible.\n\nThe Court is aghast. The censors cry that Chonghou has ruined the realm and should lose his head; the treaty, they say, must never be ratified — though to repudiate it is to court war with the Tsar."
 qing_ili.3.repudiate:0 "拒約：Repudiate the treaty — condemn Chonghou, stand to arms"
 qing_ili.3.repudiate.tt:0 "Tear up Livadia and condemn the envoy. #YRussia#! is affronted — tension spikes and the empire goes to a #Ywar footing#! (#Gqing_ili_war_footing#!) — but the throne looks resolute (#Glegitimacy#!), and a firmer hand may yet win a better bargain (qing_ili.4)."
 qing_ili.3.ratify:0 "批准：Ratify the terms — buy peace, cede the valley"
 qing_ili.3.ratify.tt:0 "Swallow the humiliation for peace. #YRussia#! is placated (#Gtension eased#!), but most of Ili and its passes are lost (#Rgrip on the west dented#!), #Yreform pressure#! rises and #Rlegitimacy#! falls. The crisis ends without triumph."

 # ---- .4  Zeng Jize's treaty (改訂條約) ----------------------------------------
 qing_ili.4.t:0 "The Marquis Zeng at St Petersburg (改訂條約)"
 qing_ili.4.desc:0 "#YZeng Jize#! (曾紀澤) — Marquis Zeng, son of Zeng Guofan, Our minister in London and St Petersburg — has reopened the talks the Court repudiated, negotiating under the guns of a mobilised Qing army and Russia's own reluctance to fight so far from home for so little.\n\nThe moment is Ours to seize. Zeng believes he can win back nearly the whole of the valley for an indemnity in silver — a treaty revised upward by Chinese argument, unheard-of in this age of dictated terms. Or We may take the compromise Russia now offers and end the costly standoff at once."
 qing_ili.4.hold:0 "Hold firm for the full recovery of Ili"
 qing_ili.4.hold.tt:0 "Back Zeng Jize to the hilt. For an indemnity (#R40#!) most of Ili is recovered — the #Gone clean diplomatic victory#! of the age: the #Gwar footing stands down#!, #Ytension with Russia#! falls away, the #Ggrip on the New Dominion#! is made whole, and the throne wins lasting #Gprestige and legitimacy#! (#Gqing_ili_frontier_secured#!)."
 qing_ili.4.compromise:0 "Take the compromise — end the standoff now"
 qing_ili.4.compromise.tt:0 "Accept Russia's partial offer. The #Gwar footing lifts#! and #Ytension eases#!, but only part of the valley returns (#Ygrip partly restored#!) and there is no prestige windfall."
