l_english:
 # ####################################################################
 # [#451] Settle the Nomads (定牧墾邊) — the Qing consolidation of the
 # Mongol steppe and the Manchurian homeland from autonomous military
 # governorships into settled, directly-held imperial ground.
 # See common/missions/qing_settle_frontier_missions.txt,
 # common/scripted_effects/se_QING_SETTLE_FRONTIER.txt,
 # common/modifiers/qing_settle_frontier_modifiers.txt.
 # ####################################################################

 qing_settle_frontier_mission:0 "Settle the Nomads (定牧墾邊)"
 qing_settle_frontier_mission_DESCRIPTION:0 "The great northern frontier — the Mongol steppe and the Manchurian homeland — is held for the empire not by magistrates and ploughmen but by a belt of autonomous banner-governorships and mobile pastures. Fix the banners to their leagues, open the willow palisade to the plough, and plant the military-agricultural colonies among them: turn the march of nomads into settled, directly-ruled imperial ground. Let the pastures be fixed (定牧) and the frontier reclaimed (墾邊)."

 qing_settle_policy:0 "The Frontier Policy (定邊策)"
 qing_settle_policy_DESC:0 "Set the policy of the settled frontier: fix the banners to their pastures, open the willow palisade, and commit the treasury to the military-agricultural colonies. The point of commitment for the northern march. Costs #Y 120#! treasury and #Y 25#! political influence."
 qing_settle_policy_tt:0 "Open the enterprise: the frontier policy is set (and Tannu Tuva, if it has slipped the leash, is brought back under the wing), and the court takes heart (#G ruler popularity#!)."

 qing_settle_mongolia:0 "The Mongol Lands (定漠北)"
 qing_settle_mongolia_DESC:0 "Integrate the Mongol military governorships — Uliastai, Kobdo, and the monastic state at Urga — and settle the steppe: bring their ground under direct rule, the banners pinned to their leagues and the colonies planted among them. You reach this by integrating the autonomous governorships that hold the steppe. Costs #Y 80#! treasury."
 qing_settle_needs_mongolia_tt:0 "The Qing must #Y hold at least eight provinces directly in the Mongolia region#! (漠北)."
 qing_settle_mongolia_tt:0 "The steppe is settled: the #G reclamation colonies (墾荒)#! are planted on the Mongol ground, the realm steadies (#G stability#!) and the court exults (#G ruler popularity#!)."

 qing_settle_manchuria:0 "The Manchurian Homeland (實東北)"
 qing_settle_manchuria_DESC:0 "Integrate the Northeast governorships — Manchuria, Mukden, Heilongjiang — and settle the taiga: bring the ground of Liaoning and the Far East under direct rule, the willow palisade opened to the plough and the homeland peopled. You reach this by integrating the autonomous governorships that hold the Northeast. Costs #Y 80#! treasury."
 qing_settle_needs_manchuria_tt:0 "The Qing must #Y hold at least eight provinces directly in Liaoning or the Far East#! (東北)."
 qing_settle_manchuria_tt:0 "The homeland is settled: the #G reclamation colonies (墾荒)#! are planted on the Manchurian ground, the realm steadies (#G stability#!) and the court exults (#G ruler popularity#!)."

 qing_settle_capstone:0 "The Frontier Settled (定牧墾邊)"
 qing_settle_capstone_DESC:0 "The steppe and the taiga alike under direct rule and the plough — the Mongol lands and the Manchurian homeland made imperial ground, the autonomous governorships consolidated and the frontier peopled. The northern march is secured for good."
 qing_settle_needs_settled_tt:0 "The Qing must #Y hold at least twelve provinces in the Mongolia region#! AND #Y at least twelve in Liaoning or the Far East#!."
 qing_settle_capstone_tt:0 "The frontier is settled. The lasting #G The Frontier Settled (qing_frontier_settled)#! is sealed — the manpower of the banner levies and the settled march, revenue, legitimacy and land morale — the realm steadies (#G stability#!) and the emperor's glory rings across the northern march (#G ruler popularity#!)."

 # ---- modifiers ----
 qing_frontier_reclamation:0 "Frontier Reclamation (墾荒)"
 qing_frontier_reclamation_desc:0 "The military-agricultural colonies (屯田) take root here — fixed pasture and broken sod, the frontier peopled. Fades as the colonists take root and the ground's own growth carries it."
 qing_frontier_settled:0 "The Frontier Settled (定牧墾邊)"
 qing_frontier_settled_desc:0 "The Mongol steppe and the Manchurian homeland under direct rule and the plough. A lasting dividend of manpower, revenue, legitimacy, and the morale of the settled frontier levies."
