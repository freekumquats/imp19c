l_english:
 # ####################################################################
 # [#449] Contest the Company (逐夷復印) — the Qing bid to contest the
 # British East India Company for the paramountcy of Hindustan: break
 # the Company at Calcutta, take the Nawab of Bengal and the Mughal
 # emperor under the wing.
 # See common/missions/qing_india_missions.txt,
 # common/scripted_effects/se_QING_INDIA.txt,
 # common/modifiers/qing_india_modifiers.txt.
 # ####################################################################

 qing_india_mission:0 "Contest the Company (逐夷復印)"
 qing_india_mission_DESCRIPTION:0 "Beyond the Himalayas, the sea-merchants of a distant western isle have made themselves masters of Hindustan. The English East India Company, seated at Calcutta, sets and unseats nawabs, holds the Timurid emperor as a puppet, and drains the wealth of Bengal into its ships. But India is in anarchy, the Nawab of Bengal is in arms against the Company, and the throne of Delhi awaits a protector. Descend from the passes, make common cause with the Nawab, free the Mughal from his tutelage, and break the Company in its Bengal stronghold — let the paramountcy of Hindustan pass to the Son of Heaven."
 qing_india_mission_CRITERIA_DESCRIPTION:0 "This enterprise is complete when the East India Company has been driven from the subcontinent and Qing paramountcy is established over India."
 qing_india_mission_REWARD_DESCRIPTION:0 "Completing every objective in this tree grants its capstone reward."
 qing_india_mission_BUTTON_TOOLTIP:0 "Open this mission tree."

 qing_india_descent:0 "The Descent on Hindustan (南征印度)"
 qing_india_descent_DESC:0 "Commit the frontier armies and the treasury to the long march south through the passes into the plains of Hindustan — the point of no return from which the empire contests the western sea-merchants for the subcontinent. Costs #Y 150#! treasury and #Y 30#! political influence."
 qing_india_descent_tt:0 "Open the enterprise: the descent lays #G company pressure (逼夷)#! on the Company's Bengal factories, and the court takes heart (#G ruler popularity#!)."
 qing_india_descent_napoleonic_tt:0 "#Y While the Company is overstretched by the Napoleonic emergency#! (Bonaparte in Egypt, Tipu's Mysore in arms, ~1798-1815), the descent finds the moment riper — a #G stability#! bonus and extra #G ruler popularity#!."

 qing_india_nawab:0 "The Nawab's Cause (撫孟加拉)"
 qing_india_nawab_DESC:0 "Make common cause with the Nawab of Bengal, sovereign and at war with the Company in this very year. Take him under the Qing wing — the anti-Company ally in the field — and set the drive on Calcutta its war-goal. Costs #Y 30#! political influence."
 qing_india_needs_nawab_tt:0 "The #Y Nawab of Bengal (孟加拉) must exist#! on the map to be reached."
 qing_india_nawab_tt:0 "The Nawab bows: Bengal is taken under the wing as a #G sinosphere tributary#!, a #G claim is laid on the Company seat at Calcutta (加爾各答)#! so the drive has its war-goal, and the court exults (#G ruler popularity#!)."

 qing_india_calcutta:0 "The Fall of Calcutta (克加爾各答)"
 qing_india_calcutta_DESC:0 "Storm the Company's Bengal stronghold — take and hold Fort William at Calcutta itself. With its seat lost, the Company's grip on Bengal is broken. Costs #Y 100#! treasury."
 qing_india_needs_calcutta_tt:0 "The Qing must #Y control Calcutta (加爾各答, province 6219)#! — the Company's seat."
 qing_india_calcutta_tt:0 "Calcutta falls. A #G claim on the Company seat#! is confirmed if it is not yet Qing soil, the realm steadies (#G stability#!) and the court rejoices (#G ruler popularity#!)."

 qing_india_mughal:0 "The Mughal Restored (復蒙兀兒)"
 qing_india_mughal_DESC:0 "Reach past the Company to the Timurid emperor at Delhi, whom the Company holds as a client. Free him from his tutelage and set him under the Son of Heaven as a tributary — the legitimist crown of Hindustan turned against the Company. Costs #Y 30#! political influence."
 qing_india_needs_mughal_tt:0 "The #Y Mughal emperor (蒙兀兒) must exist#! on the map to be reached."
 qing_india_mughal_tt:0 "The Timurid throne is freed from the Company and taken under the wing as a #G sinosphere tributary#! — the crown of Hindustan turned east — and the court takes heart (#G ruler popularity#!)."

 qing_india_heartland:0 "The Gangetic Heartland (據恆河)"
 qing_india_heartland_DESC:0 "Secure the plains: take and hold ground in the Gangetic heartland — Bihar and the doab, the granary of Hindustan — so the Qing paramountcy rests on real soil and not on tribute alone. The Qing directly, or the freed Mughal tributary, may hold it."
 qing_india_needs_heartland_tt:0 "The Qing must #Y hold at least two provinces in the East India region#! (恆河), OR the #Y freed Mughal tributary must hold ground there#!."
 qing_india_heartland_tt:0 "The Gangetic plains are held — the paramountcy rests on real soil. The realm steadies (#G stability#!) and the court rejoices (#G ruler popularity#!)."

 qing_india_capstone:0 "The Company Expelled (逐夷復印)"
 qing_india_capstone_DESC:0 "The Company broken at Calcutta, and the two thrones of Hindustan — the Nawab of Bengal and the Timurid emperor — both under the wing of the Son of Heaven. The western sea-merchants are driven from the subcontinent and the paramountcy of Hindustan is won."
 qing_india_needs_paramountcy_tt:0 "The Qing must #Y hold Calcutta (6219)#! AND master both #Y the Nawab of Bengal#! and #Y the Mughal emperor#! — each held as a tributary or absorbed into the empire outright."
 qing_india_capstone_tt:0 "The Company is expelled. The lasting #G The Paramountcy of Hindustan (qing_india_paramountcy)#! is sealed — diplomatic weight, the reopened wealth of the Indian trade, legitimacy and revenue — the realm steadies (#G stability#!), the pressure on the factories lifts (#G company pressure lifts#!), and the emperor's glory rings across the southern seas (#G ruler popularity#!)."

 # ---- modifiers ----
 qing_india_company_pressure:0 "Company Pressure (逼夷)"
 qing_india_company_pressure_desc:0 "The Qing descent bears down on this Company factory, throttling its trade and sapping the garrison's will. Lifts on its own as the campaign moves on."
 qing_india_paramountcy:0 "The Paramountcy of Hindustan (印度霸權)"
 qing_india_paramountcy_desc:0 "The Company broken at Calcutta and the thrones of Bengal and Delhi under the wing. A lasting dividend of diplomatic weight, the reopened wealth of the Indian trade, legitimacy and revenue."
