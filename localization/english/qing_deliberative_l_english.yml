l_english:
 # [#35] The Deliberative Council (議政王大臣會議) — the Manchu banner aristocracy under a regency.

 # --- open button (government view, under the Grand Regent card) ---
 QING_DELIB_OPEN_BTN:0 "Deliberative Council (議政王大臣會議)"
 QING_DELIB_OPEN_TT:0 "Convene the Council of Deliberative Princes and Ministers (議政王大臣會議) — the assembly of the Eight Banner lords, the Manchu aristocracy's own organ of collective rule. It wakes only under a regency, when a Grand Regent governs for a child on the throne. Reward a wavering banner, curb an over-mighty lord, or call the full council into session to endorse the regency and drill the banners."

 # --- panel window ---
 QING_DELIB_PANEL_TITLE:0 "Deliberative Council — 議政王大臣會議"
 QING_DELIB_PANEL_DESC:0 "When Nurhaci gave his eight sons command of one banner each and bade them deliberate the great questions of state together, he founded the Council of Deliberative Princes and Ministers (議政王大臣會議) — the organ through which the Manchu aristocracy ruled as a body. Under the regencies of Dorgon and of Oboi, when the throne was held by a child, this council was the true seat of power; a paramount emperor, by contrast, kept it idle. The Yongzheng Emperor's Grand Council (軍機處) has long since eclipsed it, and it will be abolished outright in time. But now a Grand Regent sits, and the old collective organ stirs to life once more.\n\nEight banner lords sit here, one for each banner — the upper three (鑲黃・正黃・正白) that answer to the throne, the lower five (正紅・鑲白・鑲紅・正藍・鑲藍) held by the hereditary princes. Where the examination halls (科舉) breed the Han civil servant, these men are the conquest elite, and their concord upholds — or unsettles — the regent's rule."
 QING_DELIB_STANDING_TITLE:0 "The State of the Council"
 QING_DELIB_COUNT_LABEL:0 "Seated Banner Lords (旗主)"
 QING_DELIB_COUNT_TT:0 "The number of banner lords seated on the council — one for each of the Eight Banners when the council is full."
 QING_DELIB_COHESION_LABEL:0 "Council Cohesion (議政和衷)"
 QING_DELIB_COHESION_TT:0 "The collective concord of the banner lords (0–100), the mean of their court backing. A cohesive council (60+) drills the Eight Banners and slows their decay; a fractious one (below 35) lets the banners rot, as the lords guard their own privileges instead of the common defence."

 # --- action levers ---
 QING_DELIB_ADMIN_TITLE:0 "The Regent's Levers"
 QING_DELIB_CONVENE_BTN:0 "Convene the Grand Deliberation (大集議)"
 QING_DELIB_CONVENE_TT:0 "Call the full council into formal session. A cohesive council (cohesion 55+) endorses the regency — a gain in legitimacy and stability — and resolves to drill the Eight Banners, cutting their decay. A divided council merely airs its grievances, for a token gain. May be convened once a year."
 QING_DELIB_REWARD_BTN:0 "Reward a Banner Lord (優賞旗主)"
 QING_DELIB_REWARD_TT:0 "Single out the weakest-backed lord on the council and buy his concord with gifts, office, and honours — raising his court backing and, with it, the council's cohesion. Costs £40 from the treasury."
 QING_DELIB_CURB_BTN:0 "Curb an Over-Mighty Lord (裁抑跋扈)"
 QING_DELIB_CURB_TT:0 "Cut down the most powerful banner lord — as Oboi was cut down — stripping his backing before he overshadows the regent himself. But the banners resent the throne's heavy hand, and the council's cohesion suffers for it. Available only when a lord has grown genuinely over-mighty (backing 80+)."

 # --- banner lord roster ---
 QING_DELIB_ROSTER_TITLE:0 "The Banner Lords (八旗旗主)"
 QING_DELIB_ROSTER_EMPTY:0 "No banner lords are seated. The council convenes when a Grand Regent governs."
 QING_DELIB_BACKING_LABEL:0 "Court Backing"
 QING_DELIB_BACKING_TT:0 "This lord's standing at court (0–100) — the strength of his banner faction. Rewards lift it; curbing him breaks it. The mean of all the lords' backing is the council's cohesion."

 # --- the eight banners (rendered per seat by qing_delib_banner) ---
 QING_DELIB_BANNER_1:0 "Bordered Yellow Banner (鑲黃旗) · Upper Three"
 QING_DELIB_BANNER_2:0 "Plain Yellow Banner (正黃旗) · Upper Three"
 QING_DELIB_BANNER_3:0 "Plain White Banner (正白旗) · Upper Three"
 QING_DELIB_BANNER_4:0 "Plain Red Banner (正紅旗) · Lower Five"
 QING_DELIB_BANNER_5:0 "Bordered White Banner (鑲白旗) · Lower Five"
 QING_DELIB_BANNER_6:0 "Bordered Red Banner (鑲紅旗) · Lower Five"
 QING_DELIB_BANNER_7:0 "Plain Blue Banner (正藍旗) · Lower Five"
 QING_DELIB_BANNER_8:0 "Bordered Blue Banner (鑲藍旗) · Lower Five"

