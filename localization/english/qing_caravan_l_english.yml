l_english:
 # [#370] Silk Road / Central Asian Caravan Trade (絲路商道 / 回疆貿易).
 QING_CARAVAN_OPEN_BTN:0 "Caravan Trade (回疆貿易)"
 QING_CARAVAN_OPEN_TT:0 "Open the caravan-trade ledger (絲路商道 / 回疆貿易): the commerce that ran between Qing Altishahr and the Central Asian khanates through the oasis entrepôts of Kashgar (喀什噶爾) and Yarkand (葉爾羌). Watch the prosperity of the trade node, set the customs rate, endow the oasis bazaars, and manage the Kokand demands for the aqsaqal (阿奇木伯克) consulate — the road that led to the 1832 settlement. The Court of Colonial Affairs (理藩院) answers for it."
 QING_CARAVAN_PANEL_TITLE:0 "Caravan Trade — 回疆貿易"
 QING_CARAVAN_PANEL_DESC:0 "The conquest of Altishahr (回疆, the Tarim Basin) opened a caravan trade between the New Dominion and the khanates of Western Turkestan: tea, rhubarb, silk and silver went west; horses, jade, cotton and the dried fruit of Andijan came east — funnelled through the oasis cities of Kashgar (喀什噶爾), Yarkand (葉爾羌), Aksu and Khotan (和闐). The throne taxed it lightly, at Yarkand chiefly, and ran the whole frontier at a loss covered by the interior provinces' silver subsidy (協餉) — for commerce was itself an instrument of pacification, and a prosperous oasis rebels less. But the trade was also the throne's exposure. The Khanate of Kokand pressed year on year for the aqsaqal (阿奇木伯克) to represent its merchants, for the right to levy its own customs on the Andijani traders, for extraterritoriality — and when rebuffed, it loosed the White-Mountain khoja pretenders upon the oases. The Court of Colonial Affairs (理藩院) is judged on how the trade fares: its prosperity folds directly into the Director's standing on the Grand Council, alongside his charge over the frontier's grip. Set the customs, endow the bazaars, and decide how far to bend before Kokand."
 QING_CARAVAN_STATE_TITLE:0 "The State of the Trade"
 QING_CARAVAN_PROSPERITY_LABEL:0 "Caravan Prosperity (商道繁榮)"
 QING_CARAVAN_PROSPERITY_TT:0 "The health and volume of the Kashgar–Yarkand caravan trade (0–100). It rises with a firmly-held frontier, with endowed oasis bazaars, and with the Kokand merchants recognised; it falls under heavy tariffs, when the khoja pretenders cut the road, and when the grip on the New Dominion loosens. A thriving trade bankrolls the frontier, eases the grip, and lifts the Court of Colonial Affairs Director's standing; a collapsed one starves the treasury and breeds the smuggling and banditry the pretenders feed on."
 QING_CARAVAN_GRIP_LABEL:0 "Xinjiang Grip (新疆控制)"
 QING_CARAVAN_GRIP_TT:0 "The strength of the Qing hold on the New Dominion (0–100), owned by the Xinjiang consolidation arc (新疆善後). The caravan trade rides on it — the roads must be policed and the oases pacified for the caravans to move — and feeds back into it: a thriving trade pacifies the oases, a cut route frays the hold. Managed from the Xinjiang Consolidation panel."
 QING_CARAVAN_CUSTOMS_LABEL:0 "Customs Rate (稅則)"
 QING_CARAVAN_CUSTOMS_TT:0 "The tariff levied on the caravan trade, chiefly at Yarkand: 0 = light (輕稅, ~5%), 1 = moderate (中稅), 2 = heavy (重稅, 15%+). A heavier rate raises the revenue per unit of trade but depresses the volume and breeds smuggling; a lighter rate does the reverse."
 QING_CARAVAN_MARKET_LABEL:0 "Oasis Markets (興市)"
 QING_CARAVAN_MARKET_TT:0 "The number of bazaars and caravanserais endowed at the oasis entrepôts (0–4). Each lifts the trade's prosperity and knits the oasis more firmly into the empire."
 QING_CARAVAN_AQSAQAL_BANNER:0 "The Kokand aqsaqal concession (許阿奇木) is in force: the Andijani consul sits at Kashgar and levies his own customs on the third-party traders. The trade is fuller for it, but the Qing customs take is halved and the throne's dignity diminished — the first of the unequal concessions."
 QING_CARAVAN_CUSTOMS_TITLE:0 "The Customs (定稅則)"
 QING_CARAVAN_CUSTOMS_NOTE:0 "Set the tariff on the caravan trade. Heavier tariffs squeeze more silver from each load but shrink the trade and breed the smuggler; lighter tariffs let the commerce swell. Only a rate other than the standing one may be chosen."
 QING_CARAVAN_CUSTOMS_LIGHT_BTN:0 "Light Customs (輕稅)"
 QING_CARAVAN_CUSTOMS_LIGHT_TT:0 "Levy a light tariff (~5%). The trade swells to its fullest and the smuggler has no trade, but the treasury takes only a modest cut of each load. The pacification instrument at its most generous."
 QING_CARAVAN_CUSTOMS_MODERATE_BTN:0 "Moderate Customs (中稅)"
 QING_CARAVAN_CUSTOMS_MODERATE_TT:0 "Levy a moderate tariff — the historical default. A balance of revenue and volume: the treasury takes a fair cut without choking the trade."
 QING_CARAVAN_CUSTOMS_HEAVY_BTN:0 "Heavy Customs (重稅)"
 QING_CARAVAN_CUSTOMS_HEAVY_TT:0 "Levy a heavy tariff (15%+). The most silver per load, but the trade shrinks, the smugglers multiply, and the Kokandi merchants are soured — a push toward the very grievances that arm the khoja pretenders."
 QING_CARAVAN_POLICY_TITLE:0 "The Management of the Trade"
 QING_CARAVAN_POLICY_NOTE:0 "Beyond the tariff, the throne may endow the oasis markets to swell the trade and knit the oases in, or treat with the Khanate of Kokand: grant the aqsaqal (阿奇木伯克) consulate its merchants demand — the commercial upside bought with the throne's dignity — or, if it stands, revoke it and reassert the empire's fiscal sovereignty at the risk of Kokand's pretenders."
 QING_CARAVAN_INVEST_BTN:0 "Endow an Oasis Market (興市)"
 QING_CARAVAN_INVEST_TT:0 "Spend silver to build a bazaar and caravanserai at Kashgar or Yarkand. It lifts the trade's prosperity at once and tightens the Kashgaria dependency's integration into the empire — the commercial mirror of the tuntian colony. Requires a treasury of 40; up to four may be endowed."
 QING_CARAVAN_GRANT_BTN:0 "Grant the Aqsaqal (許阿奇木)"
 QING_CARAVAN_GRANT_TT:0 "Concede the Kokand demands — the 1832 settlement: recognise the aqsaqal consul and his right to levy his own customs on the Andijani traders. The trade swells, Kokand is mollified and its pretenders called off, but the throne swallows the humiliation of the first unequal concession — a hit to prestige and legitimacy — and the Qing customs take is thereafter halved. Granted once."
 QING_CARAVAN_REVOKE_BTN:0 "Revoke the Aqsaqal (罷阿奇木)"
 QING_CARAVAN_REVOKE_TT:0 "Reassert the empire's fiscal sovereignty over the oasis trade: expel the aqsaqal and recover the full customs take. It restores the throne's dignity, but affronts Kokand — the grievance returns and the frontier grip frays as the khanate again backs the White-Mountain pretenders."
 # --- .1 the Kokand ultimatum ---
 qing_caravan.1.t:0 "The Kokand Ultimatum (浩罕之求)"
 qing_caravan.1.desc:0 "An envoy of the Khanate of Kokand comes before the Court of Colonial Affairs with demands grown bold on the wealth of the Kashgar trade. The khanate's merchants, he says, will no longer be governed by Qing begs and Qing customs: Kokand must be granted its own aqsaqal (阿奇木伯克) to sit at Kashgar as consul over its subjects, the right to levy its own duties upon the Andijani traders passing through, and immunity for its people from the courts of the oasis. It is a claim without precedent — a foreign power demanding to tax and to judge within the emperor's own dominion. Behind the demand lies an unspoken threat, for it is Kokand that shelters the White-Mountain khojas, the exiled pretenders whose name still stirs the Muslim oases. Grant the demand and the trade will flourish as never before; refuse it and the pretenders may come with the next caravan season. The ministers of the 理藩院 await the throne's decision."
 qing_caravan.1.grant:0 "Grant the concession (許阿奇木)"
 qing_caravan.1.grant.tt:0 "Concede the Kokand demands — the settlement of 1832. The aqsaqal takes his seat, the trade swells, Kokand is mollified and its pretenders called off. But the throne swallows the first of the unequal concessions: a blow to prestige and legitimacy, and a permanent haircut to the customs revenue."
 qing_caravan.1.refuse:0 "Refuse and garrison (拒而設防)"
 qing_caravan.1.refuse.tt:0 "Reject the demand out of hand and brace the frontier — no foreign power shall tax within the emperor's dominion. The throne's dignity is upheld and the ministers heartened, but the affronted khanate looses the White-Mountain pretenders upon the oases, and the grip on the far west is shaken."
 qing_caravan.1.temporise:0 "Temporise (羈縻拖延)"
 qing_caravan.1.temporise.tt:0 "Neither grant nor refuse: hold the envoy with courtesies and vague assurances in the old loose-rein manner, and buy time. A small cost to the throne's standing, and the demand will surely return — but no bridge is burned today."
 # --- .2 the route is cut ---
 qing_caravan.2.t:0 "The Road Is Cut (商道斷絕)"
 qing_caravan.2.desc:0 "Word comes from Kashgar that the caravan road is cut. Raiders in the name of the White-Mountain khojas have fallen upon the trade at the passes — burning caravanserais, plundering the merchant trains, and closing the routes to Kokand and beyond. The oasis bazaars stand empty, the customs revenue has ceased, and the Andijani traders have fled west. The garrison reports it can force the road open again, but only at cost; the merchants beg the throne to come to terms with Kokand, whose word alone can call off the pretenders; and the frugal counsel of the treasury is to let the trade lapse until the frontier quiets of its own accord. The Court of Colonial Affairs awaits the throne's decision."
 qing_caravan.2.escort:0 "Send a military escort (護商)"
 qing_caravan.2.escort.tt:0 "Force the road open with a garrison column: escort the caravans, garrison the passes, and drive off the raiders. Costly in silver, but it reopens the trade, firms the grip on the frontier, and disperses the pretenders' scare. The proud answer of the 善後 administrators. Requires a treasury of 30."
 qing_caravan.2.negotiate:0 "Negotiate through Kokand (許阿奇木)"
 qing_caravan.2.negotiate.tt:0 "Come to terms with the Khanate of Kokand — grant the aqsaqal concession it has long demanded, and let its word call off the pretenders and reopen the road. The trade revives, but at the price of the first unequal concession: prestige and legitimacy spent, and the customs take halved thereafter."
 qing_caravan.2.lapse:0 "Let the trade lapse (聽其斷絕)"
 qing_caravan.2.lapse.tt:0 "Spend nothing and concede nothing: let the caravan trade collapse and wait for the frontier to quiet of its own accord. The prosperity of the trade crashes and the oases sour without their commerce — a false economy, for a starved frontier is a restless one."
