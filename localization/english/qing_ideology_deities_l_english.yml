l_english:
 # [#63 2026-07-23] Loc for the 48 ideology thinker-deities (common/deities/04_ideology_pantheons.txt).
 # Convention (mirrors qing_deities_l): deity_KEY = "$omen_KEY$"; omen_KEY = display name;
 # omen_KEY_desc = tooltip ending in the on_activate apotheosis macro.
 # --- liberalism (自由主義) ---
 deity_montesquieu:0 "$omen_montesquieu$"
 omen_montesquieu:1 "Montesquieu"
 omen_montesquieu_desc:3 "#Y The separation of powers#!\nCharles-Louis de Secondat, Baron de Montesquieu (1689–1755), whose <i>Spirit of the Laws</i> gave liberalism its doctrine of the separation of powers and the rule of law.\n\n#! Apotheosis Effect: $military_apotheosis_capital_freemen_effect_tt_description$"
 deity_adam_smith:0 "$omen_adam_smith$"
 omen_adam_smith:1 "Adam Smith"
 omen_adam_smith_desc:3 "#Y Political economy#!\nAdam Smith (1723–1790), whose <i>Wealth of Nations</i> founded the liberal science of the market, free trade, and the division of labour.\n\n#! Apotheosis Effect: $economy_income_effect_tt_description$"
 deity_voltaire:0 "$omen_voltaire$"
 omen_voltaire:1 "Voltaire"
 omen_voltaire_desc:3 "#Y Toleration and the free press#!\nFrançois-Marie Arouet, called Voltaire (1694–1778), the sharpest pen of the Enlightenment, apostle of toleration, free thought, and civil liberty.\n\n#! Apotheosis Effect: $culture_apotheosis_characters_effect_tt_description$"
 deity_tocqueville:0 "$omen_tocqueville$"
 omen_tocqueville:1 "Tocqueville"
 omen_tocqueville_desc:3 "#Y Civil society#!\nAlexis de Tocqueville (1805–1859), whose <i>Democracy in America</i> anatomised the free association of citizens as the school of liberty.\n\n#! Apotheosis Effect: $fertility_apotheosis_capital_effect_tt_description$"
 deity_john_stuart_mill:0 "$omen_john_stuart_mill$"
 omen_john_stuart_mill:1 "John Stuart Mill"
 omen_john_stuart_mill_desc:3 "#Y Liberty#!\nJohn Stuart Mill (1806–1873), whose <i>On Liberty</i> made individual freedom against the tyranny of the majority the creed's first principle.\n\n#! Apotheosis Effect: $military_apotheosis_manpower_effect_tt_description$"
 deity_ricardo:0 "$omen_ricardo$"
 omen_ricardo:1 "David Ricardo"
 omen_ricardo_desc:3 "#Y Free trade#!\nDavid Ricardo (1772–1823), whose theory of comparative advantage armed liberalism with the case for free trade among nations.\n\n#! Apotheosis Effect: $economy_apotheosis_capital_citizens_effect_tt_description$"
 deity_kant:0 "$omen_kant$"
 omen_kant:1 "Immanuel Kant"
 omen_kant_desc:3 "#Y Enlightenment#!\nImmanuel Kant (1724–1804), whose <i>What is Enlightenment?</i> defined it as humanity's release from self-imposed tutelage, and whose ethics grounded the liberty of the rational person.\n\n#! Apotheosis Effect: $culture_apotheosis_capital_effect_tt_description$"
 deity_yan_fu:0 "$omen_yan_fu$"
 omen_yan_fu:1 "Yan Fu 嚴復"
 omen_yan_fu_desc:3 "#Y The Chinese enlightenment#!\nYan Fu 嚴復 (1854–1921), who translated Mill, Smith, Spencer and Montesquieu into Chinese — <i>Tianyan lun</i> 天演論 — and carried liberalism to the late Qing.\n\n#! Apotheosis Effect: $fertility_apotheosis_food_effect_tt_description$"
 # --- conservatism (保守主義) ---
 deity_burke:0 "$omen_burke$"
 omen_burke:1 "Edmund Burke"
 omen_burke_desc:3 "#Y Prudent reform#!\nEdmund Burke (1729–1797), whose <i>Reflections on the Revolution in France</i> founded conservatism on inherited wisdom, prescription, and gradual reform.\n\n#! Apotheosis Effect: $military_apotheosis_capital_freemen_effect_tt_description$"
 deity_friedrich_list:0 "$omen_friedrich_list$"
 omen_friedrich_list:1 "Friedrich List"
 omen_friedrich_list_desc:3 "#Y The national economy#!\nFriedrich List (1789–1846), who set the productive powers of the nation and protective tariffs against the abstractions of free-trade universalism.\n\n#! Apotheosis Effect: $economy_income_effect_tt_description$"
 deity_de_maistre:0 "$omen_de_maistre$"
 omen_de_maistre:1 "Joseph de Maistre"
 omen_de_maistre_desc:3 "#Y Throne and altar#!\nJoseph de Maistre (1753–1821), the fiercest counter-revolutionary, who bound social order to religion, hierarchy, and the sovereignty of throne and altar.\n\n#! Apotheosis Effect: $culture_apotheosis_characters_effect_tt_description$"
 deity_bonald:0 "$omen_bonald$"
 omen_bonald:1 "Louis de Bonald"
 omen_bonald_desc:3 "#Y The organic society#!\nLouis de Bonald (1754–1840), theorist of the traditional society as a divinely-ordered organism of family, church, and monarchy.\n\n#! Apotheosis Effect: $fertility_apotheosis_capital_effect_tt_description$"
 deity_hume:0 "$omen_hume$"
 omen_hume:1 "David Hume"
 omen_hume_desc:3 "#Y Custom#!\nDavid Hume (1711–1776), whose scepticism of abstract reason and reverence for custom and settled institutions prefigured the conservative temper.\n\n#! Apotheosis Effect: $military_apotheosis_manpower_effect_tt_description$"
 deity_malthus:0 "$omen_malthus$"
 omen_malthus:1 "Thomas Malthus"
 omen_malthus_desc:3 "#Y The limits of progress#!\nThomas Malthus (1766–1834), whose <i>Essay on the Principle of Population</i> set natural limits against the perfectibilist dreams of the age.\n\n#! Apotheosis Effect: $economy_apotheosis_capital_citizens_effect_tt_description$"
 deity_coleridge:0 "$omen_coleridge$"
 omen_coleridge:1 "Samuel Coleridge"
 omen_coleridge_desc:3 "#Y The clerisy#!\nSamuel Taylor Coleridge (1772–1834), who defended the church-and-state and a cultivated clerisy as the conserving soul of the nation.\n\n#! Apotheosis Effect: $culture_apotheosis_capital_effect_tt_description$"
 deity_feng_guifen:0 "$omen_feng_guifen$"
 omen_feng_guifen:1 "Feng Guifen 馮桂芬"
 omen_feng_guifen_desc:3 "#Y Self-strengthening#!\nFeng Guifen 馮桂芬 (1809–1874), whose <i>Jiaobinlu kangyi</i> 校邠廬抗議 urged Chinese learning as the base, Western learning for use — reform to preserve the ancestral order.\n\n#! Apotheosis Effect: $fertility_apotheosis_food_effect_tt_description$"
 # --- monarchism (尊王) ---
 deity_hegel:0 "$omen_hegel$"
 omen_hegel:1 "G. W. F. Hegel"
 omen_hegel_desc:3 "#Y The ethical state#!\nGeorg Wilhelm Friedrich Hegel (1770–1831), whose <i>Philosophy of Right</i> made the monarchical state the concrete realisation of ethical freedom.\n\n#! Apotheosis Effect: $military_apotheosis_capital_freemen_effect_tt_description$"
 deity_colbert:0 "$omen_colbert$"
 omen_colbert:1 "Jean-Baptiste Colbert"
 omen_colbert_desc:3 "#Y The royal economy#!\nJean-Baptiste Colbert (1619–1683), architect of mercantilism, who bound the wealth of the realm to the service of the crown.\n\n#! Apotheosis Effect: $economy_income_effect_tt_description$"
 deity_bossuet:0 "$omen_bossuet$"
 omen_bossuet:1 "Jacques-Bénigne Bossuet"
 omen_bossuet_desc:3 "#Y Divine right#!\nJacques-Bénigne Bossuet (1627–1704), whose <i>Politics Drawn from Holy Scripture</i> gave absolute monarchy its doctrine of divine right.\n\n#! Apotheosis Effect: $culture_apotheosis_characters_effect_tt_description$"
 deity_metternich:0 "$omen_metternich$"
 omen_metternich:1 "Klemens von Metternich"
 omen_metternich_desc:3 "#Y The concert of order#!\nKlemens von Metternich (1773–1859), architect of the Restoration order who set legitimate monarchy against the revolutionary tide.\n\n#! Apotheosis Effect: $fertility_apotheosis_capital_effect_tt_description$"
 deity_de_maistre_legit:0 "$omen_de_maistre_legit$"
 omen_de_maistre_legit:1 "Joseph de Maistre"
 omen_de_maistre_legit_desc:3 "#Y Legitimacy#!\nJoseph de Maistre (1753–1821), theorist of legitimate sovereignty as the God-given keystone without which society dissolves into terror.\n\n#! Apotheosis Effect: $military_apotheosis_manpower_effect_tt_description$"
 deity_necker:0 "$omen_necker$"
 omen_necker:1 "Jacques Necker"
 omen_necker_desc:3 "#Y The crown's finances#!\nJacques Necker (1732–1804), the reforming minister who sought to set the monarchy's finances in order and preserve the throne.\n\n#! Apotheosis Effect: $economy_apotheosis_capital_citizens_effect_tt_description$"
 deity_carlyle:0 "$omen_carlyle$"
 omen_carlyle:1 "Thomas Carlyle"
 omen_carlyle_desc:3 "#Y Heroic authority#!\nThomas Carlyle (1795–1881), who exalted the strong ruler and heroic authority against the levelling mechanics of the age.\n\n#! Apotheosis Effect: $culture_apotheosis_capital_effect_tt_description$"
 deity_zeng_guofan:0 "$omen_zeng_guofan$"
 omen_zeng_guofan:1 "Zeng Guofan 曾國藩"
 omen_zeng_guofan_desc:3 "#Y Loyal restoration#!\nZeng Guofan 曾國藩 (1811–1872), the Confucian statesman-general whose armies saved the throne, the model of loyal service to the dynasty.\n\n#! Apotheosis Effect: $fertility_apotheosis_food_effect_tt_description$"
 # --- nationalism (民族主義) ---
 deity_fichte:0 "$omen_fichte$"
 omen_fichte:1 "J. G. Fichte"
 omen_fichte_desc:3 "#Y The nation in arms#!\nJohann Gottlieb Fichte (1762–1814), whose <i>Addresses to the German Nation</i> summoned a people to national self-consciousness and resistance.\n\n#! Apotheosis Effect: $military_apotheosis_capital_freemen_effect_tt_description$"
 deity_list_nat:0 "$omen_list_nat$"
 omen_list_nat:1 "Friedrich List"
 omen_list_nat_desc:3 "#Y The national system#!\nFriedrich List (1789–1846), who made the customs union and the national economy the material body of the awakening nation.\n\n#! Apotheosis Effect: $economy_income_effect_tt_description$"
 deity_herder:0 "$omen_herder$"
 omen_herder:1 "J. G. Herder"
 omen_herder_desc:3 "#Y The Volksgeist#!\nJohann Gottfried Herder (1744–1803), who taught that each people bears its own genius, its <i>Volksgeist</i>, expressed in language and custom.\n\n#! Apotheosis Effect: $culture_apotheosis_characters_effect_tt_description$"
 deity_mazzini:0 "$omen_mazzini$"
 omen_mazzini:1 "Giuseppe Mazzini"
 omen_mazzini_desc:3 "#Y The young nation#!\nGiuseppe Mazzini (1805–1872), prophet of Young Italy, who made the nation a sacred duty and a democratic brotherhood of free peoples.\n\n#! Apotheosis Effect: $fertility_apotheosis_capital_effect_tt_description$"
 deity_michelet:0 "$omen_michelet$"
 omen_michelet:1 "Jules Michelet"
 omen_michelet_desc:3 "#Y The people#!\nJules Michelet (1798–1874), the historian who made <i>the People</i> the living hero of the nation's story.\n\n#! Apotheosis Effect: $military_apotheosis_manpower_effect_tt_description$"
 deity_hamilton:0 "$omen_hamilton$"
 omen_hamilton:1 "Alexander Hamilton"
 omen_hamilton_desc:3 "#Y The national state#!\nAlexander Hamilton (1755–1804), who built the fiscal and industrial sinews of a new nation-state.\n\n#! Apotheosis Effect: $economy_apotheosis_capital_citizens_effect_tt_description$"
 deity_mickiewicz:0 "$omen_mickiewicz$"
 omen_mickiewicz:1 "Adam Mickiewicz"
 omen_mickiewicz_desc:3 "#Y The nation's soul#!\nAdam Mickiewicz (1798–1855), the poet of a partitioned nation whose verse kept its soul alive in bondage.\n\n#! Apotheosis Effect: $culture_apotheosis_capital_effect_tt_description$"
 deity_liang_qichao:0 "$omen_liang_qichao$"
 omen_liang_qichao:1 "Liang Qichao 梁啟超"
 omen_liang_qichao_desc:3 "#Y The Chinese nation#!\nLiang Qichao 梁啟超 (1873–1929), who gave China the very idea of the <i>Zhonghua minzu</i> 中華民族 — a modern national people.\n\n#! Apotheosis Effect: $fertility_apotheosis_food_effect_tt_description$"
 # --- socialism (社會主義) ---
 deity_blanqui:0 "$omen_blanqui$"
 omen_blanqui:1 "Auguste Blanqui"
 omen_blanqui_desc:3 "#Y The militant vanguard#!\nLouis-Auguste Blanqui (1805–1881), the eternal insurrectionist whose life of revolt made him the living emblem of militant socialism.\n\n#! Apotheosis Effect: $military_apotheosis_capital_freemen_effect_tt_description$"
 deity_saint_simon:0 "$omen_saint_simon$"
 omen_saint_simon:1 "Henri de Saint-Simon"
 omen_saint_simon_desc:3 "#Y Industrial association#!\nHenri de Saint-Simon (1760–1825), who envisioned a society of associated producers ordered by industry and science for the common good.\n\n#! Apotheosis Effect: $economy_income_effect_tt_description$"
 deity_fourier:0 "$omen_fourier$"
 omen_fourier:1 "Charles Fourier"
 omen_fourier_desc:3 "#Y The phalanstery#!\nCharles Fourier (1772–1837), utopian who designed the phalanstery, a harmony of cooperative labour and human passion.\n\n#! Apotheosis Effect: $culture_apotheosis_characters_effect_tt_description$"
 deity_robert_owen:0 "$omen_robert_owen$"
 omen_robert_owen:1 "Robert Owen"
 omen_robert_owen_desc:3 "#Y Cooperation#!\nRobert Owen (1771–1858), the factory reformer who built New Lanark and the cooperative movement as the seed of a new moral world.\n\n#! Apotheosis Effect: $fertility_apotheosis_capital_effect_tt_description$"
 deity_louis_blanc:0 "$omen_louis_blanc$"
 omen_louis_blanc:1 "Louis Blanc"
 omen_louis_blanc_desc:3 "#Y The right to work#!\nLouis Blanc (1811–1882), who proclaimed the right to work and the social workshop, and a state that guarantees labour to all.\n\n#! Apotheosis Effect: $military_apotheosis_manpower_effect_tt_description$"
 deity_sismondi:0 "$omen_sismondi$"
 omen_sismondi:1 "Sismondi"
 omen_sismondi_desc:3 "#Y The critique of laissez-faire#!\nJean de Sismondi (1773–1842), whose critique of unregulated capitalism and its crises turned political economy toward the welfare of the worker.\n\n#! Apotheosis Effect: $economy_apotheosis_capital_citizens_effect_tt_description$"
 deity_proudhon:0 "$omen_proudhon$"
 omen_proudhon:1 "Pierre-Joseph Proudhon"
 omen_proudhon_desc:3 "#Y Mutualism#!\nPierre-Joseph Proudhon (1809–1865), who declared property theft and proposed mutualism, the free federation of producers.\n\n#! Apotheosis Effect: $culture_apotheosis_capital_effect_tt_description$"
 deity_kang_youwei:0 "$omen_kang_youwei$"
 omen_kang_youwei:1 "Kang Youwei 康有為"
 omen_kang_youwei_desc:3 "#Y The Great Unity#!\nKang Youwei 康有為 (1858–1927), whose <i>Datong Shu</i> 大同書 dreamed a Great Unity 大同 of common ownership and universal harmony.\n\n#! Apotheosis Effect: $fertility_apotheosis_food_effect_tt_description$"
 # --- communism (共產主義) ---
 deity_karl_marx:0 "$omen_karl_marx$"
 omen_karl_marx:1 "Karl Marx"
 omen_karl_marx_desc:3 "#Y Historical materialism#!\nKarl Marx (1818–1883), who with the <i>Communist Manifesto</i> and <i>Capital</i> made class struggle the motor of history and communism its end.\n\n#! Apotheosis Effect: $military_apotheosis_capital_freemen_effect_tt_description$"
 deity_engels:0 "$omen_engels$"
 omen_engels:1 "Friedrich Engels"
 omen_engels_desc:3 "#Y The condition of the worker#!\nFriedrich Engels (1820–1895), co-author of the <i>Manifesto</i>, whose study of the industrial proletariat grounded the creed in the worker's condition.\n\n#! Apotheosis Effect: $economy_income_effect_tt_description$"
 deity_bakunin:0 "$omen_bakunin$"
 omen_bakunin:1 "Mikhail Bakunin"
 omen_bakunin_desc:3 "#Y Revolutionary anarchism#!\nMikhail Bakunin (1814–1876), apostle of revolutionary anarchism and the schismatic wing that set liberty against the workers' state.\n\n#! Apotheosis Effect: $culture_apotheosis_characters_effect_tt_description$"
 deity_babeuf:0 "$omen_babeuf$"
 omen_babeuf:1 "Gracchus Babeuf"
 omen_babeuf_desc:3 "#Y The conspiracy of equals#!\nGracchus Babeuf (1760–1797), whose Conspiracy of Equals demanded the abolition of private property a generation before Marx.\n\n#! Apotheosis Effect: $fertility_apotheosis_capital_effect_tt_description$"
 deity_kautsky:0 "$omen_kautsky$"
 omen_kautsky:1 "Karl Kautsky"
 omen_kautsky_desc:3 "#Y Orthodox Marxism#!\nKarl Kautsky (1854–1938), the pope of orthodox Marxism who codified the doctrine for the mass workers' parties.\n\n#! Apotheosis Effect: $military_apotheosis_manpower_effect_tt_description$"
 deity_lassalle:0 "$omen_lassalle$"
 omen_lassalle:1 "Ferdinand Lassalle"
 omen_lassalle_desc:3 "#Y The workers' party#!\nFerdinand Lassalle (1825–1864), founder of the first German workers' party, who turned socialism into an organised political force.\n\n#! Apotheosis Effect: $economy_apotheosis_capital_citizens_effect_tt_description$"
 deity_luxemburg:0 "$omen_luxemburg$"
 omen_luxemburg:1 "Rosa Luxemburg"
 omen_luxemburg_desc:3 "#Y Mass action#!\nRosa Luxemburg (1871–1919), theorist of the mass strike and revolutionary democracy against both reform and dictatorship.\n\n#! Apotheosis Effect: $culture_apotheosis_capital_effect_tt_description$"
 deity_li_dazhao:0 "$omen_li_dazhao$"
 omen_li_dazhao:1 "Li Dazhao 李大釗"
 omen_li_dazhao_desc:3 "#Y Chinese communism#!\nLi Dazhao 李大釗 (1889–1927), co-founder of the Chinese Communist Party, who first carried Marxism into the Chinese revolution.\n\n#! Apotheosis Effect: $fertility_apotheosis_food_effect_tt_description$"
