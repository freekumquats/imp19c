l_english:
 qing_household.1.t:0 "The Privy Purse Runs Low"
 qing_household.1.desc:0 "The 內帑 — the emperor's private treasury — is nearly empty. Distinct from the state's 戶部 coffers, the privy purse is [ROOT.GetCountry.GetRuler.GetName]'s personal reserve, to be drawn upon in crisis or to fund the imperial household's establishment. The Grand Secretary of the Imperial Household reports that it must be replenished soon, or the throne will have no private cushion when the state's own treasury falters."
 qing_household.1.a:0 "Divert state funds to the privy purse."
 qing_household.1.a.tt:0 "The state treasury (-150 gold) tops up the 內帑. The privy purse rises."
 qing_household.1.b:0 "Levy a 'donation' from the grandees."
 qing_household.1.b.tt:0 "The great families are asked to contribute. The privy purse rises, but imperial legitimacy suffers (-50)."
 qing_household.1.c:0 "Let it drain. We shall manage without."
 qing_household.1.c.tt:0 "The privy purse continues to fall. The throne's private reserve is gone."

 qing_household.2.t:0 "The Eunuch Faction Ascends"
 qing_household.2.desc:0 "The 太監 — the palace eunuchs — were tightly checked by the Qing founders, who remembered how eunuch power had brought down the Ming. But now [eunuch_leader.GetName] has amassed a dangerous faction within the palace walls. He commands loyal retainers, dispenses patronage, and whispers counsel into the sovereign's ear. The Grand Secretary of the Imperial Household has lost control of the eunuchs; the throne must act before the faction grows more powerful still."
 qing_household.2.a:0 "Check him hard. Strip his power and scatter his faction."
 qing_household.2.a.tt:0 "The Qing way: [eunuch_leader.GetName] is stripped of his clout and wealth. The eunuch faction is broken. Corruption falls (-3)."
 qing_household.2.b:0 "Indulge him. Buy his compliance with silver and favour."
 qing_household.2.b.tt:0 "[eunuch_leader.GetName] is enriched (+80 gold). He remains powerful — the danger is deferred, and corruption rises (+2)."
 qing_household.2.c:0 "Co-opt him as the throne's private instrument."
 qing_household.2.c.tt:0 "[eunuch_leader.GetName] becomes the emperor's personal agent — loyal (+20 loyalty), but his rivalry with the Grand Secretary will poison the household."

 qing_household.3.t:0 "The Imperial Workshops Await Commission"
 qing_household.3.desc:0 "The 造辦處 — the imperial workshops — stand ready to craft a great work. Under the able direction of the Grand Secretary [grand_sec.GetName], the artisans can produce a luxury commission that will elevate the throne's prestige across the realm. But such a project demands silver and the Grand Secretary's personal touch; a lesser work is also possible, or the workshops may be left idle."
 qing_household.3.a:0 "Commission a great work of luxury."
 qing_household.3.a.tt:0 "A magnificent project (cost 200 gold). Imperial prestige rises sharply (+150), and the workshops flourish for years."
 qing_household.3.b:0 "A modest commission will suffice."
 qing_household.3.b.tt:0 "A respectable work (cost 80 gold). Prestige rises (+60)."
 qing_household.3.c:0 "Leave the workshops idle for now."
 qing_household.3.c.tt:0 "No cost, no gain. The artisans wait."

 qing_household.4.t:0 "The Grand Secretary's Corruption"
 qing_household.4.desc:0 "Scandal rocks the Imperial Household: the Grand Secretary [grand_sec.GetName], the man closest to the throne, has turned venal. Reports of diverted silver, sold appointments, and personal enrichment at the expense of the 內帑 reach [ROOT.GetCountry.GetRuler.GetName]. The court whispers of a Heshen in the making — a trusted minister grown corrupt. The throne must act: dismiss him and weather the effectiveness blow, demand restitution and risk his loyalty, or tolerate the rot and watch corruption deepen."
 qing_household.4.a:0 "Dismiss him. The office must be clean."
 qing_household.4.a.tt:0 "[grand_sec.GetName] is relieved of office. Corruption falls (-5), but the Grand Secretary post is vacant and council effectiveness suffers."
 qing_household.4.b:0 "Demand restitution. He stays, but pays."
 qing_household.4.b.tt:0 "The throne seizes 100 gold from [grand_sec.GetName]. His loyalty falls (-20), but he remains in office and is chastened (corruption -10)."
 qing_household.4.c:0 "Tolerate it. He is too useful to lose."
 qing_household.4.c.tt:0 "The scandal is ignored. [grand_sec.GetName] enriches himself further (+50 gold, corruption +10), and the realm's corruption deepens (+3). The Heshen path."

 qing_household_workshop_flourish:0 "Imperial Workshops Flourish"
 qing_household_workshop_flourish_desc:0 "The 造辦處 have completed a great commission. The throne's prestige shines."
 # [#359] Imperial Household Department panel (內務府) — the chamberlain-office bureaucracy view.
 QING_HOUSEHOLD_OPEN_BTN:0 "Imperial Household (內務府)"
 QING_HOUSEHOLD_OPEN_TT:0 "Open the Imperial Household Department — the chamberlain (總管內務府大臣), the privy purse (內帑), the palace eunuchs (太監), the imperial workshops (造辦處), and how well the household is kept."
 QING_HOUSEHOLD_PANEL_TITLE:0 "Imperial Household — 內務府"
 QING_HOUSEHOLD_PANEL_DESC:0 "The Imperial Household Department (內務府) is the throne's personal establishment, kept apart from the state ministries — the privy purse (內帑, the emperor's private silver), the palace eunuchs (太監, whom the Qing keep tightly checked lest they seize power as under fallen dynasties), and the imperial workshops (造辦處). Its head, the chamberlain, is the closest man to the sovereign, and answers to the Grand Council for how the household is kept: a full purse and eunuchs held in check lift his standing, a drained purse and an overreaching eunuch faction drag it down."
 QING_HOUSEHOLD_CHAMBERLAIN_TITLE:0 "Chamberlain (總管內務府大臣)"
 QING_HOUSEHOLD_VACANT:0 "The Household stands without a chamberlain. The privy purse drains and the eunuchs creep toward power."
 QING_HOUSEHOLD_PERF_LABEL:0 "Household Performance"
 QING_HOUSEHOLD_PERF_TT:0 "How well the Imperial Household is kept (0-100), from the chamberlain's charisma, the health of the privy purse, and whether the eunuchs are held in check. An overreaching eunuch faction and corruption drag it down; a vacant office floors it low."
 QING_HOUSEHOLD_PURSE_LABEL:0 "Privy Purse (內帑)"
 QING_HOUSEHOLD_PURSE_TT:0 "The emperor's private silver — his own personal wealth (內帑), distinct from the state treasury. A cushion the throne can tap in a crisis, or draw on for the workshops and the household; the Canton customs and a well-kept household fill it, patronage and a venal court drain it. It passes to the next sovereign on his accession. A full purse marks a household well kept."
 QING_HOUSEHOLD_EUNUCH_LABEL:0 "The Eunuchs (太監)"
 QING_HOUSEHOLD_EUNUCH_TT:0 "The palace eunuchs — a perennial danger the chamberlain is charged with keeping in check. When one builds a faction, he becomes a power in his own right and must be dealt with before he corrupts the court."
 QING_HOUSEHOLD_EUNUCH_DANGER:0 "A eunuch faction stalks the court."
 QING_HOUSEHOLD_EUNUCH_CHECKED:0 "The eunuchs are held in check."
 QING_HOUSEHOLD_EUNUCHS_TITLE:0 "The Palace Eunuchs (太監)"
 QING_HOUSEHOLD_EUNUCHS_TITLE_TT:0 "The eunuchs of the inner palace, administered by the 敬事房. They serve the throne's person and its household; a capable chamberlain keeps them useful and in check, a weak or venal one lets one of them build a faction and grow overmighty."
 QING_HOUSEHOLD_EUNUCHS_EMPTY:0 "No eunuchs presently serve in the palace."
 QING_HOUSEHOLD_EUNUCH_LEADER_TAG:0 "#R Leads a faction (太監專權)#!"
 QING_HOUSEHOLD_ADMIN_TITLE:0 "The Throne's Household"
 QING_HOUSEHOLD_MANAGE_PURSE_BTN:0 "Manage the Privy Purse (內帑)"
 QING_HOUSEHOLD_MANAGE_PURSE_TT:0 "Take the privy purse in hand — replenish it from the state treasury or a levy on the grandees, tap it to bail out the state in a crisis, or let it drain. Available only when the privy purse has run low (below 35); a healthy purse needs no intervention."
 QING_HOUSEHOLD_CHECK_EUNUCHS_BTN:0 "Deal with the Eunuchs (太監)"
 QING_HOUSEHOLD_CHECK_EUNUCHS_TT:0 "Move against the eunuch faction — check him hard in the Qing way (strip his power), indulge him (danger deferred), or co-opt him as the throne's private instrument (friction with the chamberlain). Available only when a eunuch faction stalks the court."
 QING_HOUSEHOLD_COMMISSION_BTN:0 "Commission the Workshops (造辦處)"
 QING_HOUSEHOLD_COMMISSION_TT:0 "Set the imperial workshops to a great work — a luxury or monument that lifts the throne's prestige. Requires a capable chamberlain (of high charisma) to oversee the commission."
 # [#360] The Imperial Harem (後宮) — the inner court, a facet of the Household.
 QING_HAREM_OPEN_BTN:0 "The Imperial Harem (後宮)"
 QING_HAREM_OPEN_TT:0 "Open the inner court (後宮) — the emperor's secondary consorts (妃嬪), drafted from the banner families, whom the Household keeps and who bear the throne its heirs. A well-kept inner court lifts the chamberlain's standing and secures the succession."
 QING_HAREM_PANEL_TITLE:0 "The Imperial Harem — 後宮"
 QING_HAREM_PANEL_DESC:0 "The inner court (後宮) was the Qing succession engine. Below the reigning empress (皇后) stood a graded harem of consorts (妃嬪), drafted from the banner families in the triennial draft (八旗選秀) and kept by the Imperial Household Department (內務府). Their sons were the realm's pool of heirs. The chamberlain (總管內務府大臣) answers to the Grand Council for how the inner court is kept: a full, well-ordered harem that gives the throne children lifts his standing, a neglected one drags it down."
 QING_HAREM_STANDING_TITLE:0 "The Inner Court"
 QING_HAREM_COUNT_LABEL:0 "Consorts (妃嬪)"
 QING_HAREM_COUNT_TT:0 "The living secondary consorts of the inner court. A healthy establishment runs to some four or more; an empty court leaves the succession thin and drags the chamberlain's standing."
 QING_HAREM_PERF_LABEL:0 "Household Standing"
 QING_HAREM_PERF_TT:0 "The inner court folds into the chamberlain's Grand Council performance (qing_min_perf_chamberlain): a full, well-kept harem lifts it, an empty or neglected one drags it down. The harem is part of his charge, not a council seat of its own."
 QING_HAREM_ADMIN_TITLE:0 "The Emperor's Pleasure"
 QING_HAREM_DRAFT_BTN:0 "Hold a Draft (選秀)"
 QING_HAREM_DRAFT_TT:0 "Hold the banner draft (八旗選秀) — bring new consorts into the inner court. Available while the court is not yet crowded (below eight consorts)."
 QING_HAREM_FAVOUR_BTN:0 "Favour a Consort (臨幸)"
 QING_HAREM_FAVOUR_TT:0 "Open the roster of consorts the emperor may favour, and #Y click one#! — she bears him a recognised child, a real heir entered into the imperial family and the succession. Available only to a reigning emperor with a living consort in the inner court not already with child."
 QING_HAREM_ROSTER_TITLE:0 "The Consorts (妃嬪)"
 QING_HAREM_ROSTER_EMPTY:0 "The inner court stands empty. Hold a draft to bring consorts into the palace."
 # ---- [#438] graded harem ranks (後宮位號) + [#418] take-as-consort ----
 QING_HAREM_RANKS_LABEL:0 "The Establishment (位號)"
 QING_HAREM_RANKS_VALUE:0 "The graded ranks of the inner court"
 QING_HAREM_RANKS_TT:0 "The Qing inner court was a graded order below the Empress (皇后). The historic establishment caps the senior ranks: #Y one Imperial Noble Consort (皇貴妃)#!, #Y two Noble Consorts (貴妃)#!, and #Y four Consorts (妃)#!; below them the entry ranks (嬪/貴人) are uncapped. A consort enters at the lowest rank and is raised up the ladder by favour — Promote a Consort (晉封) elevates the ablest eligible woman one rank, where her next tier still has an open place."
 QING_HAREM_RANK_TT:0 "This consort's rank in the graded establishment: 皇貴妃 (Imperial Noble Consort), 貴妃 (Noble Consort), 妃 (Consort), or the entry rank 嬪/貴人. Raise her through Promote a Consort (晉封)."
 QING_HAREM_PROMOTE_BTN:0 "Promote a Consort (晉封)"
 QING_HAREM_PROMOTE_TT:0 "Open the roster of consorts eligible to rise, and #Y click one#! to elevate her one rank up the graded establishment (妃 → 貴妃 → 皇貴妃). A consort is eligible only while she sits below the top rank AND her next rank up still has an open place under its cap (皇貴妃 1 / 貴妃 2 / 妃 4). A promotion gladdens the elevated woman and steadies the house."
 # ---- [#9 boot] favour + promote pickers ----
 QING_HAREM_FAVOUR_PICKER_HEADER:0 "Favour a Consort (臨幸)"
 QING_HAREM_FAVOUR_PICKER_INSTR:0 "The consorts the emperor may favour. #Y Click a name#! to favour her — she conceives him a recognised child, a real heir borne into the imperial family and the succession; the window then closes. Only living consorts not already with child are shown, and only while a male emperor reigns."
 QING_HAREM_FAVOUR_EMPTY:0 "No consort stands ready to be favoured. Hold a draft (選秀) or take a court woman (納為妃嬪) to bring consorts into the palace — a reigning emperor and a consort not already with child are needed."
 QING_HAREM_FAVOUR_ROW_TT:0 "#Y Click this row#! to favour this consort; she bears the emperor a recognised child."
 QING_HAREM_PROMOTE_PICKER_HEADER:0 "Promote a Consort (晉封)"
 QING_HAREM_PROMOTE_PICKER_INSTR:0 "The consorts eligible to rise in the graded establishment. #Y Click a name#! to elevate her one rank (妃 → 貴妃 → 皇貴妃); the window then closes. Only consorts below the top rank whose next tier still has an open place under its cap (皇貴妃 1 / 貴妃 2 / 妃 4) are shown."
 QING_HAREM_PROMOTE_EMPTY:0 "No consort stands eligible for promotion — either none sits below the top rank, or every open tier is full at its cap (皇貴妃 1 / 貴妃 2 / 妃 4)."
 QING_HAREM_PROMOTE_ROW_TT:0 "#Y Click this row#! to elevate this consort one rank up the graded establishment."
 QING_HAREM_TAKE_TITLE:0 "Take a Court Woman as Consort (納為妃嬪)"
 QING_HAREM_TAKE_TT:0 "Court women eligible to enter the inner court: living, unmarried, adult women of the imperial household who are not already consorts. Taking one brings her in at the entry rank, unlike the banner draft (選秀) which mints a new woman."
 QING_HAREM_TAKE_EMPTY:0 "No eligible court women stand at present. Hold a draft (選秀) to bring new consorts into the palace."
 QING_HAREM_TAKE_BTN:0 "Take as Consort"
 QING_HAREM_TAKE_BTN_TT:0 "Take this woman into the inner court at the entry rank (嬪/貴人). Available while the court is not yet crowded (below eight consorts)."
 QING_HAREM_TAKE_NEW_BTN:0 "Take a New Consort (納為妃嬪)"
 QING_HAREM_TAKE_OPEN_BTN:0 "Take a Court Woman as Consort (納為妃嬪)…"
 QING_HAREM_TAKE_OPEN_TT:0 "Open the roster of court women eligible to enter the inner court, and #Y click one#! to take her as a consort. Eligible women are living, unmarried, adult women of your court not already in the harem, while the court holds fewer than eight consorts."
 QING_HAREM_TAKE_PICKER_HEADER:0 "Take a Court Woman as Consort (納為妃嬪)"
 QING_HAREM_TAKE_PICKER_INSTR:0 "Court women eligible to enter the inner court. #Y Click a name#! to take her as a consort at the entry rank (嬪/貴人); the window then closes. Living, unmarried, adult women of your court who are not already consorts are shown — #Y including those held in confinement#! — while the court holds fewer than eight."
 QING_HAREM_TAKE_ROW_TT:0 "#Y Click this row#! to take this woman into the inner court at the entry rank (嬪/貴人)."
 # rank names (referenced by the qing_consort_rank_name custom loc, 00_qing_harem_loc.txt)
 qing_consort_rank_4:0 "#Y 皇貴妃 Imperial Noble Consort#!"
 qing_consort_rank_3:0 "#Y 貴妃 Noble Consort#!"
 qing_consort_rank_2:0 "妃 Consort"
 qing_consort_rank_1:0 "嬪 Consort (entry rank)"

 # ---- [#428] harem intrigue event (宮鬥) ----
 qing_harem.1.t:0 "A Scheme in the Inner Court"
 qing_harem.1.desc:0 "The inner court is never still. [qing_harem_schemer.GetName], the ablest and most cunning of the consorts, has been at work behind the vermilion walls — a whisper to a eunuch here, a slighted rival there, a memorial that reaches the throne by a crooked path. Her quarry is the reigning Empress, [qing_harem_empress.GetName], whose place at the head of the household she covets. The emperor holds the balance: to indulge the schemer is to reward her guile and unsettle the ordered house; to back the Empress is to restore the proper order — but a clever woman scorned does not forget."
 qing_harem.1.desc_noempress:0 "The inner court is never still. [qing_harem_schemer.GetName], the ablest and most cunning of the consorts, has been at work behind the vermilion walls — a whisper to a eunuch here, a slighted rival there, a memorial that reaches the throne by a crooked path. With no Empress at the head of the household, she schemes to make herself its mistress in all but name. The emperor must decide whether to indulge her guile or curb it before the whole harem falls under her sway."
 qing_harem.1.a:0 "Indulge her — let the clever woman have her way."
 qing_harem.1.a.tt:0 "The schemer rises in favour and, if not already senior, climbs a rank in the establishment. But the ordered household suffers — the sharper her gifts, the greater the disorder — and the Empress is slighted."
 qing_harem.1.b:0 "Back the Empress — uphold the ordered household."
 qing_harem.1.b.tt:0 "The Empress is strengthened and the schemer curbed. A capable Empress restores order the more surely. Available only while an Empress reigns."
 qing_harem.1.c:0 "Stay above it — the throne takes no side."
 qing_harem.1.c.tt:0 "The emperor keeps his dignity and declines to meddle in the women's quarrels — but the intrigue festers, and the house loses a little harmony to it."

 # ---- [#390] 文治 Cultural Patronage (imperial workshops / painting / 四庫全書 / 南巡) ----
 QING_WENZHI_PATRONAGE_LABEL:0 "Cultural Patronage (文治)"
 QING_WENZHI_PATRONAGE_TT:0 "The standing of imperial patronage of the arts, letters, and craft — the 文治 (civil-cultural) glory of the reign that answers the 武功 of its armies. Raised by funding the workshops, commissioning the painters, launching the great compilations, and touring the south; it fades slowly if the court sits idle. A patronage that stands high (#Y 60+#!) radiates legitimacy — the splendour of the reign is itself an argument for the Mandate."
 QING_WENZHI_WORKSHOPS_BTN:0 "Fund the Imperial Workshops (造辦處)"
 QING_WENZHI_WORKSHOPS_TT:0 "Endow the palace ateliers of the Imperial Household — the jade lapidaries, the Jingdezhen imperial kilns (御窯廠), the cloisonné and clockmakers. #R Costs 40 Treasury and 8 of the privy purse (內帑)#!; #G endows a lasting jade + porcelain craft renown#! (once) and #G raises Cultural Patronage and Legitimacy#!."
 QING_WENZHI_PAINTING_BTN:0 "Commission the Painting Academy (如意館)"
 QING_WENZHI_PAINTING_TT:0 "Set the court atelier to work — where even the Jesuit Giuseppe Castiglione (郎世寧) serves, fusing Chinese and Western brush into a new imperial splendour. #R Costs 30 Treasury#!; #G endows the court-painting renown#! (once), #G raises Cultural Patronage#! and #G the Emperor's glory#!."
 QING_WENZHI_SIKU_BTN:0 "Convene the Complete Library (四庫全書)"
 QING_WENZHI_SIKU_TT:0 "Summon the scholars of the Hanlin and the Southern Study to compile every worthy book in the realm into one imperial library — the greatest compilation of the age. #G Raises Cultural Patronage#!, then the court must choose whether to pair the work with the literary inquisition (文字獄). Founded only once."
 QING_WENZHI_TOUR_BTN:0 "Make a Southern Inspection Tour (南巡)"
 QING_WENZHI_TOUR_TT:0 "The Emperor progresses down the Jiangnan in majesty — a display of patronage that binds the wealthy south to the throne. #R Costs 60 Treasury#!; #G raises Cultural Patronage, the Emperor's glory, Legitimacy, and Stability#!."
 qing_wenzhi_needs_treasury_40_tt:0 "Requires #Y 40#! Treasury."
 qing_wenzhi_needs_treasury_30_tt:0 "Requires #Y 30#! Treasury."
 qing_wenzhi_needs_treasury_60_tt:0 "Requires #Y 60#! Treasury."
 # [MO-ENH #13] Cultural-zenith milestone event (文治鼎盛)
 qing_wenzhi.1.t:0 "The Cultural Zenith (文治鼎盛)"
 qing_wenzhi.1.desc:0 "The reign has become a golden age of arts and letters. The scholars of the Hanlin Academy (翰林院) and the Southern Study (南書房), with the master craftsmen of the Imperial Workshops (造辦處), present a memorial to the throne: this era of patronage — the jade and porcelain, the court painters, the great compilations, the tours of the wealthy south — will be remembered for a thousand years as the equal in #Y 文治#! (civil glory) of the dynasty's #Y 武功#! (martial glory). The court asks how the sovereign wishes to mark the apex of his cultural reign."
 qing_wenzhi.1.a:0 "Endow the academies for the ages"
 qing_wenzhi.1.a.tt:0 "Consolidate the golden age into lasting institutions. #G +6 Legitimacy, +1 Stability#!, and the endowment #G steadies Cultural Patronage against its slow fade#! (+8, a one-off top-up)."
 qing_wenzhi.1.b:0 "Crown the reign with a personal glory"
 qing_wenzhi.1.b.tt:0 "Mark the zenith as the sovereign's own triumph. #G The Emperor's popularity rises sharply (+12)#! and #G +4 Legitimacy#! — but the glory is the man's, not the institutions', and will fade with him."
 QING_HOUSEHOLD_COUNCIL_CONTRIB_LABEL:0 "Net Council Effectiveness"

 # [#75] eunuch beats — .5 the 敬事房 in good order (positive) + .6 a eunuch oversteps (early warning)
 qing_household.5.t:0 "The Palace in Good Order (敬事房肅清)"
 qing_household.5.desc:0 "The Directorate of the Palace Domestic Service (敬事房) reports that the eunuch establishment is well drilled and firmly held. Rotations are enforced, the ancestral prohibitions observed, and no eunuch has been permitted to meddle in the flow of memorials or trade upon his nearness to the throne — the perennial peril that toppled the Ming kept firmly in its place. The Grand Minister of the Household (總管內務府大臣) has done his signal work, and the court takes quiet satisfaction that the inner palace, at least, is sound."
 qing_household.5.a:0 "Reward the diligent chamberlain"
 qing_household.5.a.tt:0 "Commend the Grand Minister of the Household for keeping the eunuchs in check. #G +30 Legitimacy, his loyalty rises#!, and #G corruption eases a touch#!."
 qing_household.5.b:0 "Entrench the ancestral prohibitions (祖制)"
 qing_household.5.b.tt:0 "Codify the curbs on eunuch power into standing regulation — a lasting bulwark against the graft that rotted past dynasties. #R Costs 40 Treasury#!; grants a 10-year #G The Eunuchs Curbed (太監肅清)#! modifier that #G steadily drags down corruption#!, and eases it now."
 qing_household.5.c:0 "Note it, and pass on"
 qing_household.5.c.tt:0 "The good order of the inner palace is its own reward. No cost, no gain."
 qing_household.6.t:0 "A Eunuch Oversteps (太監干政)"
 qing_household.6.desc:0 "A single palace eunuch has begun to test his bounds — lingering over the memorials as they pass, dropping a word here and there to those who seek the throne's ear, and trading quietly on his access to the sovereign. It is not yet a faction; no clique has formed about him. But it is the first crack, and every clerk in the 敬事房 knows how such things ended in ages past if left unchecked. The throne must decide whether to nip the presumption now or let it grow."
 qing_household.6.a:0 "Nip it early (敬事房懲處)"
 qing_household.6.a.tt:0 "A flogging and a demotion — the presumption checked before it can harden into a faction. #G The eunuch's corruption falls, and realm corruption eases#!."
 qing_household.6.b:0 "Let the chamberlain handle it quietly"
 qing_household.6.b.tt:0 "Leave it to the Grand Minister of the Household to deal with discreetly — the household head does his job and the matter is closed with no fuss. #G His loyalty rises, and corruption eases a little#! (requires a capable chamberlain)."
 qing_household.6.c:0 "Look the other way"
 qing_household.6.c.tt:0 "The eunuch keeps his access and grows bolder. #R His corruption climbs, realm corruption creeps up, and the road to a full eunuch faction opens#!."
 # [#75] the entrench-prohibitions modifier
 qing_household_eunuchs_curbed:0 "The Eunuchs Curbed (太監肅清)"
 qing_household_eunuchs_curbed_desc:0 "The ancestral prohibitions against eunuch power are entrenched in standing regulation — a lasting bulwark against the graft that rotted past dynasties."
