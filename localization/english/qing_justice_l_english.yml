l_english:

 # ####################################################################
 # qing_justice_events.txt (BUILD #125) — Grand Minister of Justice (刑部)
 # content: penal code (大清律例), autumn assizes (秋審), appeals (京控).
 # ####################################################################

 # --- Event .1: Autumn Assizes (秋審) ---
 qing_justice.1.t:0 "The Autumn Assizes (秋審)"
 qing_justice.1.desc:0 "Autumn has come, and with it the annual review of capital cases. The memorials pile on Our desk — death sentences from every corner of the realm, each awaiting final confirmation. The Ministry of Justice (刑部) has sorted them into categories: those whose guilt is beyond doubt, those where mercy might be shown, and those whose cases are tangled in ambiguity.\n\nThis is the moment when justice and mercy must be weighed. Do We confirm the full roster of executions, upholding the deterrent power of the law? Or do We commute some, tempering rigour with compassion and demonstrating that the throne rules not by terror alone?"

 qing_justice.1.a:0 "Temper justice with mercy — commute where equity allows."
 qing_justice.1.a.tt:0 "A merciful assize: #G legitimacy#!, #G stability#!, and a long-term modifier reflecting even-handed justice. The Ministry of Justice gains standing if its minister is zealous and just."

 qing_justice.1.b:0 "The law must stand unshaken — confirm them all."
 qing_justice.1.b.tt:0 "Apply the full rigor of the code: a harsh deterrent (#G order#! via modifier) but #R +3 Tyranny#!. The Justice minister's popularity suffers if he is merciful by nature."

 # --- Event .2: Codification of the 大清律例 ---
 qing_justice.2.t:0 "A Revision of the Penal Code (大清律例)"
 qing_justice.2.desc:0 "The Grand Minister of Justice, #Y [justice_minister.GetName]#!, lays before Us a weighty proposal. The Great Qing Code (大清律例) is a living instrument, amended and glossed over the decades, but its corpus has grown tangled. Provisions conflict; archaic clauses no longer fit the times; ambiguities invite arbitrary judgement.\n\nHe proposes a systematic revision — not a wholesale rewrite, but a careful clarification and modernization. It will take time, money, and the labour of the Board's ablest jurists. But the result will be a code that stands clear and just, a foundation for even-handed rule across the realm."

 qing_justice.2.a:0 "Approve the revision — the law must be clear."
 qing_justice.2.a.tt:0 "Codify the penal code: a long-term modifier reflecting just, clear law (#G unrest#!, #G legitimacy#!, #G state loyalty#!). The Justice minister gains standing. Costs #R 50 treasury#!."

 qing_justice.2.b:0 "Decline — the disruption is too great."
 qing_justice.2.b.tt:0 "The proposal is set aside. #Y [justice_minister.GetName]#! is disappointed (#R loyalty#!, #R popularity#!)."

 # --- Event .3: A 京控 Appeal ---
 qing_justice.3.t:0 "A 京控 Appeal Reaches the Capital"
 qing_justice.3.desc:0 "A commoner has journeyed to the capital to lodge a 京控 — a direct appeal to the throne, bypassing the local magistrate. It is a desperate, dangerous act; those who fail risk beating or worse. But this man's case is compelling.\n\nHe accuses the local magistrate — one of Our own officials, #Y [corrupt_official.GetName]#! — of corruption: a false judgement, a bribe pocketed, a family ruined. The Ministry of Justice has investigated and the evidence is damning. The question now is whether We will vindicate the appellant and punish the official, or protect the magistrate and suppress the appeal to preserve the hierarchy's face."

 qing_justice.3.a:0 "Vindicate the appellant — justice must be done."
 qing_justice.3.a.tt:0 "Punish #Y [corrupt_official.GetName]#!: he is #R tainted#!, #R disgraced#!, and stripped of any office he holds. #G Legitimacy#! rises, #G unrest#! falls in a province, and the Justice minister gains standing if upright."

 qing_justice.3.b:0 "Protect the official — the hierarchy must stand."
 qing_justice.3.b.tt:0 "Deny the appeal and shield the magistrate. #R Unrest#! rises in a province, #R +2 Tyranny#!. The protected official gains #G loyalty#!, but an honest Justice minister loses standing and loyalty."

 # --- Event .4: A Notorious Case ---
 qing_justice.4.t:0 "A Notorious Case"
 qing_justice.4.desc:0 "A case has come before the Ministry of Justice that has divided the court. The facts are plain, the letter of the code unambiguous — but equity pulls the other way. Strict application of the law would produce a verdict that feels harsh, even unjust; bending the code to serve fairness would set a precedent that weakens its authority.\n\nThe memorials argue both sides. Some insist the law must stand immovable, a rock against the tide of sentiment. Others plead that law serves justice, not the reverse, and a code that cannot bend will break. The decision falls to Us."

 qing_justice.4.a:0 "The letter of the law must stand."
 qing_justice.4.a.tt:0 "Uphold the code strictly: #G stability#! (order) but #R +2 Tyranny#!. A zealous Justice minister approves; a merciful one is troubled."

 qing_justice.4.b:0 "Equity over letter — the law serves justice."
 qing_justice.4.b.tt:0 "Bend the law for fairness: #G legitimacy#! (humane) but #R stability#! falls (legal certainty weakened). A low-zeal Justice minister is relieved; a zealous one estranged."

 # ####################################################################
 # Modifiers (qing_justice_modifiers.txt)
 # ####################################################################

 qing_justice_merciful_assize:0 "Merciful Autumn Assize (秋審)"
 qing_justice_merciful_assize_desc:0 "The throne has tempered justice with mercy in the annual capital-case review, demonstrating that the law is firm but not tyrannical."

 qing_justice_harsh_code:0 "Harsh Application of the Code"
 qing_justice_harsh_code_desc:0 "The full rigor of the penal code has been applied without mercy — a stern deterrent, but one that breeds fear more than loyalty."

 qing_justice_code_revised:0 "The Penal Code Revised (大清律例)"
 qing_justice_code_revised_desc:0 "The Great Qing Code has been systematically revised and clarified, providing a firm foundation for even-handed justice across the realm."

 qing_justice_appeal_vindicated:0 "京控 Appeal Vindicated"
 qing_justice_appeal_vindicated_desc:0 "A commoner's appeal to the capital has been upheld and the corrupt local official punished — a sign that justice can still be had."

 qing_justice_appeal_denied:0 "京控 Appeal Denied"
 qing_justice_appeal_denied_desc:0 "An appeal to the capital has been suppressed and the accused magistrate protected — a sign that the powerful are above the law."

 qing_justice_arbitrary:0 "Arbitrary Justice"
 qing_justice_arbitrary_desc:0 "Justice is applied unevenly, according to the whims of a venal Ministry of Justice. The law is a tool for those who can afford it."

 # ####################################################################
 # [#363] Board of Punishments panel (刑部) — QING_justice_panel.txt / gui/qing_justice.gui
 # ####################################################################

 QING_JUSTICE_OPEN_BTN:0 "Ministry of Justice (刑部)"
 QING_JUSTICE_OPEN_TT:0 "Open the Ministry of Justice dashboard. The 刑部 is the empire's high court and keeper of the penal code (大清律例) — it charges accused officials onto its docket (待審) and tries them. Its performance folds into the Grand Minister of Justice's standing on the Grand Council."

 QING_JUSTICE_PANEL_TITLE:0 "Ministry of Justice (刑部)"
 QING_JUSTICE_PANEL_DESC:0 "The Ministry of Justice (刑部) is one of the Three Judicial Offices (三法司) — the empire's high court and the guardian of the Great Qing Code (大清律例). Where the Censorate impeaches in a single blow, the Ministry lays a formal charge and tries the accused: convicting the venal (disgrace, dismissal, and imprisonment) or acquitting the wronged. The evenness of its justice folds into the Grand Minister of Justice's standing on the Grand Council."

 QING_JUSTICE_MINISTER_TITLE:0 "Grand Minister of Justice (刑部尚書)"
 QING_JUSTICE_VACANT:0 "The Ministry of Justice sits without a president. The law drifts, and justice is arbitrary — the Ministry's standing on the Grand Council suffers until a Grand Minister of Justice is appointed."

 QING_JUSTICE_PERF_LABEL:0 "Ministry Performance"
 QING_JUSTICE_PERF_TT:0 "How well the Ministry of Justice discharges its charge (0-100, 50 = adequate). Driven by the Grand Minister of Justice's zeal (his even-handed rigour) and integrity (a just or honest minister), dragged down by an unworked docket (待審積壓) and by realm-wide corruption. This meter folds into his standing on the Grand Council."

 QING_JUSTICE_DOCKET_LABEL:0 "Docket (待審)"
 QING_JUSTICE_DOCKET_TT:0 "The number of accused officials the Ministry holds awaiting trial. A docket left unworked drags the Ministry's performance — the throne expects its cases tried, not shelved."

 QING_JUSTICE_CORRUPTION_LABEL:0 "Realm Corruption"
 QING_JUSTICE_CORRUPTION_TT:0 "The level of venality in the realm's officialdom — the rot the Ministry's justice exists to check. High corruption drags the Ministry's performance."

 QING_JUSTICE_ADMIN_TITLE:0 "The Bench"
 QING_JUSTICE_ACCUSE_BTN:0 "Accuse an Official (待審)"
 QING_JUSTICE_ACCUSE_TT:0 "Lay a formal charge against an official guilty of graft, cruelty, or disloyalty, placing him on the Ministry's docket to await trial. Requires a seated Grand Minister of Justice and an errant official not already charged."

 QING_JUSTICE_DOCKET_TITLE:0 "The Docket — Accused Awaiting Trial (待審)"
 QING_JUSTICE_DOCKET_EMPTY:0 "The docket is clear. No official stands accused before the Ministry."

 QING_JUSTICE_CONVICT_BTN:0 "Convict (定罪)"
 QING_JUSTICE_CONVICT_TT:0 "Bring the accused to judgement against him: he is tainted, disgraced, stripped of any great office, and cast into prison (下獄). Cleans a little rot out of the officialdom."

 QING_JUSTICE_ACQUIT_BTN:0 "Acquit (開釋)"
 QING_JUSTICE_ACQUIT_TT:0 "Clear the accused at trial and strike him from the docket. A wrongly-held man's loyalty is soothed."
