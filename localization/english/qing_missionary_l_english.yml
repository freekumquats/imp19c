######################################################################
# qing_missionary_l_english.yml — MISSIONARY INCIDENTS (教案).
# Covers the anti-Christian sentiment modifiers and the incident event. The Boxer
# boil-over routes into the existing Boxer rising (qing_rebellion.9), which carries
# its own localization. See se_QING_MISSIONARY.txt / qing_missionary_events.txt.
######################################################################

 # ---- modifiers --------------------------------------------------------------
 qing_antichristian_simmering:0 "仇教情緒 — Anti-Christian Feeling Simmers"
 qing_antichristian_fever:0 "扶清滅洋 — Anti-Foreign Fury at Fever Pitch"

 # ---- .1  a missionary incident ----------------------------------------------
 qing_missionary.1.t:0 "An Incident at the Mission (教案)"
 qing_missionary.1.desc:0 "Word comes of another affair at a foreign mission: a dispute over converts who flout the ancestral rites and claim the consul's protection from our magistrates; a mission raised on the ground of a razed temple; a rumour — believed by thousands — that the foreign orphanage kills children for their eyes and hearts. A mob has gathered; there is blood on the chapel steps, and the foreign consul is already drafting his demand for indemnity and the heads of the ringleaders. The gentry mutter that a magistrate who bows to the barbarian is no magistrate at all.\n\nHow shall the throne dispose of this?"
 qing_missionary.1.suppress:0 "Satisfy the consuls — indemnity and punishment."
 qing_missionary.1.suppress.tt:0 "Pay the indemnity, punish the rioters, protect the mission. Placates the aggrieved power (eases its tension), but the visible kowtow to the barbarians inflames the gentry — anti-Christian sentiment climbs, and a touch of tyranny."
 qing_missionary.1.indulge:0 "Let the magistrates look away."
 qing_missionary.1.indulge.tt:0 "Spare the humiliation of indemnity and let the populace vent. Relieves anti-Christian sentiment a little, but sharply affronts the aggrieved power (its tension spikes) and feeds reform pressure through the disorder."

 # ---- [#91 item P] the anti-Christian agitator character -----------------------
 # Epithet pinned by QING_roster_finalize (add_nickname) on the conjured firebrand
 # spawned at fever-pitch sentiment. See QING_missionary_spawn_agitator.
 NICKNAME_QING_ANTICHR_AGITATOR:0 "the Anti-Foreign Firebrand (仇教)"
