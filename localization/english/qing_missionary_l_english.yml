l_english:

######################################################################
# qing_missionary_l_english.yml — MISSIONARY INCIDENTS (教案).
# Covers the anti-Christian sentiment modifiers and the incident event. The Boxer
# boil-over routes into the existing Boxer rising (qing_rebellion.9), which carries
# its own localization. See se_QING_MISSIONARY.txt / qing_missionary_events.txt.
######################################################################

 # ---- [#51] Faith & Sedition read-out (injected into the vanilla religion view, CHI only) ----
 QING_FAITH_SEDITION_HEADER:0 "#T Faith & Sedition (民教相爭)#!"
 QING_FAITH_ANTICHR_LABEL:0 "Anti-Christian Sentiment (仇教情緒)"
 QING_FAITH_ANTICHR_TT:0 "The political anti-missionary, anti-foreign fury (0–100). It only rises once the treaty system stands and foreign consuls back the missions — before then a missionary dispute carries no diplomatic stake. Stoked by the treaty burden, sect unrest, and each incident (教案) yielded to the powers; when it boils over, the Boxers rise (庚子拳亂). Ruler and ministers meet each incident by suppressing it (satisfy the consuls, but the gentry seethe) or indulging the popular fury (spare the humiliation, affront the powers)."
 QING_FAITH_SOCIAL_LABEL:0 "Social Friction (民教相爭)"
 QING_FAITH_SOCIAL_TT:0 "The quiet cultural irritant of a foreign heterodoxy among the people (0–45) — literati contempt for the 邪教, the odd local persecution or martyrdom. It exists in every era, treaty or no (present already in 1763), tracking the mission footprint on the ground and a share of general sect unrest. A tolerated nuisance, never a national crisis — but sustained friction slowly feeds the secret-society ferment the state lumped Christianity in with (White Lotus, Triads)."
 QING_FAITH_REACH_LABEL:0 "Mission Stations (傳教據點)"
 QING_FAITH_REACH_TT:0 "The count of Christian mission stations planted across the empire's traditional-faith heartlands. Every station raises both meters above — the concrete grievance the 教案 incidents embodied. It grows as the treaties open the interior to the missions and as the powers press their protectorate over the converts."
 # ---- modifiers --------------------------------------------------------------
 qing_antichristian_simmering:0 "仇教情緒 — Anti-Christian Feeling Simmers"
 qing_antichristian_fever:0 "扶清滅洋 — Anti-Foreign Fury at Fever Pitch"
 qing_mission_social_unease:0 "民教相爭 — Unease at the Foreign Faith"
 qing_mission_social_unease_desc:0 "Christianity has been present in the provinces for generations — tolerated, underground, a curiosity of the coast and a quiet community here and there. The literati despise it as heterodoxy (邪教) that scorns the ancestral rites, and the gentry grumble; but there are no foreign gunboats behind it, and the throne loses no sleep. A faint social friction, not a crisis of state."

 # ---- .1  a missionary incident (TREATY-ERA political 教案) -------------------
 qing_missionary.1.t:0 "An Incident at the Mission (教案)"
 qing_missionary.1.desc:0 "Word comes of another affair at a foreign mission: a dispute over converts who flout the ancestral rites and claim the consul's protection from our magistrates; a mission raised on the ground of a razed temple; a rumour — believed by thousands — that the foreign orphanage kills children for their eyes and hearts. A mob has gathered; there is blood on the chapel steps, and the foreign consul is already drafting his demand for indemnity and the heads of the ringleaders. The gentry mutter that a magistrate who bows to the barbarian is no magistrate at all.\n\nHow shall the throne dispose of this?"
 qing_missionary.1.suppress:0 "Satisfy the consuls — indemnity and punishment."
 qing_missionary.1.suppress.tt:0 "Pay the indemnity, punish the rioters, protect the mission. Placates the aggrieved power (eases its tension), but the visible kowtow to the barbarians inflames the gentry — anti-Christian sentiment climbs, and a touch of tyranny."
 qing_missionary.1.indulge:0 "Let the magistrates look away."
 qing_missionary.1.indulge.tt:0 "Spare the humiliation of indemnity and let the populace vent. Relieves anti-Christian sentiment a little, but sharply affronts the aggrieved power (its tension spikes) and feeds reform pressure through the disorder."

 # ---- [#309] .2  a PRE-TREATY local heterodoxy scare (地方教案, no foreign stake) -----
 qing_missionary.2.t:0 "A Heterodoxy Scare (邪教之議)"
 qing_missionary.2.desc:0 "A memorial arrives from a provincial governor. In his districts the foreign religion has taken quiet root — a chapel in a market town, a scattering of families who will not burn incense to the ancestors, a native catechist keeping the flock between the rare visits of a European priest. The local gentry are alarmed: they name it an evil sect (邪教), no different from the White Lotus, and demand the magistrates root it out before it spreads.\n\nThere are no gunboats in this: no consul will protest, no indemnity will be demanded, whatever the throne decides. It is a question of domestic order and the ancestral way alone — the barbarians beyond the seas neither know nor could answer for what befalls their faith in the interior."
 qing_missionary.2.tolerate:0 "Leave the quiet communities be."
 qing_missionary.2.tolerate.tt:0 "The pragmatic course of the High Qing: so long as they keep the peace and pay their taxes, a few converts trouble no one. #G Eases social friction#!, at the price of a little gentry grumbling (#R a touch of sect pressure#!). No foreign power is involved."
 qing_missionary.2.suppress:0 "Enforce the proscription — expel the priests."
 qing_missionary.2.suppress.tt:0 "Invoke the ban of 1724: seize the chapels, scatter the flock, expel or execute the foreign priests. #G Sharply cuts social friction#! and #G steadies the sects#!, but at the cost of #R a measure of tyranny#! — and the underground communities will, in time, quietly return. No foreign consequence: there are no consuls yet to answer to."

 # ---- [#91 item P] the anti-Christian agitator character -----------------------
 # Epithet pinned by QING_roster_finalize (add_nickname) on the conjured firebrand
 # spawned at fever-pitch sentiment. See QING_missionary_spawn_agitator.
 NICKNAME_QING_ANTICHR_AGITATOR:0 "the Anti-Foreign Firebrand (仇教)"

 # ---- [#275] concrete missionary-station layer (傳教士入內地) ------------------
 # PROVINCE modifiers stamped/removed by se_QING_MISSIONARY_STATIONS.txt.
 qing_mission_station:0 "傳教站 — Christian Mission"
 qing_mission_station_desc:0 "A Christian mission planted in the province — chapel, school and dispensary — radiating inland from the treaty ports. It brings a little Western civilisation and wins converts out of the traditional faiths, but its foreign patronage and the privileges its converts claim grate on the local gentry and populace."
 qing_mission_unrest:0 "地方教案 — Anti-Christian Disorder"
 qing_mission_unrest_desc:0 "The local mission field has turned violent. Rumours, disputes over converts and temple land, and resentment of the foreign faith have boiled into anti-Christian disorder — the small change of grievance that fed the greater fury."
