l_english:
 # [#368] Court Intrigue + Succession Deep Sim (宮闈鬥爭 / 立儲之爭).

 # --- open button (government view) ---
 QING_PRINCES_OPEN_BTN:0 "Court Intrigue (宮闈鬥爭)"
 QING_PRINCES_OPEN_TT:0 "Open the court-intrigue and succession panel (宮闈鬥爭 / 立儲之爭): the reigning emperor's grown sons and their contest for the throne. Watch the princes gather their factions, groom the ablest, seal the succession on a chosen heir behind the 正大光明 tablet, or curb an over-mighty son before he splits the court."

 # --- panel window ---
 QING_PRINCES_PANEL_TITLE:0 "Court Intrigue — 立儲之爭"
 QING_PRINCES_PANEL_DESC:0 "An emperor's grown sons are both his greatest asset and his gravest danger. Each imperial prince (皇子) may gather a following at court, and while no heir is named the followings harden into factions — the very disease that produced the Nine Lords' struggle for Kangxi's throne (九子奪嫡, 1708–1722). The Yongzheng Emperor's cure was 秘密立儲: the heir's name sealed in a box behind the 正大光明 tablet, opened only at his death, so the contest lost its object. Here the throne may groom the ablest prince, seal the tablet on a chosen heir, or set the Censorate on a son who has grown too mighty. A house at peace over its succession steadies the whole Grand Council; a house at war over it drags every office down."
 QING_PRINCES_STANDING_TITLE:0 "The State of the Succession"
 QING_PRINCES_COUNT_LABEL:0 "Contending Princes (皇子)"
 QING_PRINCES_COUNT_TT:0 "The number of the reigning emperor's living adult sons — the field of possible heirs. With two or more and no sealed succession, the makings of a faction fight are present."
 QING_PRINCES_HARMONY_LABEL:0 "Dynastic Harmony (宗室和睦)"
 QING_PRINCES_HARMONY_TT:0 "The concord of the imperial house (0–100). A polarised succession contest — a wide gulf between the front-runner's backing and the rest — drags it down; sealing the succession lifts it. Dynastic harmony folds directly into the effectiveness of the Grand Council, so a settled house lets the great offices work."
 QING_PRINCES_SEALED_BANNER:0 "#G The succession is SEALED (秘密立儲): the heir's name rests behind the 正大光明 tablet. The transfer of power will be smooth.#!"

 # --- action levers ---
 QING_PRINCES_ADMIN_TITLE:0 "The Throne's Levers"
 QING_PRINCES_FAVOUR_BTN:0 "Groom the Ablest Prince (培植)"
 QING_PRINCES_FAVOUR_TT:0 "Advance the ablest prince — grant him prestige and raise his backing at court, marking him the clear front-runner. Useful if you mean to seal on him. But open favour under an unsealed succession inflames the losing cliques and costs a little dynastic harmony — this is exactly what fed the 九子奪嫡."
 QING_PRINCES_SEAL_BTN:0 "Seal the Succession (秘密立儲)"
 QING_PRINCES_SEAL_TT:0 "Name the front-runner the hidden heir: his name is sealed behind the 正大光明 tablet, to be opened only at your death. He becomes your designated successor, the jockeying loses its object, dynastic harmony and legitimacy rise, and the accession will be smooth. The Yongzheng reform, made concrete. Unavailable once the succession is already sealed."
 QING_PRINCES_INVESTIGATE_BTN:0 "Investigate an Over-Mighty Prince (查辦)"
 QING_PRINCES_INVESTIGATE_TT:0 "Set the Censorate on the most powerful prince — one who has gathered a dangerous following of his own (the Yinreng pattern). His backing is broken and his prestige cut. But moving against a son of the blood is an ugly business and unsettles the house. Available only when a prince's backing has grown genuinely alarming."
 QING_PRINCES_REOPEN_BTN:0 "Reopen the Succession (廢儲)"
 QING_PRINCES_REOPEN_TT:0 "Depose the sealed heir and throw the succession open again — as Kangxi deposed the crown prince Yinreng in 1712. The seal is broken, the jockeying resumes, and the house pays in legitimacy and harmony. A drastic step. Available only while a succession is sealed."

 # --- prince roster ---
 QING_PRINCES_ROSTER_TITLE:0 "The Imperial Princes (皇子)"
 QING_PRINCES_ROSTER_EMPTY:0 "The emperor has no living adult sons to contend for the throne. The succession will pass by the ordinary law."
 QING_PRINCES_BACKING_LABEL:0 "Court Backing"
 QING_PRINCES_BACKING_TT:0 "This prince's support at court (0–100) — the faction gathered behind him. An abler prince draws more; grooming lifts it, an investigation breaks it. The gulf between the highest and lowest backing is the measure of the court's division."

 # --- event .1: THE PRINCES CONTEND (奪嫡之爭) ---
 qing_princes.1.t:0 "The Princes Contend"
 qing_princes.1.desc:0 "It begins, as it always begins, in whispers. Your grown sons keep their own households, their own clients, their own ambitions — and with no heir named, each has reason to gather what strength he can. The court has begun to divide behind them. The prince [scope:qing_contest_frontrunner.GetName] is spoken of as the front-runner — and behind him, as ever, stands his mother [scope:qing_frontrunner_mother.GetName], whose own standing in the palace lifts or sinks her son's cause. But a front-runner is only a target, and the memory of the Nine Lords' struggle hangs over every audience. The contest must be governed before it governs the dynasty."
 qing_princes.1.desc_nomother:0 "It begins, as it always begins, in whispers. Your grown sons keep their own households, their own clients, their own ambitions — and with no heir named, each has reason to gather what strength he can. The court has begun to divide behind them. The prince [scope:qing_contest_frontrunner.GetName] is spoken of as the front-runner, but a front-runner is only a target, and the memory of the Nine Lords' struggle hangs over every audience. The contest must be governed before it governs the dynasty."
 qing_princes.1.a:0 "Seal the tablet on the front-runner (秘密立儲)."
 qing_princes.1.a.tt:0 "Name the ablest prince the hidden heir behind the 正大光明 tablet. The jockeying ends, harmony and legitimacy rise, and the succession is secured."
 qing_princes.1.b:0 "Groom him openly — but keep the succession open (培植)."
 qing_princes.1.b.tt:0 "Advance the front-runner with prestige and backing, but name no heir. The contest simmers on, and the losing cliques take note."
 qing_princes.1.c:0 "Stand aloof; let them contend."
 qing_princes.1.c.tt:0 "Refuse to intervene. The princes are left to struggle among themselves — and the house pays for the division in harmony and reform pressure."

 # --- event .2: AN OVER-MIGHTY PRINCE (儲位太盛) ---
 qing_princes.2.t:0 "An Over-Mighty Prince"
 qing_princes.2.desc:0 "One son has outgrown his station. [scope:qing_overmighty_prince.GetName] — borne to you by [scope:qing_overmighty_mother.GetName], whose own faction stands squarely behind him — has built a following that rivals a faction of the court in its own right: clients in the ministries, friends in the guards, a household that begins to look like a shadow throne. This is the Yinreng pattern, and it ended once in a deposition. Such a prince is either the making of the dynasty or its undoing, and the throne must decide which before the court decides for it."
 qing_princes.2.desc_nomother:0 "One son has outgrown his station. [scope:qing_overmighty_prince.GetName] has built a following that rivals a faction of the court in its own right — clients in the ministries, friends in the guards, a household that begins to look like a shadow throne. This is the Yinreng pattern, and it ended once in a deposition. Such a prince is either the making of the dynasty or its undoing, and the throne must decide which before the court decides for it."
 qing_princes.2.a:0 "Set the Censorate on him (查辦)."
 qing_princes.2.a.tt:0 "Break his faction: an investigation strips his backing and cuts his prestige. But moving against a son of the blood unsettles the house."
 qing_princes.2.b:0 "Embrace him — seal the succession on him now (秘密立儲)."
 qing_princes.2.b.tt:0 "Accept the front-runner: seal the tablet on the over-mighty prince. His strength becomes the dynasty's, the contest ends, and harmony rises."
 qing_princes.2.c:0 "Watch, and wait."
 qing_princes.2.c.tt:0 "Do nothing for now. The prince's power grows unchecked, and the house loses a little harmony to the uncertainty."
