l_english:

 # ====================================================================
 # Demographic & frontier-flavour wave — nomad migrations, the New World
 # crop boom, Hong Kong, and the naming of Vietnam.
 # See events/imp19c_mod_events/qing_frontier_migration_events.txt.
 # ====================================================================

 # --- .10 Torghut return ---------------------------------------------
 qing_migration.10.t:0 "The Torghut Return (土爾扈特東歸)"
 qing_migration.10.desc:0 "A dust-cloud of horsemen, women and cattle stretches to the horizon at the Ili frontier. They are the Torghut — Kalmyks who a century and a half ago wandered to the banks of the distant Volga, and who now, under Ubashi Khan (渥巴錫), have fled the levies of the Russian Tsar and the pressure of his priests. Through a terrible winter of Cossack raids, hunger and disease they have marched east; of the one hundred and seventy thousand who set out, barely a third have reached the Great Qing. They kneel and ask to enter the fold (內附) of the Son of Heaven."
 qing_migration.10.a:0 "Settle them on the frontier as our banner pastoralists"
 qing_migration.10.a.tt:0 "Gain manpower, new #Y tribesmen#! pops, and lasting frontier cavalry; ease #Y ethnic tension#!"
 qing_migration.10.b:0 "Open the granaries — they shall not have crossed a continent to starve"
 qing_migration.10.b.tt:0 "Spend #Y 40 gold#!; gain manpower and settlers, greatly ease #Y ethnic tension#!, and gain stability"
 qing_migration.10.c:0 "The frontier cannot feed them — turn them away"
 qing_migration.10.c.tt:0 "Lose prestige and raise #Y ethnic tension#!: word spreads that the Qing is no refuge"

 # --- .11 lesser nomad in-migration ----------------------------------
 qing_migration.11.t:0 "A People Seeks the Fold (內附)"
 qing_migration.11.desc:0 "A band of the steppe — Kazakh, Khoshut, or Dörböd, pressed between Russian forts, Kokandi raiders and the ghosts of the old Zunghar wars — sends elders to the frontier general. They wish to graze under the peace of the Great Qing and to enroll their young men beneath its banners. The Lifan Yuan (理藩院) awaits the court's word."
 qing_migration.11.a:0 "Enroll them in the banners of the frontier"
 qing_migration.11.a.tt:0 "Gain manpower and #Y tribesmen#! pops; their martial vigour eases #Y banner decay#!"
 qing_migration.11.b:0 "Accept their submission as tributary pasture-holders"
 qing_migration.11.b.tt:0 "Gain a lasting frontier-influx bonus and ease #Y ethnic tension#!"
 qing_migration.11.c:0 "Decline — the frontier has burdens enough"

 # --- .20 New World crops --------------------------------------------
 qing_migration.20.t:0 "The Crops of the Southern Seas (番薯與玉米)"
 qing_migration.20.desc:0 "From the ships that ply the route to Luzon and Batavia come strange plants of the New World: the sweet potato (番薯), maize (玉米), the groundnut (落花生), the fiery pepper and the red aubergine the barbarians call tomato (番茄). They ask nothing of the good paddy land — they thrive on dry hillsides and sandy wastes that grew nothing before. Officials report that where a family once starved on a mountainside, ten now eat. A great multiplying of the people is surely coming. Whether it becomes the empire's strength or its ruin will depend on how well the realm is governed when the reckoning arrives."
 qing_migration.20.a:0 "Promote the new crops through every province"
 qing_migration.20.a.tt:0 "Begin the #Y population boom#! (empire-wide growth + food); new farming pops now. Years hence, a strong dynasty reaps abundance — a weak one, famine and revolt"
 qing_migration.20.b:0 "Let them spread as the peasants see fit"
 qing_migration.20.b.tt:0 "Begin the boom #Y unmanaged#! — the later reckoning will tilt toward crisis"

 # --- .22 boom as blessing -------------------------------------------
 qing_migration.22.t:0 "A Teeming and Prosperous Realm (盛世滋生)"
 qing_migration.22.desc:0 "The reckoning of the boom has come, and it finds the dynasty strong. The new fields feed a doubled, trebled people; granaries are full, taxes flow, and the young men of a hundred million households fill the muster rolls. The Qianlong-era phrase is on every scholar's lips — 盛世滋生人丁, 'in a flourishing age the people multiply.' This is the abundance of a golden reign."
 qing_migration.22.a:0 "Let the empire flourish"
 qing_migration.22.a.tt:0 "Gain #Y manpower#!, prestige and stability; ease #Y sect pressure#!; the golden growth modifier endures; new communities thrive"

 # --- .23 boom as crisis ---------------------------------------------
 qing_migration.23.t:0 "Too Many Mouths (人滿為患)"
 qing_migration.23.desc:0 "The reckoning of the boom has come, and it finds the dynasty weak. The hillsides are stripped bare and the rivers choke with silt; landless migrants (棚民, 'shed people') drift into the highlands and the cities, and among them the preachers of the White Lotus (白蓮教) and the secret societies find a harvest of the desperate. Malthus's arithmetic has come to the Middle Kingdom: the people have outrun the land."
 qing_migration.23.a:0 "Open relief works and resettle the landless"
 qing_migration.23.a.tt:0 "Spend #Y 80 gold#!; sharply ease #Y sect pressure#! and #Y ethnic tension#!, gain stability"
 qing_migration.23.b:0 "The land must absorb them as it may"
 qing_migration.23.b.tt:0 "Raise #Y sect pressure#! and #Y reform pressure#! sharply; lose stability"

 # --- .30 Hong Kong --------------------------------------------------
 qing_migration.30.t:0 "The Fragrant Harbour (香港)"
 qing_migration.30.desc:0 "A memorial arrives concerning a rocky island off the mouth of the Pearl River, its fishing and incense-trading villages clustered around one of the finest deep-water anchorages in all the southern seas — 香港, the Fragrant Harbour. The barbarian traders covet it as a base. But what if the Great Qing were to build it up itself: a Chinese-run free port and customs entrepot, gathering the trade of the whole China coast into imperial hands rather than surrendering it to a foreign flag?"
 qing_migration.30.a:0 "Build the harbour into a modern entrepot"
 qing_migration.30.a.tt:0 "Spend #Y 100 gold#!; make Xianggang a #Y city#! with a port and commerce district, booming population, and an empire-wide trade bonus. It will flourish in the years to come"
 qing_migration.30.b:0 "A modest customs station will suffice"
 qing_migration.30.b.tt:0 "Build a #Y port#! at Xianggang and gain a little revenue"
 qing_migration.30.c:0 "Leave the fishing villages in peace"

 qing_migration.31.t:0 "The Pearl of the South Sea (南海明珠)"
 qing_migration.31.desc:0 "In a single generation the Fragrant Harbour has become one of the great ports of the world — a forest of masts, godowns heavy with tea and silk and the goods of every nation, and a Chinese merchant class grown rich under the imperial customs. What Britain built in another history, the Great Qing has built for itself."
 qing_migration.31.a:0 "Proclaim it the jewel of the imperial coast"
 qing_migration.31.a.tt:0 "Gain prestige and a lasting great-entrepot trade bonus; advance the #Y Self-Strengthening Movement#!"

 # --- .40 naming of Vietnam ------------------------------------------
 qing_migration.40.t:0 "The Naming of Vietnam (越南)"
 qing_migration.40.desc:0 "An embassy has come north from Nguyen Anh, who has at last unified the lands of the old Annam and taken the throne as the Emperor Gia Long (嘉隆帝). He begs investiture from the Son of Heaven — and proposes that his realm be styled 南越, 'Nam Viet.' But that ancient name once belonged to a kingdom that claimed Guangdong and Guangxi themselves; to grant it would be to invite a claim upon our own southern provinces. The Grand Council proposes to invert the characters and confer instead the name 越南 — Viet Nam."
 qing_migration.40.a:0 "Confer the name 越南 and invest Gia Long as our tributary king"
 qing_migration.40.a.tt:0 "Gain prestige and a lasting suzerain bonus; win Vietnamese goodwill; ease #Y ethnic tension#!. May lead to reform spillover"
 qing_migration.40.b:0 "Grant the grander name they asked — let them know their place beneath us"
 qing_migration.40.b.tt:0 "Gain prestige but incur tyranny and Vietnamese resentment"

 qing_migration.41.t:0 "The Chinese Model (師法中華)"
 qing_migration.41.desc:0 "Word comes from the south that the court of Hue studies the ways of the Great Qing — its examinations, its ministries, and now its arsenals and its schools. A tributary that looks to us as its model is a tributary that may be led, gently, along the road of self-strengthening. Shall we send advisors and share the new learning?"
 qing_migration.41.a:0 "Send advisors and share the new learning"
 qing_migration.41.a.tt:0 "Spend #Y 40 gold#!; gain a reforming-tributary bonus and Vietnamese goodwill; ease #Y reform pressure#! at home"
 qing_migration.41.b:0 "Keep the bond purely ceremonial"

