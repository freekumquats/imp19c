l_english:
 # [#350] Lifan Yuan Directorate (理藩院) panel.
 QING_LIFANYUAN_OPEN_BTN:0 "Lifan Yuan (理藩院)"
 QING_LIFANYUAN_OPEN_TT:0 "Open the Court of Colonial Affairs — the Grand Director (理藩院尚書) and the resident Ambans (駐防大臣) posted across the Inner-Asian dependencies."
 QING_LIFANYUAN_PANEL_TITLE:0 "Court of Colonial Affairs — 理藩院"
 QING_LIFANYUAN_PANEL_DESC:0 "The Lifan Yuan (理藩院) governs the Inner-Asian dependencies — Mongolia, Tibet, the Xinjiang khanates — through its resident Ambans (駐防大臣) rather than by direct rule. Its Grand Director answers to the Grand Council for how the frontier is kept: a Court that mans every residency lifts his standing, one that leaves dependencies unwatched drags it down."
 QING_LIFANYUAN_DIRECTOR_TITLE:0 "Grand Director of the Lifan Yuan (理藩院尚書)"
 QING_LIFANYUAN_VACANT:0 "The Lifan Yuan stands without a Director. The dependencies drift beyond the Court's eye."
 QING_LIFANYUAN_PERF_LABEL:0 "Directorate Performance"
 QING_LIFANYUAN_PERF_TT:0 "How well the Court of Colonial Affairs is run (0–100), from the Director's diplomatic skill and how fully the dependencies are covered by resident Ambans. A vacant Court floors this low."
 QING_LIFANYUAN_COVERAGE_LABEL:0 "Ambans posted / dependencies"
 QING_LIFANYUAN_COVERAGE_TT:0 "Of the Inner-Asian dependencies that warrant a resident, how many currently have a live Amban posted. Uncovered dependencies weaken the Directorate's performance."
 QING_LIFANYUAN_ROSTER_TITLE:0 "Resident Ambans (駐防大臣)"
 QING_LIFANYUAN_ROSTER_EMPTY:0 "No Amban currently sits in any dependency. Post residents from each subject's diplomatic view."
