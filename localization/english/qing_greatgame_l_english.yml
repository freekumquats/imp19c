l_english:
 qing_greatgame.1.t:0 "A Great Power Overture"
 qing_greatgame.1.desc:0 "A foreign power whose enmity toward the Qing has grown elevated now presses the throne — a frontier concession, a trade privilege, a diplomatic slight redressed. The Zongli Yamen (總理衙門) must mediate the demand."
 qing_greatgame.1.a:0 "Play the rivals against it (以夷制夷)"
 qing_greatgame.1.a.tt:0 "The Zongli holder's finesse divides the powers: placate this one at the cost of affronting its two rivals."
 qing_greatgame.1.b:0 "Concede the demand"
 qing_greatgame.1.b.tt:0 "Buy peace at the cost of treasury and prestige."
 qing_greatgame.1.c:0 "Stand firm — refuse"
 qing_greatgame.1.c.tt:0 "The court applauds defiance, but tension with the power rises."
 qing_greatgame.2.t:0 "The Powers Coordinate"
 qing_greatgame.2.desc:0 "When multiple great powers sense a common opportunity, they press together — a coordinated threat harder to deflect. The Zongli Yamen (總理衙門) must navigate the entente."
 qing_greatgame.2.a:0 "Divide them (以夷制夷)"
 qing_greatgame.2.a.tt:0 "Play two powers against the third — the Zongli holder's highest art."
 qing_greatgame.2.b:0 "Buy them off"
 qing_greatgame.2.b.tt:0 "Pay a heavy bribe to placate the coordinated threat."
 qing_greatgame.2.c:0 "Weather the storm"
 qing_greatgame.2.c.tt:0 "Refuse; all tensions rise, but the court applauds defiance."
 qing_greatgame.3.t:0 "A Diplomatic Coup"
 qing_greatgame.3.desc:0 "The Zongli holder has engineered a breakthrough — a treaty that meaningfully settles a frontier with one of the great powers. The court debates whether to applaud or temper the achievement."
 qing_greatgame.3.a:0 "Applaud the coup"
 qing_greatgame.3.a.tt:0 "Endorse the settlement; tension drops and the holder is rewarded."
 qing_greatgame.3.b:0 "Temper the achievement"
 qing_greatgame.3.b.tt:0 "Accept the settlement but do not publicly applaud."
 GREAT_GAME_PANEL_TITLE:0 "The Great Game (以夷制夷)"
 GREAT_GAME_PANEL_DESC:0 "The throne's dashboard for playing the great powers against each other. Each power's tension with the Qing, their standing, and the Zongli Yamen's (總理衙門) mediation."
 GREAT_GAME_COURTING_TITLE:0 "Courting the Powers (以夷制夷)"
 GREAT_GAME_BRITAIN_TITLE:0 "Britain"
 GREAT_GAME_FRANCE_TITLE:0 "France"
 GREAT_GAME_RUSSIA_TITLE:0 "Russia"
 GREAT_GAME_TENSION_LABEL:0 "Tension:"
 GREAT_GAME_TENSION_TT:0 "Great-power tension with the Qing (0..100). High tension = the power's enmity is felt in-game (rivalry modifier, closed advisor offers, predatory diplomatic plays)."
 GREAT_GAME_STANDING_LABEL:0 "Standing:"
 GREAT_GAME_STANDING_TT:0 "The power's opinion of the Qing — the core relations value every diplomatic action reads."
 GREAT_GAME_ZONGLI_TITLE:0 "Zongli Yamen (總理衙門)"
 GREAT_GAME_ZONGLI_DESC:0 "The proto-foreign-ministry founded 1861. The holder's skill/loyalty GATES the outcomes+costs of foreign-affairs events; a capable holder dampens GP tension, a vacant office = drift."
 GREAT_GAME_ZONGLI_VACANT:0 "Vacant — foreign affairs drift"
 GREAT_GAME_OPEN_BUTTON_TT:0 "Open the Great Game panel"
 QING_GREAT_GAME_INLINE_HEADER:0 "Great Game — Rivalry with this Power"
 QING_GREAT_GAME_TAB_TITLE:0 "The Great Game"
 QING_GREAT_GAME_TAB_BUTTON:0 "Great Game"
 QING_GREAT_GAME_SELF_TITLE:0 "Great Qing (你的帝国)"
 QING_SPHERE_INLINE_TALLY:0 "Contested Marches — China #G [Player.MakeScope.GetVariable('qing_sphere_china_count').GetValue|0]#! · Britain #R [Player.MakeScope.GetVariable('qing_sphere_britain_count').GetValue|0]#! · France #R [Player.MakeScope.GetVariable('qing_sphere_france_count').GetValue|0]#! · Russia #R [Player.MakeScope.GetVariable('qing_sphere_russia_count').GetValue|0]#! · Neutral [Player.MakeScope.GetVariable('qing_sphere_neutral_count').GetValue|0]"
 QING_SPHERE_INLINE_TALLY_TT:0 "The Great Game for the empire's frontier marches. Each contested border state and every state held by a Qing subject is fought over by four powers — China, Britain, France, Russia — whose influence rises and falls each year. The tally shows how many marches each power currently dominates. China loses ground where a rival's pull outweighs the throne's; winning a march back eases that rival's rivalry, losing one inflames it."
