l_english:
 # [#355] Ministry of Revenue (戶部) panel.
 QING_REVENUE_MINISTRY_OPEN_BTN:0 "Ministry of Revenue (戶部)"
 QING_REVENUE_MINISTRY_OPEN_TT:0 "Open the Ministry of Revenue — the Grand Minister of Revenue (戶部尚書), the ever-normal granaries (常平倉), the salt gabelle (鹽政), the silver crisis (銀荒), and how well the ministry is run."
 QING_REVENUE_MINISTRY_PANEL_TITLE:0 "Ministry of Revenue — 戶部"
 QING_REVENUE_MINISTRY_PANEL_DESC:0 "The Ministry of Revenue (戶部) keeps the imperial fisc — the land and head taxes, the ever-normal granaries (常平倉) that stabilise the price of grain against famine, and the salt gabelle (鹽政), the great monopoly that fills the treasury. Its Grand Minister answers to the Grand Council for how these are kept; full granaries, a reformed gabelle, and sound silver lift his standing there, while empty reserves, a milked monopoly, and a silver crisis (銀荒) drag it down."
 QING_REVENUE_MINISTRY_MINISTER_TITLE:0 "Grand Minister of Revenue (戶部尚書)"
 QING_REVENUE_MINISTRY_VACANT:0 "The Ministry of Revenue stands without a Minister. The granaries go unstocked and the fisc drifts."
 QING_REVENUE_MINISTRY_PERF_LABEL:0 "Ministry Performance"
 QING_REVENUE_MINISTRY_PERF_TT:0 "How well the Ministry of Revenue is run (0–100), from the Minister's finesse, the reach of the ever-normal granaries, a reformed salt gabelle, the state of the silver, and the money actually flowing onto the state ledger — the salt, Canton and caravan takes together. A silver crisis, corruption and Malthusian crowding drag it down; a vacant Board floors it low."
 QING_REVENUE_MINISTRY_GRANARY_LABEL:0 "Ever-Normal Granaries (常平倉)"
 QING_REVENUE_MINISTRY_GRANARY_TT:0 "The number of provinces holding a stocked ever-normal granary — the price-stabilising grain reserves that buy dear in glut and sell cheap in dearth, staving off famine and the rebellions it breeds."
 QING_REVENUE_MINISTRY_SILVER_LABEL:0 "Silver Crisis (銀荒)"
 QING_REVENUE_MINISTRY_RESERVE_LABEL:0 "Silver Treasury (戶部銀庫, 千兩)"
 QING_REVENUE_MINISTRY_RESERVE_TT:0 "The balance of the Ministry of Revenue's central silver treasury, in 千兩 (thousands of taels). At the 1763 zenith it stands near 62,000千兩 (~62 million taels) and climbs, under sound administration, toward its historic all-time peak of 81,820千兩 (乾隆42/1777). A capable, seated Grand Minister accumulates it; a vacant or venal Board, and the silver crisis (銀荒), drain it away.\n\n#Y This IS the currency's silver backing.#! This is not a display counter — it is the empire's actual precious-metal reserve, the silver that underwrites every string of circulating cash. A swelling treasury strengthens the currency; a drained one weakens the specie behind it — the real 銀荒. The China trade (tea, silk, porcelain out) brings silver in; the opium trade drains it out; and the throne's own fisc builds or spends it here."
 QING_REVENUE_MINISTRY_SILVER_TT:0 "The pressure on the currency (0 = sound). As silver drains abroad the copper-silver exchange turns against the taxpayer and the real burden of the land tax climbs. A high reading eats into the ministry's standing."
 QING_REVENUE_MINISTRY_SALT_LABEL:0 "Salt Gabelle (鹽政)"
 QING_REVENUE_MINISTRY_SALT_TT:0 "The great salt monopoly — the second pillar of the fisc after the land tax. Left to the merchant syndicates it leaks into private hands; reformed, it fills the treasury and lifts the ministry's standing."
 QING_REVENUE_MINISTRY_SALT_REFORMED:0 "Reformed — the gabelle fills the treasury."
 QING_REVENUE_MINISTRY_SALT_UNREFORMED:0 "Unreformed — the syndicates milk the monopoly."
 QING_REVENUE_MINISTRY_CANTON_LABEL:0 "Canton Customs (粵海關), last quarter"
 QING_REVENUE_MINISTRY_CANTON_TT:0 "The share of last quarter's Canton trade (粵海關) yield that reached the STATE treasury (戶部) — the on-books Canton Contribution. The remainder went to the emperor's privy purse (內帑). The emperor sets the split (0 / 50 / 100% to the purse) from the Canton window on the Imperial Household panel; direct more to the treasury and this line rises."
 QING_REVENUE_MINISTRY_SALT_INCOME_LABEL:0 "Salt Revenue (鹽課), last quarter"
 QING_REVENUE_MINISTRY_SALT_INCOME_TT:0 "The standing quarterly take of the salt monopoly, paid into the treasury. Rises with a reformed gabelle, a capable Grand Minister, and the empire's reach; a graft-ridden monopoly leaks much of it away."
 # [#430] caravan-customs ledger line
 QING_REVENUE_MINISTRY_CARAVAN_INCOME_LABEL:0 "Caravan Customs (回疆貿易), last quarter"
 QING_REVENUE_MINISTRY_CARAVAN_INCOME_TT:0 "The standing quarterly take of the Silk Road caravan customs, levied at Yarkand on the Central Asian trade (絲路商道). Rises with a thriving, well-policed frontier trade and a heavier tariff; a cut route or a Kokand concession skimming the third-party duties thins it. A modest frontier income, not a windfall — but real money the Ministry of Revenue books."
 # [#431 / user] whole-realm fisc read-outs
 QING_REVENUE_MINISTRY_TOTAL_INCOME_LABEL:0 "Realm Income, per quarter"
 QING_REVENUE_MINISTRY_TOTAL_INCOME_TT:0 "The empire's total net income each quarter — all taxes, tariffs and monopolies less all wages and upkeep, exactly as the treasury bar at the top of the screen reads it. The true measure of the fisc the Ministry of Revenue manages; the salt, Canton and caravan lines above are components of it."
 QING_REVENUE_MINISTRY_TREASURY_LABEL:0 "Treasury Balance"
 QING_REVENUE_MINISTRY_TREASURY_TT:0 "The standing silver in the imperial treasury — the accumulated fisc the Ministry of Revenue keeps. This is the same balance shown on the top bar."
 QING_REVENUE_MINISTRY_ADMIN_TITLE:0 "Administration of the Fisc"
 QING_REVENUE_MINISTRY_STOCK_GRANARY_BTN:0 "Stock an Ever-Normal Granary (常平倉)"
 QING_REVENUE_MINISTRY_STOCK_GRANARY_TT:0 "Commission the Minister to buy grain and stock an ever-normal granary in a Yellow-River city — a price-stabilising reserve against famine. Costs treasury; requires a capable, seated Minister and a suitable city."
 QING_REVENUE_MINISTRY_REFORM_SALT_BTN:0 "Reform the Salt Gabelle (鹽政)"
 QING_REVENUE_MINISTRY_REFORM_SALT_TT:0 "Open the question of reforming the salt monopoly — whether to break the merchant syndicates and bring the gabelle back into the treasury, or leave it to be milked. The outcome turns on the Minister's oversight. Requires a seated Minister and an as-yet-unreformed gabelle."
 QING_REVENUE_MINISTRY_ROSTER_TITLE:0 "The Ever-Normal Granaries"
 QING_REVENUE_MINISTRY_ROSTER_EMPTY:0 "No province holds a stocked granary. The empire has no reserve against famine."
 QING_REVENUE_COUNCIL_CONTRIB_LABEL:0 "Net Council Effectiveness"
