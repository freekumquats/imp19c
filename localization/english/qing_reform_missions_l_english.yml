l_english:

 # ====================================================================
 # CONSTITUTIONAL REFORM — mission tree (qing_reform_missions.txt). Task #14.
 # The proactive road to the constitutional-monarchy end-state (君主立憲): a
 # translation bureau, provincial assemblies (諮議局), the constitutional
 # mission abroad (五大臣出洋, 1905), the draft constitution (欽定憲法大綱,
 # 1908), and finally the national parliament. Task title = the task key;
 # description = <key>_DESC. Sources: Cambridge History of China v.11;
 # Kang Youwei/Liang Qichao on 戊戌變法; the 1906 預備立憲 reforms.
 # ====================================================================

 qing_constitutional_mission:0 "Constitutional Reform (君主立憲)"
 qing_constitutional_mission_DESCRIPTION:0 "The Japanese did it: an emperor kept, a constitution granted, a parliament summoned — and a backward realm made a great power in a generation. Let the Great Qing walk the same road with open eyes. Step by step we will build the institutions of a constitutional monarchy, drain the revolutionaries' cause by answering it, and remake the dynasty into a modern state that endures rather than an autocracy that falls."
 qing_constitutional_mission_CRITERIA_DESCRIPTION:0 "Play as the Qing (CHI)."
 qing_constitutional_mission_REWARD_DESCRIPTION:0 "Completing every objective in this tree grants its capstone reward."
 qing_constitutional_mission_BUTTON_TOOLTIP:0 "Open this mission tree."

 # --- root: translation bureau ---------------------------------------
 qing_con_bureau:0 "Found a Bureau for Foreign Law (譯書局)"
 qing_con_bureau_DESC:0 "Before a constitution can be drafted it must be understood. In the spirit of Wei Yuan's injunction to learn the superior techniques of the West (師夷長技), establish a bureau to translate the law-codes and institutions of Japan, Britain, Germany and America — the intellectual groundwork of reform."
 qing_con_bureau_tt:0 "Lay the groundwork: #G ease reform pressure#! and nudge the court toward the #Y constitutional centre#!."

 # --- provincial assemblies ------------------------------------------
 qing_con_assemblies:0 "Convene the Provincial Assemblies (諮議局)"
 qing_con_assemblies_DESC:0 "Let the provinces taste representation. The consultative assemblies (諮議局) — historically convened in 1909 — give the gentry a lawful voice and bind the reforming elite to the throne rather than against it. It is the first real machinery of a constitutional order."
 qing_con_assemblies_tt:0 "A #G constitutionalist#! settlement takes root: ease reform pressure, #G +1 Stability#!, and move toward the constitutional centre."

 # --- constitutional mission abroad ----------------------------------
 qing_con_mission_abroad:0 "Send the Constitutional Mission Abroad (五大臣出洋)"
 qing_con_mission_abroad_DESC:0 "As the court did in 1905, dispatch high grandees overseas to study the constitutions of the great powers first-hand — the Meiji settlement above all. They will return with a blueprint, and with the conviction that reform is survival."
 qing_con_mission_abroad_tt:0 "#R Costs £80#!: #G ease reform pressure, advance the modernising temper#!, and lean toward the constitutional centre."

 # --- draft constitution ---------------------------------------------
 qing_con_draft:0 "Promulgate the Draft Constitution (欽定憲法大綱)"
 qing_con_draft_DESC:0 "Publish the principles of a constitution and a firm timetable for the parliament to come — the Outline of the Imperial Constitution (欽定憲法大綱) of 1908, made here in earnest and in good time rather than too late. The realm now knows where it is going."
 qing_con_draft_tt:0 "#G Sharply ease reform pressure, +1 Stability, +legitimacy#! as the throne binds itself to a lawful course."

 # --- capstone: national parliament ----------------------------------
 qing_con_parliament:0 "Summon the National Parliament (國會)"
 qing_con_parliament_DESC:0 "The capstone: convene a true national parliament, the emperor preserved as sovereign but the autocracy ended. The Great Qing becomes a constitutional monarchy — the Meiji road walked to its end, the dynasty saved by the very power it surrenders."
 qing_con_parliament_tt:0 "Become a #Y constitutional monarchy#! — the second golden-age end-state. Requires the constitutional cause ascendant and no other fate already sealed."
 qing_con_needs_capacity_tt:0 "Requires sufficient #Y bureaucratic capacity#! to carry the reform."
 qing_con_needs_ready_tt:0 "Requires the #Y constitutionalist faction ascendant#! (reform-faction balance high enough)."
 qing_con_needs_not_sealed_tt:0 "Requires that the dynasty's fate is #Y not already sealed#! by another end-state."
