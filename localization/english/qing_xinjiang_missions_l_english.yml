l_english:
 # ====================================================================
 # THE SETTLEMENT OF THE NEW DOMINION (新疆善後) — Xinjiang consolidation
 # mission tree (#422). See common/missions/qing_xinjiang_missions.txt and
 # common/scripted_effects/se_QING_XINJIANG.txt (QING_xj_integrate_fully).
 # Separate file from qing_xinjiang_l_english.yml (the #367 panel loc) to
 # avoid key collision. Sources: Perdue, China Marches West (2005);
 # Millward, Beyond the Pass (1998) & Eurasian Crossroads (2007).
 # ====================================================================

 # ---- mission header ------------------------------------------------
 qing_xinjiang_mission:0 "The Settlement of the New Dominion (新疆善後)"
 qing_xinjiang_mission_DESCRIPTION:0 "The Qianlong armies have taken the far west — Dzungaria emptied by war and plague, the Muslim oases of Altishahr brought under the banner. But conquest is the easy part; now comes the 善後, the long labour of settling the aftermath. A garrisoned, subsidised frontier under a special military regime is a drain and a standing danger, as the revolts to come will prove. Build the forts, plant the military colonies, put an able hand over the governorship, and win the loyalty of the begs — until the New Dominion is no longer a restless march but a province of the empire like any other, held not by the sword alone but by settlement and good rule."

 # ---- ROOT: establish the military governorship ---------------------
 qing_xj_governorship:0 "Establish the Ili Governorship (伊犁將軍)"
 qing_xj_governorship_DESC:0 "Set the General of Ili over the New Dominion and stand up the frontier administration. The long work of settlement begins here. Costs #Y 60#! treasury."
 qing_xj_governorship_tt:0 "Stand up the Xinjiang frontier administration and take the measure of the New Dominion's #Y consolidation#!."

 # ---- fortify the frontier ------------------------------------------
 qing_xj_fortify:0 "Fortify the Frontier (築城設卡)"
 qing_xj_fortify_DESC:0 "Raise a fortress in the New Dominion — a walled garrison town (滿城) to hold the ground and command the oases and the steppe roads. Build it in the Dzungaria or Tarim country; the mission will recognise the work once the walls stand."
 qing_xj_needs_fortress_tt:0 "A #Y fortress#! must stand in the #Y Dzungaria or Tarim#! country (build a fort there)."
 qing_xj_fortify_tt:0 "The forts command the ground — the #G grip on the New Dominion#! firms."

 # ---- plant the military colonies -----------------------------------
 qing_xj_colonies:0 "Plant the Military Colonies (屯田實邊)"
 qing_xj_colonies_DESC:0 "Settle the emptied north with state military-agricultural colonies (屯田) — soldier-farmers who feed the garrisons and knit the land to the empire. Plant them from the Lifan Yuan panel; the frontier needs at least three."
 qing_xj_needs_tuntian_tt:0 "At least #Y 3 military colonies (屯田)#! must be planted in the New Dominion."
 qing_xj_colonies_tt:0 "The colonies take root — the #G subsidy (協餉)#! is set flowing to keep the frontier solvent, and the grip firms."

 # ---- install a capable governor ------------------------------------
 qing_xj_governor:0 "Install a Capable Governor (簡任能員)"
 qing_xj_governor_DESC:0 "The frontier is no post for a mediocre official. Seat a genuinely able Director of the Lifan Yuan — the office that governs the Inner Asian dependencies — a man of high administrative skill, loyal and present. Appoint him on the Grand Council."
 qing_xj_needs_governor_tt:0 "A capable Lifan Yuan Director must be seated — #Y alive, in your service, finesse 9+#!."
 qing_xj_governor_tt:0 "An able hand governs the New Dominion — the #G grip firms markedly#!."

 # ---- pacify the oases ----------------------------------------------
 qing_xj_pacify:0 "Pacify the Oases (綏靖回疆)"
 qing_xj_pacify_DESC:0 "Bring the whole frontier to a settled peace — the forts, the colonies, the loyal begs and the subsidy all telling. The New Dominion's consolidation must stand genuinely high before it can be made one with the empire."
 qing_xj_needs_consolidation_tt:0 "The New Dominion's #Y consolidation score#! must reach #Y 75#!."
 qing_xj_pacify_tt:0 "The oases are settled and prosperous — the grip firms further and the court is pleased (#G ruler popularity#!)."

 # ---- capstone: full integration ------------------------------------
 qing_xj_integrate:0 "One with the Empire (新疆一體)"
 qing_xj_integrate_DESC:0 "The work is done. The New Dominion is no longer a garrisoned march under a special regime but a settled, loyal, self-sustaining land. Decree it a normal province of the empire — striking away the frontier's burdens for good."
 qing_xj_needs_integration_tt:0 "The New Dominion's #Y consolidation score#! must reach #Y 85#! — the frontier fully settled."
 qing_xj_integrate_tt:0 "Xinjiang is #G one with the empire#!: the grip is total, #G every frontier burden — the contested bands, the ethnic tension, the unrest — is struck from the ground#!, and the New Dominion is henceforth a #G normal province#! like any interior one. The Ili governorship is absorbed a step further, the realm steadies (#G stability#!) and the court exults (#G ruler popularity#!)."
