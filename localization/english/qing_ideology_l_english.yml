 # qing_ideology_l_english.yml — [#64 2026-07-23] Ideology adoption decision + choice event (Design 3).

 # --- Decision (the button) ---
 qing_embrace_political_creed:0 "Embrace a Political Creed (立教)"
 qing_embrace_political_creed_desc:0 "The old certainties are cracking under the weight of the age. Statesmen and students alike now speak of doctrines that would order the realm not by the Mandate of Heaven but by liberty, by nation, by class. To embrace such a creed is to make it the state's guiding ideology — the court, and in time the people, will follow. It cannot be undone lightly.\n\n#Y Requires the reform crisis to be under way.#!"

 # --- Choice event ---
 qing_ideology.2.t:0 "The Creeds of the Modern Age"
 qing_ideology.2.desc:0 "The doctrines of the West and the reformers of our own halls press upon the throne. Which political religion shall the state make its own?"
 qing_ideology.2.a:0 "Liberalism — liberty and constitutional government (立憲自由)"
 qing_ideology.2.b:0 "Conservatism — the inherited order, reformed gradually (保守)"
 qing_ideology.2.c:0 "Monarchism — the throne as the keystone of order (尊王)"
 qing_ideology.2.d:0 "Nationalism — a people that is a nation (民族主義)"
 qing_ideology.2.e:0 "Socialism — a society ordered for the common good (社會主義)"
 qing_ideology.2.f:0 "Communism — class struggle and the abolition of property (共產主義)"
 qing_ideology.2.g:0 "Hold to the ancestral order — embrace no creed."
