l_english:
 qing_rites.1.t:0 "The Sacrifice to Heaven"
 qing_rites.1.desc:0 "The winter solstice approaches, and with it the most solemn rite of the imperial calendar: the 祭天 (Sacrifice to Heaven) at the Altar of Heaven. The Son of Heaven will renew the Mandate before the assembled court and heaven itself. [ROOT.GetCountry.GetRuler.GetName] turns to [rites_minister.GetName], the Grand Minister of Rites, to conduct the ceremony."
 qing_rites.1.a:0 "Conduct the ceremony with full solemnity."
 qing_rites.1.a.tt:0 "The Mandate is renewed before heaven. Costly, but the throne is affirmed."
 qing_rites.1.b:0 "Observe the rite with reduced ceremony."
 qing_rites.1.b.tt:0 "A less costly observance, but the ritual rings hollow."
 qing_rites.1.c:0 "Neglect the ceremony this year."
 qing_rites.1.c.tt:0 "Save the cost, but the Mandate is questioned."

 qing_rites.2.t:0 "A Tributary Embassy"
 qing_rites.2.desc:0 "An embassy from [tribute_subject.GetName] has arrived at the capital to present tribute and reaffirm its tributary bond. The Grand Minister of Rites, [rites_minister.GetName], will conduct the reception per correct ritual — the 賓禮 (guest protocols) that govern the tributary order. Will the vassal be honoured or slighted?"
 qing_rites.2.desc_no_minister:0 "An embassy from [tribute_subject.GetName] has arrived at the capital to present tribute and reaffirm its tributary bond. But the office of the Grand Minister of Rites stands vacant, and there is no ranking official to conduct the reception per correct ritual — the 賓禮 (guest protocols) that govern the tributary order. The embassy waits, and the throne must decide how to answer it."
 qing_rites.2.a:0 "Receive the embassy with full honours."
 qing_rites.2.a.tt:0 "Correct ritual affirms the tributary order and honours the vassal."
 qing_rites.2.b:0 "Receive with reduced ceremony."
 qing_rites.2.b.tt:0 "Cheaper, but risks slighting the vassal."
 qing_rites.2.c:0 "Decline to receive the embassy."
 qing_rites.2.c.tt:0 "The vassal is deeply offended. Only available if the Rites office is vacant."

 qing_rites.3.t:0 "A Ritual Dispute"
 qing_rites.3.desc:0 "A controversy has arisen over correct ritual precedent, and the Grand Minister of Rites, [rites_minister.GetName], must adjudicate. Uphold the orthodox interpretation and affirm tradition, or bend to pragmatism and ease the way for reform?"
 qing_rites.3.desc_zealous:0 "A controversy has arisen over correct ritual precedent. The Grand Minister of Rites, [rites_minister.GetName], a man of deep zeal, insists that orthodoxy must be upheld — but pragmatists at court whisper that flexibility serves the realm better than rigid adherence to the ancient forms."
 qing_rites.3.a:0 "Uphold orthodoxy."
 qing_rites.3.a.tt:0 "Tradition affirmed, legitimacy strengthened, but reform pressure rises slightly."
 qing_rites.3.b:0 "Bend to pragmatism."
 qing_rites.3.b.tt:0 "Reform pressure eased, but legitimacy falls."

 qing_rites.4.t:0 "The Imperial Ancestral Rite"
 qing_rites.4.desc:0 "An imperial ancestor is to be honoured, or a period of state mourning observed. The Grand Minister of Rites, [rites_minister.GetName], will conduct the 祭祖 (ancestral rites). Correct observance affirms dynastic continuity; neglect shakes the throne."
 qing_rites.4.a:0 "Observe the rite with full ceremony."
 qing_rites.4.a.tt:0 "Dynastic continuity affirmed, piety and legitimacy strengthened."
 qing_rites.4.b:0 "Observe with reduced ceremony."
 qing_rites.4.b.tt:0 "Cheaper, but the rite is less efficacious."
 qing_rites.4.c:0 "Neglect the rite."
 qing_rites.4.c.tt:0 "Save the cost, but legitimacy and tyranny suffer."

 qing_rites_heavenly_mandate_renewed:0 "Heavenly Mandate Renewed"
 qing_rites_ritual_impropriety:0 "Ritual Impropriety"
 opinion_qing_tributary_honoured:0 "Tributary Honoured"
 opinion_qing_tributary_slighted:0 "Tributary Slighted"
 opinion_qing_tributary_spurned:0 "Tributary Spurned"
 qing_rites_pragmatic_adaptation:0 "Pragmatic Adaptation"
 qing_rites_ancestral_piety:0 "Ancestral Piety"
