l_english:

 # qing_nanyang_l_english.yml — [scripted-revolutions] The South Seas Opening (南洋乘機)
 # mission tree + the Asian-colony Napoleonic ripple events (asia_napoleonic.*).

 # ================= MISSION TREE =================
 qing_nanyang_mission:0 "The South Seas Opening (南洋乘機)"

 qing_nanyang_champion:0 "Champion the Nanyang Chinese (護僑南洋)"
 qing_nanyang_champion_tt:0 "Break with the court's disdain for the men who sailed south, and proclaim the Son of Heaven #Y protector of the 華僑#! — a #G maritime forward policy#! (the qing_nanyang_protector modifier). The court takes heart (#G ruler popularity#!)."

 qing_nanyang_lanfang:0 "Consolidate Lanfang (固蘭芳)"
 qing_nanyang_lanfang_tt:0 "Raise the #Y Lanfang Kongsi (蘭芳公司)#! from its loose nominal vassalage to a #G firm tributary under the wing#! — the Hakka gold-mining republic of West Borneo made a true Qing dependency."
 qing_nanyang_needs_lanfang_tt:0 "The #Y Lanfang Kongsi (蘭芳)#! must exist on the map."

 qing_nanyang_borneo:0 "Secure West Borneo (據坤甸)"
 qing_nanyang_borneo_tt:0 "Hold the gold coast of West Borneo — #Y Pontianak (坤甸, province 2604)#!, the Lanfang seat — so the Chinese republic rests on secured ground. A #G claim#! is laid if the Qing does not yet own it."
 qing_nanyang_needs_borneo_tt:0 "The #Y Lanfang seat at Pontianak (2604)#! must be #Y held by the Qing#! OR owned by the #Y Lanfang tributary#!."

 qing_nanyang_sulu:0 "The Sulu Embrace (撫蘇祿)"
 qing_nanyang_sulu_tt:0 "Take the #Y Sultanate of Sulu (蘇祿)#! firmly under the wing as a tributary — reviving and deepening the tribute Sulu rendered Peking in the 1720s-30s, now that Manila is cut off from Spain. The pivot of the southern archipelago trade."
 qing_nanyang_needs_sulu_tt:0 "The #Y Sultanate of Sulu (蘇祿)#! must exist on the map."

 qing_nanyang_severed:0 "Strike the Severed Colony (乘虛擊夷)"
 qing_nanyang_severed_tt:0 "Press the cut-off European colony while it is soft: take and hold #Y Batavia (巴達維亞, 6270)#! of the Dutch East Indies OR #Y Manila (馬尼拉, 2004)#! of the Spanish Philippines. A #G claim#! is laid on the port the Qing holds."
 qing_nanyang_needs_severed_tt:0 "The Qing must #Y control Batavia (6270)#! OR #Y Manila (2004)#! — a key archipelago port wrested from a metropole cut off by the wars in Europe."

 qing_nanyang_capstone:0 "Master of the South Seas (南洋乘機)"
 qing_nanyang_capstone_tt:0 "Lanfang secured under the wing, the Nanyang Chinese championed, and a severed colony broken — the Son of Heaven the #G paramount power of the South Seas#! (the lasting qing_nanyang_hegemony dominion), seized in Europe's hour of distraction. The maritime powers take note."
 qing_nanyang_needs_hegemony_tt:0 "#Y Lanfang under the wing#! (a tributary or absorbed) AND #Y a key archipelago port held#! (Pontianak 2604, Batavia 6270, or Manila 2004)."

 # modifiers
 qing_nanyang_protector:0 "Protector of the Nanyang Chinese (護僑)"
 qing_nanyang_protector_desc:0 "The Son of Heaven has broken with the old disdain for the overseas Chinese and taken the 華僑 of the South Seas under his protection — a maritime forward policy that quickens trade and lifts the empire's standing among the sea-powers."
 qing_nanyang_hegemony:0 "Master of the South Seas (南洋霸權)"
 qing_nanyang_hegemony_desc:0 "The Qing is the paramount power of the Nanyang: Lanfang and the southern sultanates under the wing, the Chinese communities championed, and the cut-off colonies of a distracted Europe broken or overawed. The South Seas answer to Peking."

 # ================= RIPPLE EVENTS (asia_napoleonic.*) =================
 asia_napoleonic.1.t:0 "The Batavian Republic"
 asia_napoleonic.1.desc:0 "News comes by the monsoon traders: the French have overrun the Dutch Republic, and a puppet Batavian Republic now sits in Amsterdam. The Stadtholder has fled to England, and the Dutch East Indies — Batavia, the Spice Islands, the Borneo coast — are severed from a homeland that is now a satellite of France. The Company that ruled them is bankrupt and dissolving. Out in the Nanyang, the Dutch governors hold on alone, and no fleet will come from Europe to relieve them. It is an opening such as the South Seas have not offered in a hundred years."
 asia_napoleonic.1.a:0 "The Indies lie open. Let the court consider the South Seas."
 asia_napoleonic.1.b:0 "So the barbarians devour one another. Noted."

 asia_napoleonic.2.t:0 "Manila Cut Off"
 asia_napoleonic.2.desc:0 "The tyrant Bonaparte has seized the throne of Spain for his brother, and the Spanish nation has risen in a war for its own soil. Half a world away, the Philippines — always dependent on the yearly galleon and the will of Madrid — are left to shift for themselves, their governors cut off from a mother country that cannot hold its own capital. Manila is isolated, its garrison thin, its treasury starved."
 asia_napoleonic.2.a:0 "Manila is friendless. The moment may be seized."
 asia_napoleonic.2.b:0 "The affairs of distant barbarians. Noted."

 asia_napoleonic.3.t:0 "The Orient Threatened"
 asia_napoleonic.3.desc:0 "The reports from the western ocean are grave for the English Company. Bonaparte has landed an army in Egypt, declaring his aim to sever the road to India; and in the south of the subcontinent, the Tiger of Mysore, Tipu Sultan, has planted a Jacobin club at his capital and writes to Revolutionary France for aid against the Company. The English are stretched to the limit, fighting for their lives in Hindustan. The Company that presses upon the China trade is, for once, upon the defensive."
 asia_napoleonic.3.a:0 "The Company is overstretched. India is not beyond reach."
 asia_napoleonic.3.b:0 "Let the sea-barbarians bleed in the west. Noted."

 asia_napoleonic.4.t:0 "The Europeans Return"
 asia_napoleonic.4.desc:0 "The long wars in Europe are over; the tyrant is beaten and caged, and the powers have made their peace at Vienna. Now they turn back to the East. The English hand Java to a restored Netherlands; the Company resumes its advance across India; and Spain reasserts her grip on Manila. The window that the wars flung open in the South Seas is closing. What the empire seized in that hour it may keep — but the chance to seize more is passing."
 asia_napoleonic.4.a:0 "The moment has passed. Let us hold what we have taken."
 asia_napoleonic.4.b:0 "The barbarians return to their possessions. Noted."

 asia_napoleonic.5.t:0 "The Tsar Turns West"
 asia_napoleonic.5.desc:0 "Word comes overland from Kyakhta: the Corsican has invaded Russia with the greatest army the West has ever fielded, and the Tsar has thrown every man and every rouble into the fight for Moscow. The Russian Far East — never more than a scattering of Cossack forts and exiles across five thousand versts of frozen taiga — is stripped barer than ever. The Amur, that the Romanovs took from us at Nerchinsk a century and more ago, lies all but undefended. If the empire has the will, the northern rivers are open as they have not been in living memory."
 asia_napoleonic.5.a:0 "The north lies open. Let the banners look to the Amur."
 asia_napoleonic.5.b:0 "The Russians bleed in the west. Noted."

 # ================= COLONY MODIFIERS =================
 asia_colony_cut_off:0 "Cut Off from the Metropole"
 asia_colony_cut_off_desc:0 "The wars in Europe have severed this colony from its mother country. No reinforcement, no orders, no relieving fleet — the governors hold on alone, their garrisons thin and their treasuries starved. A lasting weakness while the wars last."
 asia_company_overstretched:0 "The Company Overstretched"
 asia_company_overstretched_desc:0 "The East India Company is stretched to its limit — Bonaparte threatening the road to India, and Mysore in arms and courting France. For a season, the Company that presses on the China trade is itself on the defensive."
 asia_russia_pinned_west:0 "Pinned in the West"
 asia_russia_pinned_west_desc:0 "Russia has thrown everything into the war against Napoleon. Her Far East — always thin — is stripped of men and attention, the Amur frontier all but undefended while the Tsar fights for his life in the west."

 # ================= HISTORICAL-CHOICE EVENTS (qing_nanyang.*) =================
 qing_nanyang.1.t:0 "The Chinese King of Siam (暹羅華王)"
 qing_nanyang.1.desc:0 "Word comes from Canton of a marvel in the south. The kingdom of Siam, shattered by the Burmans, has been reconquered and reunited by a general who now sits its throne at Thonburi — and this King Taksin is no Thai at all, but the son of a Teochew tax-farmer of Chenghai in Guangdong, a son of the Middle Kingdom raised up among the barbarians. He sends tribute and begs the Son of Heaven's recognition, and the Teochew merchant-houses of the south, who grow rich on his trade, press his case at court. The Grand Council is divided: is he a loyal son to be embraced, or a low-born usurper unfit for the Emperor's notice?"
 qing_nanyang.1.a:0 "A son of the Middle Kingdom on a southern throne — embrace him warmly."
 qing_nanyang.1.b:0 "Recognise him coolly, as we would any tributary king. No special tie."
 qing_nanyang.1.c:0 "A base-born usurper. The throne withholds its recognition."

 qing_nanyang.2.t:0 "The Vietnam Intervention (安南之役)"
 qing_nanyang.2.desc:0 "Annam is in flames. The brothers of Tây Sơn have overthrown the ancient house of Lê, and the boy-king Lê Chiêu Thống has fled north to throw himself upon the mercy of the Son of Heaven, begging an army to restore him to the throne of his fathers. The Governor-General of Liangguang urges intervention — a swift campaign to plant the Qing banner over Thăng Long and set a grateful vassal upon the Annamese throne. But the south is a country of fevers and narrow defiles, and the Tây Sơn general Nguyễn Huệ is a soldier of terrible reputation. The court awaits the Emperor's word."
 qing_nanyang.2.b.tt:0 "March south to restore the Lê (the historical intervention). Take Thăng Long — then suffer the Tây Sơn's New-Year counterstroke at Ngọc Hồi. Costly in #R men, war-exhaustion, prestige, and silver#!, but a #G tributary tie#! with the Annamese throne is patched up afterward."
 qing_nanyang.2.c.tt:0 "Send a winter-ready host and prosecute the war in earnest — no New-Year surprise. The throne #G prevails#! and takes both the northern theatre (Tonkin) and Annam #G under the wing#!, but at #R heavy cost in men, war-exhaustion, and silver#!."
 qing_nanyang.2.a:0 "Refuse. Annam is a graveyard of armies; spare the realm the disaster."
 qing_nanyang.2.b:0 "The historical intervention: restore the Lê, and take what comes."
 qing_nanyang.2.c:0 "Commit decisively — a winter-ready host that will not be caught off guard."

 qing_nanyang.3.t:0 "The Lanfang Succession (蘭芳承統)"
 qing_nanyang.3.desc:0 "From the gold coast of West Borneo comes news of a death: Luo Fangbo, the Hakka miner from Guangdong who founded the Lanfang Kongsi — that strange republic of Chinese gold-diggers who elect their own headman and govern themselves half a world from home — has died, and his elected successors look to Peking for recognition and protection. The Dutch press ever harder upon the Nanyang Chinese; a word from the Son of Heaven would hearten the kongsi and bind it to the throne. Or the court may hold, as it always has, that those who sail beyond the seas have forfeited the Emperor's care."
 qing_nanyang.3.a:0 "Affirm the tie: raise Lanfang to a firm tributary under the wing."
 qing_nanyang.3.b:0 "Keep the loose trade tie — recognition, but no entanglement."
 qing_nanyang.3.c:0 "Turn away. Those who sailed south are no concern of the throne."

 qing_nanyang.4.t:0 "Avenge the Hongxi Massacre (紅溪之恨)"
 qing_nanyang.4.desc:0 "The Dutch Company that lords it over Batavia is bankrupt and dissolving, its rule passing to a homeland cut off by the wars in Europe — and an old wound throbs afresh at court. Two generations past, in the year of the Red River, the Dutch of Batavia fell upon the Chinese of the city and butchered them in their thousands, damming the Angke canal with the bodies of the Son of Heaven's children. The court did nothing then, holding that they had forfeited its care by sailing south. Now the Dutch are weak. Shall the throne at last take up the cause of the Nanyang Chinese?"
 qing_nanyang.4.a:0 "Break with the old disdain: protest, and stand as protector of the 華僑."
 qing_nanyang.4.b:0 "Squeeze the Dutch at Canton — an embargo to make them feel the throne's displeasure."
 qing_nanyang.4.c:0 "Let it lie. The court has never troubled itself for the men who sailed away."

 qing_nanyang.5.t:0 "The Matter of Penang (檳城之議)"
 qing_nanyang.5.desc:0 "An English captain named Light has planted a trading post upon the island of Penang, off the coast of Kedah in the Malay peninsula — leased, he claims, from the Sultan, who is a tributary within the Siamese sphere the Great Throne has long recognised. A free port of the English, set at the very mouth of the Straits through which all the southern trade must pass. It is a small thing now; but the Grand Council's shrewder heads see in it the thin edge of a wedge, the first English foothold on the road between India and the China seas."
 qing_nanyang.5.a:0 "Lean on the Siamese tributary to disown the lease — check the English early."
 qing_nanyang.5.b:0 "Charter a rival Qing-backed free port for the kongsi traders."
 qing_nanyang.5.c:0 "Let it pass. One barbarian island is no concern of the throne."
