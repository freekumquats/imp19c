l_english:

 # gbr_empire_l_english.yml — GBR 1763-1815 arc (#283).

 # --- .1 The Stamp Act ---
 gbr_empire.1.t:0 "The Stamp Act"
 gbr_empire.1.desc:0 "Flush with victory over France, Parliament moves to tax the American colonies directly to pay for their defence. The cry goes up across the Atlantic: no taxation without representation. What seems a trifle in Westminster is an outrage in Boston."
 gbr_empire.1.a:0 "Press the tax — the colonies must pay their share."
 gbr_empire.1.b:0 "Repeal it — do not provoke the colonies."

 # --- .2 The American War ---
 gbr_empire.2.t:0 "The American War"
 gbr_empire.2.desc:0 "The shots at Lexington and Concord open a war within the Empire itself. The thirteen colonies take up arms, and Britain must fight to hold the greatest jewel of her new-won dominion."
 gbr_empire.2.a:0 "Send the redcoats — crush the rebellion."

 # --- .3 The Loss of America ---
 gbr_empire.3.t:0 "The Loss of America"
 gbr_empire.3.desc:0 "Cornwallis has surrendered at Yorktown, and at Paris Britain acknowledges the independence of the United States. The thirteen colonies are gone — but the Empire turns its gaze east, to India and the wider world."
 gbr_empire.3.a:0 "Turn to the East — India will replace America."

 # --- .4 The Act of Union ---
 gbr_empire.4.t:0 "The Act of Union"
 gbr_empire.4.desc:0 "The Kingdoms of Great Britain and Ireland are merged into a single United Kingdom, one crown and one Parliament from Land's End to the north of Ireland."
 gbr_empire.4.a:0 "God save the United Kingdom."

 # --- .5 Trafalgar ---
 gbr_empire.5.t:0 "Trafalgar"
 gbr_empire.5.desc:0 "Off Cape Trafalgar, Nelson's fleet annihilates the combined navies of France and Spain. Nelson falls in the hour of victory, but Britain now rules the waves unchallenged, and no invasion can touch her shores."
 gbr_empire.5.a:0 "Britannia rules the waves."

 # --- .6 Waterloo ---
 gbr_empire.6.t:0 "Waterloo"
 gbr_empire.6.desc:0 "On the field of Waterloo, Wellington and Blucher break the last army of Napoleon. The long wars are over, and Britain stands among the arbiters of Europe at the Congress of Vienna, mistress of the seas and the greatest power on earth."
 gbr_empire.6.a:0 "The tyrant is beaten. Let there be peace."

 # --- .7 The Proclamation of 1763 ---
 gbr_empire.7.t:0 "The Proclamation of 1763"
 gbr_empire.7.desc:0 "New France is conquered, and a continent lies open — yet the King's ministers draw a line along the crest of the Appalachians and forbid the colonists to cross it, reserving the western lands to the Crown and the natives. The men who bled to win that country in the late war are told they may not settle it. The first murmur of grievance rises in the seaboard towns."
 gbr_empire.7.a:0 "Hold the line — the west is the Crown's to govern."
 gbr_empire.7.b:0 "Let the settlers pass — do not vex the colonies."

 # --- .8 The Townshend Acts ---
 gbr_empire.8.t:0 "The Townshend Acts"
 gbr_empire.8.desc:0 "Fresh duties are laid on glass, lead, paint, paper and tea, and a board of customs commissioners is planted in Boston with writs of assistance to search where they please. The colonists answer with non-importation and a boycott of British goods; the quarrel that began over a stamp now hardens into a movement."
 gbr_empire.8.a:0 "Station regiments in Boston to enforce the law."
 gbr_empire.8.b:0 "Repeal all but the tea duty, and keep the principle."

 # --- .9 The Boston Tea Party ---
 gbr_empire.9.t:0 "The Boston Tea Party"
 gbr_empire.9.desc:0 "To rescue the East India Company, Parliament grants it a monopoly on the colonial tea trade. In answer, men of Boston disguised as Mohawks board the Company's ships and heave three hundred chests into the harbour. Westminster is incensed: such defiance cannot go unpunished."
 gbr_empire.9.a:0 "The Coercive Acts — close the port, break the charter."
 gbr_empire.9.b:0 "Seek conciliation before it comes to blows."

 # --- .10 The First Continental Congress ---
 gbr_empire.10.t:0 "The First Continental Congress"
 gbr_empire.10.desc:0 "The punishment of Massachusetts has done what no agitator could: twelve colonies send delegates to Philadelphia, endorse the Suffolk Resolves, bind themselves to a Continental Association of total boycott, and petition the King as one body. The colonies that London ruled as thirteen separate provinces now speak with a single voice."
 gbr_empire.10.a:0 "Declare Massachusetts in a state of rebellion."

 # --- .11 Saratoga ---
 gbr_empire.11.t:0 "The Convention of Saratoga"
 gbr_empire.11.desc:0 "General Burgoyne's whole army has laid down its arms at Saratoga, trapped in the northern woods. The disaster echoes across the Atlantic: at Versailles, the Comte de Vergennes judges that the Americans can win, and France signs a treaty of alliance with the rebel Congress. What was a colonial rebellion is now a war against the House of Bourbon — and Britain must fight it alone, without a friend in Europe."
 gbr_empire.11.a:0 "So be it — Britain will fight the Bourbons too."

 # --- .12 Yorktown ---
 gbr_empire.12.t:0 "Yorktown"
 gbr_empire.12.desc:0 "Penned against the York River by Washington and Rochambeau on land and cut off from the sea by de Grasse's fleet at the Capes, Lord Cornwallis surrenders his army. When the news reaches London, Lord North receives it as he would a ball in the breast, crying again and again, 'Oh God, it is all over.' The war for America cannot be won."
 gbr_empire.12.a:0 "Open negotiations — the colonies are lost."
