l_english:
 # ============================================================
 # [#365] Ministry of Personnel panel — the personnel bureaucracy (gui/qing_personnel.gui).
 # A Grand-Council-clone dashboard: the Grand Minister of Personnel, his ministry-performance
 # meter (which folds into his Grand Council standing), and the governor corps (the provincial
 # officialdom) as a central roster with per-governor cultivate/discipline + the 大計 review.
 # ============================================================
 QING_PERSONNEL_OPEN_BTN:0 "Ministry of Personnel (吏部)"
 QING_PERSONNEL_OPEN_TT:0 "Open the #Y Ministry of Personnel#! (吏部) dashboard.\n\nReview the #Y Grand Minister of Personnel#!, the #Y governor corps#! (the provincial officialdom), convene the triennial #Y 大計#! (Great Reckoning), and cultivate or discipline individual governors. The integrity of the officialdom folds into the Minister's standing on the #Y Grand Council#!."
 QING_PERSONNEL_PANEL_TITLE:0 "The Ministry of Personnel"
 QING_PERSONNEL_PANEL_DESC:0 "The #Y Grand Minister of Personnel#! (吏部尚書) answered for the whole provincial officialdom — the appointment, evaluation (考課), and triennial reckoning (大計) of the #Y governor corps#!. A clean, capable corps upheld the realm; the sale of offices (捐納) and a rotten officialdom were the Board's signature failure. A strong Board raises the Minister's standing on the #Y Grand Council#!."
 QING_PERSONNEL_MINISTER_TITLE:0 "Grand Minister of Personnel"
 QING_PERSONNEL_VACANT:0 "#R No Grand Minister of Personnel sits.#! The office stands vacant and the governorate drifts without oversight — appoint a Minister of Personnel from the #Y Grand Council#! to restore the reckoning."
 QING_PERSONNEL_PERF_LABEL:0 "Board performance"
 QING_PERSONNEL_PERF_TT:0 "The #Y Minister's ministry performance#! (0–100, 50 neutral): his #Y finesse#! and the #Y integrity of the governor corps#! (how much of the officialdom is clean rather than corrupt).\n\nThis folds directly into his standing on the #Y Grand Council#! — a rotten or headless officialdom drags the whole council down."
 QING_PERSONNEL_INTEGRITY_LABEL:0 "Governor corps (clean / total)"
 QING_PERSONNEL_INTEGRITY_TT:0 "The number of #Y clean governors#! (neither corrupt-trait nor corruption ≥ 40) against the whole corps. A cleaner officialdom means a stronger Minister on the #Y Grand Council#!; convene the 大計 or discipline venal governors to purge the rot."
 QING_PERSONNEL_ADMIN_TITLE:0 "The Minister's Levers"
 QING_PERSONNEL_DAJI_BTN:0 "Convene the 大計 (Great Reckoning)"
 QING_PERSONNEL_DAJI_BTN_TT:0 "Convene the triennial #Y 大計#! (Great Reckoning) — a realm-wide review of the whole governor corps: able governors are rewarded, venal ones cashiered, the outcome scaled by the Minister's finesse. #Y Available roughly once every three years#! (shared cooldown with the flavour event); requires governors to review."
 QING_PERSONNEL_ROSTER_TITLE:0 "The Governor Corps (督撫)"
 QING_PERSONNEL_ROSTER_EMPTY:0 "#I No governors serve. The provinces are ruled directly — there is no corps for the Board to evaluate.#!"
 QING_PERSONNEL_CULTIVATE_BTN:0 "Cultivate"
 QING_PERSONNEL_CULTIVATE_TT:0 "Cultivate (培養) this governor — a capable Minister (finesse ≥ 9) rewards an able official, raising his #Y loyalty#! and standing. Once per year per governor."
 QING_PERSONNEL_DISCIPLINE_BTN:0 "Discipline"
 QING_PERSONNEL_DISCIPLINE_TT:0 "Discipline (懲處) this governor — the Board cashiers a #Y venal or disloyal#! official (corrupt, corruption ≥ 40, or loyalty < 40), cutting his loyalty and standing. Once per year per governor."
 QING_PERSONNEL_COUNCIL_CONTRIB_LABEL:0 "The Ministry of Personnel's net effect on the Grand Council"
