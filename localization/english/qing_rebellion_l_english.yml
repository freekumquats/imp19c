l_english:

 # ====================================================================
 # THE ANACHRONISTIC REBELLION ROSTER (qing_rebellion_events.txt). Task #14.
 # The great risings of the long Qing crisis, offered keyed to mechanic
 # context rather than to their historical dates. Four thematic flavours:
 # sectarian (White Lotus, Eight Trigrams), theocratic (Taiping), ethnic-
 # communal (Panthay, Dungan, Miao), restorationist secret-society (Red
 # Turban, Nian), plus the two late outliers (Boxers, Xinhai).
 # Sources: Kuhn, Rebellion and Its Enemies; Naquin, Millenarian Rebellion;
 # Spence, God's Chinese Son; Perry, Rebels and Revolutionaries; Atwill, The
 # Chinese Sultanate; Hodong Kim, Holy War in China; Wakeman, Strangers at
 # the Gate; Jenks, Insurgency in Guizhou; Esherick, Origins of the Boxer
 # Uprising; Cambridge History of China vols. 10-11.
 # ====================================================================

 # ---- .1  白蓮教 WHITE LOTUS ----------------------------------------
 qing_rebellion.1.t:0 "The White Lotus Rises"
 qing_rebellion.1.desc:0 "From the poor, half-settled highlands where Hubei, Sichuan and Shaanxi meet comes the smoke of a great burning. The White Lotus (白蓮教) has risen — a folk-Buddhist sect that worships the Eternal Venerable Mother (無生老母) and awaits the descent of the Maitreya Buddha (彌勒) to end a corrupt age and begin a golden one. Tax exactions and the squeeze of corrupt clerks have turned prophecy into an army.\n\nHistory would remember this as the war that ended the High Qing: a decade of ruin (1794-1804), a hundred million taels poured out, and the humiliating discovery that the hereditary banner and Green Standard armies could no longer fight. Its fiercest field commander was a young widow, Wang Cong'er (王聰兒), who leapt to her death from a cliff rather than be taken. The rot the sect fed on was real; so is the danger."
 qing_rebellion.1.a:0 "Fortify the hamlets and clear the countryside (堅壁清野)."
 qing_rebellion.1.a.tt:0 "The strategy that historically won the war. #R Costs £80#!: #G the rising is broken, sect pressure falls sharply, +1 Stability#!."
 qing_rebellion.1.b:0 "Raise gentry militia (鄉勇) to do what the banners cannot."
 qing_rebellion.1.b.tt:0 "Cheaper and effective: #G +3 Manpower, ease the sects#! — but leaning on local militia #R shames the banners into deeper decay#!."
 qing_rebellion.1.c:0 "Trust to the hereditary armies."
 qing_rebellion.1.c.tt:0 "The banners are not what they were: #R +2 War Exhaustion#! and the failure #R breeds fresh corruption#! as the war drags on."

 # ---- .2  天理教 EIGHT TRIGRAMS -------------------------------------
 qing_rebellion.2.t:0 "The Eight Trigrams Strike the Palace"
 qing_rebellion.2.desc:0 "A White Lotus offshoot, the Eight Trigrams sect (八卦教) of the Heavenly Principle (天理教), has done the unthinkable: timing their rising to a millenarian prophecy, some two hundred sectarians — let in by sympathetic palace eunuchs — forced the very gates of the Forbidden City. Their coordinator Lin Qing (林清) had planned a decapitation strike at the throne itself, while Li Wencheng (李文成) rose in Henan.\n\nHistorically (1813) the attack failed within the palace walls — the future Daoguang Emperor is said to have shot two of the attackers with a fowling piece — and an arrowhead was left lodged in the plaque of the Longzongmen gate (隆宗門) as a permanent reminder of how close the knife had come. That a sect could reach the throne's own courtyards is a wound to the Mandate itself."
 qing_rebellion.2.a:0 "Purge the palace and crush the sect (凌遲 for its leaders)."
 qing_rebellion.2.a.tt:0 "Root out the infiltration by terror: #G ease the sects, +1 Stability#!, at the price of #R +3 Tyranny#!."
 qing_rebellion.2.b:0 "Turn the failed strike into a lesson; harden the guard."
 qing_rebellion.2.b.tt:0 "Reform the palace watch: #G the banner guard is tightened (banner decay falls) and the throne's prestige recovers (+legitimacy)#!."

 # ---- .3  太平天國 TAIPING ------------------------------------------
 qing_rebellion.3.t:0 "The Taiping Heavenly Kingdom"
 qing_rebellion.3.desc:0 "It has come. From Guangxi, the God-Worshipping Society (拜上帝會) of Hong Xiuquan (洪秀全) — the failed scholar who believes himself the younger brother of Jesus Christ — has swelled into a marching kingdom. They call it the Heavenly Kingdom of Great Peace (太平天國): iconoclasts who smash the Confucian and Buddhist idols, who ban opium and foot-binding, who share out the land as 'God's fields', and who name the Manchus demons to be swept from the earth.\n\nHistory would make this the deadliest civil war in human history — twenty million dead or more — with Nanjing taken as the Heavenly Capital (天京) and the empire cloven in two. It was broken at last not by the banners but by the Han gentry armies of Zeng Guofan (曾國藩) and Li Hongzhang (李鴻章), with a foreign-officered Ever-Victorious Army (常勝軍) holding the coast. This is not a bandit swarm; it is a rival civilisation contesting the Mandate."
 qing_rebellion.3.a:0 "Loose the Han gentry armies (曾國藩・李鴻章)."
 qing_rebellion.3.a.tt:0 "The historical salvation of the dynasty. #R Costs £120#!: #G the Taiping are broken, sect pressure collapses, +1 Stability#! — but the provincial armies that save the throne #R empower the Han elite and hollow the banners#!."
 qing_rebellion.3.b:0 "Take Western help against the God Worshippers (常勝軍)."
 qing_rebellion.3.b.tt:0 "Hire the foreign drillmasters: #G the rising is broken and Self-Strengthening advances#! as the throne learns the Western art of war."
 qing_rebellion.3.c:0 "Come to terms with the Heavenly Kingdom — the unthinkable road."
 qing_rebellion.3.c.tt:0 "Open a channel to the movement rather than fight it to the death. #G Ease the immediate sects#! and #Y set out on the Christian path#! (toward the theocracy end-state), at the cost of #R rising reform pressure#!."

 # ---- .4  捻軍 NIAN -------------------------------------------------
 qing_rebellion.4.t:0 "The Nian Horsemen"
 qing_rebellion.4.desc:0 "Across the North China Plain and the Huai River basin, the Nian (捻軍) have risen — not a sect and not a kingdom, but a swarm of mounted bands sprung from salt-smuggling, famine, and the catastrophe of the Yellow River's change of course. From their fortified earth-wall hamlets (圩寨) they ride fast and scatter faster, and a village that flew the Qing flag yesterday shelters the rebels today.\n\nHistorically (1851-1868) their cavalry ran rings around the imperial forces; the great Mongol prince Senggerinchin (僧格林沁) — the last of the banner paladins — was lured into an ambush and killed. They were subdued only when Zeng Guofan and Li Hongzhang stopped chasing and started walling: penning the horsemen behind blockade lines along the rivers and canals until they starved."
 qing_rebellion.4.a:0 "Wall off the rivers and canals; pen in the horsemen."
 qing_rebellion.4.a.tt:0 "The blockade strategy that historically worked. #R Costs £90#!: #G the Nian are contained, +2 Manpower, +1 Stability#!."
 qing_rebellion.4.b:0 "Send the banner cavalry to run them down."
 qing_rebellion.4.b.tt:0 "Senggerinchin's fate awaits: #R +3 War Exhaustion and deeper banner decay#! as the cavalry is worn out, though the pressure eases a little."

 # ---- .5  回變 PANTHAY ----------------------------------------------
 qing_rebellion.5.t:0 "The Sultanate of Dali"
 qing_rebellion.5.desc:0 "In Yunnan, a generation of Han-Hui feuding over the mines has exploded into war. After officials sided with Han settlers in a massacre of Muslims, the Hui rose under Du Wenxiu (杜文秀), who took the title Sultan Sulayman and made the ancient city of Dali (大理) the capital of a Pacified Southern State (平南國).\n\nHistorically (1856-1873) this Panthay Rebellion held the southwest for seventeen years and even sent an embassy to Britain, through Burma, seeking recognition and arms. It was crushed at last by the provincial commander Cen Yuying (岑毓英); Du swallowed opium before his capture so as to be already dying when he was taken and beheaded. It is the empire's internal frontier tearing along its ethnic seam."
 qing_rebellion.5.a:0 "Crush the Dali sultanate by force."
 qing_rebellion.5.a.tt:0 "The historical suppression. #R Costs £80#!: the rising is broken, but mass reprisals #R deepen ethnic tension#! and cost #R +4 Tyranny#!."
 qing_rebellion.5.b:0 "Conciliate the Hui; restore the communal balance."
 qing_rebellion.5.b.tt:0 "Address the grievance rather than the symptom: #G ethnic tension falls sharply, +1 Stability#! and the frontier is calmed."

 # ---- .6  陝甘回變 DUNGAN + YAQUB BEG --------------------------------
 qing_rebellion.6.t:0 "The Northwest Aflame"
 qing_rebellion.6.desc:0 "The whole northwest has risen. Hui Muslim grievance, sharpened by Sufi factional strife, has set Shaanxi and Gansu ablaze; Ma Hualong (馬化龍) holds the fortress-town of Jinjipu (金積堡), and beyond the passes a Kokandi adventurer, Yaqub Beg (阿古柏), has carved an emirate out of Kashgar and is juggling British, Russian and Ottoman recognition. Xinjiang is slipping from the empire's hand.\n\nHistorically (1862-1877) the reconquest fell to the indomitable Zuo Zongtang (左宗棠), who advanced slowly and struck surely — feeding his army from military farm-colonies and planting lines of willows along the desert road that are called 'Zuo's willows' (左公柳) to this day. He reduced the fortresses, retook Xinjiang, and had it made a full province. It was the most expensive campaign of the age, and the empire's western half hung on it."
 qing_rebellion.6.a:0 "Advance slowly, strike surely (Zuo Zongtang's reconquest)."
 qing_rebellion.6.a.tt:0 "The great reconquest of the northwest. #R Costs £130#!: #G ethnic tension eases, +3 Manpower, +2 Stability#! and the frontier is held."
 qing_rebellion.6.b:0 "Treat with Yaqub Beg; let the far west go for now."
 qing_rebellion.6.b.tt:0 "Cut losses in the desert: #G ethnic tension eases a little#!, but surrendering the frontier #R -1 Stability and feeds the reform crisis#!."

 # ---- .7  紅巾 RED TURBAN -------------------------------------------
 qing_rebellion.7.t:0 "The Red Turbans of Canton"
 qing_rebellion.7.desc:0 "In the Pearl River delta the secret societies have thrown off their secrecy. Triad brotherhoods of the Heaven and Earth Society (天地會), emboldened by the Taiping, have raised the old cry — 'Overthrow the Qing, restore the Ming' (反清復明) — bound their heads in red, and laid siege to Canton itself. Among their chiefs is Li Wenmao (李文茂), a Cantonese-opera actor who leads a corps of fellow performers into battle.\n\nHistorically (1854-1856) the siege failed and the governor-general Ye Mingchen (葉名琛) drowned the rising in blood, with the Canton execution-ground running red; the survivors fled west to found the short-lived Dacheng Guo (大成國) in Guangxi. It is not a faith and not a kingdom but a sworn-brotherhood insurrection — opportunistic, anti-Manchu, and rooted in the lodges that honeycomb the south."
 qing_rebellion.7.a:0 "Answer as Ye Mingchen did: mass reprisals around Canton."
 qing_rebellion.7.a.tt:0 "Terror breaks the rising: #G ease the sects, +1 Stability#!, at the price of #R +5 Tyranny#!."
 qing_rebellion.7.b:0 "Root out the lodges patiently; break the secret societies."
 qing_rebellion.7.b.tt:0 "The slower, surer cure. #R Costs £70#!: #G the sects ease sharply and corruption is cut#! as the brotherhoods' grip is prised loose."

 # ---- .8  苗變 MIAO -------------------------------------------------
 qing_rebellion.8.t:0 "The Miao of Guizhou Rise"
 qing_rebellion.8.desc:0 "As the empire's grip loosens in the Taiping years, the mountains of Guizhou have risen. The Miao (苗) under Zhang Xiumei (張秀眉), long aggrieved by Han land-grabbing, taxes and official abuse, have taken up arms — and around them a whole cluster of revolts, Han 'Flag' militias (號軍) and local Muslim risings, feeds the fire.\n\nHistorically (1854-1873) this second great Miao rebellion of the dynasty raged for two decades and depopulated much of the province before Hunan-model gentry armies under Xi Baotian (席寶田) ground it down; Zhang Xiumei was paraded and beheaded at Changsha in 1872. It is a recurring frontier fault line — the empire's minority marches tearing loose whenever the centre weakens."
 qing_rebellion.8.a:0 "Send gentry armies on the Hunan model (Xi Baotian)."
 qing_rebellion.8.a.tt:0 "Grind the rising down. #R Costs £90#!: the revolt is broken and #G +2 Manpower#!, though the suppression #R stokes ethnic tension#!."
 qing_rebellion.8.b:0 "Redress the land grievances; curb Han encroachment."
 qing_rebellion.8.b.tt:0 "Treat the cause: #G ethnic tension falls sharply, +1 Stability#! and the mountains are quieted."

 # ---- .9  義和團 BOXERS ---------------------------------------------
 qing_rebellion.9.t:0 "The Boxers United in Righteousness"
 qing_rebellion.9.desc:0 "Out of drought-stricken Shandong spreads a strange and furious movement: the Boxers United in Righteousness (義和團), young men who practise spirit-possession rites they believe make them proof against foreign bullets, and who raise the cry 'Support the Qing, destroy the foreign' (扶清滅洋). Unlike every other rising, this one is not against the throne but for it — its rage is aimed at the missionaries, the converts, and the railways of the encroaching West.\n\nHistorically (1899-1901) the court itself embraced them, and Boxers and imperial troops besieged the foreign Legation Quarter in Beijing for fifty-five days. It ended in catastrophe: the Eight-Nation Alliance (八國聯軍) stormed the capital, the court fled, and the Boxer Protocol (辛丑條約) imposed a ruinous indemnity. The southern viceroys, tellingly, signed a Mutual Protection of the Southeast (東南互保) and refused to fight at all. Here is a sword that cuts whichever way it is grasped."
 qing_rebellion.9.a:0 "Ride the fury: turn the Boxers on the foreigners (扶清滅洋)."
 qing_rebellion.9.a.tt:0 "A disastrous gamble. #G +4 Manpower#! from the fervour — but the powers answer in force: #R heavy currency stress (the indemnity), rising reform pressure, +4 War Exhaustion#!."
 qing_rebellion.9.b:0 "Suppress the Boxers and treat with the powers."
 qing_rebellion.9.b.tt:0 "The prudent course: #G ease the sects, +1 Stability#! at the cost of #R +3 Tyranny#! as the throne turns on its own zealots."
 qing_rebellion.9.c:0 "Let the southern viceroys sit it out (東南互保)."
 qing_rebellion.9.c.tt:0 "The realm holds together — but the throne's writ visibly frays: #R -1 Stability and rising reform pressure#! as the provinces go their own way."

 # ---- .10 辛亥 XINHAI / WUCHANG -------------------------------------
 qing_rebellion.10.t:0 "The Wuchang Uprising"
 qing_rebellion.10.desc:0 "The New Army has mutinied at Wuchang. What began with an accidental bomb-blast that exposed a revolutionary plot has become the thing the dynasty has dreaded above all: a modern, nationalist, republican revolution. The Tongmenghui (同盟會) cells and the reformed soldiery proclaim the end not of a reign but of the monarchy itself; province after province declares its independence, and the name on every placard is Sun Yat-sen (孫中山).\n\nThis is 1911 — the Xinhai Revolution (辛亥革命). Historically it ended with the dynasty's own strongman, Yuan Shikai (袁世凱), brokering the abdication of the boy-emperor Puyi (溥儀) in February 1912, closing two hundred and sixty-eight years of Qing rule and more than two thousand years of imperial monarchy. The throne has run out of tomorrows. What it commands now will decide how the Great Qing ends — or whether it can yet become something that endures."
 qing_rebellion.10.a:0 "Yield to the republic (the historical end)."
 qing_rebellion.10.a.tt:0 "Abdicate the dynasty's absolute claim. Become a #Y constitutional republic#! — the third golden-age end-state: the Qing endures as a state, the monarchy does not. #G The crisis resolves, +1 Stability#!."
 qing_rebellion.10.b:0 "Concede a constitutional monarchy while there is still time."
 qing_rebellion.10.b.tt:0 "Save the throne by surrendering the autocracy. Become a #Y constitutional monarchy#! — the second golden-age end-state: emperor preserved, parliament granted. #G +2 Stability#!."
 qing_rebellion.10.c:0 "Send Yuan Shikai's New Army to crush the mutiny."
 qing_rebellion.10.c.tt:0 "A last stand by the sword. #R -2 Stability, +3 War Exhaustion, +6 Tyranny#!, the pressure unbroken — and the strongman who saves the throne #R may yet demand its crown#!."
