l_english:
 # ####################################################################
 # [#447] Open the Closed Country (叩關破鎖國) — the anachronistic Qing
 # naval opening of Sakoku Japan, gated on the New Treasure Fleet (#439).
 # See common/missions/qing_open_japan_missions.txt,
 # common/scripted_effects/se_QING_OPEN_JAPAN.txt,
 # common/modifiers/qing_open_japan_modifiers.txt.
 # ####################################################################

 qing_open_japan_mission:0 "Open the Closed Country (叩關破鎖國)"
 qing_open_japan_mission_DESCRIPTION:0 "For a century and a half the Tokugawa Shogunate has kept Japan sealed behind the Sakoku edicts — one window at Nagasaki, the coast forbidden to foreign hulls on pain of death. But the treasure fleet has sailed to the Western Ocean and returned, and the Qing command the sea once more. Sail into the closed isles and force them open — a full century before the black ships of the West would have done it. Force the southern gate through Kyushu and drive on Edo, or reach past the shogun to the Ainu of the north; break the isolation of the Chrysanthemum court on the Dragon Throne's terms."
 qing_open_japan_mission_CRITERIA_DESCRIPTION:0 "Play as the Qing (CHI), hold the New Treasure Fleet's glory, and the Tokugawa shogunate (TKG) must exist."
 qing_open_japan_mission_REWARD_DESCRIPTION:0 "Completing every objective in this tree grants its capstone reward."
 qing_open_japan_mission_BUTTON_TOOLTIP:0 "Open this mission tree."

 qing_openjapan_arrive:0 "The Fleet Arrives (寶船抵日)"
 qing_openjapan_arrive_DESC:0 "Let the great fleet stand off the closed coast and the court present its demand: the isles will open. The shogunate will stiffen, but the treasure-ships that dwarf its coastal junks bear their pressure on the seaward domains. This is the point of commitment. Costs #Y 120#! treasury and #Y 30#! political influence."
 qing_openjapan_arrive_tt:0 "Open the enterprise: the fleet's presence lays #G coastal pressure (海壓)#! on the shogunate's ports, and the court takes heart (#G ruler popularity#!)."

 qing_openjapan_kyushu:0 "The Southern Gate (南路叩關)"
 qing_openjapan_kyushu_DESC:0 "Force the one window the shogunate keeps on the world. Take and hold Kyushu — the Nagasaki approach through which the whole Sakoku trade was funnelled. You must seize the ground yourself; the mission recognises the gate once it is genuinely held."
 qing_openjapan_needs_kyushu_tt:0 "The Qing must #Y control at least one province in the Kyushu region#! (九州)."
 qing_openjapan_kyushu_tt:0 "The southern gate is held — a #G claim is laid on the shogun's seat at Edo (江戶)#! so the drive on the heartland has its war-goal, and the court exults (#G ruler popularity#!)."

 qing_openjapan_edo:0 "The March on Edo (進逼江戶)"
 qing_openjapan_edo_DESC:0 "Drive into the Kanto heartland and take the shogun's seat — Edo itself. With the capital held, the Bakufu's will to keep the country closed is broken. Costs #Y 80#! treasury."
 qing_openjapan_needs_edo_tt:0 "The Qing must #Y control Edo (江戶, province 3684)#! — the shogun's seat."
 qing_openjapan_edo_tt:0 "Edo falls. A #G claim on the shogun's seat#! is confirmed if it is not yet Qing soil, the realm steadies (#G stability#!) and the court rejoices (#G ruler popularity#!)."

 qing_openjapan_ainu:0 "The Ainu Road (撫蝦夷)"
 qing_openjapan_ainu_DESC:0 "Reach past the shogunate to the Ainu of Ezo, whom the Matsumae clan has been grinding north for two centuries. Take them under the Qing wing — a foothold at Japan's back, and a lever against the Chrysanthemum court from the north. Costs #Y 25#! political influence."
 qing_openjapan_needs_ainu_tt:0 "The #Y Ainu (蝦夷) must exist#! on the map to be reached."
 qing_openjapan_ainu_tt:0 "The Ainu are taken under the wing as a #G sinosphere tributary#! — a Qing foothold in the north — and the court takes heart (#G ruler popularity#!)."

 qing_openjapan_ezo:0 "Hold Ezo (據蝦夷地)"
 qing_openjapan_ezo_DESC:0 "Secure Hokkaido. Take and hold the ground of Ezo — whether under the Qing flag directly or through the Ainu tributary — so the Matsumae window closes and Japan is hemmed from the north."
 qing_openjapan_needs_ezo_tt:0 "The #Y Ezo region (蝦夷地 / Hokkaido) must be held#! — by the Qing directly, or by the Ainu tributary."
 qing_openjapan_ezo_tt:0 "Ezo is secured — Japan is hemmed from the north (#G ruler popularity#!)."

 qing_openjapan_capstone:0 "The Country Opened (開國)"
 qing_openjapan_capstone_DESC:0 "Both gates carried: the southern one forced at Edo and the northern one shut on the shogunate through Ezo. The Sakoku is ended — a full century before the West would have done it — and Japan is opened on the Dragon Throne's terms."
 qing_openjapan_needs_opened_tt:0 "The Qing must #Y hold Edo (3684)#! AND #Y hold Ezo#! (directly or through the Ainu tributary)."
 qing_openjapan_capstone_tt:0 "The closed country is opened. The lasting #G The Country Opened (qing_japan_opened)#! is sealed — diplomatic weight, a maritime-commerce dividend, legitimacy and naval morale — the realm steadies (#G stability#!), the fleet's #G coastal pressure lifts#!, and the emperor's glory rings across the eastern sea (#G ruler popularity#!)."

 # ---- modifiers ----
 qing_japan_coastal_pressure:0 "Coastal Pressure (海壓)"
 qing_japan_coastal_pressure_desc:0 "The Qing treasure fleet stands off this port, throttling its trade and sapping the defenders' will. Lifts on its own as the fleet moves on."
 qing_japan_opened:0 "The Country Opened (開國)"
 qing_japan_opened_desc:0 "The Sakoku ended a century early — Japan opened to the Qing by the northern and southern gates alike. A lasting dividend of diplomatic weight, reopened maritime commerce, and naval prestige."
