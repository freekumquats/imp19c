 # --- [#96] consumer event: the Qing reacts to the Mexico arc's Second Empire ---
 # Fired by mex_instability.12 (human CHI only) once MEX_install_empire has crowned
 # Maximilian and set global_var:mex_empire_country. The AI Qing expresses its
 # stance through the #69 mission tree, not this pop-up.
 qing_mexico_adventure.1.t:0 "The Throne Across the Ocean (墨西哥帝業)"
 qing_mexico_adventure.1.desc:0 "Word crosses the Pacific: screened by the great war between the American states, Louis-Napoleon's France has shipped a Habsburg archduke across the ocean and crowned him Emperor of Mexico. A European throne now stands in the valley of Anáhuac, upheld by French bayonets — and shadowed, as every throne in the Americas must be, by the republic to the north and by the Juarista bands that have not laid down their arms. The Middle Kingdom has reached the far shore; the enterprise is ours to make our own. We may prop this throne — bind it to us, uphold it against the day Washington and the Republic come to pull it down — or we may throw in with Juárez and wager on its fall."
 qing_mexico_adventure.1.a:0 "Prop the throne — a Franco-Qing patronage."
 qing_mexico_adventure.1.a.tt:0 "Become the Second Empire's #Y foreign patron#!. #G Set the patronage that keeps the Empire standing past the day France abandons it (the throne survives its historical fall); warm relations with Mexico City; a wealth grant and prestige#!. #R Provokes Britain#!, and — if the Daoguang entente was sealed — #R betrays it and affronts the United States#!."
 qing_mexico_adventure.1.b:0 "Back Juárez — bet on the Republic."
 qing_mexico_adventure.1.b.tt:0 "Court the #Y Juarista Republic#! instead. #G A commercial windfall and prestige; the American republic that backs Juárez is pleased#!. #R Affronts France#!, whose throne this repudiates. The Empire is left to fall on its own schedule."
