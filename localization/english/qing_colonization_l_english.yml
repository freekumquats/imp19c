 # ====================================================================
 # THE GREAT PACIFIC ENTERPRISE — Qing overseas-colonization mission tree.
 # See common/missions/qing_colonization_missions.txt.
 # Sources: Perdue, China Marches West (2005); Gibson, Otter Skins, Boston
 # Ships and China Goods (1992, on the maritime fur trade & Russian America);
 # Millward, Eurasian Crossroads (2007, Xinjiang); Schottenhammer (ed.),
 # The East Asian Maritime World; on Ryukyu, Kerr, Okinawa: History of an
 # Island People (2000).
 # ====================================================================

 qing_colonization_mission:0 "The Great Pacific Enterprise (大洋洲事業)"
 qing_colonization_mission_DESCRIPTION:0 "The Middle Kingdom has ever looked inward, its back to the sea. But a dynasty grown strong in steam and silver need not. Beyond the northern forests lies the thin, half-starved colonial effort of the Tsar; beyond the ocean, a whole New World whose furs and gold already flow through Canton. Let the dragon look outward — to Taiwan and the island road, to the New Dominion and the Silk Road cities, and across the Great Ocean itself."
 qing_colonization_mission_CRITERIA_DESCRIPTION:0 "Play as the Qing (CHI) during the High-Qing era, or once Self-Strengthening has reached 40."
 qing_colonization_mission_REWARD_DESCRIPTION:0 "Completing every objective in this tree grants its capstone reward."
 qing_colonization_mission_BUTTON_TOOLTIP:0 "Open this mission tree."

 # --- root: Maritime Bureau ------------------------------------------
 qing_col_bureau:0 "Establish the Maritime Bureau (海洋事務局)"
 qing_col_bureau_DESC:0 "For the enterprise to begin, the court must first do what it has never done: treat the ocean as a highway rather than a wall. A Maritime Bureau, drawing on the new fleets and the China Merchants' steamers, will chart the sea roads and the fur coasts and turn the empire's face outward."
 qing_col_bureau_tt:0 "Found the #Y Maritime Bureau#! and open the Pacific enterprise."

 # --- Taiwan ----------------------------------------------------------
 qing_col_taiwan:0 "Develop the Province of Taiwan (臺灣建省)"
 qing_col_taiwan_DESC:0 "Taiwan has been a mere prefecture of Fujian since 1684. Liu Mingchuan (劉銘傳) would make it a modern province in its own right — with the island's first railway, telegraph and coal mines, and fortified ports facing the ocean. It shall be the unsinkable springboard of the whole enterprise."
 qing_col_taiwan_tt:0 "Modernise #Y Taiwan#! into a maritime province (city, port, commerce); claim the Pescadores."

 # --- Amur ------------------------------------------------------------
 qing_col_amur:0 "Secure the Amur Frontier (鞏固黑龍江)"
 qing_col_amur_DESC:0 "On the great river the two empires have faced one another since the Cossacks first came — at Albazin, at Nerchinsk (尼布楚), at Kyakhta (恰克圖). The Tsar's men grow bolder each year. Fortify the Amur, settle the banner-lands, and lay the Qing claim upon the Okhotsk coast before Russia closes it off for good."
 qing_col_amur_tt:0 "Fortify the #Y Amur#!, ease #Y banner decay#!, and claim the Okhotsk coast."

 # --- Xinjiang --------------------------------------------------------
 qing_col_xinjiang:0 "Consolidate the New Dominion (經營新疆)"
 qing_col_xinjiang_DESC:0 "Xinjiang — the 'New Dominion' won from the Zunghars in the 1750s — is vast, thinly held, and coveted by Russia and the oasis khanates alike. As Zuo Zongtang (左宗棠) did in his day, garrison Urumqi and Kashgaria, plant military-agricultural colonies (屯田) in the oases, and bind the New Dominion firmly to the empire."
 qing_col_xinjiang_tt:0 "Fortify and settle #Y Xinjiang#!; a firmer grip, though it stirs #Y ethnic tension#!."

 # --- Central Asia ----------------------------------------------------
 qing_col_central_asia:0 "The Great Game in Central Asia (中亞大博弈)"
 qing_col_central_asia_DESC:0 "West of the passes lie the Kazakh steppe and the ancient Silk Road cities — Tashkent, Kokand (浩罕), Samarkand, and the khanates of Bukhara and Khiva. Russia's columns march toward them year by year. Reach them first: claim the steppe and the oasis cities, and offer the khans the shelter of the Son of Heaven's suzerainty against the Tsar."
 qing_col_central_asia_tt:0 "Claim the #Y steppe and Silk Road cities#! and make Bukhara a tributary, before Russia takes them."

 # --- Alaska ----------------------------------------------------------
 qing_col_alaska:0 "Contest Russian America (爭奪阿拉斯加)"
 qing_col_alaska_DESC:0 "Across the northern ocean lies Russian America, governed from the little wooden capital of Novoarkhangelsk (Sitka) by the chronically under-supplied Russian-American Company — a colony that survives only on the Canton tea trade and Californian grain. A Qing fleet that can reach it can contest the whole fur coast: Sitka, Kodiak, and the sea-otter wealth of the north Pacific."
 qing_col_alaska_tt:0 "Claim the #Y Alaskan fur coast#! (Sitka, Novoarkhangelsk, Kodiak) and gain development capital."

 # --- Canada ----------------------------------------------------------
 qing_col_canada:0 "The Northwest Fur Coast (西北毛皮海岸)"
 qing_col_canada_DESC:0 "South of Alaska runs the misted coast of the Nootka and Columbia trade, where British, American and Russian ships already vie for sea-otter pelts bound for Canton. Plant Qing factories along it and the richest fur trade on earth flows into imperial hands."
 qing_col_canada_tt:0 "Establish the #Y Pacific-Northwest fur trade#! and gain development capital."

 # --- California ------------------------------------------------------
 qing_col_california:0 "A Colony on the Golden Shore (開拓金山)"
 qing_col_california_DESC:0 "Fort Ross fed Russian Alaska from the California coast; a generation hence, Chinese hands would build the American West and call San Francisco 金山, the Golden Mountain. Let the Qing plant its own colony on the great bay of the western sea — the eastern anchor of a Pacific empire."
 qing_col_california_tt:0 "Claim #Y San Francisco Bay#!; found the Golden Shore colony and gain great capital."

 # --- Pacific isles ---------------------------------------------------
 qing_col_pacific_isles:0 "The Island Road (太平洋群島)"
 qing_col_pacific_isles_DESC:0 "Between the two shores lie the stepping-stones of the ocean: Ryukyu (琉球), a Qing tributary until Japan seized it; the Marianas and Guam; the Philippines (呂宋); and far out, the isles the sandalwood traders called 檀香山 — Hawaii. Command the island road and the whole Pacific becomes an imperial sea."
 qing_col_pacific_isles_tt:0 "Reassert Ryukyu and claim the #Y island stepping-stones#! (Guam, Marianas, Hawaii)."

 # --- [#315] the Southern Ocean: New Holland + New Guinea --------------
 qing_col_new_holland:0 "Reach for New Holland (新荷蘭)"
 qing_col_new_holland_DESC:0 "Far to the south lies a great continent — New Holland, whose eastern coast the English captain Cook charted only in 1770 (its western and northern shores the Dutch had mapped a century before). A High-Qing state with junk fleets and a full treasury need not wait for Europe: plant the dragon banner at the great harbour (the future Sydney, on the bay Cook would call Port Jackson), and the temperate south coast — from the whaling grounds of Van Diemen's Land to the western shore — becomes an imperial frontier. The surplus millions of the Yangzi will follow the state's inducement across the southern ocean."
 qing_col_new_holland_tt:0 "Plant the first colony at #Y Sydney (Port Jackson)#! and claim the temperate coast — #R racing Britain#! to the southern continent."
 qing_col_new_guinea:0 "Contest the Papuan Coast (巴布亞)"
 qing_col_new_guinea_DESC:0 "North of New Holland lie the spice-rich, fever-ridden coasts of New Guinea and the island of Van Diemen's Land to the south. Trading posts on the Papuan shore and a garrison on the Tasman island complete the southern arc — a Qing dominion of the south seas, from the tropics to the roaring forties, closing the ocean to the latecomer Europeans."
 qing_col_new_guinea_tt:0 "Claim the #Y Papuan coast#! trading posts and #Y Tasmania#! — completing the South Seas dominion."

 # --- the Daoguang Doctrine (US entente) ------------------------------
 qing_col_daoguang_doctrine:0 "Proclaim the Daoguang Doctrine (道光主義)"
 qing_col_daoguang_doctrine_DESC:0 "In 1823 the American president Monroe declared the New World closed to European empire. Let the Great Qing answer with a doctrine of its own: the Pacific and the Americas are the sphere of the rising powers who border them, and the old empires of Europe — Britain, France, Russia — shall gain no further ground there. The young American republic came to Canton as a rival of the British, not their partner; by the Treaty of Wanghia (望廈條約, 1844) it dealt with the Qing on gentler terms than London ever offered. Make that common interest a common front. Where the Qing and the Americans stand together, the Pacific coast need not be a field of rivalry — and the powers of Europe find the ocean's far shore closed to them."
 qing_col_daoguang_doctrine_tt:0 "Forge an #Y entente with the United States#!: shared goodwill, trade and standing — and Qing expansion on the New World coast no longer provokes #Y Britain#! or America itself."

 # --- capstone --------------------------------------------------------
 qing_col_capstone:0 "An Empire on Which the Sun Never Sets (環太平洋大清)"
 qing_col_capstone_DESC:0 "From the Amur to the Golden Shore, from the Silk Road oases to the sandalwood isles, the banner of the Great Qing flies around the rim of the world's greatest ocean. Where another history left China carved apart by foreign powers, this Qing has become a power that spans the globe. The Pacific is a Chinese sea."
 qing_col_capstone_tt:0 "Complete the #Y Pacific dominion#!: lasting empire-wide bonuses, great prestige, and vindication of self-strengthening."

 # --- shared gate tooltips -------------------------------------------
 qing_col_needs_fleet_tt:0 "You need a modern navy — a #Y fleet or naval yard#! from the Self-Strengthening Movement"
 qing_col_needs_strong_fleet_tt:0 "You need the #Y Beiyang Fleet#! (or another great fleet) to cross the ocean"
 qing_col_needs_strong_army_tt:0 "You need a #Y modern army#! (the Ever-Victorious Army) or a consolidated New Dominion"
 qing_col_needs_taiwan_tt:0 "You must own #Y Taibei or Tainan#! on Taiwan"
 qing_col_needs_xinjiang_tt:0 "You must own part of #Y Xinjiang#! (Urumqi, Aksu, or Turpan)"
 qing_col_needs_holdings_tt:0 "You must hold at least one of your #Y Pacific or steppe conquests#!"
 qing_col_needs_usa_tt:0 "The #Y United States#! must exist to forge the entente"
 qing_col_needs_new_holland_tt:0 "You must have #Y settled New Holland#! first"

 # ====================================================================
 # THE PROTECTORATES-GENERAL (都護府) — the Tang institution of indirect
 # frontier rule, revived as tributary subjects. See the protectorate tasks
 # in common/missions/qing_colonization_missions.txt and the release effect
 # common/scripted_effects/se_QING_PROTECTORATE.txt.
 # Sources: Beckwith, Empires of the Silk Road (2009); Skaff, Sui-Tang China
 # and its Turko-Mongol Neighbors (2012); Twitchett (ed.), Cambridge History
 # of China Vol. 3; on Lanfang, Heidhues, Golddiggers, Farmers, and Traders
 # (2003), Yuan Bingling 袁冰凌 (2000).
 # ====================================================================

 # --- 安北 Anbei (Pacified North) ------------------------------------
 qing_col_anbei:0 "The Protectorate of the Pacified North (安北都護府)"
 qing_col_anbei_DESC:0 "The Tang held the Mongol steppe not as a province but through the Protectorate-General of the Pacified North (安北都護府), a Protector-General ruling the tribes by 'loose rein' (羈縻) from Ordu-Baliq on the Orkhon. Revive the institution: gather the northern grasslands you hold into an autonomous march that guards the steppe frontier and renders tribute to the throne, rather than binding the restless tribes to direct rule from Beijing."
 qing_col_anbei_tt:0 "Erect the #Y Protectorate of the Pacified North#! from your holdings in #Y Mongolia#! — released as a new #G tributary#! march. Gain the #G Pacified North#! modifier (manpower, land morale, legitimacy)."
 qing_col_needs_north_land_tt:0 "You must own at least #Y 3 provinces in Mongolia#! to erect the march"

 # --- 安東 Andong (Pacified East) ------------------------------------
 qing_col_andong:0 "The Protectorate of the Pacified East (安東都護府)"
 qing_col_andong_DESC:0 "After the fall of Goguryeo the Tang governed Manchuria and the Korean marches through the Protectorate-General of the Pacified East (安東都護府), seated first at Pyongyang and later withdrawn to Liaodong. Revive it: gather your Manchurian and Korean holdings into an autonomous eastern march, a tributary shield on the road the danger from across the eastern sea must travel."
 qing_col_andong_tt:0 "Erect the #Y Protectorate of the Pacified East#! from your holdings in #Y Liaoning and Korea#! — released as a new #G tributary#! march. Gain the #G Pacified East#! modifier (manpower, reduced fort upkeep, legitimacy)."
 qing_col_needs_east_land_tt:0 "You must own at least #Y 3 provinces in Liaoning or Korea#! to erect the march"

 # --- 安西 Anxi (Pacified West) --------------------------------------
 qing_col_anxi:0 "The Protectorate of the Pacified West (安西都護府)"
 qing_col_anxi_DESC:0 "The Tang held the Tarim oases and the Silk Road through the Protectorate-General of the Pacified West (安西都護府), seated at Kucha, its Four Garrisons (安西四鎮) watching the road to Central Asia. Revive it: gather your Turkestan holdings into an autonomous oasis march — a lighter hand on the alien west than direct provincial rule, and easier for it to bear."
 qing_col_anxi_tt:0 "Erect the #Y Protectorate of the Pacified West#! from your holdings in #Y Turkestan#! — released as a new #G tributary#! march; #G eases ethnic tension#!. Gain the #G Pacified West#! modifier (commerce, reputation, legitimacy)."
 qing_col_needs_west_land_tt:0 "You must own at least #Y 3 provinces in Turkestan#! to erect the march"

 # --- 安南 Annan (Pacified South) ------------------------------------
 qing_col_annan:0 "The Protectorate of the Pacified South (安南都護府)"
 qing_col_annan_DESC:0 "For three centuries the Tang held the Red River delta through the Protectorate-General of the Pacified South (安南都護府), seated at Hanoi — the name 安南 outlasting the institution to become the very name of Vietnam. Revive it: gather your holdings in the south into an autonomous tributary march, guarding the tropical frontier without the ruinous cost of holding it by garrison alone."
 qing_col_annan_tt:0 "Erect the #Y Protectorate of the Pacified South#! from your holdings in #Y Vietnam#! — released as a new #G tributary#! march; #G eases ethnic tension#!. Gain the #G Pacified South#! modifier (commerce, tax, legitimacy)."
 qing_col_needs_south_land_tt:0 "You must own at least #Y 3 provinces in Vietnam#! to erect the march"

 # --- 安海 Anhai (Pacified Seas) — invented --------------------------
 qing_col_anhai:0 "The Protectorate of the Pacified Seas (安海都護府)"
 qing_col_anhai_DESC:0 "The Tang never ruled the ocean — but a Qing that commands the island road may. Where the old dynasty raised marches on the land frontiers, raise one upon the sea: the Protectorate of the Pacified Seas (安海都護府), gathering the scattered island holdings of the enterprise — the Ryukyus, the Marianas, the Philippines, the sandalwood isles — into a single maritime march under a Protector of the Ocean. An invention of this Qing, without Tang precedent, and all the prouder for it."
 qing_col_anhai_tt:0 "Erect the invented #Y Protectorate of the Pacified Seas#! from your #Y Pacific island holdings#! — released as a new #G tributary#! march. Gain the #G Pacified Seas#! modifier (naval morale, export commerce, legitimacy)."
 qing_col_needs_isles_land_tt:0 "You must own at least #Y 3 island provinces#! in the Pacific (Ryukyu, the Philippines, the Marianas, Hawaii and the isles between) to erect the march"

 # --- 安新 Anxin (Pacified New World) — invented ---------------------
 qing_col_anxin:0 "The Protectorate of the Pacified New World (安新都護府)"
 qing_col_anxin_DESC:0 "Beyond the Great Ocean, where no Chinese dynasty ever held ground, this Qing has. Gather the Pacific-coast conquests of the New World — the fur coast of the north, the golden shore of California — into a single transpacific march: the Protectorate of the Pacified New World (安新都護府), the most distant and improbable of all the marches, a Protector-General of a continent the Tang cartographers never knew. An invention wholly of this Qing."
 qing_col_anxin_tt:0 "Erect the invented #Y Protectorate of the Pacified New World#! from your #Y North-American holdings#! — released as a new #G tributary#! march. Gain the #G Pacified New World#! modifier (export commerce, tax, legitimacy)."
 qing_col_needs_newworld_land_tt:0 "You must own at least #Y 3 provinces on the New World Pacific coast#! (Alaska, the Northwest coast or California) to erect the march"

 # --- 蘭芳 Lanfang — the Borneo kongsi republic ----------------------
 qing_col_lanfang:0 "Recognise the Lanfang Republic (蘭芳共和國)"
 qing_col_lanfang_DESC:0 "In 1777 the Hakka miner Luo Fangbo (羅芳伯) founded on the goldfields of western Borneo the Lanfang kongsi (蘭芳公司) — a self-governing federation of overseas-Chinese miners, its headman elected, that ruled Mandor and Pontianak for a century. It sent envoys to Beijing seeking to become a tributary; the Qianlong court, holding the Nanyang Chinese to be lawless emigrants, spurned them. Reverse that judgement: extend the throne's protection over the sons of Tang abroad, and take the kongsi republic under suzerainty before the Dutch can crush it (as they did in 1884)."
 qing_col_lanfang_tt:0 "Recognise the #Y Lanfang kongsi republic#! of western Borneo — your #Y Borneo holdings#! released as a new #G tributary#! republic (an elected oligarchy of miners, not a viceroyalty). Gain the #G Lanfang Republic#! modifier (commerce, export commerce, reputation)."
 qing_col_needs_borneo_tt:0 "You must own at least #Y 2 provinces in Borneo#! to release the kongsi republic"

