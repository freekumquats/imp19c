 # ====================================================================
 # THE SCRAMBLE FOR AFRICA (鄭和下西洋復興) — task #67. The southern enterprise
 # that revives the Zheng He treasure voyages and arrives in Africa amid the
 # 19th-c. European partition.
 # ====================================================================

 # --- 鄭和下西洋 — the treasure voyages reborn ----------------------
 qing_col_zheng_he:0 "Revive the Treasure Voyages (鄭和下西洋)"
 qing_col_zheng_he_DESC:0 "Between 1405 and 1433 the eunuch-admiral Zheng He (鄭和) led seven great fleets of the Ming down the western ocean — to Malacca, to Calicut, to Hormuz, and on to the Swahili coast of Africa, where at Malindi and Kilwa his captains took aboard a live giraffe to bear home as a tribute-qilin to the Yongle Emperor. Then the dynasty burned its shipyards and turned its back on the sea for four hundred years. Do the opposite: build the treasure fleet anew, sail the monsoon road your ancestors sailed, and plant the dragon banner on the coast of Zanj — this time to stay, in the very decades the barbarians of the West are dividing the continent among themselves."
 qing_col_zheng_he_tt:0 "Revive the treasure fleet and land on the #Y Swahili coast#! (Zanzibar, Kilwa) that the Ming voyages reached. #G Claim the coast; a treasure-fleet modifier (naval range, morale, export commerce); a wealth grant; +prestige#!. #R Alarms Britain#!, whose ocean the Indian Ocean has become."
 qing_col_needs_africa_land_tt:0 "You must own at least #Y 3 provinces in Africa#! (the Swahili coast, the Cape, Egypt, the Congo, Mozambique, Madagascar, the Horn, Guinea or Angola) to erect the march"

 # --- 好望角 — the Cape of Good Hope --------------------------------
 qing_col_cape:0 "Round the Cape of Good Hope (好望角)"
 qing_col_cape_DESC:0 "The Cape of Good Hope is the hinge of the whole southern world: every ship between the Atlantic and the Indian Ocean must round it. The Dutch planted their victualling station there in 1652; the British took it in 1806 and have held it since as the master-key of the sea-road to India and China alike. A Qing that would command the southern ocean cannot leave that key in the Royal Navy's pocket. Seize the Cape."
 qing_col_cape_tt:0 "Contest the #Y Cape of Good Hope#! with the Royal Navy. #G Claim the Western Cape (pressed as a diplomatic play); a Cape-route modifier (naval range, ship recruitment, commerce); a wealth grant#!. #R A sharp affront to Britain#!."

 # --- 蘇伊士 — the Suez / Red Sea passage ---------------------------
 qing_col_suez:0 "Force the Suez Passage (蘇伊士)"
 qing_col_suez_DESC:0 "The short road home runs through the Red Sea and the isthmus of Suez — cut by a canal in 1869, and thereafter the jugular of the British Empire, watched over by an Anglo-French financial condominium until Britain seized Egypt outright in 1882. Hold the passage, and the treasure fleet need not round the whole of Africa to reach the Middle Kingdom; leave it in barbarian hands, and the southern enterprise dangles at the end of a rope two other powers may cut."
 qing_col_suez_tt:0 "Contest the #Y Suez passage and the Red Sea gate#!. #G Claim Suez (pressed as a diplomatic play) and Cairo; a Suez-passage modifier (export + import commerce, naval range); a wealth grant#!. #R Offends both Britain and France#!, the condominium powers of Egypt."

 # --- 剛果 — the Congo interior -------------------------------------
 qing_col_congo:0 "Carve the Congo Interior (剛果)"
 qing_col_congo_DESC:0 "The Congo basin was the crucible of the Scramble: the vast, wet heart of the continent that Leopold's agents and the Berlin Conference of 1884-85 carved up on paper before any European had walked most of it. France planted itself on the north bank at Brazzaville; Britain pressed from the Niger and the south. Thrust the enterprise inland from the coast into that green interior — and stand, uninvited, at the partitioners' table."
 qing_col_congo_tt:0 "Thrust into the #Y Congo basin and the Guinea coast#!. #G Claim the interior; a Congo modifier (tax, commerce); a wealth grant#!. #R Sets the Qing against both Britain and France#!, the paramount partitioners of the Berlin Conference."

 # --- 安非 Anfei (Pacified Africa) — invented -----------------------
 qing_col_anfei:0 "The Protectorate of the Pacified Africa (安非都護府)"
 qing_col_anfei_DESC:0 "On the coast the treasure fleets last touched four centuries ago, and in the interior no Chinese dynasty ever dreamed of, this Qing now holds ground. Gather the African conquests — the Swahili coast, the Cape, the Red Sea gate, the Congo — into a single march under a Protector-General, and extend the Tang institution of loose-rein rule to the farthest shore of all. An invention wholly of this Qing, and the southern twin of the Pacified New World across the other ocean."
 qing_col_anfei_tt:0 "Erect the invented #Y Protectorate of the Pacified Africa#! from your #Y African holdings#! — released as a new #G tributary#! march. Gain the #G Pacified Africa#! modifier (export commerce, naval morale, legitimacy)."

