 # ##################################################################
 # 墨西哥 THE MEXICAN ADVENTURE — the Manila galleon & the throne of Mexico
 # ##################################################################
 # --- allow-tooltips ------------------------------------------------
 qing_col_needs_pacific_reach_tt:0 "You need #Y a modern battle-fleet (the Beiyang or Nanyang squadron) or a foothold in California#! before you can reach across the Pacific to the New World"
 qing_col_needs_acapulco_tt:0 "You must #Y hold Acapulco or have re-opened the silver road#! before pressing on to the Gulf coast of Mexico"
 qing_col_needs_mexico_land_tt:0 "You must own at least #Y 3 provinces in Mexico#! (Pacific Mexico incl. Mexico City, Eastern Mexico, Northern Mexico or Central America) to enthrone a client emperor"

 # --- 馬尼拉大帆船 — the galleon reborn -----------------------------
 qing_col_galleon:0 "Reopen the Silver Road (馬尼拉大帆船)"
 qing_col_galleon_DESC:0 "For two hundred and fifty years the Manila galleon crossed the Pacific each year — Mexican silver west to Canton, Chinese silk and porcelain east to Acapulco — the one steady thread binding the Middle Kingdom to the New World, and the pump that drew half the silver of the Americas into China. The Spanish crown cut the line in 1815, the very year of our reckoning. Let the dragon fleet take up the route the galleons abandoned, and follow the silver home to its source."
 qing_col_galleon_tt:0 "Reopen the #Y Manila-Acapulco silver road#!. #G Claim Acapulco and draw settlers to it; a Silver Road modifier (export/import commerce, naval range); a wealth grant#!. #R Nettles Britain#! (unless the Daoguang entente holds), master of the world's trade."

 # --- 韋拉克魯斯 — the Gulf foothold --------------------------------
 qing_col_veracruz:0 "Land at Veracruz (韋拉克魯斯)"
 qing_col_veracruz_DESC:0 "Veracruz — the fever-coast port where Cortés burned his ships, and where in 1862 a French army landed to begin its Mexican adventure. From the Pacific shore the enterprise reaches across to the Gulf, and sets its foot upon the door to the Mexican interior: the same door, and the same year's contest, that France itself covets."
 qing_col_veracruz_tt:0 "Seize the Gulf gate at #Y Veracruz#!, the French landing point of 1862. #G Claim it and open a diplomatic play for it against France; a Gulf-Gate modifier; a wealth grant#!. #R Affronts France#!, whose own Mexican adventure contests the same ground."

 # --- 墨西哥帝業 — the Mexican adventure (the fork) -----------------
 qing_col_maximilian:0 "The Mexican Adventure (墨西哥帝業)"
 qing_col_maximilian_DESC:0 "In our history it was Louis-Napoleon's Second Empire that, screened by the American war between the states, shipped the Habsburg archduke Maximilian across the ocean and crowned him Emperor of Mexico (1864). Here that gambit is ours to share or to seize. Should the Emperor Emeritus grace our court, we make common cause with his nephew's France, and together prop the throne against the republicans and the affronted Americans. Should he not, the dragon plays the game alone — and plants its crown over the head of the France that would deny it."
 qing_col_maximilian_tt:0 "Contest the #Y throne of Mexico#!. #G Claim Mexico City; a Mexican-Crown modifier; a wealth grant#!.\n#Y If the Emperor Emeritus (Napoleon) is at court#!: a #G Franco-Qing condominium#! — warm relations with France and Napoleon's gratitude, but it #R provokes Britain#!.\n#Y Otherwise#!: the Qing seizes the adventure alone, which #R provokes France#!.\nEither way, enthroning a monarch in the Americas #R betrays the Daoguang entente#! and affronts the United States."

 # --- 墨西哥帝國 — the client Empire of Mexico ----------------------
 qing_col_mexican_empire:0 "The Empire of Mexico (墨西哥帝國)"
 qing_col_mexican_empire_DESC:0 "Gather all of Mexico — the Pacific coast and its capital of Mexico City, the Gulf shore, the northern deserts, the isthmus of Central America — and raise it up as a client Empire, an imperial throne bound to the Son of Heaven as his most distant tributary. A Habsburg-styled monarchy on the far side of the world, seated in the ancient valley of Anáhuac and wearing the dragon's protection. (The leaner Pacified New World march, Anxin, keeps to the fur coast and California, north of the mountains.)"
 qing_col_mexican_empire_tt:0 "Raise Mexico into a client #Y Empire of Mexico#! — released as an #G imperial-monarchy tributary#! seated at Mexico City (Pacific, Eastern and Northern Mexico, and Central America). Gain the #G Empire of Mexico#! modifier (export commerce, legitimacy, land morale)."

