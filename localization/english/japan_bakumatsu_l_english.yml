l_english:

 # ######################################################################
 # japan_bakumatsu_l_english.yml — "The Collapse of the Tokugawa": Japan's road
 # from Perry to the Meiji Restoration (#94). Beats .0-.7, band/modifier display
 # names, the JPN formation name/adjective, and the roster nicknames.
 # ######################################################################

 # --- .0 Perry at Uraga ------------------------------------------------
 japan_bakumatsu.0.t:0 "The Black Ships"
 japan_bakumatsu.0.desc:0 "Four warships of the United States, black-hulled and belching smoke, ride at anchor off Uraga, and Commodore Perry will not be turned away as the Russians and the British were turned away before him. He carries a letter from his President and the plain threat of his guns: Japan will open her ports, or she will learn what the Chinese learned at Canton. For two hundred years the Tokugawa have kept the realm sealed and kept, thereby, the sole right to treat with the outer world — the very foundation of their mandate. That foundation now cracks in Edo Bay, and every lord in Japan has heard the sound."
 japan_bakumatsu.0.a:0 "Sign the Convention — the guns leave no other course."
 japan_bakumatsu.0.b:0 "Expel the barbarians — the seclusion edicts still stand!"

 # --- .1 Harris Treaty + Komei refusal ---------------------------------
 japan_bakumatsu.1.t:0 "A Treaty Without Sanction"
 japan_bakumatsu.1.desc:0 "The tairō Ii Naosuke, iron-willed and impatient, sets his name to Consul Harris's commercial treaty — and does it without the sanction of the Court. When the request goes up to Kyoto, Emperor Kōmei does the unthinkable: he refuses. At a stroke the realm has two masters whose commands contradict, for to obey the bakufu is now to defy the throne, and to honour the throne is to defy the bakufu. The sonnō-jōi men — 'revere the Emperor, expel the barbarian' — have found the wedge they needed, and it is driven into the very heart of Tokugawa legitimacy."
 japan_bakumatsu.1.a:0 "Sign regardless — the shogun's word is law in Japan."
 japan_bakumatsu.1.b:0 "Defer to Kyoto — do not set the realm against the throne."

 # --- .2 Ansei Purge -> Sakuradamon ------------------------------------
 japan_bakumatsu.2.t:0 "Blood at the Sakurada Gate"
 japan_bakumatsu.2.desc:0 "Ii Naosuke answers dissent with the headsman: the Ansei Purge sweeps up the sonnō activists, and the fierce young teacher Yoshida Shōin dies under it, a martyr made. The reprisal is not long in coming. On a snowy morning outside the Sakurada Gate of Edo Castle, a band of Mito and Satsuma rōnin cut the tairō down in his palanquin and carry off his head. The shogunate's strongest man is dead, murdered at the shogun's own threshold, and the lesson is plain to every domain: the bakufu can no longer protect even its own."
 japan_bakumatsu.2.a:0 "Seek reconciliation with Kyoto — bind Court and camp together."
 japan_bakumatsu.2.b:0 "Answer terror with a harder hand."

 # --- .3 Namamugi -> Kagoshima -----------------------------------------
 japan_bakumatsu.3.t:0 "The Bombardment of Kagoshima"
 japan_bakumatsu.3.desc:0 "On the Tōkaidō road a Satsuma retainer cuts down an English merchant named Richardson for failing to yield to his lord's procession, and Britain demands blood-price. When Satsuma refuses, a Royal Navy squadron sails into Kagoshima Bay and burns the city about its castle. But the lesson Satsuma takes is not submission — it is that jōi bravado is folly against steam and shell. The domain that fought the British now buys from them: Armstrong guns, ironclads, a modern arsenal. Satsuma will meet the West with the West's own weapons, and turn them, in time, upon the bakufu."
 japan_bakumatsu.3.a:0 "So the strongest domain arms itself for the reckoning."

 # --- .4 Shimonoseki + Choshu expeditions ------------------------------
 japan_bakumatsu.4.t:0 "The Chōshū Expeditions"
 japan_bakumatsu.4.desc:0 "Chōshū, hottest of the sonnō-jōi domains, closes the Shimonoseki Strait with shore batteries and fires on foreign shipping — and a fleet of four nations reduces the forts to rubble. Yet when the bakufu raises a great host to chastise the domain a second time, the punitive expedition simply collapses: Chōshū's peasant militias, drilled in Western order and armed with Western rifles, throw the shogun's feudal levies back in disarray. The whole realm sees it now. The shogunate cannot bring even a single domain to heel. The Mandate of the Tokugawa is a spent thing, and only its shadow remains."
 japan_bakumatsu.4.a:0 "Press the expedition — the domain must be humbled."
 japan_bakumatsu.4.b:0 "Withdraw and treat — cut the losses before they mount."

 # --- .5 Satcho Alliance -----------------------------------------------
 japan_bakumatsu.5.t:0 "The Satchō Alliance"
 japan_bakumatsu.5.desc:0 "Satsuma and Chōshū have hated one another for centuries, and the bakufu has long survived by setting the great domains at each other's throats. But Sakamoto Ryōma of Tosa, a masterless swordsman with a merchant's cunning and a diplomat's vision, does what no one thought possible: in secret he brings the two together. Satsuma will feed Chōshū the arms it is forbidden to buy; Chōshū will stand with Satsuma against the shogun. The two mightiest military domains in Japan are now bound in common cause, and that cause is the end of the Tokugawa."
 japan_bakumatsu.5.a:0 "Let the two great domains be joined — the die is cast."

 # --- .6 Taisei hokan --------------------------------------------------
 japan_bakumatsu.6.t:0 "The Return of Rule"
 japan_bakumatsu.6.desc:0 "Tokugawa Yoshinobu, fifteenth and last of the Tokugawa shoguns, reads the board and makes his final gambit. Rather than be pulled down, he will step down: he memorialises the young Emperor Meiji and formally returns the governing authority his house has held for two and a half centuries. It is the taisei hōkan, the restoration of imperial rule. Yoshinobu wagers that no one else can actually govern — that the Tokugawa, richest and best-organised house in the land, will remain first among a council of lords even without the title. The sonnō men mean to prove him wrong, and to leave the Tokugawa nothing at all."
 japan_bakumatsu.6.a:0 "Return rule gracefully — and remain first among the lords."
 japan_bakumatsu.6.b:0 "Cling to power — the Tokugawa do not kneel."

 # --- .7 Restoration proclaimed ----------------------------------------
 japan_bakumatsu.7.t:0 "The Meiji Restoration"
 japan_bakumatsu.7.desc:0 "It is done. In the name of the boy Emperor the ōsei fukkō is proclaimed — the shogunate abolished outright, direct imperial rule restored after seven hundred years of warrior government. The great tozama ride to enforce it, and where the Tokugawa and their northern allies resist, the matter passes to the arbitrament of arms. But the age has turned past any turning back. From the wreck of the bakuhan order a single modern state is rising, with one sovereign, one government, and one purpose: to make Japan strong enough that no black ships will ever dictate to her again. This is the Empire of Japan."
 japan_bakumatsu.7.a:0 "A new age dawns over Japan."

 # --- band / modifier display names ------------------------------------
 baku_grip_firm:0 "The Shogun's Grip: Firm"
 baku_grip_firm_desc:0 "Tokugawa authority holds; the great domains obey, and Edo speaks for Japan to the outer world."
 baku_grip_shaken:0 "The Shogun's Grip: Shaken"
 baku_grip_shaken_desc:0 "The bakufu's mandate is questioned openly; Kyoto stirs, and the tozama look to their own arms."
 baku_grip_broken:0 "The Shogun's Grip: Broken"
 baku_grip_broken_desc:0 "The shogunate cannot enforce its will even on a single domain; the realm slides toward the reckoning."
 baku_western_arms:0 "Western Arms"
 baku_western_arms_desc:0 "The domain has met the West's guns by adopting them — modern drill, rifles, and artillery."

