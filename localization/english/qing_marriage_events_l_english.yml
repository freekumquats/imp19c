l_english:
 # [#412/#413] qing_marriage.1 — the dynastic claim on a wedded realm's vacant throne.
 qing_marriage.1.t:0 "A Dynastic Claim (繼統之議)"
 qing_marriage.1.desc:0 "Death has emptied the throne of [claim_realm.GetName], a house long joined to ours by marriage — and by that blood our line stands the strongest claimant to its crown. Our realm is the greater; the two crowns might be joined in one sovereign. Shall we press for the union outright, or stand upon the claim and take it in our own time?"
 qing_marriage.1.a:0 "Press for the union — join the crowns (垂統)"
 qing_marriage.1.a.tt:0 "Bind [claim_realm.GetName] to us as a #Y royal union#! (it comes to share our sovereign). Legitimacy rises. Available while it stands independent and we are at peace."
 qing_marriage.1.b:0 "Stand upon the claim (待時)"
 qing_marriage.1.b.tt:0 "Take only the pressable claim on [claim_realm.GetName]'s lands — a casus belli to war for the inheritance when the moment suits."
