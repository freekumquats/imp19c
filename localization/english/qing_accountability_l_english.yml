 l_english:

 # ####################################################################
 # qing_accountability_events.txt (#103) — the Grand Council ACCOUNTABILITY
 # reckoning. A great office has faltered under a weak minister and an abler,
 # antagonistic rival has stepped forward to claim the post. Scopes:
 #   scope:qing_acc_defender    — the discredited sitting minister
 #   scope:qing_acc_challenger  — the abler rival who covets his office
 # ####################################################################

 qing_accountability.1.t:0 "A Minister Called to Account"
 qing_accountability.1.desc:0 "The memorials pile up, and they all point one way. The domain entrusted to #Y [qing_acc_defender.GetName]#! has faltered — the boards mutter, the censors sharpen their brushes, and the corridors of the [ROOT.GetCountry.GetAdjective] court fill with talk of a man no longer equal to his charge.\n\nInto that opening steps #Y [qing_acc_challenger.GetName]#!: abler, hungrier, and openly contemptuous of the incumbent. He lets it be known — through the right intermediaries — that he would serve the throne far better in that office. The two are no friends; the rivalry is real, and the court waits to see which way We will lean.\n\nDo We stand by Our servant, elevate the challenger, or sweep the whole unseemly quarrel aside?"

 qing_accountability.1.a:0 "Stand by him — loyalty is not bought in a season."
 qing_accountability.1.a.tt:0 "#Y [qing_acc_defender.GetName]#! keeps his office and, heartened by Our confidence, is bound closer to the throne (#G loyalty#!, standing). The passed-over #Y [qing_acc_challenger.GetName]#! is embittered (#R loyalty#!). Costs #R 10 Political Influence#!."

 qing_accountability.1.b:0 "Elevate the abler man — merit must rule the council."
 qing_accountability.1.b.tt:0 "Relieve #Y [qing_acc_defender.GetName]#! and hand the contested office to #Y [qing_acc_challenger.GetName]#!, who takes it up bound to the throne (#G loyalty#!). The fallen minister leaves disgraced (#R loyalty#!, #R popularity#!). Costs #R 15 Political Influence#!."

 qing_accountability.1.c:0 "A plague on both — dismiss the quarrel."
 qing_accountability.1.c.tt:0 "Relieve #Y [qing_acc_defender.GetName]#! (the office falls #R vacant#!, straining its domain) and slap down the presumptuous #Y [qing_acc_challenger.GetName]#!. Both are estranged; the court learns to hold its tongue (#R +2 Tyranny#!)."
