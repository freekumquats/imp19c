 ##Chinese imperial examination degrees (科舉功名) — [#34] the keju degree ladder##
 jiansheng:0 "Student of the Imperial Academy (監生)"
 jiansheng_desc:0 "This character holds the jiansheng rank — a place in the Imperial Academy, gained by purchase (捐監) or by academy enrolment rather than by passing the examinations. The lowest and least-respected qualification, but a foot on the ladder of office all the same."
 shengyuan:0 "Licentiate (生員・秀才)"
 shengyuan_desc:0 "This character passed the prefectural examination (院試) to become a shengyuan — a 'government student', a licentiate of the local Confucian school. He wears the scholar's gown and is exempt from corporal punishment and the labour levy, the first of the gentry degrees."
 juren:0 "Provincial Graduate (舉人)"
 juren_desc:0 "This character passed the triennial provincial examination (鄉試) to become a juren, a 'recommended man'. The degree alone qualifies him to hold office and marks him for life as a member of the upper gentry."
 gongshi:0 "Metropolitan Graduate (貢士)"
 gongshi_desc:0 "This character passed the metropolitan examination (會試) at the capital to become a gongshi, a 'presented tribute scholar' — one of the few hundred drawn from the whole empire each triennium, awaiting only the palace examination to be ranked among the jinshi."
 jinshi:0 "Presented Scholar (進士)"
 jinshi_desc:0 "This character passed the palace examination (殿試) under the emperor's own eye to become a jinshi, a 'presented scholar' — the summit of the civil examinations and the surest path to the high offices of state. A jinshi ranked by the throne is the Son of Heaven's own disciple (天子門生)."
 hanlin:0 "Hanlin Academician (翰林)"
 hanlin_desc:0 "This character stood among the very first of his jinshi cohort and was elevated into the Hanlin Academy (翰林院) — the corps of elite scholars who drafted the edicts, compiled the histories, tutored the imperial house, and staffed the Grand Secretariat. The most prestigious of all civil degrees."
 fanyi_jinshi:0 "Translation Laureate (繙譯進士)"
 fanyi_jinshi_desc:0 "This character passed the banner translation examination (翻譯科), the Manchu- and Mongol-language track reserved for the bannermen. Its laureates staffed the frontier commands and the resident-commissioner (amban, 駐紮大臣) posts of the Inner Asian march, the throne's men in Lhasa, Urga, and Ili."