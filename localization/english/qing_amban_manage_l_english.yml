l_english:
 QING_AMBAN_MANAGE_POST_TT:0 "#T Post an Amban (駐紮大臣)#!\nDispatch a resident commissioner to oversee this Inner Asian dependency on the throne's behalf. Managing this post by hand removes it from the automatic Lifan Yuan rotation — the resident will not be recalled or replaced without your order.\nCost: 25 political influence. Requires the Lifan Yuan office to be filled."
 QING_AMBAN_MANAGE_RECALL_TT:0 "#T Recall the Amban#!\nWithdraw the resident from this dependency, leaving the post vacant. It will remain unattended until you post a new man or return the dependency to automatic management.\nCost: 10 political influence and a little tyranny (direct intervention in the frontier bureaucracy)."
 QING_AMBAN_MANAGE_REPLACE_TT:0 "#T Replace the Amban#!\nRecall the sitting resident and dispatch a fresh one in a single stroke.\nCost: 25 political influence and some tyranny. Requires the Lifan Yuan office to be filled."
 QING_AMBAN_MANAGE_RETURN_AUTO_TT:0 "#T Return to Automatic Management#!\nHand this post back to the quarterly Lifan Yuan rotation. If it is vacant the court will staff it in time; if occupied, the ordinary turnover of residents resumes."
 qing_amban_needs_lifanyuan_tt:0 "The Lifan Yuan (理藩院) office must be filled to dispatch a resident"
 qing_amban_needs_influence_25_tt:0 "Requires 25 political influence"
 qing_amban_recall_valid_tt:0 "A living resident must be posted here"
 qing_amban_recall_needs_influence_10_tt:0 "Requires 10 political influence"
