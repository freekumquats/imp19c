l_english:

 # ######################################################################
 # fra_revolution_l_english.yml — France's 1763->1815 historical arc (#283):
 # the ancien regime, the Revolution, the Republic, Napoleon's Consulate and
 # Empire, and the Bourbon Restoration. Beats .1-.6 + the dynamic country
 # names and Napoleon's nickname.
 # ######################################################################

 # --- Dynamic country names + Napoleon's epithet -----------------------
 FRA_EMPIRE_NAME:0 "French Empire"
 FRA_RESTORATION_NAME:0 "Kingdom of France"
 NICKNAME_FRA_NAPOLEON:0 "Napoleon Bonaparte"

 # --- .1 Accession of Louis XVI (1774) ---------------------------------
 fra_revolution.1.t:0 "The New King"
 fra_revolution.1.desc:0 "Louis XV is dead of the smallpox, and the crown passes to his grandson, a shy and well-meaning young man of nineteen. Louis XVI inherits a kingdom that is the envy of Europe in arms and letters — and a treasury bled white by a century of war. His ministers whisper that only radical reform of the tax privileges of the nobility and clergy can save the finances of the realm; the court whispers that such reform is unthinkable. The reckoning is only deferred."
 fra_revolution.1.a:0 "Back the reformers — Turgot must have his economies."
 fra_revolution.1.b:0 "The privileges of the orders are the pillars of the throne."

 # --- .2 Storming of the Bastille (1789) -------------------------------
 fra_revolution.2.t:0 "The Bastille Falls"
 fra_revolution.2.desc:0 "The Estates-General, summoned to mend the finances, has become a National Assembly that claims to speak for the nation itself. On the fourteenth of July the mob of Paris storms the Bastille, and royal authority evaporates in a single afternoon. The old order of privilege and absolutism is shattered; what will rise in its place, no one can yet say. The King is a prisoner of events, and the Revolution has begun."
 fra_revolution.2.a:0 "Treat with the Assembly — a constitution may yet save the monarchy."
 fra_revolution.2.b:0 "Call up the loyal regiments and crush the rabble."

 # --- .3 The First Republic (1792) -------------------------------------
 fra_revolution.3.t:0 "Vive la République"
 fra_revolution.3.desc:0 "The monarchy is abolished. On the twenty-first of September the Convention proclaims France a Republic, one and indivisible, and the crowned heads of Europe recoil in horror at the regicide nation in their midst. The Republic answers their coalition with the levée en masse — a nation in arms — and carries the tricolour beyond the frontiers of France in the name of liberty. The age of kings is declared over; the age of revolution has come."
 fra_revolution.3.a:0 "To arms, citizens — the Republic will defend itself."

 # --- .4 18 Brumaire — Napoleon First Consul (1799) --------------------
 fra_revolution.4.t:0 "The Whiff of Grapeshot"
 fra_revolution.4.desc:0 "The Directory has failed — corrupt, bankrupt, and despised. Into the vacuum steps a young general from Corsica, victor of Italy and Egypt, who on the eighteenth of Brumaire disperses the councils at bayonet-point and takes power as First Consul. Napoleon Bonaparte promises order at home and glory abroad, and an exhausted nation believes him. The Revolution has found its master; the Republic has found its emperor-to-be."
 fra_revolution.4.a:0 "Order is restored. Let the Consul govern."

 # --- .5 The First Empire (1804) ---------------------------------------
 fra_revolution.5.t:0 "Emperor of the French"
 fra_revolution.5.desc:0 "In the cathedral of Notre-Dame, before the Pope himself, Napoleon takes the crown from the altar and sets it upon his own head. The Republic is a memory; France is an Empire, and its Emperor means to make himself master of the continent. The armies of the Grande Armée are the finest the world has seen, and the crowned heads who once mocked the Corsican upstart will learn to dread the name of Austerlitz."
 fra_revolution.5.a:0 "Long live the Emperor. On to glory."

 # --- .6 The Fall of Napoleon (1814) -----------------------------------
 fra_revolution.6.t:0 "The Abdication"
 fra_revolution.6.desc:0 "The dream is over. The Russian snows swallowed the Grande Armée; the nations of Europe rose as one; and the Sixth Coalition has taken Paris. Napoleon abdicates and is packed off to Elba, and the allies restore the Bourbons in the person of Louis XVIII, brother of the martyred king. France is pushed back within her old frontiers, humbled but intact — and the long revolutionary age, begun at the Bastille a quarter-century ago, is closed at last."
 fra_revolution.6.a:0 "The King is restored. Let there be peace."
