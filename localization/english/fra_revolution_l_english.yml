l_english:

 # ######################################################################
 # fra_revolution_l_english.yml — France's 1763->1815 historical arc (#283):
 # the ancien regime, the Revolution, the Republic, Napoleon's Consulate and
 # Empire, and the Bourbon Restoration. Beats .1-.6 + the dynamic country
 # names and Napoleon's nickname.
 # ######################################################################

 # --- Dynamic country names + Napoleon's epithet -----------------------
 FRA_EMPIRE_NAME:0 "French Empire"
 FRA_RESTORATION_NAME:0 "Kingdom of France"
 NICKNAME_FRA_NAPOLEON:0 "Napoleon Bonaparte"

 # --- .1 Accession of Louis XVI (1774) ---------------------------------
 fra_revolution.1.t:0 "The New King"
 fra_revolution.1.desc:0 "Louis XV is dead of the smallpox, and the crown passes to his grandson, a shy and well-meaning young man of nineteen. Louis XVI inherits a kingdom that is the envy of Europe in arms and letters — and a treasury bled white by a century of war. His ministers whisper that only radical reform of the tax privileges of the nobility and clergy can save the finances of the realm; the court whispers that such reform is unthinkable. The reckoning is only deferred."
 fra_revolution.1.a:0 "Back the reformers — Turgot must have his economies."
 fra_revolution.1.b:0 "The privileges of the orders are the pillars of the throne."

 # --- .2 Storming of the Bastille (1789) -------------------------------
 fra_revolution.2.t:0 "The Bastille Falls"
 fra_revolution.2.desc:0 "The Estates-General, summoned to mend the finances, has become a National Assembly that claims to speak for the nation itself. On the fourteenth of July the mob of Paris storms the Bastille, and royal authority evaporates in a single afternoon. The old order of privilege and absolutism is shattered; what will rise in its place, no one can yet say. The King is a prisoner of events, and the Revolution has begun."
 fra_revolution.2.a:0 "Treat with the Assembly — a constitution may yet save the monarchy."
 fra_revolution.2.b:0 "Call up the loyal regiments and crush the rabble."

 # --- .3 The First Republic (1792) -------------------------------------
 fra_revolution.3.t:0 "Vive la République"
 fra_revolution.3.desc:0 "The monarchy is abolished. On the twenty-first of September the Convention proclaims France a Republic, one and indivisible, and the crowned heads of Europe recoil in horror at the regicide nation in their midst. The Republic answers their coalition with the levée en masse — a nation in arms — and carries the tricolour beyond the frontiers of France in the name of liberty. The age of kings is declared over; the age of revolution has come."
 fra_revolution.3.a:0 "To arms, citizens — the Republic will defend itself."

 # --- .4 18 Brumaire — Napoleon First Consul (1799) --------------------
 fra_revolution.4.t:0 "The Whiff of Grapeshot"
 fra_revolution.4.desc:0 "The Directory has failed — corrupt, bankrupt, and despised. Into the vacuum steps a young general from Corsica, victor of Italy and Egypt, who on the eighteenth of Brumaire disperses the councils at bayonet-point and takes power as First Consul. Napoleon Bonaparte promises order at home and glory abroad, and an exhausted nation believes him. The Revolution has found its master; the Republic has found its emperor-to-be."
 fra_revolution.4.a:0 "Order is restored. Let the Consul govern."

 # --- .5 The First Empire (1804) ---------------------------------------
 fra_revolution.5.t:0 "Emperor of the French"
 fra_revolution.5.desc:0 "In the cathedral of Notre-Dame, before the Pope himself, Napoleon takes the crown from the altar and sets it upon his own head. The Republic is a memory; France is an Empire, and its Emperor means to make himself master of the continent. The armies of the Grande Armée are the finest the world has seen, and the crowned heads who once mocked the Corsican upstart will learn to dread the name of Austerlitz."
 fra_revolution.5.a:0 "Long live the Emperor. On to glory."

 # --- .6 The Fall of Napoleon (1814) -----------------------------------
 fra_revolution.6.t:0 "The Abdication"
 fra_revolution.6.desc:0 "The dream is over. The Russian snows swallowed the Grande Armée; the nations of Europe rose as one; and the Sixth Coalition has taken Paris. Napoleon abdicates and is packed off to Elba, and the allies restore the Bourbons in the person of Louis XVIII, brother of the martyred king. France is pushed back within her old frontiers, humbled but intact — and the long revolutionary age, begun at the Bastille a quarter-century ago, is closed at last."
 fra_revolution.6.a:0 "The King is restored. Let there be peace."

 # --- .7 The Assembly of Notables (1787) -------------------------------
 fra_revolution.7.t:0 "The Assembly of Notables"
 fra_revolution.7.desc:0 "The debts of a century of war — Austrian, Seven Years', and above all the American — have brought the crown to the edge of bankruptcy. Calonne lays the deficit before an Assembly of Notables and begs them to accept a tax that spares no order, not even the privileged. They refuse, and demand that only the Estates-General, unsummoned since 1614, may consent to new taxes. The dam has cracked."
 fra_revolution.7.a:0 "Summon the Estates-General."
 fra_revolution.7.b:0 "Tax the privileged orders by royal decree."

 # --- .8 The Estates-General & Tennis Court Oath (1789) ----------------
 fra_revolution.8.t:0 "The Third Estate Rises"
 fra_revolution.8.desc:0 "The three estates gather at Versailles for the first time in a hundred and seventy-five years. When the Third Estate is locked from its hall, its deputies crowd into a nearby tennis court and swear a solemn oath never to disperse until France has a constitution. They style themselves the National Assembly, and the King's ministers do not dare to scatter them. Sovereignty is passing from the throne to the nation — and the Bastille has not yet fallen."
 fra_revolution.8.a:0 "Recognise the National Assembly."
 fra_revolution.8.b:0 "Ring Versailles with troops and dissolve them."

 # --- .9 The Regicide, the Terror, the Nation in Arms (1793) -----------
 fra_revolution.9.t:0 "The Nation in Arms"
 fra_revolution.9.desc:0 "Citizen Louis Capet mounts the scaffold, and the crowned heads of Europe recoil in horror and league against the regicide Republic. Ringed by enemies, the Convention answers with the levée en masse — every unmarried man to the colours, the whole nation and its wealth requisitioned for war — and with the Terror, as the Committee of Public Safety feeds aristocrats, moderates and its own to the guillotine. From the chaos rise the largest armies Europe has ever seen, and a new kind of war."
 fra_revolution.9.a:0 "Aux armes, citoyens! The Republic will not fall."

 # --- .10 Thermidor (1794) ---------------------------------------------
 fra_revolution.10.t:0 "Thermidor"
 fra_revolution.10.desc:0 "The Terror has begun to devour its own, and the Convention, in fear for its own necks, turns at last on Robespierre. The Incorruptible is shouted down, arrested, and sent to the very blade he had fed so long. The killing stops; the Republic survives, but bled white and without a compass, its zeal spent and its idealists dead."
 fra_revolution.10.a:0 "The Terror is over. Let the Republic breathe."

 # --- .11 The Directory (1795) -----------------------------------------
 fra_revolution.11.t:0 "The Directory"
 fra_revolution.11.desc:0 "A new constitution vests power in a five-man Directory, propertied and cautious, that governs by lurching from coup to coup between royalists and Jacobins. When a royalist mob threatens the Convention, a young Corsican artillery officer named Bonaparte sweeps the streets with a whiff of grapeshot and is marked as a man to watch. The Republic is weak, corrupt and weary — and it has learned to lean on its generals."
 fra_revolution.11.a:0 "Let the Directors govern — for now."

 # --- .12 The Egyptian Expedition (1798) -------------------------------
 fra_revolution.12.t:0 "The Egyptian Expedition"
 fra_revolution.12.desc:0 "Unable to strike Britain across the Channel, the Directory sends General Bonaparte to seize Egypt and sever the road to India. He wins the Battle of the Pyramids and brings savants to unlock the land of the pharaohs — but Nelson burns his fleet at Aboukir Bay, and the army is stranded in the sand. It matters little to Bonaparte: he slips home to a Republic that has learned it cannot do without him."
 fra_revolution.12.a:0 "To the East — strike Britain through the Orient."

 # --- .13 Austerlitz (1805) --------------------------------------------
 fra_revolution.13.t:0 "The Sun of Austerlitz"
 fra_revolution.13.desc:0 "One year to the day since he set the crown upon his own head, the Emperor meets the combined armies of Austria and Russia on the field of Austerlitz. He lures them off the Pratzen Heights, splits their line, and destroys them before the winter sun. The Third Coalition shatters; Austria sues for peace; the Holy Roman Empire itself will soon be swept away. France is the master of the continent, and the Grande Armée is the finest instrument of war the world has seen."
 fra_revolution.13.a:0 "Soldiers, I am pleased with you!"

 # --- .14 The Russian Catastrophe (1812) -------------------------------
 fra_revolution.14.t:0 "The Russian Catastrophe"
 fra_revolution.14.desc:0 "Six hundred thousand men — the largest army ever assembled in Europe — cross the Niemen into Russia. The Tsar's armies retreat and burn the land behind them; Borodino is a slaughter without a victor; Moscow is entered and goes up in flames. And then the winter comes. The retreat from Moscow destroys the Grande Armée utterly: of the host that crossed the Niemen, barely a broken remnant struggles home. The Emperor's power is broken in the snows, and all Europe rises to finish him."
 fra_revolution.14.a:0 "Save what can be saved. Back to the Niemen."

 # --- .15 The Hundred Days (1815) --------------------------------------
 fra_revolution.15.t:0 "The Hundred Days"
 fra_revolution.15.desc:0 "He was not made to die on a rock in the Mediterranean. Napoleon slips from Elba, lands in the south with a handful of men, and marches on Paris. The regiments sent to stop him tear off their white cockades and rally to their Emperor with cries of Vive l'Empereur; Louis XVIII flees; and within weeks Napoleon rules France again without a shot fired. But the powers of Europe will not treat with him, and their armies gather in Belgium for the reckoning."
 fra_revolution.15.a:0 "The Eagle flies again. To arms, one last time!"

 # --- .16 The Second Restoration (1815) --------------------------------
 fra_revolution.16.t:0 "The Second Restoration"
 fra_revolution.16.desc:0 "Waterloo has broken the Eagle for the last time. Napoleon abdicates a second time and gives himself up to the British, who will keep him on a rock in the South Atlantic until he dies. The allied armies enter Paris once more, and Louis XVIII returns in the baggage-train of the coalition to a throne that no longer pretends to rest on anything but their bayonets. The revolutionary age that opened at the Bastille is closed for good; France is thrust back within her old frontiers, and the long peace of the Congress settles over an exhausted Europe."
 fra_revolution.16.a:0 "The wars are over at last. Let the King reign."
