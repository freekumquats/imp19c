l_english:

# Qing subject-integration reaction events (events/imp19c_mod_events/qing_subject_integration.txt).
# Flavor text is grounded in real Qing frontier history and cites its sources
# inline. [scope:target.GetName] = the subject being integrated.

# --- .10  POPULAR UNREST --------------------------------------------------
 qing_integ.10.t:0 "Unrest in [scope:target.GetName]"
 qing_integ.10.desc:0 "Our drive to absorb [scope:target.GetName] into the direct administration of the Great Qing has stirred the old resentments. Magistrates report crowds gathering in the market towns, tax registers burned, and agitators preaching that the throne means to strip the people of every liberty they were promised.\n\nThe court remembers the Revolt of the Three Feudatories (三藩之亂, 1673–1681), when the Kangxi Emperor's decision to revoke the autonomous southern fiefs against a divided council touched off eight years of civil war. It remembers too the White Lotus Rebellion (白蓮教起義, 1794–1804), of which a later decree admitted plainly: 'it was extortion by local officials that goaded the people into rebellion' (官吏苛索逼民為亂). Shall we press on regardless?"
 qing_integ.10.a:0 "Crush the disturbance. The Son of Heaven does not bargain with rabble."
 qing_integ.10.a.tt:0 "Suppress the unrest: #R -5 Stability, +War Exhaustion#!, harsh unrest in the affected province, and lasting resentment among our subjects — but integration continues."
 qing_integ.10.b:0 "Suspend the integration until tempers cool."
 qing_integ.10.b.tt:0 "Halt the process (it can be resumed later), lose a step of progress, and recover #G +2 Stability#!."
 qing_integ.10.c:0 "Remit taxes and distribute grain to pacify the frontier (rou yuan 柔遠)."
 qing_integ.10.c.tt:0 "Spend #R £100#! from the treasury to feed the affected province and win our subject's goodwill."

# --- .11  CORRUPTION SCANDAL ----------------------------------------------
 qing_integ.11.t:0 "A Scandal at Court"
 qing_integ.11.desc:0 "The silver appropriated to smooth the integration of [scope:target.GetName] has gone missing. Auditors trace the theft to [scope:corrupt_official.GetName], who has grown fat diverting funds meant for canals, granaries, and garrison pay.\n\nThe court needs no reminder of Heshen (和珅), the favourite whose graft was called the most brazen in the empire's history — the fortune confiscated at his fall in 1799 was reckoned to equal twelve years of imperial revenue, and the funds he stole from the dykes drowned whole prefectures. How shall we answer this?"
 qing_integ.11.a:0 "Impeach and confiscate. Let the traitor's fortune fill our coffers."
 qing_integ.11.a.tt:0 "Seize the grandee's estate: #G +£150 treasury, +3 Stability#!, but #R +5 Tyranny#!; the disgraced official turns against us."
 qing_integ.11.b:0 "Settle the matter quietly to avoid embarrassment."
 qing_integ.11.b.tt:0 "Pay #R £80#! in hush money, lose a step of integration progress, and slow all integration while the scandal festers."
 qing_integ.11.c:0 "Institute 'nourish-honesty' stipends (yanglian yin 養廉銀)."
 qing_integ.11.c.tt:0 "Spend #R £120#! on Yongzheng's remedy — legitimate allowances that remove the incentive to steal; our ruler gains popularity and the official is bound to us."

# --- .12  ETHNIC STRIFE ---------------------------------------------------
 qing_integ.12.t:0 "Blood on the Frontier"
 qing_integ.12.desc:0 "As direct rule replaces the old chieftaincies in [scope:target.GetName], Han settlers and the native peoples have fallen to open violence over land, water, and the desecration of ancestral ground.\n\nThis is the shadow of gaitu guiliu (改土归流) — the abolition of hereditary chiefs that Ortai pressed across the southwest in the 1720s, which lit the Miao Rebellion of 1795–1806 as settlers pushed the indigenous off their fields. It is the shadow of Du Wenxiu's Pingnan Guo (平南國) in the Panthay Rebellion (雲南回變, 1856–1873) and of the Dungan Revolt (陝甘回變, 1862–1877), in which some twenty-one million souls perished. The frontier waits on our word."
 qing_integ.12.a:0 "Send in the Green Standard Army to restore order."
 qing_integ.12.a.tt:0 "Impose order by force: #R -3 Stability, +5 Aggressive Expansion#!, harsh unrest in the affected province, and strife that sours our subject relations."
 qing_integ.12.b:0 "Segregate settlers and natives; slow the process to keep the peace."
 qing_integ.12.b.tt:0 "Build walls and forts between the communities as after the Miao rising: lose a step of progress, gain #G +2 Stability#! and our subject's goodwill."
 qing_integ.12.c:0 "Fund resettlement and irrigation to defuse the land dispute."
 qing_integ.12.c.tt:0 "Spend #R £100#! to ease the land pressure and lastingly improve the affected province."

# --- .20  BOUNTIFUL FRONTIER HARVEST --------------------------------------
 qing_integ.20.t:0 "A Bountiful Harvest"
 qing_integ.20.desc:0 "The military-agricultural colonies (tuntian 屯田) sown across [scope:target.GetName] have brought in a bumper harvest. The granaries are full, the garrisons well fed, and the settlers who anchor our claim to the frontier are prospering.\n\nIt was on such colonies — soldiers, migrants, and convicts breaking new ground in Xinjiang, Mongolia, and the northeast — that Qing power on the frontier was built. A good year is a gift to be spent wisely."
 qing_integ.20.a:0 "Bank the surplus and press our advantage."
 qing_integ.20.a.tt:0 "Add the surplus to the treasury via our currency reserves and advance the integration a further step for free."
 qing_integ.20.b:0 "Invest the surplus in a new state farm and industry."
 qing_integ.20.b.tt:0 "Build an #Y Industrial Estate#! in the colony's heartland and earn our subject's goodwill."

# --- .21  INVESTITURE FESTIVAL / IMPERIAL FAVOUR --------------------------
 qing_integ.21.t:0 "An Auspicious Investiture"
 qing_integ.21.desc:0 "The season turns to ceremony. The nobles of [scope:target.GetName] have come to the throne to receive crown, seal, and robes of office (冊封), binding their houses to the Great Qing with ritual and gifts.\n\nThis is the art the dynasty perfected — the investiture of tributaries, the six Southern Tours of the Qianlong Emperor (南巡, 1751–1784), the emperor honoured as a wheel-turning Buddhist king (轉輪聖王) among the frontier peoples. A well-run rite is worth an army in binding a subject's elite to us (rou yuan 柔遠)."
 qing_integ.21.a:0 "Hold the ceremony in the grandest style."
 qing_integ.21.a.tt:0 "Spend #R £60#!; our ruler gains #G +25 Prestige#! and the subject's elite is bound to us for years."
 qing_integ.21.b:0 "A modest rite will suffice."
 qing_integ.21.b.tt:0 "Spend nothing: gain #G +2 Stability#! and a shorter spell of our subject's goodwill."

# --- Resume button (SUB_QING_subject_interactions.txt) --------------------
 QING_SUBJECT_RESUME_TT:0 "#Y Resume Integration#!\nLift the suspension and continue absorbing this governorship. Progress so far is preserved and there is no cost — the process and its events will resume."

