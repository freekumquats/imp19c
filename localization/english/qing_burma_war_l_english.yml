l_english:
 # ====================================================================
 # THE INVASION OF BURMA (清緬戰爭) — the Sino-Burmese War conquest mission
 # tree (#421). See common/missions/qing_burma_war_missions.txt,
 # common/scripted_effects/se_QING_BURMA.txt, and
 # common/modifiers/qing_burma_war_modifiers.txt.
 # Sources: Dai Yingcong, "A Disguised Defeat: The Myanmar Campaign of the
 # Qing Dynasty" (Modern Asian Studies, 2004); Charney, Southeast Asian
 # Warfare 1300-1900 (2004).
 # ====================================================================

 # ---- mission header ------------------------------------------------
 qing_burma_war_mission:0 "The Invasion of Burma (清緬戰爭)"
 qing_burma_war_mission_DESCRIPTION:0 "Beyond the Yunnan passes lies the kingdom of the Konbaung — the one southern neighbour that would not bend the knee. Qianlong's generals thought it a punitive stroll; it became the emperor's costliest frontier war, four invasions swallowed by the jungle and the fever of the Irrawaddy lowlands. This is that war fought in earnest. March the banner and Green-Standard armies south, break the Konbaung host and its stockades, and hold the road to the royal city — but the true enemy is the pestilential country itself, which will bleed an army white before it ever sees the walls of Ava. Win it, and the whole of Burma answers to the Son of Heaven."
 qing_burma_war_mission_CRITERIA_DESCRIPTION:0 "Play as the Qing (CHI), and the Konbaung kingdom of Burma (BUR) must exist."
 qing_burma_war_mission_REWARD_DESCRIPTION:0 "Completing every objective in this tree grants its capstone reward."
 qing_burma_war_mission_BUTTON_TOOLTIP:0 "Open this mission tree."

 # ---- ROOT: mobilise the Yunnan frontier ----------------------------
 qing_burma_mobilise:0 "Mobilise the Yunnan Frontier (雲南備邊)"
 qing_burma_mobilise_DESC:0 "Put the armies of the southwest on a war footing and open the campaign against the Konbaung. Once the columns cross the passes there is no easy turning back: the treasury must carry an army provisioned beyond the frontier, and the malarial lowlands ahead will begin their work on the men. Costs #Y 120#! treasury."
 qing_burma_mobilise_tt:0 "Open the southern campaign: lay the #R pestilential lowlands (瘴疫)#! over the Burmese heartland, take on the #R campaign strain#!, and needle the #Y British Raj#! on its Indian frontier."

 # ---- cross the frontier --------------------------------------------
 qing_burma_frontier:0 "Cross the Frontier (度緬關)"
 qing_burma_frontier_DESC:0 "The war begins at the Shan border. Seize and HOLD the border marches — Namtu or Kyaikkhami — with your own armies. The Konbaung do not fold at the first push; expect a hard fight and a defending host that rallies to meet you."
 qing_burma_needs_frontier_tt:0 "The Qing must #Y control#! the border ground: #Y Namtu (9052)#! or #Y Kyaikkhami (7657)#!."
 qing_burma_frontier_tt:0 "The frontier is breached — but the #R Konbaung rally a fresh host#! to bar the road, and the emperor's resolve steadies the court (#G ruler popularity#!)."

 # ---- the road to Ava -----------------------------------------------
 qing_burma_mandalay:0 "The Road to Ava (取阿瓦)"
 qing_burma_mandalay_DESC:0 "Drive deep into the fever country and take the royal heartland at Mandalay. This is where the historical campaigns died — in the swamps and the wet-season sickness, not before the enemy. Hold the city, and claim the ground. Costs #Y 80#! treasury."
 qing_burma_needs_mandalay_tt:0 "The Qing must #Y control#! #Y Mandalay (6562)#!."
 qing_burma_mandalay_tt:0 "Mandalay is held — a #Y claim#! is laid on the royal heartland and the court exults (#G ruler popularity#!)."

 # ---- the fall of the capital ---------------------------------------
 qing_burma_capital:0 "The Fall of the Capital (下緬京)"
 qing_burma_capital_DESC:0 "Take the Konbaung capital itself. With the royal city in Qing hands the enemy state is broken and the dynasty's war of the south is all but won."
 qing_burma_needs_capital_tt:0 "The Qing must #Y control#! the #Y Konbaung capital, Rangoon (7675)#!."
 qing_burma_capital_tt:0 "The royal city has fallen — a #Y claim#! is laid on the capital, the realm steadies (#G stability#!), and the court rejoices (#G ruler popularity#!)."

 # ---- capstone: the pacification of Burma ----------------------------
 qing_burma_capstone:0 "The Pacification of Burma (平定緬甸)"
 qing_burma_capstone_DESC:0 "The Irrawaddy heartland is held by the Son of Heaven — the royal city and the road to it both in Qing hands. Seal the conquest that Qianlong's generals never achieved: Burma, at last, a dominion of the empire."
 qing_burma_needs_conquest_tt:0 "The Qing must #Y control#! BOTH #Y Rangoon (7675)#! and #Y Mandalay (6562)#! — the heartland genuinely subdued."
 qing_burma_capstone_tt:0 "Burma is pacified. The #Y conquered Irrawaddy and Pegu are annexed to the empire#! as Qing soil, the lasting #G dominion of Burma (qing_burma_conquered)#! is won — tax, prestige, legitimacy and manpower from the new southern land — and the #G ruinous campaign strain lifts#! at last. The #Y Shan uplands turn to the poppy (罌粟)#!, joining the empire's own opium country and easing the silver drain of foreign imports."

 # ---- province / campaign modifiers ---------------------------------
 qing_burma_miasma:0 "Pestilential Lowlands (瘴疫)"
 qing_burma_miasma_desc:0 "The malarial jungle of the Irrawaddy — the true killer of the Qing columns. An army standing here bleeds to fever and cannot live off the land."
 qing_burma_campaign_strain:0 "Southern Campaign Strain (南征)"
 qing_burma_campaign_strain_desc:0 "The cost of provisioning an army beyond the passes, and the war-weariness of a long, sickly campaign."
 qing_burma_conquered:0 "Dominion of Burma (平緬)"
 qing_burma_conquered_desc:0 "The Konbaung realm subdued and the Irrawaddy brought under the Son of Heaven — a lasting dividend of the southern conquest."
