l_english:
 # [#356] Marriage-proposal diplomatic play — the two-step picker (replaces Dynastic Match).
 MARRIAGE_PLAY_OPEN_BTN:0 "Propose a Marriage"
 MARRIAGE_PLAY_OPEN_TT:0 "Open a marriage proposal — choose one of your unmarried courtiers and an unmarried figure of another court, and pursue their union as a diplomatic play."
 # [B1] Royal Marriage — diplomatic-view entry point (replaces MARRIAGE_PLAY_OPEN_BTN + its realm picker)
 # [BT-E] header for the collapsible Dynastic Actions category the Royal Marriage button now lives in
 MARRIAGE_PLAY_DYNASTIC_HEADER:0 "Dynastic Actions"
 # [BT-F] section headers splitting each candidate picker into adults and children (minors = betrothal path)
 MARRIAGE_PLAY_SECTION_ADULTS:0 "#Y Adults#!"
 MARRIAGE_PLAY_SECTION_CHILDREN:0 "#Y Children (betrothal)#!"
 MARRIAGE_PLAY_DIPLO_BTN:0 "Royal Marriage"
 MARRIAGE_PLAY_DIPLO_BTN_TT:0 "#T Royal Marriage#!\nPursue a dynastic union with the court of #Y [DiplomaticView.GetTargetCountry.GetName]#!. Choose one of your unmarried courtiers, then an unmarried figure of their court, and press the match as a diplomatic play. Requires a foreign realm with a reigning ruler."
 MARRIAGE_PLAY_TITLE:0 "Propose a Royal Marriage"
 MARRIAGE_PLAY_INSTR:0 "Choose a target realm, then one of your own unmarried characters, then an unmarried character of the opposite sex at that court. The proposed union becomes a diplomatic play — its success turns on the pair's compatibility, the incentives you offer, and the fortunes of the courtship. If both are adults they will wed; if either is a minor they will be betrothed to wed at adulthood. Members of each ruling family are listed first."
 MARRIAGE_PLAY_COL_REALM:0 "Target Realm"
 MARRIAGE_PLAY_COL_OWN:0 "Your Court"
 MARRIAGE_PLAY_COL_THEIR:0 "Their Court (opposite sex)"
 MARRIAGE_PLAY_PICK_REALM_TT:0 "Select this realm as the marriage partner. Its eligible characters will fill the third column."
 MARRIAGE_PLAY_PICK_REALM_FIRST:0 "Select a target realm first — its eligible characters will appear here."
 MARRIAGE_PLAY_PICK_OWN_TT:0 "Choose this character of your court as one half of the match."
 MARRIAGE_PLAY_PICK_THEIR_TT:0 "Choose this character of the target court as the other half of the match."
 MARRIAGE_PLAY_LAUNCH_BTN:0 "Send the Proposal"
 MARRIAGE_PLAY_LAUNCH_TT:0 "Open the marriage-proposal diplomatic play between the two chosen characters. Requires a character selected in both courts."
 MARRIAGE_PLAY_CANCEL_BTN:0 "Cancel"
 MARRIAGE_PLAY_CANCEL_TT:0 "Close without proposing."
 # [BT-marriage-merge 2026-07-23] Back button — return to the own-character step in the merged one-window picker.
 MARRIAGE_PLAY_BACK_BTN:0 "← Back"
 MARRIAGE_PLAY_BACK_TT:0 "Go back and choose a different character from your own court."
 # [rebuild 2026-07-16] three sequential single-column screens — per-screen instruction + empty-list lines.
 MARRIAGE_PLAY_INSTR_REALM:0 "Step 1 of 3 — choose the realm you wish to marry into. Its eligible unmarried characters will be gathered for you to pick from next."
 MARRIAGE_PLAY_INSTR_OWN:0 "Step 2 of 3 — choose one of your own unmarried courtiers. Members of the ruling family are listed first."
 MARRIAGE_PLAY_INSTR_THEIR:0 "Step 3 of 3 — choose an unmarried character of the opposite sex at that court, then send the proposal. If both are adults they wed; if either is a minor they are betrothed to wed at adulthood."
 MARRIAGE_PLAY_NO_REALMS:0 "No realm is presently open to a marriage proposal."
 MARRIAGE_PLAY_NO_OWN:0 "Your court holds no unmarried character to offer."
 MARRIAGE_PLAY_NO_THEIR:0 "That court holds no eligible unmarried character of the opposite sex."
