l_english:

 # ######################################################################
 # mex_instability_l_english.yml — "La República Inestable": Mexico's road from
 # independence through La Reforma to the Second Empire (#96). Beats .1-.13,
 # band/modifier display names, the Empire/Republic name+adjective, and the
 # roster nicknames.
 # ######################################################################

 # --- .1 First Empire — Iturbide ---------------------------------------
 mex_instability.1.t:0 "The Crown of Agustín I"
 mex_instability.1.desc:0 "Independence is won — and won by a royalist. Agustín de Iturbide, the officer who turned his coat to embrace the insurgent Guerrero under the Plan de Iguala, has entered Mexico City at the head of the Army of the Three Guarantees, and now the Congress he bullied has proclaimed him Emperor Agustín I. A Mexican throne, native and Catholic and conservative, rises over a realm that stretches from Guatemala to the Oregon country. But the republicans seethe, the treasury is empty, and a garrison commander at Veracruz named Santa Anna is already sharpening his ambition. The empire is a month old and already the vultures circle."
 mex_instability.1.a:0 "Sustain the Empire — a native throne for a Catholic nation."
 mex_instability.1.b:0 "Cast it down — Mexico shall be a republic."

 # --- .2 Federalist Constitution ---------------------------------------
 mex_instability.2.t:0 "The Constitution of 1824"
 mex_instability.2.desc:0 "Iturbide is fallen and shot, Central America has gone its own way, and the surviving Congress writes a federal republic in the image of the United States to the north: nineteen sovereign states, a weak centre, an elected president. The Federalists — the yorkinos, the coming Liberals — hail it as the charter of a free people. But Lucas Alamán and the centralists warn that a country of caudillos and cathedrals cannot be governed from a hollow capital, that federalism is merely disintegration with a flag. The fault line that will split Mexico for forty years is drawn on this parchment."
 mex_instability.2.a:0 "Embrace federalism — sovereignty to the states."
 mex_instability.2.b:0 "Hold to a strong centre — or the realm dissolves."

 # --- .3 The Age of Santa Anna -----------------------------------------
 mex_instability.3.t:0 "The Napoleon of the West"
 mex_instability.3.desc:0 "Antonio López de Santa Anna takes the presidency, and Mexico begins its long dance with the one man who will dominate it for a generation. He is elected as a Federalist and governs, when it suits him, as a Centralist; he retires to his hacienda at Manga de Clavo and returns whenever the country tires of whoever replaced him. He has beaten the Spanish at Tampico and made himself indispensable. Over the next twenty years he will hold the presidency nearly a dozen times, lose half the nation, and always — somehow — come back. The pronunciamiento, the barracks revolt announced as a lofty 'plan,' is now simply how Mexico changes its government."
 mex_instability.3.a:0 "Let the pendulum swing Centralist."
 mex_instability.3.b:0 "Let the pendulum swing Federalist."

 # --- .4 Texas secedes -------------------------------------------------
 mex_instability.4.t:0 "The Loss of Texas"
 mex_instability.4.desc:0 "The Siete Leyes — Santa Anna's centralist constitution, dissolving the sovereign states into mere departments — has set the whole periphery aflame, from Zacatecas to Yucatán. But it is in the north that the fire cannot be put out. The Anglo colonists of Texas, and no few Tejanos with them, rise against the dictatorship. Santa Anna storms the Alamo and slaughters the garrison at Goliad — and then, careless in his triumph, is surprised and routed at San Jacinto in eighteen minutes, and taken prisoner. At swordpoint he signs Texas away. Mexico's Congress repudiates the treaty and will never recognize the loss, but the Lone Star flies over the north, and everyone can see it."
 mex_instability.4.a:0 "Recognize the loss — regroup what remains."
 mex_instability.4.b:0 "Vow reconquest — Texas is Mexican soil."

 # --- .5 The Pastry War ------------------------------------------------
 mex_instability.5.t:0 "The Pastry War"
 mex_instability.5.desc:0 "France has come to collect. Among the claims of French nationals against the chronically insolvent Mexican state is one from a pastry-cook whose shop was wrecked by looting officers — and so the affair earns its faintly absurd name. But there is nothing absurd about a French squadron blockading Veracruz and bombarding the fortress of San Juan de Ulúa. Santa Anna, disgraced since Texas, rushes to the defense and loses a leg to French grapeshot — a wound he will parade into yet another political resurrection. The blockade teaches Mexico the lesson it will not learn: that a bankrupt nation on this coast is a standing invitation to European guns."
 mex_instability.5.a:0 "Pay the indemnity — lift the blockade."
 mex_instability.5.b:0 "Resist — no foreign fleet dictates to Mexico."

 # --- .6 Mexican War + the Cession -------------------------------------
 mex_instability.6.t:0 "The War of North American Invasion"
 mex_instability.6.desc:0 "The United States has annexed Texas and now wants more. Their army crosses the disputed Río Grande; their general Scott lands at Veracruz and marches the invasion road to the capital, storming Chapultepec where the boy cadets die rather than surrender the colors. The war is lost battle by battle, and at Guadalupe Hidalgo the price is counted: Alta California, New Mexico, the whole northern half of the republic, signed away for fifteen million dollars and the promise that the Americans will go home. Half of Mexico is gone in two years. No humiliation cuts deeper, and none does more to poison the nation's faith in itself — or its dread of the colossus to the north."
 mex_instability.6.a:0 "Accept the treaty — Mexico cannot fight on."
 mex_instability.6.b:0 "Fight on — better ruin than dismemberment."

 # --- .7 The Gadsden Purchase ------------------------------------------
 mex_instability.7.t:0 "His Serene Highness Sells the Mesilla"
 mex_instability.7.desc:0 "Santa Anna is back one last time, styling himself 'His Serene Highness' and ruling a bankrupt court on borrowed splendor. To fill the empty treasury he sells the Americans the Mesilla Valley — the strip they want for a southern railroad — for ten million dollars. That a dictator should dismember the fatherland once was catastrophe; that he should now do it a second time, for cash, to fund his own pomp, is the final outrage. In the mountains of Guerrero the old caudillo Juan Álvarez and the liberals gather. The Age of Santa Anna is about to end, and the men who will end it are already writing their plan."
 mex_instability.7.a:0 "Take the silver — the treasury is empty."
 mex_instability.7.b:0 "Refuse — sell no more of the fatherland."

 # --- .8 The Ayutla Revolution -----------------------------------------
 mex_instability.8.t:0 "The Plan de Ayutla"
 mex_instability.8.desc:0 "From the hot country of Guerrero the liberals raise the standard: Juan Álvarez, the veteran caudillo of the south, and Ignacio Comonfort proclaim the Plan de Ayutla against the dictatorship. This time the pronunciamiento does not merely swap one general for another — it topples an era. Santa Anna, deserted and despised, sails into his final exile, and the man of the future steps forward: Benito Juárez, the Zapotec lawyer from Oaxaca who rose from a shepherd's hut to the bar and the ministry. La Reforma has begun, and behind it stands a generation that means not to govern Mexico but to remake it."
 mex_instability.8.a:0 "Ride the liberal tide — the old order is finished."
 mex_instability.8.b:0 "Moderate the revolution — do not break the nation."

 # --- .9 La Reforma + Constitution of 1857 -----------------------------
 mex_instability.9.t:0 "La Reforma"
 mex_instability.9.desc:0 "The liberals turn their reforms on the two great corporations that have stood outside the nation since the conquest: the army and the Church. The Ley Juárez strips their special courts; the Ley Lerdo forces the Church to sell its vast estates — the largest landholder and banker in Mexico — into the open market. The Constitution of 1857 enshrines it all. From Rome, Pius IX condemns the charter and threatens excommunication upon any who swear to it, and the pulpits thunder that the liberals are heretics come to despoil God's house. The country cleaves in two. What began as reform is curdling, fast, into a war of religion and property."
 mex_instability.9.a:0 "Press the reform to its limit — nationalize the Church."
 mex_instability.9.b:0 "Conciliate the Church — pull back from the brink."

 # --- .10 The War of the Reform ----------------------------------------
 mex_instability.10.t:0 "The Three Years' War"
 mex_instability.10.desc:0 "Comonfort loses his nerve, embraces the conservative Plan de Tacubaya, and then flees — and the constitution he betrayed makes Juárez, as head of the Supreme Court, the lawful president. Now there are two Mexicos and two governments: the conservatives in the capital under the brilliant young general Miguel Miramón, and the liberals at Veracruz under Juárez, holding the customs house and the sea. From that perch Juárez issues the Leyes de Reforma and nationalizes the Church outright. For three years the armies march and countermarch across a ruined land, until the liberals win the field at Calpulalpan and Juárez rides into Mexico City. But the treasury is a smoking void, the country owes fortunes it cannot pay, and the conservatives, beaten at home, are already in Europe whispering to an emperor."
 mex_instability.10.a:0 "The Liberals prevail — Juárez enters the capital."
 mex_instability.10.b:0 "The Conservatives hold — Miramón keeps Mexico City."

 # --- .11 Default + European intervention ------------------------------
 mex_instability.11.t:0 "The Suspension of Payments"
 mex_instability.11.desc:0 "The Reform War has left the treasury an empty shell, and Juárez does the only thing he can: he suspends all payment on the foreign debt for two years. The reply comes from London, where Britain, Spain, and France sign a convention and dispatch a joint fleet to seize the customs of Veracruz and take their money by force. The allied squadrons drop anchor off San Juan de Ulúa — the same fortress France bombarded a generation ago. But this time one of the three creditors has come for more than silver. Napoleon III dreams of a Latin, Catholic empire planted in the Americas to check the Protestant colossus of the north, and he has a candidate already in mind."
 mex_instability.11.a:0 "Negotiate — settle with the creditors at La Soledad."
 mex_instability.11.b:0 "Defy them all — Mexico will not be collected like a debt."

 # --- .12 Cinco de Mayo -> Maximilian ----------------------------------
 mex_instability.12.t:0 "The Empire of Maximilian"
 mex_instability.12.desc:0 "On the fifth of May, before the gates of Puebla, General Ignacio Zaragoza and a ragged republican army — a young colonel named Porfirio Díaz among them — throw back the finest army in the world. The victory rings around the nation and buys a year. But France pours in reinforcements, storms Puebla the second time, and enters Mexico City; Juárez retreats north with the Republic in his carriage. The conservatives get their wish at last: an assembly of notables offers the crown to Ferdinand Maximilian of Habsburg, brother of the Austrian Emperor, and he accepts on the strength of a rigged plebiscite. He steps ashore at Veracruz with his Empress Carlota to reign as Emperor of Mexico — a European throne in the New World, upheld by French bayonets and shadowed, always, by the war raging in the United States that alone keeps the Americans from intervening."
 mex_instability.12.a:0 "Submit to the Empire — order under a Catholic throne."
 mex_instability.12.b:0 "Follow Juárez north — the Republic does not die."

 # --- .13 The Empire falls / endures -----------------------------------
 mex_instability.13.t:0 "Querétaro"
 mex_instability.13.desc:0 "The American war is over, and the Union, victorious and armed, remembers the Monroe Doctrine. Sheridan masses an army on the Río Grande, rifles cross to Juárez by the tens of thousands, and Washington tells Paris plainly to go home. Napoleon III, his Mexican adventure a bottomless drain and his eastern frontier eyeing Prussia, abandons his emperor and withdraws the army that was the throne's only foundation. Maximilian, too proud or too honorable to flee, makes his last stand at Querétaro and is taken, and on the Hill of Bells he faces a republican firing squad beside Miramón and Mejía. Juárez restores the Republic he never conceded had ended. The lesson is carved in powder-smoke: no foreign crown can stand in the Americas without a foreign army to hold it up."
 mex_instability.13.a:0 "The Republic is restored — Juárez triumphant."

 # --- band / modifier display names ------------------------------------
 mex_estable:0 "Mexico: Stable"
 mex_estable_desc:0 "A rare interval of order; the centre holds and the economy breathes."
 mex_inquieta:0 "Mexico: Restive"
 mex_inquieta_desc:0 "The pronunciamiento cycle bites; capital grows wary and the centre frays."
 mex_anarquia:0 "Mexico: Anarchy"
 mex_anarquia_desc:0 "Praetorian chaos; the treasury bleeds and the provinces slip the leash."
 mex_church_dominant:0 "The Church Ascendant"
 mex_church_dominant_desc:0 "A rich, politically entrenched Church — a Conservative bulwark, and a fiscal drag on a state that cannot tax its wealth in mortmain."
 mex_church_disentailed:0 "The Church Disentailed"
 mex_church_disentailed_desc:0 "La Reforma has broken the Church's economic power; its land re-enters the market and the treasury's reach, at the cost of clerical goodwill."
 mex_debt_suspension:0 "Suspension of Payments"
 mex_debt_suspension_desc:0 "Mexico has defaulted on its foreign debt; the creditor powers gather their fleets."
 mex_second_empire:0 "The Second Mexican Empire"
 mex_second_empire_desc:0 "A foreign army holds the capital; order is imposed from above, on a throne resting on French bayonets."
 mex_caste_war:0 "The Caste War of Yucatán"
 mex_caste_war_desc:0 "The Maya of the peninsula have risen against the whites; the province is in open ethnic revolt."

