l_english:
 qing_war.1.t:0 "Officer Review Board"
 qing_war.1.desc:0 "The Grand Minister of War, [scope:war_minister.GetName], convenes a board to review the realm's field commanders. The 兵部 administered the Green Standard Army and officer appointments; a capable War minister ensures his commanders remain loyal and effective."
 qing_war.1.a:0 "Commend [scope:able_commander.GetName] for his service."
 qing_war.1.a.tt:0 "The able commander gains martial skill, loyalty, and wealth."
 qing_war.1.b:0 "Cashier [scope:negligent_commander.GetName] for negligence."
 qing_war.1.b.tt:0 "The negligent commander loses power base and loyalty; the officer corps is strained."
 qing_war.1.c:0 "A general review suffices."
 qing_war.1.c.tt:0 "Modest benefit to morale and legitimacy."
 qing_war.2.t:0 "A Commander's Private Following"
 qing_war.2.desc:0 "Commander [scope:wayward_commander.GetName] has grown too close to his own troops. The 19th-century danger: regional armies (湘軍/淮軍) whose commanders answered to their patrons, not the throne. His power base now rivals that of the court itself."
 qing_war.2.a:0 "Recall him and disband his force."
 qing_war.2.a.tt:0 "The commander loses power base and loyalty; stability strained."
 qing_war.2.b:0 "Promote him to a great office."
 qing_war.2.b.tt:0 "Bind him to the court by giving him a seat at the council table."
 qing_war.2.c:0 "Watch and wait."
 qing_war.2.c.tt:0 "The commander's loyalty drifts further and his power base grows."
 qing_war.3.t:0 "Military Commission"
 qing_war.3.desc:0 "The Grand Minister of War, [scope:war_minister.GetName], recommends a new military commission. The 兵部 administered the Green Standard Army; a capable minister can expand the realm's armed forces."
 qing_war.3.a:0 "Commission a new army."
 qing_war.3.a.tt:0 "Raise a new legion at the capital."
 qing_war.3.b:0 "Commission a naval squadron."
 qing_war.3.b.tt:0 "Raise a new navy at the capital."
 qing_war.3.c:0 "Decline the commission."
 qing_war.3.c.tt:0 "The War minister is disappointed."
 qing_war.4.t:0 "Military-Examination Cycle (武舉)"
 qing_war.4.desc:0 "The Grand Minister of War, [scope:war_minister.GetName], proposes a military-examination cycle to recruit fresh officers. The 武舉 was the military counterpart to the civil examinations, testing candidates in archery, strategy, and the martial classics."
 qing_war.4.a:0 "Fund the full examination cycle."
 qing_war.4.a.tt:0 "2-3 capable martial courtiers join the court."
 qing_war.4.b:0 "A modest intake."
 qing_war.4.b.tt:0 "1 capable martial courtier joins the court."
 qing_war.4.c:0 "Defer the examination."
 qing_war.4.c.tt:0 "Save treasury; stability strained."
 qing_war_officer_purge:0 "Officer Corps Purge"
 qing_war_officer_purge_desc:0 "A purge of negligent officers has strained the officer corps."
 qing_war_general_review:0 "General Review"
 qing_war_general_review_desc:0 "A general review of the officer corps has bolstered morale and loyalty."
 qing_war_army_expansion:0 "Army Expansion"
 qing_war_army_expansion_desc:0 "A new army commission has strengthened the realm's land forces."
 qing_war_naval_expansion:0 "Naval Expansion"
 qing_war_naval_expansion_desc:0 "A new naval squadron has strengthened the realm's maritime forces."
 qing_war_examination_success:0 "Military-Examination Success (武舉)"
 qing_war_examination_success_desc:0 "A successful military-examination cycle has recruited fresh officers."
 qing_war_examination_modest:0 "Military-Examination Intake (武舉)"
 qing_war_examination_modest_desc:0 "A modest military-examination intake has recruited a new officer."
 qing_war_commended_officer:0 "Commended Officer"
 qing_war_commended_officer_desc:0 "This officer has been commended by the Grand Minister of War."
 qing_war_cashiered_officer:0 "Cashiered Officer"
 qing_war_cashiered_officer_desc:0 "This officer has been cashiered for negligence."
 qing_war_recalled_commander:0 "Recalled Commander"
 qing_war_recalled_commander_desc:0 "This commander has been recalled and his force disbanded."
 qing_war_unmonitored_commander:0 "Unmonitored Commander"
 qing_war_unmonitored_commander_desc:0 "This commander operates without oversight, his power base growing."
