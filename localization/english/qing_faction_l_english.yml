l_english:
 # qing_faction_events.txt — conservative-vs-reformist Grand Council politics (#158).
 # Every key BOM+LF. The reform balance / effectiveness / harmony numbers moved by
 # each option are described in se_QING_FACTION.txt and the event options.

 # --- qing_faction.1  THE REFORM MEMORIAL (變法奏摺) ---
 qing_faction.1.t:0 "A Memorial on Reform"
 qing_faction.1.desc:0 "The council chamber is loud today. [scope:reformer.GetName], of the reform-minded party, has laid before the throne a memorial urging the adoption of Western methods — machines, schools, new-model troops. Before the ink is dry, [scope:conservative.GetName] is on his feet in opposition, invoking the ancestors and the sages against every clause of it.\n\nThe two factions of the Grand Council look to Us. The whole court is waiting to see which way the wind blows from the throne."
 qing_faction.1.a:0 "Back the memorial — the times demand it"
 qing_faction.1.a.tt:0 "The reform trajectory advances; [scope:reformer.GetName] is commended, [scope:conservative.GetName] estranged. Costs political influence."
 qing_faction.1.b:0 "Hold to the ancestral ways"
 qing_faction.1.b.tt:0 "The reform trajectory recedes and stability rises; [scope:conservative.GetName] is commended, [scope:reformer.GetName] estranged."
 qing_faction.1.c:0 "Seek a middle course — strength without upheaval"
 qing_faction.1.c.tt:0 "Council effectiveness rises a little, but neither faction is satisfied (both mildly slighted)."

 # --- qing_faction.2  BEHIND THE SCREEN, AGAINST THE TIDE (慈禧阻變) ---
 qing_faction.2.t:0 "Behind the Screen"
 qing_faction.2.desc:0 "The Grand Council has swung toward reform, and the edicts of a new age are being drafted. But from the inner palace the Empress Dowager [scope:dowager.GetName] has made her displeasure known. She summons the great ministers behind the screen, and lets it be understood that the ancestors' realm will not be remade by upstarts while she draws breath.\n\nIt is the old question of this reign: does the throne rule, or does the Dowager? Reform hangs on the answer."
 qing_faction.2.a:0 "Defer to the Empress Dowager"
 qing_faction.2.a.tt:0 "The reforms are rolled back (the reform trajectory falls sharply); the Dowager gains great prestige and the house is outwardly kept, but the council is dragged rightward and governs worse."
 qing_faction.2.b:0 "Defy her — the reforms will proceed"
 qing_faction.2.b.tt:0 "The reform trajectory advances and the Emperor gains prestige, but the imperial house is bitterly divided (a heavy blow to dynastic harmony). Costs political influence."

 # --- qing_faction.3  A COUNCIL AT DEADLOCK (朝議紛爭) ---
 qing_faction.3.t:0 "A Council at Deadlock"
 qing_faction.3.desc:0 "The Grand Council is split down the middle. For every reformer like [scope:reformer.GetName] there is a conservative like [scope:conservative.GetName], and every question — a railway, a tariff, an appointment — divides the chamber into two immovable camps. Memorials pile up unanswered; nothing is decided; the business of the empire grinds to a halt.\n\nThe factions will not resolve this themselves. Only the throne can break the deadlock."
 qing_faction.3.a:0 "Force it — purge the lesser faction's loudest voice"
 qing_faction.3.a.tt:0 "The smaller bloc's spokesman is unseated and estranged; council effectiveness recovers, but tyranny rises. The reform balance tilts toward the surviving majority."
 qing_faction.3.b:0 "Broker a working consensus"
 qing_faction.3.b.tt:0 "Spend political influence to bridge the two blocs — council effectiveness recovers markedly and both spokesmen are commended."
 qing_faction.3.c:0 "Let the paralysis run its course"
 qing_faction.3.c.tt:0 "Council effectiveness bleeds further, and the two spokesmen become personal rivals."
 # [#308/user] .4 — a collective memorial (聯名上奏): a bloc of councillors lobbies together
 qing_faction.4.t:0 "A Collective Memorial (聯名上奏)"
 qing_faction.4.desc:0 "It is not one man this time but many. A bloc of the Grand Council has set its names to a single memorial and stands before the throne with one voice — [scope:lobby_leader.GetName] at their head. They have banded together to press their case as a body, and the weight of their number is itself the argument: to refuse them is to face down a caucus of the men who run the empire, not a lone petitioner.\n\nThe throne may grant what they ask, face them down, or quietly draw off their spokesman and let the bloc collapse without him."
 qing_faction.4.a:0 "Concede to the memorial"
 qing_faction.4.a.tt:0 "Grant the bloc's demand. #G The whole caucus is gratified#! and the realm's course bends their way — a reformist or issue bloc #G advances reform#! and eases pressure; a conservative bloc #G rolls it back#! for a gain in stability. Costs political influence."
 qing_faction.4.b:0 "Face them down — the throne will not be dictated to"
 qing_faction.4.b.tt:0 "Assert the autocrat's prerogative. #R The whole bloc is estranged#! and #R council effectiveness dips#! while they sulk, and a #R touch of tyranny#! — but the throne's authority stands undivided."
 qing_faction.4.c:0 "Co-opt their spokesman"
 qing_faction.4.c.tt:0 "Draw off [scope:lobby_leader.GetName] with favour and standing so he abandons the caucus. #G He is bound closer to the throne#!, but the #R rest of the bloc, leaderless and betrayed, is left estranged#! — divide and rule. Costs political influence."
