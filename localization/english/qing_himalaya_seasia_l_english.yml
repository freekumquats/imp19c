l_english:

 # ====================================================================
 # THE SOUTHERN & MARITIME FRONTIER (南疆與海疆) — Qing Himalaya + Southeast
 # Asia expansion mission tree. See common/missions/qing_himalaya_seasia_missions.txt
 # and common/modifiers/qing_himalaya_seasia_modifiers.txt.
 # Sources: Perdue, China Marches West (2005); Dai Yingcong, "A Disguised
 # Defeat: The Myanmar Campaign of the Qing Dynasty" (Modern Asian Studies,
 # 2004); Woodside, Vietnam and the Chinese Model (1988); Rose, Nepal:
 # Strategy for Survival (1971, the Sino-Nepalese War & tribute); John K.
 # Fairbank (ed.), The Chinese World Order (1968, the tributary system).
 # ====================================================================

 # ---- mission header ------------------------------------------------
 qing_himalaya_seasia_mission:0 "The Southern & Maritime Frontier (南疆與海疆)"
 qing_himalaya_seasia_mission_DESCRIPTION:0 "Ringing the empire to the south lies the old tributary world of the Son of Heaven — Tibet under its ambans, the Gurkha kingdom that bent the knee in 1792, and beyond the mountains the whole of the southern seas: Burma, Siam, Vietnam, Cambodia, Laos, the Shan chiefs, all of whom once sent tribute to Beijing. But two European empires now climb toward it — Britain up out of India, France into Indochina. Reassert the 朝貢 order across the Himalaya and the Nanyang before they close it off, whether by the sword or by the shrewder art of dividing the spoils with the barbarians themselves."
 qing_himalaya_seasia_mission_CRITERIA_DESCRIPTION:0 "This enterprise is complete when the Himalayan and mainland-Southeast-Asian marches — Nepal, Sikkim, the Shan and Lao states — are bound to the throne as tributaries."
 qing_himalaya_seasia_mission_REWARD_DESCRIPTION:0 "Completing every objective in this tree grants its capstone reward."
 qing_himalaya_seasia_mission_BUTTON_TOOLTIP:0 "Open this mission tree."

 # ---- ROOT: the Court of Colonial Affairs (理藩院) -------------------
 qing_hs_lifanyuan:0 "Extend the Court of Colonial Affairs (理藩院)"
 qing_hs_lifanyuan_DESC:0 "The Lifanyuan has governed the empire's Inner Asian dependencies — Mongols, Tibetans, the Muslim west — since the dynasty's founding. Broaden its remit to the whole southern arc, from the Himalayan glacis to the tributaries of the southern seas, and give the court a single instrument for ordering the frontier."
 qing_hs_lifanyuan_tt:0 "Found the #Y Southern Court#! and open the frontier enterprise."

 # ---- ARC I: the Himalaya -------------------------------------------
 qing_hs_tibet:0 "Confirm the Amban Protectorate (駐藏大臣)"
 qing_hs_tibet_DESC:0 "Since 1720 the empire has held Tibet through its resident commissioners — the ambans at Lhasa — and the garrison that answers to them. Reaffirm that protectorate in strength: fortify the holy city, bind the Ganden Podrang to Beijing, and make the roof of the world the empire's own southern rampart against whatever climbs the far side of the range."
 qing_hs_tibet_tt:0 "Fortify #Y Lhasa#! and entrench the #Y amban#! protectorate over Tibet."

 qing_hs_nepal:0 "The Gurkha Tribute (廓爾喀) Restored"
 qing_hs_nepal_DESC:0 "In 1788–92 the Qianlong court fought the Gurkhas across the Himalaya and drove them back from Tibet; the war ended with a Nepalese tribute mission to Beijing and a fixed cycle of embassies thereafter. Make that bond permanent. Bring the kingdom of the Gurkhas back into the tributary fold under the Son of Heaven — and in so doing, plant the Qing flag on the very crest that the British Raj is climbing from below."
 qing_hs_nepal_tt:0 "Make #Y Nepal#! a tributary and press the Qing claim into the Himalaya — this #R provokes Britain#!."

 qing_hs_himalaya_ring:0 "Close the Himalayan Ring (錫金・不丹・拉達克)"
 qing_hs_himalaya_ring_DESC:0 "Beyond Nepal lie the other Buddhist marches of the range — Sikkim, Bhutan, and Ladakh, the 'Little Tibet' of the western passes. Draw them all into the protectorate and the whole southern face of the Himalaya becomes a single defended glacis. But that wall now abuts British India along its entire length: a strong Qing may negotiate a demarcation of spheres along the watershed; a bolder one simply takes the range and dares London to answer."
 qing_hs_himalaya_ring_tt:0 "Claim #Y Sikkim, Bhutan and Ladakh#! and raise the #Y Himalayan Wall#!."

 # ---- ARC II: Southeast Asia ----------------------------------------
 qing_hs_vietnam:0 "Deepen the Vietnamese Tribute (越南)"
 qing_hs_vietnam_DESC:0 "Vietnam has been the most Confucian of the tributaries — its court modelled on Beijing's, its embassies among the most faithful — even as the Qing armies that marched south in 1788 met defeat at Đống Đa. Reaffirm and deepen that bond now, press the imperial claim upon the Red River and Hanoi, and step directly into the country France means to make the heart of its own Indochina."
 qing_hs_vietnam_tt:0 "Make #Y Vietnam#! a tributary and claim #Y Hanoi#! — the heart of the coming #R French#! sphere."

 qing_hs_indochina:0 "The Indochina Sphere (柬埔寨・寮國)"
 qing_hs_indochina_DESC:0 "Behind Vietnam lie Cambodia and the Lao principalities of the Mekong — Vientiane and Luang Prabang — long caught between Siamese and Vietnamese overlordship. Draw them into the Qing tributary order and the whole of the future French Indochina falls within the empire's shadow. Paris will not forgive it."
 qing_hs_indochina_tt:0 "Claim #Y Phnom Penh and Vientiane#!, make Cambodia and Laos tributaries, and raise the #Y Indochina Sphere#! — this #R gravely provokes France#!."

 qing_hs_burma:0 "The Konbaung Reckoning (緬甸)"
 qing_hs_burma_DESC:0 "Four times between 1765 and 1769 the Qianlong court hurled its armies at Konbaung Burma, and four times the jungle and the Burmese turned them back — until Burma too, in the end, resumed the tribute embassies. Settle that old account. Bring Burma into the tributary fold and claim the road to Mandalay — and meet the British, pushing up from Bengal, at the very frontier where two empires' ambitions collide."
 qing_hs_burma_tt:0 "Make #Y Burma#! a tributary and claim #Y Mandalay#! — this #R gravely provokes Britain#!."

 qing_hs_siam:0 "The Siamese Pivot (暹羅)"
 qing_hs_siam_DESC:0 "Siam sent tribute to Beijing more often than any other Southeast Asian court, and it alone would keep its independence by playing Britain and France against each other. Win it to the Qing order and you hold the pivot of the whole Nanyang — the wedge between British Burma and French Indochina. But to plant the dragon banner in Bangkok is to needle both European empires at once."
 qing_hs_siam_tt:0 "Make #Y Siam#! a tributary, claim #Y Bangkok#!, and become the #Y suzerain of the southern seas#! — this #R provokes both Britain and France#!."

 # ---- CAPSTONE ------------------------------------------------------
 qing_hs_capstone:0 "The Southern Dominion Restored (南天一統)"
 qing_hs_capstone_DESC:0 "From the snows of Ladakh to the mouths of the Mekong, from the amban's yamen at Lhasa to the harbour of Bangkok, the tributary order of the Son of Heaven stands whole again — and modern. Where another history saw Britain take Burma, France take Indochina, and the whole southern arc carved from a helpless court, this Qing has closed the mountains and mastered the southern seas. The Nanyang is once more a Chinese world."
 qing_hs_capstone_tt:0 "Complete the #Y Southern Dominion#! — the tributary order of the south restored and modernised."

 # ---- gate tooltips (allow blocks) ----------------------------------
 qing_hs_needs_tibet_tt:0 "Must own or hold a subject who owns #Y Lhasa#! (province 3819)."
 qing_hs_needs_vietnam_tt:0 "The state of #Y Vietnam#! must exist."
 qing_hs_needs_burma_tt:0 "The state of #Y Burma#! must exist."
 qing_hs_needs_siam_tt:0 "The state of #Y Siam#! must exist."
 qing_hs_needs_south_tt:0 "Must hold the southern frontier — a Himalayan, Indochinese or Nanyang institution, or any #Y tributary#! of the sinosphere."

 # ---- "split the difference" partition tooltips ---------------------
 qing_hs_partition_britain_tt:0 "The Qing is strong enough to #G split the difference#!: divide the frontier with #Y Britain#! by negotiation rather than provocation."
 qing_hs_partition_france_tt:0 "The Qing is strong enough to #G split the difference#!: divide the frontier with #Y France#! by negotiation rather than provocation."

 # ---- modifier names & descriptions ---------------------------------
 qing_hs_southern_court:0 "The Southern Court (理藩院)"
 qing_hs_southern_court_desc:0 "The Court of Colonial Affairs, extended to the southern and Himalayan marches — a single instrument for ordering the frontier and its tributaries."
 qing_hs_amban:0 "The Amban Protectorate (駐藏大臣)"
 qing_hs_amban_desc:0 "The resident-commissioner regime over Tibet, garrison and yamen together — the empire's fortified southern rampart."
 qing_hs_himalayan_wall:0 "The Himalayan Wall (喜馬拉雅屏障)"
 qing_hs_himalayan_wall_desc:0 "The whole southern face of the range closed into a single defended glacis — Nepal, Sikkim, Bhutan and Ladakh under the Son of Heaven."
 qing_hs_indochina_sphere:0 "The Indochina Sphere (中南半島)"
 qing_hs_indochina_sphere_desc:0 "Vietnam, Cambodia and Laos drawn into the tributary fold — the trade of the eastern peninsula flowing to the empire."
 qing_hs_nanyang_suzerain:0 "Suzerain of the Southern Seas (南洋宗主)"
 qing_hs_nanyang_suzerain_desc:0 "Siam won and the pivot of the Nanyang held — the empire astride the wedge between the British and French spheres, and the commerce of the southern ocean."
 qing_hs_southern_dominion:0 "The Southern Dominion (南天一統)"
 qing_hs_southern_dominion_desc:0 "The tributary order of the south restored whole and modernised, from the Himalaya to the Mekong — a Chinese Nanyang once more, and the empire the greater for it."
