l_english:

 # spa_america_l_english.yml — [boot #17] Spanish-America Napoleonic disruption arc + Qing hook.

 # --- .1 The Retrocession of Louisiana (San Ildefonso, 1800) ---
 spa_america.1.t:0 "The Retrocession of Louisiana"
 spa_america.1.desc:0 "By the third Treaty of San Ildefonso, chief minister Godoy trades distant, costly Louisiana back to Bonaparte's France — in exchange for an Italian kingdom for the queen's brother. A paper triumph: at a stroke Spain gives up the Mississippi buffer that shielded the silver provinces of New Spain from the Anglo-Americans, keeping only the vast plains she never truly held."
 spa_america.1.a:0 "Trust the French alliance — an Italian crown for a wilderness."
 spa_america.1.b:0 "Rue the bargain — the Mississippi was our shield."

 # --- .2 The Louisiana Purchase (1803) ---
 spa_america.2.t:0 "The Louisiana Purchase"
 spa_america.2.desc:0 "Napoleon, needing silver for his coming war and unable to hold the province against the British fleet, sells Louisiana entire to the young American republic. New Spain now shares its whole northern frontier with a vigorous, land-hungry neighbour where once there was only empty distance."
 spa_america.2.a:0 "The Americans are a distant merchant folk — no threat to our silver."
 spa_america.2.b:0 "Fortify the northern presidios against the restless republic."

 # --- .3 The Bayonne Abdications — the Juntas Rise (1808) ---
 spa_america.3.t:0 "The Juntas Rise"
 spa_america.3.desc:0 "At Bayonne, Bonaparte has forced both Charles IV and his son Ferdinand to abdicate, and set his own brother Joseph on the Spanish throne. The loyal viceroyalties of the Americas will neither obey the usurper nor sit idle: from Caracas to Buenos Aires the cabildos form governing juntas — sworn, they say, in captive Ferdinand's name. Viceregal authority, once absolute, will never fully recover."
 spa_america.3.a:0 "Rule through the juntas in Ferdinand's name — hold the empire by fiction."
 spa_america.3.b:0 "Send loyalist officers to crush the presumptuous cabildos."

 # --- .4 The Cry of Dolores & the Loss of West Florida (1810) ---
 spa_america.4.t:0 "The Cry of Dolores"
 spa_america.4.desc:0 "The empire fractures at both ends. In the Bajío, Father Miguel Hidalgo rings his church bell and raises the peasantry under the banner of the Virgin of Guadalupe — the Mexican war of independence has begun. On the Gulf, the Anglo settlers of West Florida seize the fort at Baton Rouge, proclaim a republic, and are annexed by the United States within weeks. The New World empire is coming apart."
 spa_america.4.a:0 "Loose the royalist army — Hidalgo will hang within the year."
 spa_america.4.b:0 "The empire is slipping — husband what strength remains for Spain herself."

 # --- .5 (Qing) Spain Prostrate — a Pacific Opening (1808) ---
 spa_america.5.t:0 "Spain Prostrate — a Pacific Opening"
 spa_america.5.desc:0 "Word reaches Peking through the Canton merchants: Madrid has fallen to the French, and across the Great Eastern Ocean her empire convulses — the viceroys govern by juntas, the treasure-fleets falter, and the far Pacific reaches of New Spain (the terminus of the Manila galleon, the Californian missions, the misty Nootka coast) lie all but ungoverned. A throne with a foothold on that ocean might press its advantage while Spain cannot lift a hand."
 spa_america.5.a:0 "Press the Pacific coast — plant a foothold Spain can no longer defend."
 spa_america.5.a.tt:0 "#Y Spend 120 treasury#!. Press the Qing claim along the Pacific coast (the proven fur-coast/silver-road colonial hook); #G +10 prestige#! and the court takes heart."
 spa_america.5.b:0 "Stand aside — the throne will not chase a wilderness across the widest ocean."
