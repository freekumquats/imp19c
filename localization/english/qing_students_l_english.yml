l_english:

######################################################################
# qing_students_l_english.yml — THE EDUCATIONAL MISSION & STUDENTS ABROAD
# (留學生 / 留美幼童). Covers the students modifiers, the mission-hub and
# recall-crisis events, and the mechanics-panel verb.
# See se_QING_STUDENTS.txt / qing_students_events.txt.
######################################################################

 # ---- modifiers --------------------------------------------------------------
 qing_students_mission_running:0 "留學生 — Educational Mission Abroad"
 qing_students_returnee_corps:0 "海歸 — Western-Trained Returnee Corps"
 qing_students_alarm_high:0 "士林側目 — Literati Alarm at the Mission"

 # ---- the mechanics-panel verb -----------------------------------------------
 qing_action_students_mission:0 "The Educational Mission (留學生)"
 qing_action_students_mission_desc:0 "Send China's brightest boys abroad to master Western science, engineering, and navigation — a generation trained to man the arsenals, telegraphs, railways, and fleets at home. It is the boldest human-capital wager of the age, but the classical literati distrust it: every cohort abroad feeds their alarm, and if reform pressure and alarm both spike, the court may recall the mission in disgrace."
 qing_action_students_needs_treasury_tt:0 "Requires #Y40 Treasury#!"

 # ---- .1  the mission hub -----------------------------------------------------
 qing_students.1.t:0 "Boys to the Western Schools"
 qing_students.1.desc:0 "Yung Wing (容閎), the first Chinese graduate of an American college, presses his scheme upon the court: send our children abroad — to New England, to the naval academies of France and England — to be schooled in the sciences that make the West strong, and to return in a decade as the engineers and admirals of a modern China. Zeng Guofan and Li Hongzhang lend their patronage. The Hanlin scholars call it madness — to entrust the flower of our youth to barbarian tutors, to see them forget the sages and cut their queues.\n\nWhat is the court's will?"
 qing_students.1.launch:0 "Launch the Educational Mission (幼童出洋肄業局)."
 qing_students.1.launch.tt:0 "Found the mission and send the first cohort abroad. Begins building a pool of Western-trained returnees who will advance Self-Strengthening as they graduate — but raises conservative alarm and reform pressure."
 qing_students.1.cohort:0 "Send another cohort abroad."
 qing_students.1.cohort.tt:0 "Enlarge the mission. More students abroad means a greater returnee dividend to come — but a larger affront to the literati, feeding the alarm that drives the recall risk."
 qing_students.1.refound:0 "Re-found the dissolved mission."
 qing_students.1.refound.tt:0 "A later reform-minded court reopens the Educational Mission that was once recalled. Sends a fresh cohort abroad."
 qing_students.1.decline:0 "Not now — the classics must come first."

 # ---- .10  the recall crisis --------------------------------------------------
 qing_students.10.t:0 "Recall the Students!"
 qing_students.10.desc:0 "The censors have their memorial before the throne. The boys abroad, they thunder, have gone native — they wear foreign dress, play foreign games, kneel in foreign churches; some have cut their queues, that badge of loyalty to the dynasty. They will come home not as servants of the throne but as strangers to it. The mission must be dissolved, the students hauled back before the rot spreads. Li Hongzhang and Yung Wing plead for patience — a few years more and the first engineers will return.\n\nThe court awaits the imperial decision."
 qing_students.10.defend:0 "Face down the censors — the mission stands."
 qing_students.10.defend.tt:0 "Spend #Y40 Political Influence#! to defend the mission. Alarm subsides sharply, reform pressure eases, and the reform faction is emboldened. The students stay abroad to finish their studies."
 qing_students.10.yield:0 "Yield — recall the mission. (The 1881 outcome.)"
 qing_students.10.yield.tt:0 "Dissolve the Educational Mission and haul the students home before their degrees. The cohort abroad is forfeit; only a fraction — the near-finished — return as trained men. A heavy blow to prestige and a jolt of reform pressure."
