l_english:
 # marriage_l_english.yml — [#311] the dynastic-marriage layer (se_MARRIAGE.txt +
 # MARRIAGE_actions.txt). Grounded in research/1763_ROYAL_MARRIAGE_diplomacy.md. BOM+LF.

 # ---- L4 GUI action tooltips (custom_tooltip gate reasons) --------------------
 marriage_action_needs_bond_slot_tt:0 "Our house holds fewer than #Y 3#! standing dynastic marriages (a house wed to too many is saturated)."
 marriage_action_needs_compatible_tt:0 "The two houses are #Y compatible#! — both are of the Western Christian marriage bloc, OR they share a faith, OR a #Y bridge#! (a papal dispensation or a bride's conversion) has been forged. A match across the confessional line (e.g. a Qing–European union) is impossible until such a bridge is made."
 marriage_action_needs_pi_40_tt:0 "Requires #R 40#! political influence — the diplomatic groundwork for a dispensation or a conversion."
 marriage_action_needs_treasury_80_tt:0 "Requires #R £80#! — the price of the dispensation apparatus and the attendant gifts."

 # ---- opinion modifiers -------------------------------------------------------
 royal_marriage_opmod:0 "Royal Marriage"
 royal_betrothal_opmod:0 "Royal Betrothal"
 royal_jilted_opmod:0 "A Betrothal Repudiated"

 # ---- country modifier --------------------------------------------------------
 royal_marriage_dysfunction:0 "A Loveless Royal Marriage"
 royal_marriage_dysfunction_desc:0 "The sovereign's dynastic match is barren and unhappy — a shadow over the succession and a discord at court that drags on legitimacy and the temper of the realm."
 royal_marriage_entente:0 "Dynastic Entente"
 royal_marriage_entente_desc:0 "A royal marriage binds our house to a great power that cannot stoop to a formal alliance — yet the dynastic tie is a standing understanding all the same: a diplomatic bond, a mutual-defence sympathy, and the prestige of the match. It fades with the generation that made it unless renewed."

 # ---- L4 candidate-list window (marriage_window.gui + marriage_open_candidates) ----
 MARRIAGE_OPEN_BTN:0 "Royal Marriages (聯姻)"
 MARRIAGE_OPEN_BTN_TT:0 "Open the #Y dynastic-marriage#! court: the foreign houses your dynasty could wed. A marriage binds two ruling houses in standing goodwill and alliance — but equal standing was demanded of both #Y faith#! and #Y power#!. A house far beneath (or above) your own great-power standing, or of an alien confession, can be wed only after a #Y bridge#! is forged."
 MARRIAGE_WINDOW_TITLE:0 "The Dynastic Match (聯姻)"
 MARRIAGE_WINDOW_OWN_HEADER:0 "Our House: #Y [Player.GetRuler.GetFamily.GetName]#!"
 MARRIAGE_WINDOW_OWN_HEADER_TT:0 "Your own dynasty. A prospective match is judged against your house on two axes: #Y faith / bloc#! and #Y power#! (an economic-and-military great-power score). Only a near-peer of a compatible confession may wed freely."
 MARRIAGE_WINDOW_POWER_LABEL:0 "#Y Marriage Power#!"
 MARRIAGE_WINDOW_POWER_TT:0 "#Y Marriage Power of the House of [Player.GetRuler.GetFamily.GetName]: [Player.MakeScope.Var('marriage_display_power').GetValue|0]#!\nOur #Y great-power score#! — the combined weight of economy, military, technology, subjects, administration and stability. A partner's score must lie within a threefold band of ours to be a match of comparable standing; a wider gulf demands a bridge."
 MARRIAGE_WINDOW_CAND_POWER_TT:0 "This house's #Y great-power score#!, set beside ours. Within a threefold band either way, the two are of comparable standing and may wed freely (faith permitting); beyond it, only a forged bridge will serve."
 MARRIAGE_BTN_PROPOSE:0 "Propose"
 MARRIAGE_BTN_PROPOSE_TT:0 "Conclude a #Y royal marriage#! with this house at once — available only when the pair is compatible (comparable power AND a shared bloc or faith, or a bridge already forged) and both courts field a marriageable child. Binds the houses in goodwill and a lasting alliance, with a dowry."
 MARRIAGE_BTN_SEEK_BRIDGE:0 "Seek Dispensation"
 MARRIAGE_BTN_SEEK_BRIDGE_TT:0 "Forge a #Y bridge#! to this house — a papal dispensation or a bride's conversion — the sole road to a match across the confessional or power line (a Qing–European union, a Catholic–Protestant one). Costs political influence and treasury. Shown only when a bridge is actually required."
 MARRIAGE_BTN_BETROTH:0 "Betroth"
 MARRIAGE_BTN_BETROTH_TT:0 "Pledge a #Y betrothal#! — a binding promise that a child of each house (a #Y minor#! may be pledged, unlike a marriage) shall wed once #Y both come of age#!. It does #Y not#! seal an alliance, but it #G warms relations#! in anticipation of the union. When both children are grown the match concludes automatically. If a betrothed child #Y dies#!, the pledge dissolves with no blame — but to #R wilfully break#! it while both live is a grave insult (a lasting grievance, a broken bond, lost prestige)."
 marriage_action_needs_betrothable_child_tt:0 "Both houses field a #Y betrothable child#! — a child of the ruling family, alive, unwed, and not already pledged (any age: a minor may be betrothed)."
 MARRIAGE_WINDOW_CHILDREN_LINE:0 "#Y Marriageable:#! [Country.MakeScope.Var('marriage_display_adult_children').GetValue|0]   #Y Betrothable:#! [Country.MakeScope.Var('marriage_display_child_count').GetValue|0]"
 MARRIAGE_WINDOW_CHILDREN_TT:0 "#Y Marriageable#! = children of the ruling house who are grown and could wed #Y now#! (the Propose option). #Y Betrothable#! = children of any age who could be #Y pledged#! to wed at adulthood (the Betroth option) — this includes the marriageable ones."
 MARRIAGE_WINDOW_STATUS_WED:0 "#qing_reformist ● Wed#!"
 MARRIAGE_WINDOW_STATUS_BETROTHED:0 "#qing_conservative ● Betrothed#!"
 MARRIAGE_WINDOW_EMPTY:0 "No eligible house is within reach of our court. A prospective match must be a dynastic monarchy in diplomatic range with an unwed child of the ruling family."
 MARRIAGE_WINDOW_HINT:0 "Choose a house to #Y propose#! a marriage, #Y betroth#! two children to wed at adulthood, or (across a confessional or power gulf) #Y seek a dispensation#!."
