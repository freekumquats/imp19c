l_english:
 qing_ethnic.1.t:0 "Unrest in [revolt_province.GetName]"
 qing_ethnic.1.desc:0 "The province of [revolt_province.GetName] has erupted in open revolt. The local population, long restive under our rule, has taken up arms against the throne. Our governors report that the grievances run deep — cultural alienation, heavy taxation, and the memory of conquest all fuel the flames. If we do not act decisively, the revolt may spread to neighbouring provinces."
 qing_ethnic.1.a:0 "Grant them autonomy and lower the tax burden."
 qing_ethnic.1.a.tt:0 "The province's tension will fall substantially, and we will lower ethnic tension empire-wide — but the court will see this as weakness."
 qing_ethnic.1.b:0 "Send a pacification expedition to restore order."
 qing_ethnic.1.b.tt:0 "A martial response: the province's tension will fall moderately, but at the cost of manpower and gold."
 qing_ethnic.1.c:0 "Crush the revolt with no quarter."
 qing_ethnic.1.c.tt:0 "A harsh suppression will cow the province, but the brutality will inflame neighbouring lands and raise ethnic tension across the empire."
 qing_ethnic.2.t:0 "Restive Province: [restive_province.GetName]"
 qing_ethnic.2.desc:0 "Our governors report that [restive_province.GetName] is becoming increasingly restive. The local population chafes under our rule, and whispers of discontent spread through the markets and teahouses. The province has not yet erupted into open revolt, but the signs are ominous. We should act now, while the situation is still manageable."
 qing_ethnic.2.a:0 "Send a trusted envoy to investigate and report."
 qing_ethnic.2.a.tt:0 "The attention will soothe the province slightly, at a small cost in gold."
 qing_ethnic.2.b:0 "Noted. We will watch the situation."
 qing_ethnic.2.b.tt:0 "No immediate action — the warning is informational."
 qing_ethnic.3.t:0 "The Revolt Spreads"
 qing_ethnic.3.desc:0 "The revolt in [snowball_source.GetName] has not been contained, and the flames of rebellion are spreading to neighbouring provinces. Our regional forces are stretched thin, and the local population grows bolder with each passing day. If we do not deploy a decisive force now, the entire region may slip from our grasp."
 qing_ethnic.3.a:0 "Deploy regional forces to contain the spread."
 qing_ethnic.3.a.tt:0 "A heavy cost in manpower and gold, but the revolt will be contained."
 qing_ethnic.3.b:0 "Let the regional forces handle it — do not overreact."
 qing_ethnic.3.b.tt:0 "No immediate cost, but the revolt will continue to fester and ethnic tension will rise."
 qing_ethnic_autonomy_granted:0 "Autonomy Granted (自治)"
 qing_ethnic_autonomy_granted_desc:0 "The throne has granted this province a measure of autonomy in exchange for peace."
 qing_ethnic_crushed_brutally:0 "Crushed Brutally (嚴懲)"
 qing_ethnic_crushed_brutally_desc:0 "A harsh suppression has cowed the population, but resentment festers."
 qing_ethnic_restive:0 "Restive (離心)"
 qing_ethnic_restive_desc:0 "The local population is increasingly alienated from the throne."
