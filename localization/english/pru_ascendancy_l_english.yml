l_english:

 # pru_ascendancy_l_english.yml — PRU 1763-1815 arc (#283).

 # --- .1 The First Partition of Poland ---
 pru_ascendancy.1.t:0 "The First Partition of Poland"
 pru_ascendancy.1.desc:0 "Frederick the Great, Catherine of Russia and Maria Theresa of Austria agree to carve away the borderlands of the Polish-Lithuanian Commonwealth among themselves. Prussia takes Royal Prussia, uniting Brandenburg with East Prussia at last."
 pru_ascendancy.1.a:0 "Take our share — the corridor to the east is ours."

 # --- .2 The League of Princes ---
 pru_ascendancy.2.t:0 "The League of Princes"
 pru_ascendancy.2.desc:0 "Frederick forms the Furstenbund to rally the German princes against Habsburg ambition, casting Prussia as the champion of German liberties against Vienna."
 pru_ascendancy.2.a:0 "Lead the German princes."

 # --- .3 The Fall of Poland ---
 pru_ascendancy.3.t:0 "The Fall of Poland"
 pru_ascendancy.3.desc:0 "With the Second and Third Partitions, Poland is erased from the map of Europe. Prussia gains Warsaw and the lands of New East Prussia, swollen with new subjects and new troubles."
 pru_ascendancy.3.a:0 "Take Warsaw — Poland is no more."

 # --- .4 The Catastrophe of Jena ---
 pru_ascendancy.4.t:0 "The Catastrophe of Jena"
 pru_ascendancy.4.desc:0 "Prussia, proud heir of Frederick, marches against Napoleon and is annihilated in a single day at Jena and Auerstedt. The Tilsit peace strips away half the kingdom; Prussia is brought to her knees."
 pru_ascendancy.4.a:0 "Endure — and prepare to rise again."

 # --- .5 The Prussian Reforms ---
 pru_ascendancy.5.t:0 "The Prussian Reforms"
 pru_ascendancy.5.desc:0 "In the ashes of defeat, Stein and Hardenberg remake the state and Scharnhorst and Gneisenau remake the army. A humbled Prussia forges the instruments of her resurrection."
 pru_ascendancy.5.a:0 "Reform the state — a new Prussia will rise."

 # --- .6 The Battle of the Nations ---
 pru_ascendancy.6.t:0 "The Battle of the Nations"
 pru_ascendancy.6.desc:0 "At Leipzig the reborn Prussian army, in the coalition of nations, helps shatter Napoleon's power. Prussia marches to victory and, at Vienna, to the Rhineland and the rank of a great power restored."
 pru_ascendancy.6.a:0 "On to the Rhine — Prussia is great again."
