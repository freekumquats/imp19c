 # ====================================================================
 # THE JAPAN / MEIJI SUB-LAYER (東亞近代化) — task #22.
 #   mission tree:  common/missions/qing_japan_missions.txt
 #   effects:       common/scripted_effects/se_QING_DIPLO.txt (QING_japan_*)
 #   modifiers:     common/modifiers/qing_japan_modifiers.txt
 #   opinions:      common/opinions/imp19c_opinions.txt
 #   player verbs:  common/scripted_guis/QING_mechanics_actions.txt
 #                  (buttons in gui/government_view.gui)
 # Task title = the task key itself; description = <key>_DESC; the completion
 # summary tooltip = <key>_tt, matching the other Qing mission trees.
 # Sources: Jansen, The Making of Modern Japan (2000); Key-Hiuk Kim, The Last
 #   Phase of the East Asian World Order (1980); Howland, Borders of Chinese
 #   Civilization (1996); S.C.M. Paine, The Sino-Japanese War of 1894–1895 (2003).
 # ====================================================================

 # ---- mission header --------------------------------------------------
 qing_japan_mission:0 "Japan and the Eastern Sea (東亞近代化)"
 qing_japan_mission_DESCRIPTION:0 "Across the narrow eastern sea lies the one power that is neither tributary nor barbarian but the Middle Kingdom's own mirror — an Asian court racing the very modernization the Self-Strengthening Movement attempts. #Y 同文同種#! — same script, same race. Japan may be the Qing's truest ally against the Western tide, or, industrialized and hostile, the sharpest danger it will ever face. Open the closed courts, then choose the road: the pan-Asian #Y accord#!, or the #Y rivalry#! that ends in the collision over Korea, the Ryukyus and Formosa."
 qing_japan_mission_CRITERIA_DESCRIPTION:0 "This enterprise is complete when Japan has been drawn into the Qing sphere and the pan-Asian order affirmed."
 qing_japan_mission_REWARD_DESCRIPTION:0 "Completing every objective in this tree grants its capstone reward."
 qing_japan_mission_BUTTON_TOOLTIP:0 "Open this mission tree."

 # ---- ROOT: open relations -------------------------------------------
 qing_jp_open_relations:0 "Open the Closed Courts (遣使日本)"
 qing_jp_open_relations_DESC:0 "For two centuries Beijing and Edo have kept no formal relations; the sea between them has been a silence, crossed only by the junks of the Nagasaki trade. As both courts stir to the Western threat, that silence serves neither. Send a standing legation — the first Qing minister to Japan — and open a channel of intelligence and amity where there was none."
 qing_jp_open_relations_tt:0 "Establish the #Y first legation to Japan#!; a modest opening warmth. Gain the #G The First Legation#! modifier (reputation, political influence)."
 qing_jp_needs_japan_tt:0 "#Y Japan#! (the Tokugawa Shogunate or a unified Japan) must exist."
 qing_jp_road_uncommitted_tt:0 "The dynasty must not already be committed to the #Y other road#! — the accord and the rivalry are a single choice, not both."

 # ---- ARC A — THE ACCORD ---------------------------------------------
 qing_jp_treaty_amity:0 "The Treaty of Amity (修好條規)"
 qing_jp_treaty_amity_DESC:0 "In 1871 the two empires signed the Sino-Japanese Friendship and Trade Treaty — the only modern treaty the Qing ever concluded on terms of equality, court to court, with no unequal clause. Reaffirm and deepen it: mutual consulates, a framework for trade, and the recognition of Japan as a peer rather than a tributary. It is the cornerstone of the pan-Asian road."
 qing_jp_treaty_amity_tt:0 "Conclude the #Y Treaty of Amity#! as equals; #G warm the accord#! markedly. Gain the #G Treaty of Amity#! modifier (commerce, export commerce)."
 qing_jp_needs_accord_tt:0 "Requires a measure of #Y accord#! already built with Japan."

 qing_jp_shared_learning:0 "Shared Students and Arsenals (留學生)"
 qing_jp_shared_learning_DESC:0 "Let the two self-strengthening programmes cease to duplicate what the West sells so dear. Exchange students and engineers across the narrow sea; share the drawings of ships and guns, the translations of Western science, the hard lessons of the arsenals. What one court learns at ruinous cost, the other need not learn twice. Cooperation speeds both clocks."
 qing_jp_shared_learning_tt:0 "Pool the two modernization programmes; #G warm the accord#!, advance #G Japan's Meiji progress#! and your own #G Self-Strengthening#!. Gain the #G Shared Learning#! modifier (research, promotion speed)."

 qing_jp_ryukyu_accord:0 "The Ryukyu Question, Settled (琉球分島)"
 qing_jp_ryukyu_accord_DESC:0 "The Ryukyu Kingdom has paid tribute to both Beijing and the Satsuma daimyo for centuries — a dual allegiance Japan now means to end by annexation. Rather than let it become the first casus belli, settle it by negotiation: the 1880 partition proposal, here carried through. The northern islands to Japan, the southern Sakishima chain confirmed to the Qing, and the peace of the eastern sea kept."
 qing_jp_ryukyu_accord_tt:0 "Settle the #Y Ryukyu#! status by negotiation; claim Naha and #G warm the accord#!. Gain the #G Ryukyu Condominium#! modifier (commerce, naval morale)."

 qing_jp_alliance:0 "The East Asian Alliance (東亞同盟)"
 qing_jp_alliance_DESC:0 "Let the entente become a true alliance: two industrial monarchies of the East standing together against the Western tide, their fleets and markets joined, their students and arsenals one enterprise. It is the road history did not take — the Qing and Japan as partners rather than the victor and the vanquished of 1895. The apex of the warm road."
 qing_jp_alliance_tt:0 "Forge the #Y East Asian Alliance#! — the capstone of the accord road. Gain the lasting #G East Asian Alliance#! modifier (research, commerce, naval morale, reputation), #G +40 ruler prestige#!, #G +1 Stability#!, and a strong push to both #G Meiji#! and #G Self-Strengthening#! progress."
 qing_jp_needs_deep_accord_tt:0 "Requires #Y deep accord#! with Japan and #Y low rivalry#!."

 # ---- ARC B — THE RIVALRY --------------------------------------------
 qing_jp_read_danger:0 "Read the Eastern Danger (東洋之患)"
 qing_jp_read_danger_DESC:0 "In the great coastal-defence debate (塞防海防之爭), the far-sighted warn that the true peril comes not from the Western land frontier but from the industrializing power across the eastern sea. Name Japan the coming rival while there is still time to prepare — and accept that to do so is to set the two courts on the road to confrontation over Korea, the Ryukyus and Formosa."
 qing_jp_read_danger_tt:0 "Name Japan the coming rival; #R sharpen the rivalry#! and turn the court's mind to coastal defence."

 qing_jp_ready_coast:0 "Ready the Coast (海防)"
 qing_jp_ready_coast_DESC:0 "Concentrate the northern and southern fleets, fortify Weihaiwei and the island approaches, lay the telegraph along the seaboard, and drill the coastal garrisons. History's Beiyang Fleet was starved of shells and coal at the decisive hour; this fleet shall not be. Build the defence the 1894 war found wanting — before, not after, the guns open."
 qing_jp_ready_coast_tt:0 "Fortify #Y Weihaiwei#! and ready the fleets; #R sharpen the rivalry#!. Gain the #G Coastal Defence Readied#! modifier (naval morale, reduced fleet upkeep, land morale)."
 qing_jp_needs_rivalry_tt:0 "Requires a measure of #Y rivalry#! already built with Japan."

 qing_jp_korea_shield:0 "Hold the Korean Shield (朝鮮)"
 qing_jp_korea_shield_DESC:0 "Joseon Korea is the buffer and the flashpoint both: the tributary Japan means to prise loose, and did, in 1894, when the fighting over it began the war. Reaffirm the Qing suzerainty over the peninsula in strength — bind Seoul to Beijing, station the garrisons, and make plain that any thrust at Korea is a thrust at the Great Qing itself."
 qing_jp_korea_shield_tt:0 "Reaffirm suzerainty over #Y Joseon Korea#! (a tributary); #R sharpen the rivalry#! toward the collision."

 qing_jp_triumph:0 "The Collision Won (甲午雪恥)"
 qing_jp_triumph_DESC:0 "The war history lost is here forestalled or won. The Japanese thrust into Korea is broken at the Yalu; the Beiyang Fleet, this time supplied and led, holds the Yellow Sea; Formosa and the Liaodong stay in Qing hands; and the humiliation of Shimonoseki is never signed. The century of humiliation does not turn on this hinge. The apex of the hard road — 雪恥, the shame wiped clean."
 qing_jp_triumph_tt:0 "Break the Japanese challenge — the capstone of the rivalry road. Gain the lasting #G The Collision Won#! modifier (land and naval morale, manpower, reputation, legitimacy), #G +50 ruler prestige#!, #G +1 Stability#!, a sharp #G easing of the rivalry#! (the danger broken), and a strong push to #G Self-Strengthening#! progress."
 qing_jp_needs_deep_rivalry_tt:0 "Requires #Y deep rivalry#! with Japan."

 # ---- player-verb tooltips (government view buttons) ------------------
 QING_ACTION_JAPAN_ACCORD_TT:0 "#Y Warm the Accord (修好)#!\nSend an embassy of amity across the eastern sea, drawing Japan toward the pan-Asian entente (同文同種). #G Accord rises, rivalry cools#!, and the two courts' opinion of one another improves.\n\nCost: #R 20 Political Influence#!."
 QING_ACTION_JAPAN_RIVALRY_TT:0 "#Y Sharpen the Rivalry (海防)#!\nPress the disputed frontiers — Korea, the Ryukyus, Formosa — and turn the court to coastal defence against the eastern danger. #R Rivalry rises, accord cools#!, and Japan's court hardens against the Qing.\n\nCost: #R 20 Political Influence#!."

