 # ######################################################################
 # qing_summer_palace_l_english.yml — The Garden of Gardens (圓明園／頤和園, #74).
 # ######################################################################

 # --- mission + tasks --------------------------------------------------
 qing_summer_palace_mission:0 "The Garden of Gardens (圓明園)"
 qing_summer_palace_mission_DESCRIPTION:0 "Two gardens stood in the hills north-west of Beijing, grander than the Forbidden City itself: the #Y 圓明園 Yuanmingyuan#! (Garden of Perfect Brightness, Qianlong's ten thousand halls and Jesuit fountains) and the #Y 清漪園 Qingyi Yuan#! (Garden of Clear Ripples, on Kunming Lake). Let us raise them in all their splendour, monuments to the dynasty's glory. But a garden of gardens is a hostage to fortune: the barbarian may put both to the torch in 1860 — and the day may come when the court must weigh the rebuilding of one against the ships that guard the coast."
 qing_summer_palace_mission_CRITERIA_DESCRIPTION:0 "Play as the Qing (CHI)."
 qing_summer_palace_mission_REWARD_DESCRIPTION:0 "Completing every objective in this tree grants its capstone reward."
 qing_summer_palace_mission_BUTTON_TOOLTIP:0 "Open this mission tree."
 qing_sp_yuanmingyuan:0 "Raise the Yuanmingyuan (圓明園)"
 qing_sp_yuanmingyuan_tt:0 "Restore and expand the #Y Garden of Perfect Brightness#! north-west of Beijing, Qianlong's garden of gardens: #G a lasting monument to the dynasty's prestige#!."
 qing_sp_needs_capital_tt:0 "We must hold #Y Beijing#! (or a subject must) — the garden lies in its Haidian hills."
 qing_sp_european_pavilions:0 "Build the European Pavilions (西洋樓)"
 qing_sp_european_pavilions_tt:0 "Commission the #Y Xiyang Lou#! — Castiglione's Jesuit baroque, the marble fountains and the Hall of Calm Seas: #G a wonder of cultural exchange that raises the court's standing#!."
 qing_sp_siku_library:0 "House the Four Treasuries (四庫全書)"
 qing_sp_siku_library_tt:0 "Set the Wenyuan Pavilion copy of the #Y Complete Library of the Four Treasuries#! within the garden: #G a monument of learning#! that deepens the bureaucracy and #G forges a shared civilisation#!."
 qing_sp_yiheyuan:0 "The Garden of Nurtured Harmony (頤和園)"
 qing_sp_yiheyuan_tt:0 "Resolve to raise the garden anew as the #Y Yiheyuan#! — but the court must find the money. #Y A dilemma follows.#!"

 # --- Branch B tasks (Qingyi → Yiheyuan) --------------------------
 qing_sp_qingyi:0 "Raise the Qingyi Yuan (清漪園)"
 qing_sp_qingyi_tt:0 "Build the #Y Garden of Clear Ripples#! on Kunming Lake (昆明湖) and Longevity Hill (萬壽山), a SEPARATE site from the Yuanmingyuan: #G a seat of imperial leisure and prestige#!. This garden will become the foundation for the Yiheyuan."
 qing_sp_tongzhi_restoration:0 "Attempt the Tongzhi Restoration (同治中興)"
 qing_sp_tongzhi_tt:0 "Fund the historical (failed) attempt to #Y rebuild the Yuanmingyuan ruins#! — it collapsed after 11 months for lack of funds and official opposition. #R Likely to fail#!, but the attempt itself shows the dynasty cares."
 qing_sp_needs_burnt_tt:0 "The Yuanmingyuan must have been #R burnt (1860 sack)#! — there is no standing garden to restore."
 qing_sp_tongzhi_after_1873_tt:0 "The historical restoration attempt began in 1873."
 qing_sp_yiheyuan_after_1884_tt:0 "Cixi's Yiheyuan rebuild began in 1884 (opened 1888)."
 qing_sp_yiheyuan_wonder_synergy_tt:0 "The Qing has also raised a #Y Great Work#! (the engine wonder system) elsewhere — the narrative gardens and the real wonder #G synergize#!: #G +15 popularity#!."
 qing_sp_yiheyuan_jubilee_extend_tt:0 "The Yiheyuan was built FOR Cixi's 60th birthday (萬壽) — the active #Y imperial jubilee#! glow is #G extended#! (3 years)."
 qing_sp_yiheyuan_jubilee_grant_tt:0 "The Yiheyuan opening IS an imperial jubilee (萬壽) — grant the #G jubilee cultural modifier#! (2 years)."

 # --- Cultural synergy tooltips -----------------------------------
 qing_sp_pavilions_court_painting_synergy_tt:0 "The #Y court painting#! cultural project is active — Castiglione (郎世寧) designed the 西洋樓, so the #G cultural fusion#! grants #G +10 extra prestige#!."
 qing_sp_siku_cultural_synergy_tt:0 "The #Y Siku Quanshu#! cultural project is already active — this library is the Yuanmingyuan COPY (one of seven): #G +1 stability#! from the synergy."

 # --- .1 the sack of 1860 ----------------------------------------------
 qing_summer_palace.1.t:0 "The Burning of the Yuanmingyuan (火燒圓明園)"
 qing_summer_palace.1.desc:0 "The barbarian expedition has broken through to the plain before Beijing, and its soldiers have reached the garden-palace at Haidian. What Kangxi began and Qianlong perfected — the halls of cedar and gold, Castiglione's fountains, the library of the Four Treasuries, three generations of tribute from every corner of the earth — the men of Britain and France have given to the torch. For three days the smoke has darkened the sky over the capital. Lord Elgin calls it a lesson to the Son of Heaven. The garden of gardens, the true seat of the court, is a field of ash and broken marble.\n\nThere is no word in the language of the court for a wound like this."
 qing_summer_palace.1.a:0 "This shall not be forgotten."
 qing_summer_palace.1.a.tt:0 "The garden's glories are #R lost#! — its modifiers stripped, a lasting #R scar of the burnt ruins#! left in their place, and #R the throne's prestige and stability shaken#!. But the outrage #G galvanises the reform party#! and #G forges a national feeling#! that the dynastic order never knew — a founding wound of a modern China."

 # --- .2 the navy-funds dilemma of 1888 --------------------------------
 qing_summer_palace.2.t:0 "The Debate over the Yiheyuan (頤和園之議)"
 qing_summer_palace.2.desc.adorn:0 "The decision is made: the garden shall be raised anew, grander than before, a fitting seat for the court and a monument to the dynasty's endurance. But the treasury is not what it was, and the fleet the reformers have laboured to build eats silver by the ton. The Empress Dowager's household proposes a simple expedient: the naval budget is large, and a garden is forever, while ships rust and sink. Others at the council whiten at the thought. How shall the Yiheyuan be paid for?"
 qing_summer_palace.2.desc.ashes:0 "The ashes of 1860 still lie where the barbarians left them, a standing reproach in the hills above the capital. To raise the garden from that ruin would proclaim to the world that the dynasty is not broken. But the treasury is not what it was, and the fleet the reformers have laboured to build eats silver by the ton. The Empress Dowager's household proposes a simple expedient: the naval budget is large, and a garden is forever, while ships rust and sink. Others at the council whiten at the thought. How shall the Yiheyuan be paid for?"
 qing_summer_palace.2.a:0 "Divert the naval budget — a garden is forever."
 qing_summer_palace.2.a.tt:0 "Divert funds raised #Y in the navy's name#! for marble and gilding. #G The garden rises in full splendour and the dynasty's prestige soars#! — but the fleet is left #R modestly weakened#! (per scholarly research, only the INTEREST funded the palace; the real cause of fleet stagnation was #Y Weng Tonghe's 1888 arms-purchase ban#! + Board-of-Revenue cuts). #R Self-strengthening progress falls back.#!"
 qing_summer_palace.2.b:0 "Pay honestly from the treasury — we can afford both."
 qing_summer_palace.2.b.tt:0 "Fund the garden from #Y the treasury#! and leave the fleet whole. #G The garden rises in full splendour#!, and a state that pays for its pleasures without robbing its defences #G reassures the reformers#!. (Requires a full treasury — only the reformed Qing can take this road.)"

 # --- modifier display names -------------------------------------------
 qing_sp_garden_of_brightness:0 "Garden of Perfect Brightness (圓明園)"
 qing_sp_european_marvels:0 "The European Pavilions (西洋樓)"
 qing_sp_imperial_library:0 "The Imperial Library (四庫全書)"
 qing_sp_qingyi_garden:0 "Garden of Clear Ripples (清漪園)"
 qing_sp_burnt_ruins:0 "The Burnt Ruins (火燒圓明園)"
 qing_sp_yiheyuan_splendour:0 "Garden of Nurtured Harmony (頤和園)"
 qing_sp_starved_fleet:0 "Diverted Naval Funds (挪用海軍經費)"

 # --- .3 the Marble Boat blame (post-1894) ---------------------------
 qing_summer_palace.3.t:0 "The Marble Boat Reproach (石舫之非)"
 qing_summer_palace.3.desc:0 "The war is lost, and the critics have found their culprit: the #Y 石舫#!, the Marble Boat in the Yiheyuan — a stone pleasure-craft with Western paddle wheels, paid for with silver that should have bought powder and shot for the fleet. Never mind that the real cause of the navy's stagnation was Weng Tonghe's ban on foreign arms and the Ministry of Revenue's cuts — the Marble Boat is a symbol the people can see, and the defeat must have a face. The Empress Dowager's garden is that face. The reproach will not be silenced."
 qing_summer_palace.3.a:0 "The critics are not wholly wrong."
 qing_summer_palace.3.a.tt:0 "The #R scapegoating stings#! the throne's prestige and stability, but #G feeds reform pressure#! (demand for accountability) and #G forges a civic identity#! around the humiliation."

 # --- .4 the Tongzhi restoration attempt (1873) ----------------------
 qing_summer_palace.4.t:0 "The Tongzhi Restoration (同治中興)"
 qing_summer_palace.4.desc:0 "The Tongzhi Emperor has resolved to raise the Yuanmingyuan from its ashes — to proclaim to the world that the dynasty is not broken, that the garden of gardens shall stand again. The literati cheer; the treasury officials blanch. The sums required are staggering, and the court is not what it was. History records that this restoration collapsed after eleven months, the funds exhausted and the opposition too loud. But history is not yet written."
 qing_summer_palace.4.a:0 "Let the work begin — history may surprise us."
 qing_summer_palace.4.a.tt:0 "The restoration is #Y attempted#!. Historical odds are #R 80% failure#! (funds/opposition collapse the project, small consolation in reform pressure), #G 20% success#! (the garden rises, huge prestige/stability/civic-identity)."

