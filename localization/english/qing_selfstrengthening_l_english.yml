 # ====================================================================
 # SELF-STRENGTHENING MOVEMENT (自強運動 / 洋務運動) — mission tree.
 # See common/missions/qing_selfstrengthening_missions.txt.
 # Task title = the task key itself; description = <key>_DESC.
 # Sources: Pong, Modernization and Politics in China (1994); Kwang-Ching
 # Liu & Richard Smith, Cambridge History of China vol.11; Benjamin Elman,
 # Naval Warfare and the Refraction of China's Self-Strengthening Reforms
 # (2004); Richard J. Smith, Mercenaries and Mandarins (1978); late-Qing
 # university research digest (Peiyang/Peking/Nanyang).
 # ====================================================================

 qing_selfstrengthening_mission:0 "The Self-Strengthening Movement (自強運動)"
 qing_selfstrengthening_mission_DESCRIPTION:0 "Ships and guns are the roots of self-strengthening. #Y 中學為體，西學為用#! — Chinese learning as the substance, Western learning for application. Let us take the barbarians' own arts of steam, shell and telegraph and make them serve the dynasty, so that the Great Qing enters not the century of humiliation but a new age of wealth and power (富國強兵)."

 # --- root: Zongli Yamen ---------------------------------------------
 qing_ss_zongli:0 "Establish the Zongli Yamen (總理衙門)"
 qing_ss_zongli_DESC:0 "Prince Gong (恭親王奕訢) memorialises for an Office for the General Management of Affairs Concerning the Various Countries — the 總理各國事務衙門. It will be the brain of reform: a foreign ministry, a customs service, and the political shelter under which arsenals, yards and schools can be built. Historically founded 1861; here it can be raised whenever the court finds the will."
 qing_ss_zongli_tt:0 "Found the #Y Zongli Yamen#!, seat of the Self-Strengthening Movement, and gain its lasting influence."

 # --- arsenal: Jiangnan ----------------------------------------------
 qing_ss_jiangnan:0 "Found the Jiangnan Arsenal (江南製造總局)"
 qing_ss_jiangnan_DESC:0 "At Shanghai, Zeng Guofan (曾國藩) and Li Hongzhang (李鴻章), with the Yale-educated Yung Wing (容閎) buying the machinery abroad, raise the largest arsenal in East Asia — and with it a translation bureau (翻譯館) to render Western science into Chinese. Guns, shells, and knowledge. Historically 1865."
 qing_ss_jiangnan_tt:0 "Build the #Y Jiangnan Arsenal#! (an arsenal) in your greatest city; gain research, manpower and infantry discipline."

 # --- navy yard: Fuzhou ----------------------------------------------
 qing_ss_fuzhou:0 "Build the Fuzhou Navy Yard (福州船政局)"
 qing_ss_fuzhou_DESC:0 "At Mawei (馬尾), Zuo Zongtang (左宗棠) and Shen Baozhen (沈葆楨) engage the French officers Prosper Giquel and Paul d'Aiguebelle to lay down a modern dockyard and, beside it, the Fuzhou Naval College (船政學堂) that will school China's first modern officer corps — Yan Fu (嚴復) among its cadets. Historically 1866."
 qing_ss_fuzhou_tt:0 "Build the #Y Fuzhou Navy Yard#! (a port) in your greatest coastal city; cut ship costs and raise naval morale."

 # --- schools: Tongwen Guan ------------------------------------------
 qing_ss_tongwen:0 "Open the Tongwen Guan (同文館)"
 qing_ss_tongwen_DESC:0 "The American missionary W.A.P. Martin (丁韙良) heads a College of Combined Learning at Peking — first interpreters, then mathematics, chemistry and international law. It is the seed from which the technical colleges and the great universities will grow. Historically 1862."
 qing_ss_tongwen_tt:0 "Found the #Y Tongwen Guan#! (a university); raise research, promotion speed and political influence."

 # --- Peiyang / Tianjin University -----------------------------------
 qing_ss_peiyang_university:0 "Charter Peiyang University (北洋大學堂)"
 qing_ss_peiyang_university_DESC:0 "Sheng Xuanhuai (盛宣懷) charters at Tianjin the Peiyang College of Western Learning — China's first modern university, with faculties of engineering, law and mining on the American model. Its graduation diplomas will be recognised the world over. Historically 1895; a strong dynasty may found it decades sooner."
 qing_ss_peiyang_university_tt:0 "Found #Y Peiyang University 北洋大學堂#! (→ 天津大學; a university); advance the movement."

 # --- Imperial University of Peking ----------------------------------
 qing_ss_peking_university:0 "Found the Imperial University of Peking (京師大學堂)"
 qing_ss_peking_university_DESC:0 "The crown of the new education: the Imperial University of the Capital, later Peking University (北京大學). Born of the reform memorials, it will train the officials, scientists and engineers of a modernised empire — and outlast every dynasty that follows. Historically 1898; the greatest of the new schools."
 qing_ss_peking_university_tt:0 "Found the #Y Imperial University of Peking#! (a university); gain lasting prestige and momentum toward the golden age."

 # --- commerce: China Merchants SNC ----------------------------------
 qing_ss_merchant:0 "Charter the China Merchants Company (輪船招商局)"
 qing_ss_merchant_DESC:0 "Under the 官督商辦 principle — official supervision, merchant management — Li Hongzhang charters the China Merchants Steam Navigation Company, drawing real merchant capital into the work of the state. Historically 1872. But the fusion of bureaucratic control and private profit breeds its own graft: the #R official-supervision tension#! rides along with the capital."
 qing_ss_merchant_tt:0 "Build a #Y commerce district#!, gain development capital, and raise commerce and exports — but incur the #R 官督商辦 tension#! (corruption and administrative drag)."

 # --- telegraph: Imperial Telegraph Administration -------------------
 qing_ss_telegraph:0 "String the Telegraph Lines (電報總局)"
 qing_ss_telegraph_DESC:0 "Sheng Xuanhuai (盛宣懷) raises the Imperial Telegraph Administration, and the wire marches out from Tianjin along the coast and up the great rivers. For the first time the court can command a distant governor in hours rather than weeks — the reach of every edict lengthens. Historically 1881; also run on the 官督商辦 model."
 qing_ss_telegraph_tt:0 "Build a #Y commerce district#!, #Y lengthen the reach of the bureaucracy#! (capacity), and raise commerce — at the cost of the #R 官督商辦 tension#!."

 # --- rail + iron + coal ---------------------------------------------
 qing_ss_rail:0 "Lay the Railways and Ironworks (鐵路與鐵廠)"
 qing_ss_rail_DESC:0 "From the Tangshan–Xugezhuang line (唐胥鐵路) grows a network toward the Kaiping Mines (開平礦務局) and Zhang Zhidong's Hanyang Ironworks (漢陽鐵廠) — coal, iron and rail, the very sinews of industry. Historically the 1880s, over fierce geomantic objection."
 qing_ss_rail_tt:0 "Build a #Y railway#! and a #Y resource operation#!; cut build costs and speed your armies."

 # --- Ever-Victorious Army -------------------------------------------
 qing_ss_ever_victorious:0 "Raise the Ever-Victorious Army (常勝軍)"
 qing_ss_ever_victorious_DESC:0 "The Western-drilled corps first raised at Shanghai in 1860 under Frederick Townsend Ward (華爾) and famously commanded by Charles 'Chinese' Gordon (戈登) — a force that won thirty-three engagements in succession with English words of command and modern arms, and became the model for Li Hongzhang's Huai Army (淮軍). You do not summon it from nowhere; you gain the doctrine and the drill to #Y build modern, Western-armed land units cheaply#!."
 qing_ss_ever_victorious_tt:0 "Gain the #Y Ever-Victorious Army#! doctrine: cheaper modern infantry, cavalry and guns, with better discipline and morale."

 # --- Beiyang Fleet --------------------------------------------------
 qing_ss_beiyang:0 "Assemble the Beiyang Fleet (北洋水師)"
 qing_ss_beiyang_DESC:0 "Li Hongzhang's great northern fleet, its ironclads Dingyuan (定遠) and Zhenyuan (鎮遠) the terror of East Asian seas, based at Lüshun (旅順) and Weihaiwei (威海衛). A real modern squadron musters in your northern waters, and your yards learn to #Y build warships cheaply#! thereafter — so you may, perhaps, avoid the disaster of 1894 that history dealt the real Beiyang."
 qing_ss_beiyang_tt:0 "#Y Raise the Beiyang Fleet#! — a real modern squadron at Tianjin (or your chief northern port) — and gain its capability: deeply cheaper modern warships, higher naval morale and speed."

 # --- Nanyang Fleet --------------------------------------------------
 qing_ss_nanyang:0 "Organise the Nanyang Fleet (南洋水師)"
 qing_ss_nanyang_DESC:0 "The southern squadron guarding the Yangzi approaches and the central coast, based on Shanghai and Nanjing. A real modern flotilla musters there, rounding out the two-ocean navy of a self-strengthened empire."
 qing_ss_nanyang_tt:0 "#Y Raise the Nanyang Fleet#! — a real squadron at Shanghai (or your chief coastal port) — and gain its capability: naval morale, supply and cheaper upkeep."

 # --- Fujian Fleet ---------------------------------------------------
 qing_ss_fujian:0 "Commission the Fujian Fleet (福建水師)"
 qing_ss_fujian_DESC:0 "The squadron built beside the Fuzhou Navy Yard (福州船政局) from which its hulls came. History saw it annihilated by the French at the Battle of Fuzhou (馬江海戰) in a single afternoon of 1884; a self-strengthened Qing keeps it as a genuine standing force of the south-east coast."
 qing_ss_fujian_tt:0 "#Y Raise the Fujian Fleet#! — a real squadron at Fuzhou (or your chief coastal port) — and gain its capability: cheaper ships built at the yard, with morale and supply."

 # --- Guangdong Fleet ------------------------------------------------
 qing_ss_guangdong:0 "Raise the Guangdong Fleet (廣東水師)"
 qing_ss_guangdong_DESC:0 "The Canton squadron of the Pearl River delta, guarding the far southern coast and its treaty-port trade. A nimble real flotilla musters at Guangzhou to complete the four-fleet navy of a modernised empire."
 qing_ss_guangdong_tt:0 "#Y Raise the Guangdong Fleet#! — a real squadron at Guangzhou (or your chief coastal port) — and gain its capability: fleet speed, morale and cheaper upkeep."

 # --- capstone -------------------------------------------------------
 qing_ss_capstone:0 "The Great Achievement of Self-Strengthening (自強大成)"
 qing_ss_capstone_DESC:0 "Arsenals, yards, schools, railways, two fleets and a modern army — the work of a generation stands complete. Where history gave the Self-Strengthening Movement only defeat at Japanese hands in 1895, a well-governed Qing has instead crossed into an alternate age of industry and power. The dynasty is renewed; the century of humiliation is averted."
 qing_ss_capstone_tt:0 "Seal the #Y industrial golden age#!: lasting empire-wide bonuses to industry, commerce, army, navy, manpower and legitimacy."

 # --- shared gate tooltips -------------------------------------------
 qing_ss_needs_capacity_tt:0 "The bureaucracy must be capable enough to carry the work (#Y bureau capacity#! high enough)"
 qing_ss_needs_coast_tt:0 "You must own a #Y coastal province#! for the yard"
 qing_ss_needs_golden_age_tt:0 "The movement must have reached its #Y apex#! (Self-Strengthening progress 85+)"

