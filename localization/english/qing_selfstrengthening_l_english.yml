 # --- [#91 item N] the great-work wonder of the golden age ------------
 qing_selfstr_wonder_building:0 "Hall of Self-Strengthening (自強大成之殿)"
 qing_selfstr_wonder_building_desc:0 "The crowning monument of the industrial golden age: a great hall of learning, industry and empire raised in the capital when the Self-Strengthening Movement reaches its apex (自強大成). Beneath its roof the arsenals, yards, colleges and telegraph offices of the renewed dynasty are gathered into one seat of national purpose — a wonder that radiates #Y prestige, research and civilisation#! across the realm. Built only once, and only by an empire that has truly crossed into the age of wealth and power (富國強兵)."

 # --- [#440] countrywide railway network tier bands ------------------
 qing_rail_network_trunk:0 "Railway Trunk Line (鐵路幹線)"
 qing_rail_network_trunk_desc:0 "The first spine of a national railway has been laid. A trunk line quickens the march of armies and the flow of trade, and cheapens the works that follow the rails. The beginning of the empire on iron."
 qing_rail_network_regional:0 "Regional Railway Network (區域鐵路網)"
 qing_rail_network_regional_desc:0 "The provinces are being knitted together by rail. Troops, grain and revenue move faster and further; construction is cheaper and internal commerce grows as regional markets are joined. A modern transport artery spanning the heartland."
 qing_rail_network_national:0 "National Railway Grid (全國鐵路網)"
 qing_rail_network_national_desc:0 "The empire rides on rails. A national grid lets the state reach, supply, tax and conscript its whole population — armies concentrate at speed, commerce and revenue swell, and the throne's writ runs down every line. The spine of a modern great power (富國強兵)."
