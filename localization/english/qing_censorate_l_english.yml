l_english:
 qing_censorate.1.t:0 "A Censor's Impeachment Memorial"
 qing_censorate.1.desc:0 "The Grand Inspector of the Censorate, [qing_censorate_target.GetName], has laid a memorial before the throne impeaching [qing_censorate_target.GetName], accusing the official of venality and disloyalty. The memorial is detailed and damning — [qing_censorate_target.GetName]'s corruption is [qing_censorate_target.GetCorruption|0], and the court whispers of embezzlement and abuse. The censor and the accused have clashed before, making this impeachment sharper still. How shall the throne respond?"
 qing_censorate.1.a:0 "Uphold the impeachment. [qing_censorate_target.GetName] is disgraced."
 qing_censorate.1.a.tt:0 "The accused is cleansed, loses loyalty and popularity, and is removed from any office held. Corruption falls, and the censorate is emboldened."
 qing_censorate.1.b:0 "Exonerate [qing_censorate_target.GetName]; the censor oversteps."
 qing_censorate.1.b.tt:0 "The accused is indulged, the censor estranged. Corruption rises slightly, and tyranny increases."
 qing_censorate.1.c:0 "Suppress the memorial. Punish the censor for insolence."
 qing_censorate.1.c.tt:0 "The censor is disgraced and removed from office. Corruption rises, tyranny spikes, and the censorate is cowed."

 qing_censorate.2.t:0 "Remonstrance Against the Throne"
 qing_censorate.2.desc:0 "The Grand Inspector [qing_censorate_target.GetName] has submitted a memorial criticizing not a courtier, but imperial policy itself. The censor argues that the realm's corruption and misgovernment stem from the throne's own decisions, and that reform is overdue. It is a bold remonstrance — the duty of a言官, but also lèse-majesté if the emperor chooses to take it so. How shall the throne respond?"
 qing_censorate.2.a:0 "Heed the remonstrance. Reform is needed."
 qing_censorate.2.a.tt:0 "Legitimacy rises, reform pressure falls, and the censor is praised. Stability increases."
 qing_censorate.2.b:0 "Rebuke the censor privately; the throne is not to be lectured."
 qing_censorate.2.b.tt:0 "The censor is estranged, and tyranny rises slightly."
 qing_censorate.2.c:0 "Punish the censor for lèse-majesté."
 qing_censorate.2.c.tt:0 "The censor is disgraced, removed from office, and tainted. Corruption rises, tyranny spikes, and the censorate is cowed."

 qing_censorate.3.t:0 "A Factional Network Exposed"
 qing_censorate.3.desc:0 "The censorate's investigation has uncovered a factional network of corrupt officials — a clique that has enriched itself at the state's expense. [qing_censorate_target.GetName] has laid the evidence before the throne: embezzlement, kickbacks, and patronage spread across the bureaucracy. The censor urges decisive action. How shall the throne respond?"
 qing_censorate.3.a:0 "Purge the network. Root out the corruption."
 qing_censorate.3.a.tt:0 "Corruption falls sharply, but tyranny rises and stability falls. The censor is praised, and the censorate is emboldened."
 qing_censorate.3.b:0 "Investigate further. Gather more evidence."
 qing_censorate.3.b.tt:0 "Corruption and reform pressure fall slightly."
 qing_censorate.3.c:0 "Let it lie. The disruption would be too great."
 qing_censorate.3.c.tt:0 "Corruption rises, and the censor is estranged."

 qing_censorate.4.t:0 "The Censorate Captured"
 qing_censorate.4.desc:0 "The censorate itself has been captured by a faction. What began as anti-corruption work has become a weapon for factional purges — [qing_censorate_target.GetName] is wielding the censorate's authority to destroy rivals under the guise of rooting out venality. The court knows it; the throne knows it. The censorate, meant to be the dynasty's check on corruption, has become its tool. How shall the throne respond?"
 qing_censorate.4.a:0 "Break the captured censorate. Dismiss [qing_censorate_target.GetName]."
 qing_censorate.4.a.tt:0 "The censor is disgraced and removed. Corruption falls, but tyranny rises and stability falls."
 qing_censorate.4.b:0 "Let the purge proceed. One faction will be destroyed."
 qing_censorate.4.b.tt:0 "Corruption shifts but does not fall. Tyranny spikes, stability falls, and the censor is indulged. The censorate remains captured."
 qing_censorate.4.c:0 "Dissolve the censorate entirely. The institution is irredeemable."
 qing_censorate.4.c.tt:0 "The censor is removed, the office permanently vacated. Corruption spikes, tyranny and unrest soar, and legitimacy bleeds."

 qing_censorate_cowed:0 "Censorate Cowed"
 qing_censorate_cowed_desc:0 "The censorate has been chastened by the throne's punishment of a censor. Oversight is chilled, and corruption festers unchecked."
 qing_censorate_captured:0 "Censorate Captured"
 qing_censorate_captured_desc:0 "The censorate has been weaponized for factional purges dressed as anti-corruption. It is no longer a check on venality, but a tool of tyranny."
 qing_censorate_dissolved:0 "Censorate Dissolved"
 qing_censorate_dissolved_desc:0 "The censorate has been dissolved by imperial decree. The last internal check on corruption is gone, and the realm knows it."
 # [#362] Censorate panel (都察院) — the censor office bureaucracy with an Inspectors-General corps.
 QING_CENSORATE_OPEN_BTN:0 "The Censorate (都察院)"
 QING_CENSORATE_OPEN_TT:0 "Open the Censorate (都察院) — the dynasty's internal check on venality, headed by the Grand Inspector (左都御史) and his corps of investigating censors (御史). The Censorate's rigour folds into the Grand Inspector's standing on the Grand Council."
 QING_CENSORATE_PANEL_TITLE:0 "The Censorate — 都察院"
 QING_CENSORATE_PANEL_DESC:0 "The Censorate (都察院) was the dynasty's chief internal check on corruption — the Grand Inspector (左都御史) and his corps of investigating censors (御史/言官) impeached venal officials and remonstrated even with the throne. A fearless, high-finesse Grand Inspector with a deep bench of inspectors drives down corruption and lifts his standing on the Grand Council; a vacant or captured Censorate lets venality fester and drags him down. Commission inspectors into the corps and loose them upon the venal."
 QING_CENSORATE_CHIEF_TITLE:0 "Grand Inspector (左都御史)"
 QING_CENSORATE_VACANT:0 "The Censorate stands without a Grand Inspector. No one checks the venality of the court, and corruption creeps unchallenged."
 QING_CENSORATE_PERF_LABEL:0 "Censorate Standing"
 QING_CENSORATE_PERF_TT:0 "The Grand Inspector's Grand Council performance (qing_min_perf_censor, 0-100). His finesse (his investigative rigour), his integrity (an honest or just censor is the fearless remonstrant the office needs), the depth of his inspector corps, and the realm's corruption level all fold into it. A rigorous, well-staffed Censorate over a clean court lifts his standing; a captured, thin, or vacant one over a venal court drags it."
 QING_CENSORATE_CORPS_LABEL:0 "Investigating Censors (御史)"
 QING_CENSORATE_CORPS_TT:0 "The number of investigating censors (御史/言官) serving in the corps under the Grand Inspector. A healthy bench of around four sustains the Censorate's reach; a thin corps blunts it. Commission courtiers into the corps below."
 QING_CENSORATE_CORRUPTION_LABEL:0 "Court Corruption (貪腐)"
 QING_CENSORATE_CORRUPTION_TT:0 "The realm's corruption level — the venality the Censorate exists to check. A court awash in graft drags the Grand Inspector's standing no matter the man; a rigorous Censorate over a clean court lifts it. Impeach the venal to drive it down."
 QING_CENSORATE_ADMIN_TITLE:0 "The Censorate at Work"
 QING_CENSORATE_APPOINT_BTN:0 "Commission an Inspector (簡放御史)"
 QING_CENSORATE_APPOINT_TT:0 "Commission a courtier into the corps of investigating censors (御史). Opens the court roster; select an eligible, unassigned courtier. The corps is capped at six — a select service, not the whole court. A deeper bench strengthens the Censorate's reach and the Grand Inspector's Grand Council standing."
 QING_CENSORATE_APPOINT:0 "Commission as Censor"
 QING_CENSORATE_IMPEACH_BTN:0 "Impeach the Venal (彈劾)"
 QING_CENSORATE_IMPEACH_TT:0 "Loose the Censorate upon the most corrupt courtier in the realm — the Grand Inspector lays a memorial, the official is disgraced, stripped of any office held, and corruption falls. Requires a present Grand Inspector and a venal courtier to prosecute; the lever is dead when the court is clean."
 QING_CENSORATE_ROSTER_TITLE:0 "The Inspecting Censors (御史)"
 QING_CENSORATE_ROSTER_EMPTY:0 "No investigating censor serves in the corps. The Grand Inspector works alone, his reach into the bureaucracy thin. Commission inspectors above."
 QING_CENSORATE_RECALL_BTN:0 "Recall"
 QING_CENSORATE_RECALL_TT:0 "Recall this investigating censor from the corps, returning him to the general court."
 QING_CENSORATE_COUNCIL_CONTRIB_LABEL:0 "Net Council Effectiveness"
