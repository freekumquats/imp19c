 usa_1812_northwest_open:0 "The Old Northwest Opened"
 usa_1812_northwest_open_desc:0 "Tecumseh's confederacy shattered at the Thames and no British buffer state raised at Ghent, the trans-Appalachian west lies open to American settlement as never before. The frontier surges toward the Mississippi."
