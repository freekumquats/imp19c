 # usa_1812_l_english.yml — [scripted-revolutions 2nd pass] The War of 1812 AI-autonomous arc.

 usa_1812.1.t:0 "The Chesapeake and the Leopard"
 usa_1812.1.desc:0 "Off the Virginia Capes, His Britannic Majesty's ship Leopard has hailed the frigate Chesapeake and demanded to search her for deserters. When Commodore Barron refuses, the Leopard fires broadside after broadside into the unready American ship; three are killed, and four men are dragged off as British subjects. The nation is aflame with humiliation and fury — yet the navy is small and the treasury thin. President Jefferson turns not to the sword but to commerce, reaching for economic weapons to bring the arrogant British to heel."
 usa_1812.1.a:0 "An outrage — but answer it with the counting-house, not the cannon."
 usa_1812.1.b:0 "Blood for blood. Let the war hawks have their war."

 usa_1812.2.t:0 "The Embargo"
 usa_1812.2.desc:0 "To coerce Britain and France without firing a shot, the President has laid an embargo upon all foreign trade: not a single American ship may clear for a foreign port. But it is New England, whose wharves and warehouses live by the sea, that bleeds — commerce collapses, merchants are ruined, and the Federalists of the northeast begin to speak darkly of a government that wars upon its own. And still the British are unmoved."
 usa_1812.2.a:0 "Hold the embargo. The nation must not flinch."
 usa_1812.2.b:0 "Repeal it before New England revolts; try a lesser measure."

 usa_1812.3.t:0 "Tippecanoe"
 usa_1812.3.desc:0 "On the Wabash, Governor Harrison has marched upon Prophetstown, the seat of the great pan-Indian confederacy that Tecumseh and his brother the Prophet have raised to bar the American advance west. In Tecumseh's absence the warriors attack at dawn and are repulsed; Harrison burns the town and its winter stores. The confederacy is wounded but not broken — and it turns now, in bitterness, to the open arms of the British in Canada."
 usa_1812.3.a:0 "A famous victory. Press on into the western lands."
 usa_1812.3.b:0 "Seek terms with the confederacy before it drives us to war."

 usa_1812.4.t:0 "Mr. Madison's War"
 usa_1812.4.desc:0 "The grievances have grown past bearing: British warships seize American sailors on the high seas by the thousand; the Orders in Council strangle American trade; and British muskets arm the Indian confederacy on the frontier. The war hawks of the Congress — Clay, Calhoun — will be denied no longer. The United States declares war upon Great Britain, and the cry goes up to march upon Canada, which Mr. Jefferson supposes 'a mere matter of marching.' (Unknown to Washington, London has just repealed the Orders — five days too late.)"
 usa_1812.4.a:0 "On to Canada! The fourteenth colony is ripe for the taking."
 usa_1812.4.b:0 "A war upon the sea alone; spare the army the northern woods."

 usa_1812.5.t:0 "The Surrender of Detroit"
 usa_1812.5.desc:0 "The American invasion of Canada has ended in disaster before it began. At Detroit, the British general Brock and the Shawnee war-chief Tecumseh have bluffed the timid General Hull — marching the same warriors again and again through the woods to feign a great host, and warning that once battle is joined the Indians will be 'beyond control.' Terrified for the women and children behind his walls, Hull surrenders the fort, the town, and two thousand five hundred men without firing a shot. The northwest is Britain's, and the confederacy exults."
 usa_1812.5.a:0 "The Canadas hold. God save the King."

 usa_1812.6.t:0 "The Thames"
 usa_1812.6.desc:0 "Commodore Perry has swept the British from Lake Erie — 'We have met the enemy and they are ours' — and the British army, its supply line cut, retreats up the valley of the Thames. There General Harrison overtakes them, and in the battle Tecumseh falls. With him dies the dream of a pan-Indian nation to hold the line of the Ohio: the great confederacy dissolves as an organized power, its peoples scattered and leaderless. The trans-Appalachian west lies open now to the American plough as it has never been before."
 usa_1812.6.a:0 "The frontier is won. Let the settlers pour westward."
 usa_1812.6.b:0 "Honour the fallen; stay the settlers' hand a while."

 usa_1812.7.t:0 "The Burning of Washington"
 usa_1812.7.desc:0 "With the Corsican beaten and caged upon Elba, Britain has turned the veterans of the Peninsula loose upon America. General Ross and Admiral Cockburn scatter the raw militia at Bladensburg and march unopposed into the capital, where they put the Capitol, the President's House, and the Library of Congress to the torch. President Madison flees into the countryside; the smoke of the burning city can be seen for miles. It is the high-water mark of British arms in America — the humiliation of the young republic complete."
 usa_1812.7.a:0 "Let the Peninsular veterans finish what Bladensburg began."

 usa_1812.8.t:0 "The Peace of Ghent"
 usa_1812.8.desc:0 "In the Flemish city of Ghent the negotiators have made their peace. Both nations are weary; with Napoleon beaten, Britain no longer needs to press American sailors or strangle American trade, and the Duke of Wellington himself has advised that there is no ground to demand American territory. The treaty restores all things to what they were before the war — status quo ante bellum. Not an acre changes hands; impressment goes unmentioned, the war having made it moot; and the Indian buffer state Britain promised its allies is quietly abandoned to its fate."
 usa_1812.8.a:0 "Peace. And now turn wholly against Bonaparte's last gasp."

 usa_1812.9.t:0 "The Hero of New Orleans"
 usa_1812.9.desc:0 "News travels slowly across the Atlantic. Two weeks after the peace was signed at Ghent — but before word of it could cross the ocean — a great British army assaults General Andrew Jackson's motley line of regulars, militia, free men of colour, and Baratarian pirates before New Orleans. In little more than half an hour it is annihilated: two thousand British fall, their generals among them, against a bare handful of American dead. The war ends as it began, changing not a single border — yet the republic remembers only this last, dazzling triumph, and Andrew Jackson is a hero for the ages."
 usa_1812.9.a:0 "The Hero of New Orleans! Let the era of good feelings begin."

