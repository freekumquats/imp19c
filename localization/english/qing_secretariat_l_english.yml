l_english:
 # qing_secretariat.* — Central Secretariat (內閣) office events (#273)
 qing_secretariat.1.t:0 "The Edict Mill"
 qing_secretariat.1.desc:0 "The Grand Secretary [scope:secretary.GetName] presides over the chancery of the 內閣, where the throne's will is turned into the crisp, enforceable language of an imperial edict. A great mass of rescripts has come up for drafting — [ROOT.GetCountry.GetRuler.GetName] watches to see whether the machinery turns cleanly or merely grinds."
 qing_secretariat.1.a:0 "A chancery in fine order."
 qing_secretariat.1.a.tt:0 "Under an able hand the edicts flow crisp and enforceable — a burst of political influence (+15) and a touch of legitimacy (+3); the Grand Secretary's standing rises."
 qing_secretariat.1.b:0 "The desk is cleared, no more."
 qing_secretariat.1.b.tt:0 "A workmanlike clearing of the backlog — modest political influence (+6)."

 qing_secretariat.2.t:0 "The Rescript Backlog"
 qing_secretariat.2.desc:0 "Edicts have piled up unanswered in the halls of the 內閣 (積壓), and the machinery of state stalls for want of the chancery's seal. The Grand Secretary [scope:secretary.GetName] asks how hard he is to drive his clerks — [ROOT.GetCountry.GetRuler.GetName] can crack the whip or let the backlog slide."
 qing_secretariat.2.a:0 "Drive them hard. Clear it."
 qing_secretariat.2.a.tt:0 "The chancery is driven to clear the backlog — political influence recovered (+12), but the Grand Secretary is worn and resentful (his loyalty -6)."
 qing_secretariat.2.b:0 "Let it wait. They are overworked."
 qing_secretariat.2.b.tt:0 "The backlog is left to drift — the influence pool bleeds (-8) and the localities feel the stall (stability -1)."

 qing_secretariat.3.t:0 "The Drafting Scandal"
 qing_secretariat.3.desc:0 "A rescript has been doctored in the drafting (擬旨舞弊) — a faction slipped its own language into an imperial edict as it passed through the chancery. The corruption reaches into the 內閣 itself, on the Grand Secretary [scope:secretary.GetName]'s watch. [ROOT.GetCountry.GetRuler.GetName] can make a hard example of the chancery or hush the matter up."
 qing_secretariat.3.a:0 "Root out the culprit. Make an example."
 qing_secretariat.3.a.tt:0 "The doctored language is rooted out — corruption eases and the court is steadied (stability +1), but the Grand Secretary is tainted by the scandal on his watch (his prominence -5)."
 qing_secretariat.3.b:0 "Hush it up. Let the edict stand."
 qing_secretariat.3.b.tt:0 "The matter is buried and the edict stands — venality festers (corruption up) and the influence pool suffers (-6)."

 # [#361] Central Secretariat panel (內閣) — the working chancery, a facet of the grand_secretariat office (shares the Hanlin #358 meter).
 QING_SECRETARIAT_OPEN_BTN:0 "The Central Secretariat (內閣)"
 QING_SECRETARIAT_OPEN_TT:0 "Open the working chancery (內閣) — where the Grand Secretary (大學士) drafts the throne's edicts (票擬) and clears the rescript backlog (積壓). The chancery's throughput folds into the SAME Grand Council standing as the Hanlin Academy above: one office, one meter."
 QING_SECRETARIAT_PANEL_TITLE:0 "The Central Secretariat — 內閣"
 QING_SECRETARIAT_PANEL_DESC:0 "The Central Secretariat (內閣) was the throne's edict-drafting chancery, headed by the Grand Secretary (大學士) — the SAME office the Hanlin Academy fills from its scholar corps. The Hanlin is the reservoir of talent; the 內閣 is where those men work, turning the throne's will into crisp, enforceable rescripts (票擬) and clearing the backlog that piles up when the chancery grinds (積壓). A chancery that keeps pace lifts the Grand Secretary's standing on the Grand Council; a choked backlog drags it — the same meter the Academy feeds, for it is one man and one office."
 QING_SECRETARIAT_SECRETARY_TITLE:0 "Grand Secretary (大學士)"
 QING_SECRETARIAT_VACANT:0 "The chancery stands without a Grand Secretary. The rescript backlog climbs untended and the throne's business stalls."
 QING_SECRETARIAT_PERF_LABEL:0 "Chancery Standing"
 QING_SECRETARIAT_PERF_TT:0 "The Grand Secretary's Grand Council performance (qing_min_perf_grand_secretariat, 0-100) — the SAME meter the Hanlin Academy feeds, for the Academy and the chancery are one office. His finesse, the waiting scholar bench, examination vigour, and the rescript backlog all fold into it. A cleared chancery lifts it; a choked backlog drags it."
 QING_SECRETARIAT_BACKLOG_LABEL:0 "Rescript Backlog (票擬積壓)"
 QING_SECRETARIAT_BACKLOG_TT:0 "The edicts and rescripts awaiting drafting in the chancery (0-100). Fresh business comes up every quarter; a capable, present Grand Secretary works it down by his throughput, while a vacant or weak chancery lets it climb. A backlog worse than a tolerable ~30 drags his Grand Council standing; a well-cleared one lifts it."
 QING_SECRETARIAT_INFLUENCE_LABEL:0 "Political Influence"
 QING_SECRETARIAT_INFLUENCE_TT:0 "The realm's pool of political influence, which the chancery marshals as it drafts the throne's edicts. Convening the chancery for a concentrated drafting session generates influence scaled by the Grand Secretary's charisma."
 QING_SECRETARIAT_ADMIN_TITLE:0 "The Chancery"
 QING_SECRETARIAT_CONVENE_BTN:0 "Convene the Chancery (票擬)"
 QING_SECRETARIAT_CONVENE_TT:0 "Convene the chancery for a concentrated session of edict-drafting — clear a large chunk of the rescript backlog and marshal political influence (scaled by the Grand Secretary's charisma). Available to a present Grand Secretary with a backlog worth convening for (20 or more), once every three quarters."
