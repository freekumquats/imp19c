l_english:
 # [#367] Xinjiang Consolidation Arc (新疆善後) — holding the New Dominion after the conquest.
 QING_XJ_OPEN_BTN:0 "Xinjiang (新疆善後)"
 QING_XJ_OPEN_TT:0 "Open the New Dominion — the work of settling Xinjiang (新疆善後) after the conquest: the grip on the frontier, the beg notables who hold the oases (伯克), the military colonies (屯田), the silver subsidy that keeps it solvent (協餉), and the levers to consolidate the far west before the khojas can rise."
 QING_XJ_PANEL_TITLE:0 "The New Dominion — 新疆善後"
 QING_XJ_PANEL_DESC:0 "The conquest of Dzungaria and the Muslim oases (1755–59) won the Qing a vast new frontier; holding it is the harder labour. The far west is governed lightly — Uighur begs (伯克) confirmed over their oases by the throne, banner garrisons in the north, and a stream of interior silver (協餉) to pay for it all. Settle it well and the New Dominion is a shield for Mongolia and the capital; neglect it, and the White-Mountain khojas — sheltered in Kokand — will find the oases undermanned and the begs wavering. This is the Court of Colonial Affairs' (理藩院) greatest charge, and its Director is judged on how well the west is held."
 QING_XJ_STATE_TITLE:0 "The State of the Frontier"
 QING_XJ_GRIP_LABEL:0 "Grip on the New Dominion"
 QING_XJ_GRIP_TT:0 "The throne's hold on Xinjiang (0–100). A firm grip (70+) yields men and prestige and settles the oases; a collapsed one (20 or below) means a contested, bleeding march — and invites the khoja to rise. Raised by colonies, loyal begs and the silver subsidy; eroded by neglect."
 QING_XJ_CONSOL_LABEL:0 "Consolidation"
 QING_XJ_CONSOL_TT:0 "The composite health of the frontier (0–100), built from the grip, the loyal beg corps, the tuntian colonies and the silver subsidy — less any begs who have gone over to the khoja. This score folds into the standing of the Court of Colonial Affairs (理藩院) Grand Director: the New Dominion is his greatest charge, and he answers on the Grand Council for how well it is held."
 QING_XJ_BEGS_LABEL:0 "Loyal Begs Serving (伯克)"
 QING_XJ_BEGS_TT:0 "The number of Uighur beg notables confirmed by the throne over the oases (capped at five). A full corps of loyal begs holds the Muslim south; an empty or disloyal one leaves it open to the khoja."
 QING_XJ_TUNTIAN_LABEL:0 "Military Colonies (屯田)"
 QING_XJ_TUNTIAN_TT:0 "The number of state military farms (屯田) planted in the emptied north of Dzungaria. Each resettles the frontier, feeds the garrisons and tightens the empire's hold on the west."
 QING_XJ_ADMIN_TITLE:0 "Settling the Aftermath (善後)"
 QING_XJ_PLANT_BTN:0 "Plant a Military Colony (屯田)"
 QING_XJ_PLANT_TT:0 "Spend the treasury to settle a colony of soldier-farmers on the empty steppe of Dzungaria — firming the grip, feeding the garrison, and drawing the Yili Governorate a step closer into the empire. Requires treasury and unsettled Dzungaria land (colonies capped at eight)."
 QING_XJ_APPOINT_BTN:0 "Appoint a Beg (授伯克)"
 QING_XJ_APPOINT_TT:0 "Confirm a loyal Uighur notable as a beg over a Tarim oasis, binding him to the throne and steadying the Muslim south. Requires the Kashgaria dependency and a beg corps below its cap of five."
 QING_XJ_DISCIPLINE_BTN:0 "Discipline a Beg (懲辦)"
 QING_XJ_DISCIPLINE_TT:0 "Cashier a beg who has gone over to the khoja — a costly loss of face now, but a purge of the disloyal element restores order to the oases. Requires a beg who has turned."
 QING_XJ_XIEXIANG_ON_BTN:0 "Ship the Silver Subsidy (協餉)"
 QING_XJ_XIEXIANG_ON_TT:0 "Begin the annual stream of interior-province silver (協餉) that pays the western garrisons and keeps the New Dominion solvent — a lasting drain on the army budget, but the frontier holds."
 QING_XJ_XIEXIANG_OFF_BTN:0 "Cut the Silver Subsidy (罷協餉)"
 QING_XJ_XIEXIANG_OFF_TT:0 "End the silver subsidy to spare the treasury — but the unpaid garrisons and unfunded administration will let the grip on the far west slip."
 QING_XJ_ROSTER_TITLE:0 "The Begs of the Oases (伯克)"
 QING_XJ_ROSTER_EMPTY:0 "No beg holds an oasis for the throne. Appoint loyal Uighur notables to hold the Muslim south — or leave it open to the khoja."
 # nickname keys for the 1763 opening beg corps + the appointed-beg default.
 NICKNAME_QING_XJ_EMINKHOJA:0 "Emin Khoja"
 NICKNAME_QING_XJ_ODUI:0 "Odui"
 NICKNAME_QING_XJ_BEG:0 "a Beg of the Oases"
 # --- the khoja revolt-scare event (qing_xinjiang.1) ---
 qing_xinjiang.1.t:0 "The Khoja Stirs (張格爾蠢動)"
 qing_xinjiang.1.desc:0 "Word comes from the far west that a pretender of the White-Mountain khojas — sheltered and armed across the border in Kokand — has slipped into the Muslim oases, preaching holy war against the infidel Qing. The garrisons are thin, the begs uncertain, and the loyalty of the south hangs on which way the wind blows. The throne must decide: pour silver and troops into a swift suppression before the rising can spread, or trust the frontier to hold itself and spare the treasury the burden."
 qing_xinjiang.1.suppress:0 "Crush it now (進剿)"
 qing_xinjiang.1.suppress.tt:0 "Spend the treasury and throw the Ili banner garrison at the pretender — a costly campaign, but the rising is scattered and the grip on the New Dominion firms."
 qing_xinjiang.1.fester:0 "Trust the frontier to hold (姑息)"
 qing_xinjiang.1.fester.tt:0 "Spare the treasury and let the far oases fend for themselves — but the rising takes root: the grip slips, the borderlands seethe, a wavering beg goes over to the khoja, and Kokand reads Peking's inaction as weakness."
