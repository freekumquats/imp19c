 # imp19c_units_l_english.yml — [R2 error.log fix] display names for the Qing standing-army
 # garrisons, coastal-patrol navies, and Opium-War occupation forces created in
 # imp19c_effects_legion_setup.txt. These MUST be loc keys, not quoted strings passed through
 # the SE_qing_raise_garrison $name$ macro: a quoted multi-word string loses its quotes on macro
 # substitution and the tokenizer then reads the name words as effects (error.log: Unknown effect
 # Banner / Green / Eight / 雲貴綠營 ...). name = <LOC_KEY> is the proven idiom (oracle: TI/Invictus
 # create_unit name = MACROBIAN_MAHOUT_ARMY). BOM + LF.
