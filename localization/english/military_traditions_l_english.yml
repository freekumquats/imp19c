 ## Manchu Traditions — The Ten Great Campaigns (十全武功) ##
 manchu_shiquan:0 "The Ten Great Campaigns"
 manchu_shiquandesc:2 "十全武功 — the ten frontier victories Qianlong proclaimed, styling himself the Old Man of the Ten Complete Victories."
 # START #
 shiquan_start:0 "The Old Man of Ten Complete Victories"
 shiquan_start_desc:0 "十全老人. Qianlong counted ten great campaigns to his reign; the banners and the Green Standard that won them are the empire's martial reserve."
 # Path A — Pacification of the Western Regions (平定西域) #
 shiquan_dzungar_1:0 "First Dzungar Campaign"
 shiquan_dzungar_1_desc:0 "1755 — the march on Ili that shattered the Dzungar Khanate."
 shiquan_dzungar_2:0 "Second Dzungar Campaign"
 shiquan_dzungar_2_desc:0 "1757 — the crushing of Amursana's revolt and the final pacification of Dzungaria."
 shiquan_altishahr:0 "Pacification of the Muslim Tribes"
 shiquan_altishahr_desc:0 "1759 — the reduction of the Tarim oasis cities and the Khoja brothers, and the making of the New Dominion."
 # Path B — The Jinchuan Wars and the Island (大小金川) #
 shiquan_jinchuan_1:0 "First Jinchuan Campaign"
 shiquan_jinchuan_1_desc:0 "1747-49 — the first assault on the stone watch-towers of the Jinchuan valleys."
 shiquan_jinchuan_2:0 "Second Jinchuan Campaign"
 shiquan_jinchuan_2_desc:0 "1771-76 — the long, ruinous reduction of the fortress-towers with massed cannon and sappers."
 shiquan_taiwan:0 "Pacification of Taiwan"
 shiquan_taiwan_desc:0 "1787-88 — the amphibious expedition that put down the Lin Shuangwen rising, the largest revolt of the age."
 # Path C — The Tributary Frontiers (外藩征討) #
 shiquan_burma:0 "The Burma Campaign"
 shiquan_burma_desc:0 "1765-69 — four costly expeditions into the jungle against the Konbaung, ending in a tributary peace."
 shiquan_vietnam:0 "The Vietnam Campaign"
 shiquan_vietnam_desc:0 "1788-89 — the intervention to restore the Lê against the Tây Sơn."
 shiquan_gurkha:0 "The Gurkha Campaigns"
 shiquan_gurkha_desc:0 "1788-92 — the two marches over the Himalaya that drove the Gurkhas to the gates of Kathmandu."
 # Capstone #
 shiquan_laoren:0 "The Ten Complete Victories"
 shiquan_laoren_desc:0 "十全武功 complete — the martial prestige of the high Qing at its summit."

 ## Napoleonic Tradition (task #65) ##
 # LA GRANDE ARMÉE — available to the Qing ONLY while Napoleon holds the Emperor
 # Emeritus office (gated on the qing_napoleon_present country flag, not a culture
 # group). Deliberately oversized buffs per the design brief.
 #####################################
 napoleon_tradition_requires_emeritus:0 "Available only while Napoleon holds the office of Emperor Emeritus (太上皇) at the Qing court."
 napoleon_grande_armee:0 "La Grande Armée"
 napoleon_grande_armeedesc:2 "The Napoleonic art of war — the corps system, the massed battery, the Imperial Guard and the marshalate — imported wholesale into the armies of the Qing."
 napoleon_start:0 "La Grande Armée"
 napoleon_start_desc:0 "The army reorganised into self-contained corps, each a combined-arms army in miniature: the morale and the reserve of a nation in arms."
 napoleon_jeune_garde:0 "La Jeune Garde"
 napoleon_jeune_garde_desc:0 "The Young Guard — the drilled conscript elite, the Guard's proving ground."
 napoleon_vieille_garde:0 "La Vieille Garde"
 napoleon_vieille_garde_desc:0 "The Old Guard — 'les grognards', the veterans of a hundred fields, held back until the decisive hour."
 napoleon_la_garde_meurt:0 "La Garde meurt"
 napoleon_la_garde_meurt_desc:0 "'La Garde meurt et ne se rend pas' — the Guard dies and does not surrender. The unbreakable heart of the army steadies the whole line."
 napoleon_brienne:0 "L'École de Brienne"
 napoleon_brienne_desc:0 "The artillery officer's schooling — the mathematics of fire and the concentration of the guns."
 napoleon_grande_batterie:0 "La Grande Batterie"
 napoleon_grande_batterie_desc:0 "The massed guns of Wagram and Borodino, eighty pieces firing as one to break the enemy centre."
 napoleon_dieu_de_la_guerre:0 "Le Dieu de la Guerre"
 napoleon_dieu_de_la_guerre_desc:0 "'L'artillerie est le dieu de la guerre' — the grand battery as the arbiter of the field."
 napoleon_bataillon_carre:0 "Le Bataillon Carré"
 napoleon_bataillon_carre_desc:0 "The corps arrayed so that whichever is engaged, the others can march to the guns."
 napoleon_manoeuvre:0 "La Manœuvre sur les Derrières"
 napoleon_manoeuvre_desc:0 "The march around the enemy's flank onto his rear and his communications — the operational masterstroke."
 napoleon_campagne_1805:0 "La Campagne de 1805"
 napoleon_campagne_1805_desc:0 "Ulm and Austerlitz — an army destroyed by marching before a shot was fired, the corps system at its zenith."
 napoleon_levee:0 "La Levée en Masse"
 napoleon_levee_desc:0 "The nation in arms — conscription filling the corps faster than any dynast's enemy could match."
 napoleon_baton:0 "Le Bâton de Maréchal"
 napoleon_baton_desc:0 "'Chaque soldat porte dans sa giberne le bâton de maréchal' — promotion by merit, and marshals bound to the Emperor."
 napoleon_la_gloire:0 "La Gloire"
 napoleon_la_gloire_desc:0 "The eagle-standards, the bulletins, the cult of victory — the glory that binds an army to its Emperor."
 napoleon_lempereur:0 "L'Empereur"
 napoleon_lempereur_desc:0 "The whole Napoleonic system in one army: Guard, guns, manoeuvre and marshalate together — the art of war perfected."
