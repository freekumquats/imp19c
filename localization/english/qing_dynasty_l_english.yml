l_english:
 # qing_dynasty_events.txt — family dynamics of the imperial house (#157).
 # Each option moves qing_dynastic_harmony, which feeds Grand Council effectiveness.

 qing_dynasty.1.t:0 "The Dowager's Counsel"
 qing_dynasty.1.desc:0 "From the inner palace, the Empress Dowager [scope:dowager.GetName] sends word to the throne. She has watched the great offices at their work, and offers [ROOT.GetRuler.GetName] her seasoned counsel on the matter before the Grand Council — the 皇太后 has outlived three reigns' worth of ministers, and her judgement of men is not lightly dismissed. Yet to heed her openly is to admit the sovereign rules with his mother at his shoulder."
 qing_dynasty.1.a:0 "Heed her counsel. The house is one."
 qing_dynasty.1.a.tt:0 "The Dowager's wisdom steadies the court. The imperial house draws together (dynastic harmony +8); she gains prestige (+25) and the emperor a measure of standing (+10)."
 qing_dynasty.1.b:0 "Set it gently aside. The emperor rules."
 qing_dynasty.1.b.tt:0 "[ROOT.GetRuler.GetName] asserts himself and rules alone. His prestige rises (+20), but the slighted matriarch withdraws and the house frays (dynastic harmony -6)."

 qing_dynasty.2.t:0 "The Crown Prince Proves Himself"
 qing_dynasty.2.desc:0 "The Crown Prince [scope:crownprince.GetName] comes before the throne to ask for a real charge among the great offices — not the ceremonial errands of an heir, but true work by which he might be tested. A prince who learns statecraft at the council table makes for a secure succession; a prince kept idle grows restless, or worse, ignorant. But the grandees are jealous of their prerogatives, and an heir given too much too soon is his own danger."
 qing_dynasty.2.a:0 "Let him earn his spurs in the offices."
 qing_dynasty.2.a.tt:0 "The heir distinguishes himself in the council's work. The succession looks secure and the house is content (dynastic harmony +8); the Crown Prince gains prestige (+20)."
 qing_dynasty.2.b:0 "Keep him to his studies for now."
 qing_dynasty.2.b.tt:0 "The heir is held to the classics a while longer. Order is preserved (dynastic harmony +3), but the Crown Prince chafes at the leash (loyalty -10)."

 qing_dynasty.3.t:0 "The House Divided"
 qing_dynasty.3.desc:0 "The quarrel can no longer be hidden: the Crown Prince [scope:crownprince.GetName] and the Empress Dowager [scope:dowager.GetName] are openly at odds, each with a faction of ministers and eunuchs, and the feud is spilling into the council chamber itself. Memorials go unanswered while the two camps manoeuvre; the great offices grind to a halt. [ROOT.GetRuler.GetName] must master his own kin before the paralysis spreads to the whole government."
 qing_dynasty.3.a:0 "Mediate. Knit the house back together."
 qing_dynasty.3.a.tt:0 "The emperor spends his own standing to broker peace between heir and dowager (prestige -15). The house is reconciled (dynastic harmony +10)."
 qing_dynasty.3.b:0 "Let them burn themselves out."
 qing_dynasty.3.b.tt:0 "The throne stands aside and the feud hardens (dynastic harmony -12). The court sees a sovereign who cannot master his own house, and [ROOT.GetRuler.GetName]'s prestige suffers (-20)."

 qing_dynasty.4.t:0 "Behind the Screen"
 qing_dynasty.4.desc:0 "The Empress Dowager [scope:dowager.GetName] moves to rule from behind the screen — 垂簾聽政, the yellow silk drawn across the throne hall behind which a matriarch might hear the ministers and issue her will. It is a road other reigns have taken when the sovereign was young or weak, and it has as often saved a dynasty as hollowed it out. She reaches now for real sway over the Grand Council. Will [ROOT.GetRuler.GetName] yield, or send her back to the inner palace?"
 qing_dynasty.4.a:0 "Yield. Let her hear the ministers."
 qing_dynasty.4.a.tt:0 "The screen is hung and the Dowager takes real power (prestige +30). But a court with two suns is a divided one, and the council's unity suffers (dynastic harmony -10)."
 qing_dynasty.4.b:0 "Send her back to the inner palace."
 qing_dynasty.4.b.tt:0 "[ROOT.GetRuler.GetName] firmly reclaims his authority (prestige +20). The Dowager retires slighted, and the house frays for it (dynastic harmony -6)."

 qing_dynasty.5.t:0 "The Wayward Heir"
 qing_dynasty.5.desc:0 "The Crown Prince [scope:crownprince.GetName] has been overreaching — courting the grandees, dispensing favours, gathering a following about him before his time. An ambitious heir is not in itself a sin, but a prince who builds a party while his father yet reigns invites the very factionalism that has torn other dynasties apart. [ROOT.GetRuler.GetName] must decide whether to indulge the young man's hunger or to rein it in."
 qing_dynasty.5.a:0 "Indulge him. Give him a hand in the council."
 qing_dynasty.5.a.tt:0 "The heir is given a real role and is delighted (loyalty +15, prestige +10). But the old grandees bristle at the upstart, and the house slips toward faction (dynastic harmony -5)."
 qing_dynasty.5.b:0 "Rein him in. He forgets his place."
 qing_dynasty.5.b.tt:0 "The Crown Prince is put firmly back in his place. Order is preserved (dynastic harmony +3), but the heir resents the rebuke (loyalty -10)."

