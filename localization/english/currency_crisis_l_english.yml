l_english:

# ============================================================================
# Generic currency-stress band modifiers (00_currency.txt)
# ============================================================================
 currency_reserve_strain:0 "Reserve Strain"
 currency_reserve_crisis:0 "Reserve Crisis"

# ============================================================================
# currency_crisis.1 — a run on the reserves
# ============================================================================
 currency_crisis.1.t:0 "A Run on the Reserves"
 currency_crisis.1.desc:0 "The exchange has turned against us. There is more paper and coin in circulation than the metal in the vaults can honour, and word of it has spread among the merchant houses: they are presenting notes for specie faster than the treasury can pay. Every ledger in the realm is being marked down against the reserve. Left unchecked, a currency that cannot be redeemed is no currency at all — and trade, tax, and the treasury all founder together. The council awaits the throne's decision."

 currency_crisis.1.a:0 "Replenish the reserves — buy specie on the open market."
 currency_crisis.1.a.tt:0 "Spend #R £100#! to restore the metal backing: #G sharply eases the currency crisis, +1 Stability#!."

 currency_crisis.1.b:0 "Suspend convertibility and issue paper to cover the shortfall."
 currency_crisis.1.b.tt:0 "An emergency injection of funds (#G +£60,000 worth of currency#!), but the debasement only #Y partly eases the crisis#! and costs #R -1 Stability#!."

 currency_crisis.1.c:0 "Ride it out; the market must right itself."
 currency_crisis.1.c.tt:0 "Change nothing: #R -1 Stability#! now, and the crisis eases only slightly."
