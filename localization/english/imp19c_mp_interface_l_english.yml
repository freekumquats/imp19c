 card_the_concert_of_europe:0 "#T The Peace of 1763#!\nIn 1763 Europe fell silent after the Seven Years' War — the first truly global conflict, fought from the forests of North America to the plains of Bengal.\n\nThe Treaty of Paris humbled France, stripping it of Canada and its Indian empire and confirming Britain as the master of the seas and the colonies. Days earlier the Treaty of Hubertusburg had ended the continental war, leaving Frederick the Great's Prussia bloodied but unbroken and its grip on Silesia secure against Austria.\n\nThe powers now turned from the battlefield to the treasury, nursing colossal war debts and rebuilding their armies. It was an exhausted, watchful peace — one whose unpaid costs and unsettled rivalries would shape the age to come."
