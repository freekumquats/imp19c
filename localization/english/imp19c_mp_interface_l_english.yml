 mp_description:0 "#T Description"
 GBR_DESK:0 "In 1763, Great Britain emerged triumphant from the Seven Years' War. By the Treaty of Paris it took Canada, Florida and mastery of India from France, becoming the foremost colonial and naval power on earth — though the vast war debt would soon drive it to tax its American colonies."
 PRU_DESK:0 "In 1763, Prussia under Frederick the Great emerged from the Seven Years' War battered but victorious, its hold on Silesia confirmed by the Treaty of Hubertusburg. Having survived the combined weight of Austria, Russia and France, it took its place among the great powers of Europe."
 RUS_DESK:0 "In 1763, the Russian Empire under the newly enthroned Catherine the Great stretched from the Baltic to the Pacific. Fresh from the Seven Years' War, the court at St. Petersburg pursued expansion southward against the Ottomans and enlightened reform at home."
 FRA_DESK:0 "In 1763, the Kingdom of France under Louis XV reeled from defeat in the Seven Years' War, ceding Canada and its Indian possessions by the Treaty of Paris. Still populous and wealthy, the monarchy nonetheless found its finances and prestige badly shaken."
 NED_DESK:0 "In 1763, the Dutch Republic of the United Provinces was a wealthy maritime and trading nation past the height of its Golden Age. Its merchants and the great trading companies still commanded global commerce, though its power was waning between Britain and France."
 AUS_DESK:0 "In 1763, the Habsburg Monarchy under Empress Maria Theresa emerged from the Seven Years' War having failed to wrest Silesia back from Prussia. Still a great Catholic power spanning Central Europe, it turned now to internal reform and consolidation."
 TUR_DESK:0 "In 1763, the Ottoman Empire held an uneasy peace, stagnating while Europe modernised around it. Within a few years war with Russia would expose its military decline, but for now it ruled a vast realm from the Balkans through Arabia to Egypt."
 SAR_DESK:0 "In 1763, the Kingdom of Sardinia, ruled from Turin by the House of Savoy, was a small but ambitious Alpine state astride the road between France and Italy, deftly playing the great powers against one another to enlarge its domains."
 SPA_DESK:0 "In 1763, the Spanish Empire under Charles III still spanned the Americas and the Pacific, but its late entry into the Seven Years' War had cost it Florida. The enlightened Bourbon reforms now sought to revive its economy, army and colonial administration."
 USA_DESK:0 "In 1763, the Thirteen Colonies of British America prospered along the Atlantic seaboard, freed at last from the French threat in Canada. Yet the war debt and new taxes imposed from London were already stirring the resentments that would kindle revolution."
 VNZ_DESK:0 "In 1763, Venezuela was a Spanish colonial territory on the Caribbean coast of South America, its wealth built on cacao and administered from Caracas — a distant frontier of the Spanish Empire, generations from independence."
 MEX_DESK:0 "In 1763, Mexico was the heart of the Viceroyalty of New Spain, the richest jewel of the Spanish crown. Its silver mines financed the empire while a rigid colonial society, governed from Mexico City, ruled over vast territories."
 EGY_DESK:0 "In 1763, Egypt was an Ottoman province in name only, real power resting with the Mamluk beys of Cairo who ruled the Nile with growing autonomy. It remained a wealthy land of grain and trade on the route between Europe and the Indies."
 EIC_DESK:0 "In 1763, the British East India Company had transformed from a trading concern into a territorial power. Its victory at Plassey had delivered Bengal, and its private armies and revenues now made it the effective master of much of India."
 KHL_DESK:0 "In 1763, the Sikh misls of the Dal Khalsa were rising across the Punjab, waging relentless war against the Afghan invasions of Ahmad Shah Durrani. From these fierce confederacies of warriors the future Sikh Empire would one day be forged."
 CHI_DESK:0 "The Qing Empire in 1763 stood at the zenith of its power. Under the Qianlong Emperor of the Manchu Aisin-Gioro dynasty, the conquest of the Dzungars and the pacification of the Tarim Basin had just added the vast new dominion of Xinjiang, extending Qing rule over China, Manchuria, Mongolia, Tibet and Central Asia. Reigning from Beijing over roughly a third of humanity and governing through the Grand Council and the Six Boards, the High Qing enjoyed unrivalled prosperity — though the seeds of later strain, corruption and Western pressure at Canton were already sown."
 TKG_DESK:0 "In 1763, Tokugawa Japan lived in the long peace of the Edo period under the shogun's rule from Edo. Sealed from the world by the sakoku policy, it was a stable and orderly realm of samurai, merchants and a flourishing urban culture."