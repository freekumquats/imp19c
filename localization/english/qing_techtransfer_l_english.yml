l_english:

######################################################################
# qing_techtransfer_l_english.yml — TECHNOLOGY-TRANSFER BARGAINS (洋務交易 / 借才借法).
# Covers the bargain hub, the track picker, the call-the-favor crisis, and the
# mechanics-panel verb. This feature adds no new modifiers (it reuses the Self-
# Strengthening institution modifiers and the diplomacy/treaty meters).
# See se_QING_TECHTRANSFER.txt / qing_techtransfer_events.txt.
######################################################################

 # ---- the mechanics-panel verb -----------------------------------------------
 qing_action_techtransfer:0 "Technology-Transfer Bargain (洋務交易)"
 qing_action_techtransfer_desc:0 "Strike a help-for-favors deal with a foreign power: their machinery, engineers, patterns, and loans to accelerate one of our Self-Strengthening enterprises at once — a genuine shortcut past the slow indigenous path. But every bargain deepens that power's stake in China, and one day it will call the favor in with a concession demand. Buy modernization on credit, and remember who holds the note."
 qing_action_techtransfer_needs_pi_tt:0 "Requires #Y20 Political Influence#!"

 # ---- .1  the bargain hub -----------------------------------------------------
 qing_techtransfer.1.t:0 "A Bargain with the Barbarians"
 qing_techtransfer.1.desc:0 "The yards and arsenals cannot be built on Confucian virtue alone; they need foreign steel, foreign engineers, foreign patterns, and foreign silver. Each of the powers is eager to supply them — for a price rarely written on the invoice. With whom shall we deal?"
 qing_techtransfer.1.britain:0 "Deal with Britain (the Armstrong works, the loan houses)."
 qing_techtransfer.1.france:0 "Deal with France (the Fuzhou pattern, the Creusot works)."
 qing_techtransfer.1.russia:0 "Deal with Russia (overland arms, the frontier concessions)."
 qing_techtransfer.1.america:0 "Deal with America (the machine shops, the missionary engineers)."
 qing_techtransfer.1.decline:0 "Not now — we will build with our own hands."

 # ---- .2  the track picker ----------------------------------------------------
 qing_techtransfer.2.t:0 "What Shall We Buy?"
 qing_techtransfer.2.desc:0 "The partner is chosen. Now — which enterprise shall their help advance? Whatever we take, the favor-debt to them grows, and with it their claim upon us."
 qing_techtransfer.2.arsenal:0 "Arsenal machinery (機器局 — guns and shells)."
 qing_techtransfer.2.arsenal.tt:0 "Costs #Y40 Treasury#!. Advances the arsenal track (the Jiangnan works) and adds to the partner's favor-debt. Warms the partner; its rivals bristle."
 qing_techtransfer.2.naval:0 "A dockyard & fleet (船政 — the naval track)."
 qing_techtransfer.2.naval.tt:0 "Costs #Y40 Treasury#!. Advances the naval track (the Fuzhou yard) and adds to the partner's favor-debt. Warms the partner; its rivals bristle."
 qing_techtransfer.2.rail:0 "Railways & mines (鐵路 — the rail track)."
 qing_techtransfer.2.rail.tt:0 "Costs #Y40 Treasury#!. Advances the rail-and-iron track and adds to the partner's favor-debt. Warms the partner; its rivals bristle."
 qing_techtransfer.2.telegraph:0 "The telegraph (電報 — the wire network)."
 qing_techtransfer.2.telegraph.tt:0 "Costs #Y40 Treasury#!. Advances the telegraph track and adds to the partner's favor-debt. Warms the partner; its rivals bristle."
 qing_techtransfer.2.back:0 "On reflection, deal with no one yet."

 # ---- .10  the call-the-favor crisis -----------------------------------------
 qing_techtransfer.10.t:0 "The Favor Called In"
 qing_techtransfer.10.desc:0 "The reckoning has come. The power whose engineers built our works and whose banks financed them now presents its account — not in silver, but in privilege: a mining concession, a railway right, a lease upon our soil. The machinery was never a gift. To pay is to deepen the foreign grip we sought to escape; to refuse is to make an enemy of a creditor who has gunboats.\n\nWhat is the court's will?"
 qing_techtransfer.10.pay:0 "Pay the concession — honor the debt."
 qing_techtransfer.10.pay.tt:0 "Grant the concession. Clears most of that power's favor-debt and keeps its goodwill, but deepens the unequal-treaty burden (a fresh concession upon our soil)."
 qing_techtransfer.10.refuse:0 "Refuse — the debt is repudiated."
 qing_techtransfer.10.refuse.tt:0 "Deny the demand. We keep the industrial gains and a measure of pride (#G+10 legitimacy#!), but the affronted power's tension spikes sharply — a creditor made into a foe."
