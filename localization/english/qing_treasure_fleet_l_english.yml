 # common/modifiers/qing_treasure_fleet_modifiers.txt.
 # ####################################################################

 qing_treasure_fleet_mission:0 "The New Treasure Fleet (新寶船隊)"
 qing_treasure_fleet_mission_DESCRIPTION:0 "Three centuries ago the eunuch-admiral Zheng He (鄭和) took the greatest fleet the world had ever seen down to the Western Ocean — nine-masted treasure-ships (寶船) longer than a European galleon was wide, bearing the Ming flag to Ceylon, Arabia and the coast of Africa. Then the court burned the plans, banned the building of ocean-going ships, and turned its back on the sea. Turn it back again. Revive the coastal shipyards, raise the great ports, build a fleet to dwarf the war-junks of the water-forces, and send it once more down to the southern seas — a sea-power reborn, tribute and renown flowing back up the Pearl and the Yangtze."

 qing_treasure_revive_yards:0 "Revive the Shipyards (振興船政)"
 qing_treasure_revive_yards_DESC:0 "Overturn the sea-ban mindset that has bound the empire to its shores. Pour silver into the coastal yards — the Longjiang works, the Fujian slips — and set the shipwrights to their craft once more. The programme raises a real home shipyard at your ablest coastal province. Costs #Y 100#! treasury."
 qing_treasure_revive_yards_tt:0 "Open the treasure-fleet programme: #G raise a home shipyard / sea port#! at the realm's ablest coastal province, and the court takes heart (#G ruler popularity#!)."

 qing_treasure_build_ports:0 "Build the Great Ports (廣建船塢)"
 qing_treasure_build_ports_DESC:0 "A treasure fleet needs harbours to match. Raise the port infrastructure yourself — develop a sea port to its fullest — so the great hulls have deep water to lie in and yards to fit them out. The mission recognises the harbour once it genuinely stands."
 qing_treasure_needs_port_tt:0 "The Qing must #Y own a fully-developed sea port#! — a #Y Harbour (port_building) at level 3#! in a coastal province."
 qing_treasure_build_ports_tt:0 "The great ports stand — the realm's standing rises (#G legitimacy#!) and the court exults (#G ruler popularity#!). The lasting glory awaits the fleet's return."

 qing_treasure_amass_fleet:0 "Amass the Fleet (聚舟師)"
 qing_treasure_amass_fleet_DESC:0 "Build the hulls. Not the handful of war-junks of a coastal patrol, but a true ocean-going fleet — you must raise the ships yourself. When the fleet is genuinely gathered, the great treasure-ship armada is formally mustered under the imperial flag. Costs #Y 80#! treasury."
 qing_treasure_needs_fleet_tt:0 "The Qing must have a fleet of #Y 20 ships or more#! afloat."
 qing_treasure_amass_fleet_tt:0 "The armada is gathered — the named #Y 新寶船隊 (New Treasure Fleet)#! is mustered at the home sea port, and the court rejoices (#G ruler popularity#!)."

 qing_treasure_capstone:0 "The Voyage to the Western Ocean (下西洋)"
 qing_treasure_capstone_DESC:0 "Let the fleet sail. Down past Champa and Malacca, across to Ceylon and the pepper coast, into the Indian Ocean where no Chinese fleet has flown the flag in three hundred years — and home again, laden with tribute, envoys, and the renown of a realm that once more commands the sea."
 qing_treasure_needs_voyage_tt:0 "The Qing must have a grand ocean-going fleet of #Y 30 ships or more#!."
 qing_treasure_capstone_tt:0 "The treasure fleet returns in triumph. The lasting #G Glory of the Treasure Fleet (qing_treasure_fleet_glory)#! is sealed — naval reach, diplomatic weight, and a trade dividend from the reopened sea lanes — the realm steadies (#G stability, legitimacy#!), the tributary courts are overawed (#G tributary prestige#!), and the emperor's glory rings from the southern seas (#G ruler popularity#!). #Y The fleet now sails STANDING return voyages#!, bringing home the wealth of the empire's overseas colonies — the more #Y dominions established through the Great Pacific Enterprise#! (Australia, Africa, the fur coast, the Americas), the richer each homecoming."

 # the returning-fleet dominion modifier
 qing_treasure_fleet_glory:0 "Glory of the Treasure Fleet (寶船之威)"
 qing_treasure_fleet_glory_desc:0 "The New Treasure Fleet has sailed to the Western Ocean and returned — a sea-power reborn. The empire commands the southern sea lanes once more: swifter shipyards, a fleet that fights above its weight, the diplomatic weight of a realm whose flag flies from Ceylon to the African coast, and the commerce of the reopened routes."
