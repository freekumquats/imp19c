l_english:

 # aus_habsburg_l_english.yml — AUS 1763-1815 arc (#283).

 # --- .1 The Partition of Poland ---
 aus_habsburg.1.t:0 "The Partition of Poland"
 aus_habsburg.1.desc:0 "Reluctantly, Maria Theresa joins Prussia and Russia in the partition of Poland — 'she wept, but she took', as Frederick sneered. Austria annexes Galicia and Lodomeria in the south."
 aus_habsburg.1.a:0 "Take Galicia — we cannot let the others gain alone."

 # --- .2 The Reforms of Joseph II ---
 aus_habsburg.2.t:0 "The Reforms of Joseph II"
 aus_habsburg.2.desc:0 "Maria Theresa is dead, and her son Joseph II rules alone, driving radical enlightened reforms through the realm at breakneck speed — abolishing serfdom, taxing the Church, and stirring revolt from the Netherlands to Hungary."
 aus_habsburg.2.a:0 "Push the reforms — the state must be rational."
 aus_habsburg.2.b:0 "Temper them — do not inflame the provinces."

 # --- .3 The Austrian Empire ---
 aus_habsburg.3.t:0 "The Austrian Empire"
 aus_habsburg.3.desc:0 "Anticipating the dissolution of the thousand-year Holy Roman Empire, Francis proclaims himself hereditary Emperor of Austria, that his house may keep an imperial crown whatever befalls the old Reich."
 aus_habsburg.3.a:0 "Proclaim the Empire of Austria."

 # --- .4 Austerlitz ---
 aus_habsburg.4.t:0 "Austerlitz"
 aus_habsburg.4.desc:0 "Napoleon crushes the combined Austro-Russian army at Austerlitz, the Battle of the Three Emperors. The Treaty of Pressburg strips Austria of Venetia and the Tyrol; the humiliation is complete."
 aus_habsburg.4.a:0 "Endure the peace — our hour will come."

 # --- .5 Metternich Turns the Tide ---
 aus_habsburg.5.t:0 "Metternich Turns the Tide"
 aus_habsburg.5.desc:0 "Under the guidance of Prince Metternich, Austria abandons her forced alliance with France and joins the Sixth Coalition. The full weight of Europe now turns against Napoleon, and Vienna will host the peace."
 aus_habsburg.5.a:0 "Join the coalition — Austria will lead the peace."
