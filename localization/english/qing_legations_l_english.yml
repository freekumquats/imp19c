l_english:

######################################################################
# qing_legations_l_english.yml — DIPLOMATIC MISSIONS & PERMANENT LEGATIONS
# (遣使 / 駐外使館). Covers the legation modifiers, the hub + Burlingame events,
# and the mechanics-panel verb. See se_QING_LEGATIONS.txt / qing_legation_events.txt.
######################################################################

 # ---- permanent-legation modifiers -------------------------------------------
 qing_legation_britain_active:0 "駐英使館 — Legation at London"
 qing_legation_france_active:0 "駐法使館 — Legation at Paris"
 qing_legation_russia_active:0 "駐俄使館 — Legation at St Petersburg"
 qing_legation_japan_active:0 "駐日使館 — Legation at Tokyo"
 qing_legation_america_active:0 "駐美使館 — Legation at Washington"
 qing_burlingame_mission_active:0 "蒲安臣使團 — The Burlingame Mission"

 # ---- the mechanics-panel verb -----------------------------------------------
 qing_action_open_legation:0 "Establish a Permanent Legation (駐外使館)"
 qing_action_open_legation_desc:0 "Plant a resident minister in the capital of one of the great powers — the institutional completion of the Zongli Yamen. Each legation raises our diplomatic reach and eases friction with the host power, but sending envoys to bow in a barbarian court affronts the conservatives at home."
 qing_action_legation_needs_pi_tt:0 "Requires #Y20 Political Influence#!"

 # ---- .1  the legation hub ----------------------------------------------------
 qing_legation.1.t:0 "Envoys to the Barbarian Courts"
 qing_legation.1.desc:0 "For two centuries the Middle Kingdom received tribute; it did not send envoys as equals. The Zongli Yamen has changed that calculus. To conduct diplomacy as the powers do — to gather intelligence, to protect our emigrant subjects, to negotiate rather than merely react — the dynasty must plant a resident minister in a foreign capital. The literati will call it a kowtow. It is, in truth, an eye in the enemy's house.\n\nWhere shall the first legation stand?"
 qing_legation.1.britain:0 "To London (駐英使館)"
 qing_legation.1.britain.tt:0 "Open a permanent legation at London. Eases tension with #YBritain#! and raises our diplomatic standing; a modest conservative backlash."
 qing_legation.1.france:0 "To Paris (駐法使館)"
 qing_legation.1.france.tt:0 "Open a permanent legation at Paris. Eases tension with #YFrance#! and raises our diplomatic standing; a modest conservative backlash."
 qing_legation.1.russia:0 "To St Petersburg (駐俄使館)"
 qing_legation.1.russia.tt:0 "Open a permanent legation at St Petersburg. Eases tension with #YRussia#! and raises our diplomatic standing; a modest conservative backlash."
 qing_legation.1.japan:0 "To Tokyo (駐日使館)"
 qing_legation.1.japan.tt:0 "Open a permanent legation at Tokyo — a legation to the one Asian peer. Warms the accord and raises our diplomatic standing; a modest conservative backlash."
 qing_legation.1.america:0 "To Washington (駐美使館)"
 qing_legation.1.america.tt:0 "Open a permanent legation at Washington. Raises our diplomatic standing; a modest conservative backlash."
 qing_legation.1.decline:0 "Not yet — the Middle Kingdom is slow to send envoys abroad."

 # ---- .2  the Burlingame Mission ----------------------------------------------
 qing_legation.2.t:0 "The Burlingame Mission (蒲安臣使團)"
 qing_legation.2.desc:0 "Anson Burlingame, the retiring American minister, has offered to carry China's case to the treaty powers in the dynasty's own name — a grand embassy to the courts of the West, led by a barbarian who has come to admire us. It is an audacious stroke: to speak to all the powers at once, through a man they cannot dismiss, and to win from them a promise of patience while the Middle Kingdom reforms at its own pace.\n\nShall we send the grand embassy?"
 qing_legation.2.a:0 "Send the grand embassy."
 qing_legation.2.a.tt:0 "Costs #Y60 Treasury#!. Eases tension with Britain and France at once, relieves reform pressure, and greatly raises our prestige and diplomatic standing for a decade."
 qing_legation.2.b:0 "No envoy shall bow in a barbarian court."
 qing_legation.2.b.tt:0 "Decline the embassy. The conservatives are satisfied, but the chance passes — reform pressure builds a little."
