l_english:
# [#62 2026-07-23] NATIONALISM concept layer (Design 4 — Culture → Nationalism).
# These name the nationalism GROUPS (the culture-group-level national identities) as a NEW layer
# ON TOP OF the culture keys — the culture-group ethnonyms (chinese_group:1 "Han", german:1 "German")
# are DELIBERATELY left untouched: "Han" is a correct ethnonym, distinct from the invented pan-Han
# nation "中華 Zhonghua minzu" (coined by Liang Qichao, 1902). Overwriting the culture name would
# mislabel the Han culture group as the nation everywhere it appears; instead these keys give the
# nationalism concept its own display names, used by the citizenship decisions + nationalism read-out.
 nationalism_concept:0 "Nationalism"
 nationalism_concept_desc:0 "A nation is a modern, constructed identity — a people imagining itself a single political community, awakening from a patchwork of local cultures under the pressures of print, industry, and the state. Where a realm's peoples cohere into one nation, loyalty and integration rise; where a subject people's homeland is held by another, national grievance and irredentism grow."

# ---- the recognised nations (culture-group-level identities) ----
 zhonghua_nation:0 "中華 (Zhonghua)"
 zhonghua_nation_desc:0 "The pan-Han national identity that unifies the Northern, Wu, Yue, Hakka, Min and other Han peoples into a single 中華民族 — a modern nation invented in the reform era, not a primordial given."
 manchu_nation:0 "滿族 (Manchu)"
 manchu_nation_desc:0 "The Manchu national identity of the banner peoples — the ruling nation of the Qing, bound by the banner order and the Manchu Way, ever a minority atop a Han sea."
 mongol_nation:0 "蒙古族 (Mongol)"
 mongol_nation_desc:0 "The Mongol national identity of the steppe peoples, bound into the Qing frontier order through the banners and the Lifan Yuan."
 german_nation:0 "Deutschtum (German)"
 german_nation_desc:0 "The German national identity — a people scattered across many states, awakening to the dream of a single German nation."
 italian_nation:0 "Risorgimento (Italian)"
 italian_nation_desc:0 "The Italian national identity — the Risorgimento's aspiration to gather the peninsula's peoples into one nation."
 french_nation:0 "La Nation française (French)"
 french_nation_desc:0 "The French national identity — the archetype of the civic nation, one and indivisible."

# ---- citizenship (the in-group / out-group state) ----
 nationalism_citizen_ingroup:0 "Citizen (In-group)"
 nationalism_citizen_ingroup_desc:0 "This people is integrated into the national community — its members hold the fuller rights of citizens within the realm."
 nationalism_subject_outgroup:0 "Subject (Out-group)"
 nationalism_subject_outgroup_desc:0 "This people stands outside the national community — a subject people, not integrated, holding the lesser rights of the out-group."

# ---- citizenship decision titles + tooltips (culture_decisions/*_culture_decisions.txt) ----
 qing_grant_citizenship:0 "Grant Citizenship (歸化)"
 qing_extend_local_rights:0 "Extend Local Rights (優容)"
 qing_revoke_citizenship:0 "Revoke Citizenship (削籍)"
 qing_proclaim_nation:0 "Proclaim the Nation (立國族)"
 qing_proclaim_nation_recognised_tt:0 "Our realm bears a recognised national identity"
 qing_proclaim_nation_civic_tt:0 "Our realm has cohered into an emerging nation (National Integration ≥ 50)"
