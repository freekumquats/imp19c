l_english:

 # rus_expansion_l_english.yml — RUS 1763-1815 arc (#283).

 # --- .1 A King for Poland ---
 rus_expansion.1.t:0 "A King for Poland"
 rus_expansion.1.desc:0 "Russian bayonets secure the Polish throne for Catherine's former favourite Stanislaw Poniatowski. The Commonwealth becomes a Russian client in all but name."
 rus_expansion.1.a:0 "Install our man in Warsaw."

 # --- .2 The Annexation of Crimea ---
 rus_expansion.2.t:0 "The Annexation of Crimea"
 rus_expansion.2.desc:0 "Catherine formally annexes the Crimean Khanate, extinguishing the last remnant of the Golden Horde and carrying the double eagle to the shores of the Black Sea. The dream of Russian dominion in the south takes shape."
 rus_expansion.2.a:0 "Annex the Khanate — the Black Sea is ours."

 # --- .3 The Fall of Poland ---
 rus_expansion.3.t:0 "The Fall of Poland"
 rus_expansion.3.desc:0 "With the final partitions, Poland ceases to exist, and Russia takes the lion's share — Lithuania, Belarus, and the western Ukraine. The empire reaches deep into the heart of Europe."
 rus_expansion.3.a:0 "Take the lion's share."

 # --- .4 The Death of Catherine ---
 rus_expansion.4.t:0 "The Death of Catherine"
 rus_expansion.4.desc:0 "Catherine the Great is dead of a stroke, and her embittered son Paul I ascends the throne, erratic and resentful of his mother's legacy. The court holds its breath."
 rus_expansion.4.a:0 "The new Tsar reigns."

 # --- .5 The Murder of Paul ---
 rus_expansion.5.t:0 "The Murder of Paul"
 rus_expansion.5.desc:0 "Paul I is strangled in his bedchamber by disaffected officers, and his son Alexander I — who knew of the plot — takes the throne. Young, liberal, and ambitious, Alexander will measure himself against Napoleon."
 rus_expansion.5.a:0 "Alexander reigns — Russia looks west."

 # --- .6 The Patriotic War ---
 rus_expansion.6.t:0 "The Patriotic War"
 rus_expansion.6.desc:0 "Napoleon crosses the Niemen with the greatest army Europe has ever seen. Moscow burns, but the Russian winter and the Russian people annihilate the Grande Armee. Russia emerges the saviour of Europe."
 rus_expansion.6.a:0 "Burn Moscow, and let winter do the rest."
