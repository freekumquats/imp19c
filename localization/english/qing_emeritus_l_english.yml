 # ============================================================================
 # qing_emeritus_l_english.yml — [bookmark-1763 #304] the historical Emperor
 # Emeritus (太上皇) abdication (qing_emeritus_events.txt / se_QING_EMERITUS.txt).
 # Distinct from the Napoleon alt-history (#65, qing_napoleon_l_english.yml).
 # BOM / LF, matching the other localization/english/*.yml files.
 # ============================================================================

 qing_emeritus.2.t:0 "The Weight of Sixty Years (太上皇)"
 qing_emeritus.2.desc:0 "The Emperor is old now — older than any sovereign of the house in living memory, and his reign has run on and on until it approaches the sixty-one years of the great Kangxi Emperor, his grandfather. To sit the throne longer than that revered ancestor would be a kind of impiety; to lay it down entirely is unthinkable while the mind is clear and the realm still answers to his hand.\n\nThere is a third way, sanctified by the ancients: to abdicate the throne to the designated heir, [scope:qing_emeritus_heir.GetName], and reign on as 太上皇 — Supreme Emperor Emeritus. The son would wear the yellow and receive the envoys; but the memorials would still cross the Emeritus's desk, the Grand Council would still heed his word, and the armies would still march at his command. The form of retirement, the substance of rule.\n\nHow shall the Emperor answer the weight of his own long reign?"
 qing_emeritus.2.a:0 "Abdicate to Taishang Huang (太上皇) — honour the ancestor, keep the power."
 qing_emeritus.2.a.tt:0 "Take the 太上皇 office: #G [scope:qing_emeritus_heir.GetName] reigns as junior emperor#!, but the Emeritus keeps his seat and power on the Grand Council (the prosperity-grade office buff). #G +15 Legitimacy, +30 Prestige#! for the supreme filial gesture. On the Emeritus's death, real power passes to the reigning emperor — and a corrupt favourite is purged for a treasury windfall."
 qing_emeritus.2.b:0 "Reign on; the Mandate is not laid down while breath remains."
 qing_emeritus.2.b.tt:0 "Keep the throne undivided: #G +1 Stability#!. The offer will not return; the natural succession runs its course on the Emperor's death."
