l_english:
 qing_integ.30.t:0 "改土歸流: The Circuit is Complete"
 qing_integ.30.desc:0 "The integration of [scope:target.GetName] has reached its culmination. After years of surveys, tax rolls, and careful pressure, the native chieftaincy (土司 tusi) is ready to be converted into a directly-administered circuit under a regular magistrate (流官 liuguan). This is gaitu guiliu (改土歸流) — the historic Qing policy that turned autonomous frontier lordships into provinces of the realm.\n\nHow shall we enact the absorption?"
 qing_integ.30.a:0 "A grand ceremony: investiture, feast, and solemn ritual."
 qing_integ.30.a.tt:0 "Spend §Y120§! gold to hold a triumphal investiture. Gain legitimacy and stability. The newly incorporated circuit is welcomed with fanfare."
 qing_integ.30.b:0 "A bureaucratic integration: dispatch surveyors and magistrates."
 qing_integ.30.b.tt:0 "Spend §Y60§! gold. The pragmatic path: a census, tax rolls, and circuit officials. Less glory, but faster and cheaper. Strains the bureaucracy."
 qing_integ.30.c:0 "A coercive absorption: send in the Green Standard Army."
 qing_integ.30.c.tt:0 "The Zhao Erfeng model: garrison first, administrate second. Cheap and fast, but provokes tyranny and unrest. The frontier remembers force."
 qing_integ.40.t:0 "川邊改土歸流: Force the Pace?"
 qing_integ.40.desc:0 "The integration of [scope:target.GetName] is well advanced, but not yet complete. Some at court argue that the time has come to issue an incorporation decree (改土歸流令) — to force the pace and finish the work now, rather than wait for the process to mature naturally.\n\nThe precedent: Zhao Erfeng's 川邊改土歸流 (Chuanbian gaitu guiliu, 1904-11), where the Sichuan governor-general forcibly incorporated Kham and eastern Tibet. It worked — but it provoked the 1905 Batang Uprising and laid the groundwork for Tibetan separatism after 1911.\n\nShall we push the decree through, or wait?"
 qing_integ.40.a:0 "Issue the decree. Spend legitimacy and gold to finish now."
 qing_integ.40.a.tt:0 "Spend §Y100§! gold and §Y20§! legitimacy to jump to the integration threshold. Risky: the dependency may resist."
 qing_integ.40.b:0 "Wait. Let the process mature naturally."
 qing_integ.40.b.tt:0 "The patient path: no cost, no risk, no acceleration."
 qing_integ.41.t:0 "巴塘起義: The Chieftain Resists"
 qing_integ.41.desc:0 "The incorporation decree has landed in [scope:target.GetName] — and the native chieftain (土司 tusi) has refused it. His kinsmen have risen in armed defiance, echoing the 1905 Batang Uprising (巴塘起義) when Zhao Erfeng's coercive incorporation provoked the Gyalrong chieftains to revolt.\n\nThe precedent cuts both ways. Kangxi, after the Revolt of the Three Feudatories (三藩之亂, 1673-81), granted Wu Sangui's grandson a lesser title and left him in Yunnan rather than executing him outright — a conciliation that kept the peace. Qianlong, facing the second Jinchuan War (金川之戰, 1771-76), sent 60,000 troops and 70 million taels to crush the Gyalrong chieftains — a victory that drained the treasury and seeded resentment for generations.\n\nHow shall we respond?"
 qing_integ.41.a:0 "Conciliate: roll back the decree, restore autonomy."
 qing_integ.41.a.tt:0 "The Kangxi model: when pressed, give ground. Roll back integration progress by §Y2§! steps. Gain stability, lose prestige."
 qing_integ.41.b:0 "Crush: send in the Green Standard Army to suppress the rising."
 qing_integ.41.b.tt:0 "The Qianlong model: a massive expedition to break the chieftain's will. Spend §Y150§! gold, gain tyranny and AE, suffer unrest. The process continues."
 qing_integ.41.c:0 "Co-opt: bribe the chieftain, marry into his family, grant titles."
 qing_integ.41.c.tt:0 "The Yongzheng rou yuan (柔遠) model: instead of force, co-opt the native elite via gold, prestige, and affinity. Spend §Y100§! gold."
 qing_integ_new_circuit_solemn:0 "Newly Incorporated Circuit (Solemn Rite)"
 qing_integ_new_circuit_solemn_desc:0 "A triumphal investiture has welcomed this newly absorbed territory into the realm. The pomp and ceremony have won the populace's goodwill, easing the administrative burden."
 qing_integ_new_circuit_bureaucratic:0 "Newly Incorporated Circuit (Bureaucratic)"
 qing_integ_new_circuit_bureaucratic_desc:0 "Surveyors, tax rolls, and circuit magistrates are working overtime to digest this newly absorbed territory. Efficient, but the bureaucracy is strained."
 qing_integ_new_circuit_coercive:0 "Newly Incorporated Circuit (Coercive)"
 qing_integ_new_circuit_coercive_desc:0 "The Green Standard Army garrison holds this newly absorbed territory down. Fast and cheap, but the frontier remembers the heavy hand."
 qing_integ_conciliation_granted:0 "Conciliation Granted to Frontier"
 qing_integ_conciliation_granted_desc:0 "The throne has rolled back its incorporation decree and restored autonomy to a resistant dependency. Face is lost, but peace is kept."
 qing_integ_coopted_chieftain:0 "Co-opted Chieftain"
 qing_integ_coopted_chieftain_desc:0 "This native chieftain has been co-opted via gold, titles, and marriage into the imperial network. His loyalty is personal, not institutional."
