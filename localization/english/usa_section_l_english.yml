l_english:

 # ######################################################################
 # usa_section_l_english.yml — "The House Divided": the American road to the
 # Civil War (#93). Beats .1-.12 + band/modifier display names. The dynamically
 # released Confederacy reuses the qing_uscw_csa_name/_adj keys (single canonical
 # CSA name shared with the Qing #73 arc), defined in qing_uscw_l_english.yml.
 # ######################################################################

 # --- .1 Missouri Compromise -------------------------------------------
 usa_section.1.t:0 "The Missouri Question"
 usa_section.1.desc:0 "Missouri petitions to enter the Union as a slave state, and the fragile balance of the republic trembles. To admit her is to tip the Senate southward; to refuse is to tell half the nation its institutions are not welcome in the West. Henry Clay labours for a bargain: admit Missouri with slavery, Maine without it, and draw a line across the continent at 36°30' beyond which slavery shall not pass. The Union holds — for now — but a line has been drawn on the map and in the national soul."
 usa_section.1.a:0 "Uphold the balance — admit them in pairs, and draw Clay's line."
 usa_section.1.b:0 "Restrict slavery's spread — bar it from the northern territories."
 usa_section.1.c:0 "Let slavery follow the flag wherever it goes."

 # --- .2 Nullification Crisis ------------------------------------------
 usa_section.2.t:0 "The Nullification Crisis"
 usa_section.2.desc:0 "South Carolina, enraged by the Tariff of Abominations, declares that a state may nullify a federal law it deems unconstitutional — and threatens to leave the Union if coerced. Calhoun's doctrine of states' rights has found its first battlefield. President Jackson answers with the Force Bill and a promise to hang the nullifiers, even as Clay crafts a compromise tariff. The crisis passes without disunion — but the South has learned the language of secession, and rehearsed the threat."
 usa_section.2.a:0 "The Force Bill — a state does not defy the Union and stand."
 usa_section.2.b:0 "A compromise tariff — let Clay find the middle way again."
 usa_section.2.c:0 "Concede — the states have rights the federal power must respect."

 # --- .3 Texas annexation ----------------------------------------------
 usa_section.3.t:0 "The Annexation of Texas"
 usa_section.3.desc:0 "The Lone Star Republic, wrested from Mexico by American settlers, asks to join the Union — and it would enter as a vast new slave state, perhaps carved into several. The South is jubilant, the North alarmed; and Mexico warns that annexation means war. Manifest Destiny beckons westward, but every mile of new territory reopens the question the republic cannot answer: slave, or free?"
 usa_section.3.a:0 "Annex Texas — the continent is ours to fill."
 usa_section.3.b:0 "Decline — Texas is not worth a war and a wound to the balance."

 # --- .4 Mexican War + Wilmot Proviso ----------------------------------
 usa_section.4.t:0 "The Wilmot Proviso"
 usa_section.4.desc:0 "The war with Mexico has delivered a domain vaster than the Louisiana Purchase — California, New Mexico, all the Southwest. And with it, the question that will not die: shall this new land be slave or free? Congressman Wilmot moves to bar slavery from every acre of the Cession. His Proviso fails in the Senate — but it has made the expansion of slavery the one issue that overrides all others, North and South. There is no longer any neutral ground on the map, or in the Congress."
 usa_section.4.a:0 "Popular sovereignty — let each territory decide for itself."
 usa_section.4.b:0 "Bar slavery from the Cession — the Proviso must pass."
 usa_section.4.c:0 "Extend the Missouri line to the Pacific — split the difference."

 # --- .5 Compromise of 1850 --------------------------------------------
 usa_section.5.t:0 "The Compromise of 1850"
 usa_section.5.desc:0 "California asks to enter free, and the whole precarious edifice threatens to collapse. Clay and Douglas assemble one last great bargain: California free, the territories organised on popular sovereignty — and, as the price of Southern assent, a Fugitive Slave Act that turns every Northern citizen into a slave-catcher on pain of law. The Union is preserved. But the North, made complicit in slavery's enforcement in its own streets, will never forgive it, and the abolitionist cause finds a thousand new converts."
 usa_section.5.a:0 "Pass the omnibus — the Union is worth the Fugitive Slave Act."
 usa_section.5.b:0 "Reject it — no compromise with the slave-catchers."

 # --- .6 Kansas-Nebraska Act -------------------------------------------
 usa_section.6.t:0 "The Kansas-Nebraska Act"
 usa_section.6.desc:0 "Senator Douglas, hungry for a Pacific railroad and Southern votes, moves to organise the Kansas and Nebraska territories on popular sovereignty — repealing the sacred Missouri line of 1820. The effect is an earthquake. The Whig Party, unable to hold North and South together, simply dies; from its ruins and the anti-slavery Democrats rises a new, wholly sectional party — the Republicans, a party of the North alone. The old system of two national parties, which had contained every crisis for a generation, is shattered. Nothing now stands between the sections and each other."
 usa_section.6.a:0 "Pass the Act — popular sovereignty, and the railroad west."
 usa_section.6.b:0 "Preserve the Missouri line — do not unleash this whirlwind."

 # --- .7 Bleeding Kansas -----------------------------------------------
 usa_section.7.t:0 "Bleeding Kansas"
 usa_section.7.desc:0 "Popular sovereignty has turned Kansas into a battlefield. Border ruffians from Missouri and free-soil settlers from New England pour in to seize the territory by ballot and by bullet; towns burn, and John Brown answers massacre with massacre at Pottawatomie. In the Senate chamber itself, a South Carolina congressman beats the abolitionist Charles Sumner senseless with a cane — and is showered with new canes by admiring Southerners. The violence is no longer a threat. It is here, and it is spreading."
 usa_section.7.a:0 "Send federal troops — restore order to the territory."
 usa_section.7.b:0 "Let Kansas settle the question by blood if it must."

 # --- .8 Dred Scott ----------------------------------------------------
 usa_section.8.t:0 "The Dred Scott Decision"
 usa_section.8.desc:0 "Chief Justice Taney's Court rules that a Black man has no rights a white man is bound to respect, that Dred Scott is not and can never be a citizen — and, going further, that Congress has no power to bar slavery from any territory at all. At a stroke the Missouri Compromise, the Wilmot Proviso, the whole free-soil program is declared unconstitutional. The South is triumphant; the North is aghast, for if slavery cannot be kept out of the territories, what is to keep it out of the free states themselves?"
 usa_section.8.a:0 "The republic must live with the verdict — for now."

 # --- .9 Lincoln-Douglas debates ---------------------------------------
 usa_section.9.t:0 "A House Divided"
 usa_section.9.desc:0 "Across Illinois, a gaunt prairie lawyer named Lincoln pursues Senator Douglas from town to town, and the two men argue the future of the republic before enormous crowds. \"A house divided against itself cannot stand,\" Lincoln warns. \"I believe this government cannot endure, permanently half slave and half free.\" He loses the Senate seat — but the debates carry his name across the whole North, and mark him as the man who has named the crisis plainly at last."
 usa_section.9.a:0 "Let the argument be heard the length of the land."

 # --- .10 Harpers Ferry ------------------------------------------------
 usa_section.10.t:0 "John Brown at Harpers Ferry"
 usa_section.10.desc:0 "John Brown, the avenging angel of Bleeding Kansas, seizes the federal arsenal at Harpers Ferry, meaning to arm a great slave insurrection. The rising fails; Brown is taken, tried, and hanged. But on the gallows he becomes something more dangerous than a raider — a martyr. The North tolls its bells for him and sings his name; the South sees in that mourning the naked face of its nightmare, a region that would cheer the slaughter of slaveholders in their beds. After Harpers Ferry, the two sections can no longer imagine sharing a country."
 usa_section.10.a:0 "Hang him — the law must answer insurrection."
 usa_section.10.b:0 "Pardon him — do not hand the abolitionists a martyr."

 # --- .11 Election of 1860 ---------------------------------------------
 usa_section.11.t:0 "The Election of 1860"
 usa_section.11.desc:0 "The Democratic Party splinters North and South, and into the breach steps the Republican Lincoln, running on a platform of no slavery in the territories. In a four-way race he wins the presidency without carrying a single Southern state — indeed without appearing on many Southern ballots at all. To the South it is proof that its voice no longer counts in the councils of the nation, that it is now a permanent minority ruled by a hostile North. Before Lincoln is even inaugurated, South Carolina moves to leave the Union."
 usa_section.11.a:0 "Lincoln is elected — let the South make of it what it will."
 usa_section.11.b:0 "A fusion ticket to deny Lincoln — anything to hold the Union."

 # --- .12 Secession Winter ---------------------------------------------
 usa_section.12.t:0 "Secession Winter"
 usa_section.12.desc:0 "It has come at last. South Carolina leads the Deep South out of the Union; at Montgomery they raise a new flag over a Confederate States of America and swear in their own president. When Southern guns open on Fort Sumter in Charleston harbour, the long argument of a generation becomes a war. The republic that Clay and Webster and Jackson strove so long to hold whole is broken in two — and only the arbitrament of arms will say whether it is ever made one again."
 usa_section.12.a:0 "The Union will be preserved — by force of arms if it must be."

 # --- band / modifier display names ------------------------------------
 usa_sectional_calm:0 "Sectional Calm"
 usa_sectional_calm_desc:0 "The antebellum boom runs on; the quarrel over slavery is background noise, not yet a fire."
 usa_sectional_strained:0 "Sectional Strain"
 usa_sectional_strained_desc:0 "The crisis begins to bite — capital grows wary and the nation's politics turn fractious and sharp."
 usa_sectional_crisis:0 "A House Divided"
 usa_sectional_crisis_desc:0 "The Union stands on the brink; the sections eye one another as enemies, and disunion is spoken aloud."
 usa_king_cotton:0 "King Cotton"
 usa_king_cotton_desc:0 "The slave-labour cotton economy of the South, on which half the mills of the world depend."
 usa_free_labor:0 "Free Labor"
 usa_free_labor_desc:0 "The free-soil industrial economy of the North: free men, free soil, and the workshops of a new age."
 usa_fugitive_act:0 "The Fugitive Slave Act"
 usa_fugitive_act_desc:0 "Federal law conscripting Northern citizens as slave-catchers — and making abolitionists by the thousand."
 usa_secession_winter:0 "Secession Winter"
 usa_secession_winter_desc:0 "The Deep South departs; a Confederacy is proclaimed, and the guns are turned upon Fort Sumter."
 usa_bleeding:0 "Bleeding Kansas"
 usa_bleeding_desc:0 "Popular sovereignty made into open war — ballots and bullets, and towns put to the torch."

