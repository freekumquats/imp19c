l_english:

 # spa_bourbon_l_english.yml — SPA 1763-1815 arc (#283).

 # --- .1 The Expulsion of the Jesuits ---
 spa_bourbon.1.t:0 "The Expulsion of the Jesuits"
 spa_bourbon.1.desc:0 "Charles III, enlightened despot and reformer, expels the Society of Jesus from Spain and all her dominions, asserting the crown's mastery over the Church and the empire."
 spa_bourbon.1.a:0 "Expel the order — the crown is supreme."

 # --- .2 War with Britain ---
 spa_bourbon.2.t:0 "War with Britain"
 spa_bourbon.2.desc:0 "By the Treaty of Aranjuez, Spain joins France in the American war against Britain, hoping to recover Gibraltar and Florida from the old enemy."
 spa_bourbon.2.a:0 "Join the war — recover what Britain took."

 # --- .3 A Weak King ---
 spa_bourbon.3.t:0 "A Weak King"
 spa_bourbon.3.desc:0 "Charles III is dead, and his feeble son Charles IV takes the throne, soon a puppet of his wife and the favourite Godoy. The reforming age of Spain gives way to drift and intrigue."
 spa_bourbon.3.a:0 "The new King reigns."

 # --- .4 The French Alliance ---
 spa_bourbon.4.t:0 "The French Alliance"
 spa_bourbon.4.desc:0 "By the Treaty of San Ildefonso, Spain reverses course and allies Revolutionary France against Britain, binding her fortunes to Paris — and to the coming storm."
 spa_bourbon.4.a:0 "Ally with France against Britain."

 # --- .5 The Dos de Mayo ---
 spa_bourbon.5.t:0 "The Dos de Mayo"
 spa_bourbon.5.desc:0 "Napoleon has lured the royal family to Bayonne and set his brother Joseph on the Spanish throne. Madrid rises on the second of May, and all Spain follows — the Peninsular War, a national war of the knife, has begun."
 spa_bourbon.5.a:0 "Rise against the French — no surrender."

 # --- .6 The Return of the King ---
 spa_bourbon.6.t:0 "The Return of the King"
 spa_bourbon.6.desc:0 "With Napoleon beaten and the French driven out by Wellington and the guerrillas, Ferdinand VII returns in triumph — and promptly abolishes the liberal constitution, restoring absolute monarchy over an exhausted and divided nation."
 spa_bourbon.6.a:0 "Restore the absolute crown."
