l_english:

 # ====================================================================
 # WESTERN EMBASSIES TO THE COURT (西使覲見 / 貢使問題).
 # See events/imp19c_mod_events/qing_embassy_events.txt and
 # common/scripted_effects/se_QING_EMBASSY.txt.
 # Sources: Peyrefitte, The Immobile Empire; Hevia, Cherishing Men from Afar;
 # Cranmer-Byng, An Embassy to China; Hsü, The Rise of Modern China.
 # ====================================================================

 # --- .1  Macartney (1793) ------------------------------------------
 qing_embassy.1.t:0 "The Macartney Embassy (馬戛爾尼使團)"
 qing_embassy.1.desc:0 "A great embassy from the King of England has come up the Bei He to Peking. Lord Macartney (馬戛爾尼) brings tribute the like of which the court has not seen — a planetarium, telescopes, clocks, a hot-air balloon, cannon and muskets — and with them a letter from King George requesting a resident minister at Peking, the opening of ports beyond Canton, and a small island for English trade.\n\nThe Ministry of Rites insists he perform the full #Y kowtow#! (三跪九叩) before the Son of Heaven, as every tribute-bearer must. The Englishman offers to bend one knee, as he would to his own king, and no more. The whole question of whether these sea barbarians are vassals bearing tribute or envoys of an equal crown hangs on the bending of a knee — and behind it, whether the Celestial Empire needs anything the West can offer at all."
 qing_embassy.1.rebuff:0 "\"The Celestial Empire possesses all things\" — send him home"
 qing_embassy.1.rebuff.tt:0 "Uphold the tribute ceremony and refuse the demands (the edict of self-sufficiency). #R Affronts Britain#! (rising Great-Game tension), but #G its rivals France and Russia are quietly pleased#! (以夷制夷) and the #G conservatives are vindicated#! (eased reform pressure, prestige)."
 qing_embassy.1.receive:0 "Receive the embassy and open a channel of trade"
 qing_embassy.1.receive.tt:0 "Grant the audience as near-equals and open limited trade. #G Cools tension with Britain and builds goodwill#!, draws #G trade revenue and a lasting commerce lift#! (and a further treaty port, if the treaty order already stands) — but #R France and Russia bristle#! and the #R conservatives recoil#! (rising reform pressure)."
 qing_embassy.1.embrace:0 "#Y Embrace the barbarians' arts#! — learn what they have brought (洋務先聲)"
 qing_embassy.1.embrace.tt:0 "The great divergence. Receive the embassy #G(goodwill + trade, as above)#! — then resolve that the Celestial Empire will #Y LEARN#! what the English brought, launching #G early industrialization#! nearly seventy years before its time. Founds the #G Imperial Cannon Foundry (火器局)#! at once and opens the #G reform program#! to build the rest (a translation bureau, a steam yard, a machine-works), all feeding the #G Self-Strengthening momentum#! toward an early Industrial Golden Age.\n\nBut there is no Opium War yet to justify so radical a break: the #R conservative court recoils#! (#R legitimacy and stability hit, rising reform pressure, a lasting court-reaction drag#!) until the program proves itself. A pre-modern bureaucracy also carries it only slowly — #R progress gains are halved while administrative capacity is weak#!."

 # --- .2  Amherst (1816) --------------------------------------------
 qing_embassy.2.t:0 "The Amherst Embassy (阿美士德使團)"
 qing_embassy.2.desc:0 "The English have sent another. Lord Amherst (阿美士德) has come to press again the demands Macartney could not win a generation ago. But the court has learned nothing and forgotten nothing: the ministers hurry him through a night journey to the palace and demand he present himself at once, exhausted and without his robes of state, to perform the kowtow before the Jiaqing Emperor.\n\nHe refuses. The affront is now mutual, and sharper than before — an embassy expelled from the capital without ever being received. The English will not come knocking with gifts a third time; what comes next may come with gunboats."
 qing_embassy.2.rebuff:0 "Expel the embassy over the kowtow"
 qing_embassy.2.rebuff.tt:0 "Send Lord Amherst away without an audience for refusing the kowtow. #R Sharply affronts Britain#! (rising Great-Game tension), but #G France and Russia are pleased#! (以夷制夷) and the #G conservatives are vindicated#! (eased reform pressure, prestige)."
 qing_embassy.2.receive:0 "Grant the audience — receive Lord Amherst"
 qing_embassy.2.receive.tt:0 "Receive the embassy with dignity and open limited trade. #G Cools tension with Britain and builds goodwill#!, draws #G trade revenue and a lasting commerce lift#! (and a further treaty port, if the treaty order already stands) — but #R France and Russia bristle#! and the #R conservatives recoil#! (rising reform pressure)."

 # --- .3  Titsingh (Dutch, 1795) ------------------------------------
 qing_embassy.3.t:0 "The Titsingh Embassy (荷蘭使團)"
 qing_embassy.3.desc:0 "Hard on Macartney's heels, the Dutch East India Company has sent its own mission under Isaac Titsingh (德勝) to congratulate the Qianlong Emperor on the sixtieth year of his reign. Where the Englishman haggled over a knee, the Dutchmen submit gladly: they perform the full kowtow, kneel where they are told, and endure the Peking winter in shabby quarters — model tribute-bearers, asking for nothing.\n\nThey are the last embassy from the West that will bow so completely. The court may reward such deference with a little trade, or accept it as no more than the tribute the Middle Kingdom is owed."
 qing_embassy.3.rebuff:0 "Accept the tribute, grant nothing — the form is its own reward"
 qing_embassy.3.rebuff.tt:0 "Receive the Dutch kowtow as the tribute due the Celestial Empire and grant no concession. #G The tribute form is upheld#! (eased reform pressure, prestige). The Dutch carry no Great-Game rivalry counter, so no power's tension moves."
 qing_embassy.3.receive:0 "Reward the deference — open trade with the Dutch"
 qing_embassy.3.receive.tt:0 "Grant the Dutch a channel of trade for their deference. Draws #G trade revenue and a lasting commerce lift#! (and a further treaty port, if the treaty order already stands) and #G improves relations with the Netherlands#! — but the #R conservatives recoil#! (rising reform pressure)."

 # --- .4  Golovkin (Russia, 1805) -----------------------------------
 qing_embassy.4.t:0 "The Golovkin Embassy (戈洛夫金使團)"
 qing_embassy.4.desc:0 "A great Russian embassy under Count Golovkin (戈洛夫金) has reached Urga (庫倫) on the road to Peking, seeking to widen the overland trade that trickles through Kyakhta (恰克圖) and to settle the northern frontier. The Qing frontier officials, as is proper, require the ambassador to rehearse the #Y kowtow#! before a table bearing the Emperor's name before he may proceed.\n\nGolovkin refuses to bow to an empty table. The embassy halts at the frontier, hundreds of li short of the capital, the whole enterprise foundering — as Macartney's did — on the question of whether Russia comes as a vassal or an equal."
 qing_embassy.4.rebuff:0 "Turn the embassy back at the frontier"
 qing_embassy.4.rebuff.tt:0 "Refuse to let Golovkin proceed without the kowtow. #R Affronts Russia#! (rising Great-Game tension), but #G its rivals Britain and France are pleased#! (以夷制夷) and the #G conservatives are vindicated#! (eased reform pressure, prestige)."
 qing_embassy.4.receive:0 "Receive the mission — widen the Kyakhta trade"
 qing_embassy.4.receive.tt:0 "Let the embassy come to Peking and widen the overland trade. #G Cools tension with Russia and builds goodwill#!, draws #G trade revenue and a lasting commerce lift#! (and a further treaty port, if the treaty order already stands) — but #R Britain and France bristle#! and the #R conservatives recoil#! (rising reform pressure)."

 # --- .5  France ----------------------------------------------------
 qing_embassy.5.t:0 "A French Embassy (法蘭西使團)"
 qing_embassy.5.desc:0 "France, not to be outdone by the English, has sent an embassy of her own to seek the same audience, the same trade, and above all the protection of the Catholic missions whose priests have served at the court since the days of the Jesuits. The same question waits at the palace gate: the kowtow, and whether these barbarians of the far West come as tribute-bearers or as envoys of a crown that reckons itself the equal of the Great Qing."
 qing_embassy.5.rebuff:0 "Stand on the ceremony — refuse the French"
 qing_embassy.5.rebuff.tt:0 "Uphold the tribute ceremony and refuse the demands. #R Affronts France#! (rising Great-Game tension), but #G its rivals Britain and Russia are pleased#! (以夷制夷) and the #G conservatives are vindicated#! (eased reform pressure, prestige)."
 qing_embassy.5.receive:0 "Receive the embassy — open trade"
 qing_embassy.5.receive.tt:0 "Grant the audience and open limited trade. #G Cools tension with France and builds goodwill#!, draws #G trade revenue and a lasting commerce lift#! (and a further treaty port, if the treaty order already stands) — but #R Britain and Russia bristle#! and the #R conservatives recoil#! (rising reform pressure)."

 # --- .6  Cushing / Wanghia (America, 1844) -------------------------
 qing_embassy.6.t:0 "The Cushing Mission (顧盛使團)"
 qing_embassy.6.desc:0 "The Americans have sent a commissioner, Caleb Cushing (顧盛), but he comes in a wholly new key. He does not haggle over the kowtow — he simply declines to perform it, and where the older embassies came as supplicants he comes with a treaty already drafted, asking only what the English won at gunpoint: most-favoured-nation trade, on paper, between equals.\n\nIt is the shape of the future — privilege claimed by right of treaty rather than granted as an imperial favour. The court may grant it as the cheapest of the barbarians' demands to satisfy, or refuse to concede by right what it has always given only as grace."
 qing_embassy.6.rebuff:0 "Refuse the treaty — no privilege claimed by right"
 qing_embassy.6.rebuff.tt:0 "Decline to grant privileges by treaty rather than imperial grace. #G The imperial prerogative is upheld#! (eased reform pressure, prestige). America carries no Great-Game rivalry counter, so no power's tension moves."
 qing_embassy.6.receive:0 "Grant most-favoured trade — the co-operative opening"
 qing_embassy.6.receive.tt:0 "Grant the Americans most-favoured-nation trade by treaty. Draws #G trade revenue and a lasting commerce lift#! (and a further treaty port, if the treaty order already stands) and #G improves relations with the United States#! — but the #R conservatives recoil#! (rising reform pressure)."

 # --- .10  The early-industrialization program hub (洋務先聲) ---------
 qing_embassy.10.t:0 "The Foreign-Affairs Program (洋務先聲)"
 qing_embassy.10.desc:0 "The decision is made: the Empire will learn. The Jesuit astronomers still kept at the Bureau of Astronomy, the English models and instruments Macartney left behind, the memorials of the few officials who have looked westward and not flinched — all are gathered to a single purpose. The cannon foundry already casts its first guns. Now the court must decide how far and how fast to carry the work: a bureau to translate the barbarians' science, a yard to copy their steam-vessels, a works to build the machines that build machines.\n\nEach foundation is a fresh provocation of those who hold that the Manchu Way and the Sages suffice. But each also carries the Empire one step further from the fate the century holds for a China that does not change."
 qing_embassy.10.translation:0 "Found the Translation & Science Bureau (譯館)"
 qing_embassy.10.translation.tt:0 "Establish a bureau to translate Western science and teach it — a real #G school#! and the #G modern-science tech line#!. #G Advances the movement#! (reform momentum) but #R provokes the conservatives#!."
 qing_embassy.10.yard:0 "Found the Steam-Experiment Yard (機器船廠)"
 qing_embassy.10.yard.tt:0 "Build a coastal yard to copy the West's steam-vessels — a real #G port#! and the #G early naval tech#!. #G Advances the movement#! but is the sharpest provocation of the tribute worldview (#R heavy conservative backlash#!)."
 qing_embassy.10.manufactory:0 "Found the Imperial Machine-Works (機器製造局)"
 qing_embassy.10.manufactory.tt:0 "A state manufactory to make the machines that make machines — a real #G industrial operation#! and the #G steam-engine tech line#!, and it turns a #G profit (development capital)#!. #G Advances the movement#!, at a #R conservative cost#!."
 qing_embassy.10.consolidate:0 "#G Consolidate the program#! — the court accepts the new order"
 qing_embassy.10.consolidate.tt:0 "With all four foundations standing and the movement carrying real momentum, the new order is no longer contested. #G Lifts the conservative-reaction drag for good, eases reform pressure, and restores stability and legitimacy#!."
 qing_embassy.10.later:0 "Attend to it later"
 qing_embassy.10.later.tt:0 "Keep the program open; return to it another time."

