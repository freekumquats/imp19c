 # ---- field-active + character modifiers ----
 qing_advisor_naval_active:0 "Foreign Naval Adviser (海軍顧問)"
 qing_advisor_army_active:0 "Foreign Army Drillmaster (陸軍教習)"
 qing_advisor_fiscal_active:0 "Foreign Fiscal Adviser (財政顧問)"
 qing_advisor_technical_active:0 "Foreign Technical Expert (技術顧問)"
 qing_foreign_advisor:0 "Foreign Expert in Qing Service (洋員)"

 # ---- opinion ----
 qing_advisor_home_opinion:0 "Has a national in Qing service"

 # ---- scripted-GUI verb + tooltips ----
 qing_action_recruit_advisor:0 "Recruit a Foreign Expert (延聘洋員)"
 qing_gov_advisor_dismiss:0 "Dismiss this Foreign Expert (辭退洋員)"
 qing_action_advisor_needs_slot_tt:0 "Requires a free advisor post (a limited number may serve at once)."
 qing_action_advisor_needs_pi_tt:0 "Requires #Y 15 Political Influence#!."

 # ---- .1 recruitment hub ----
 qing_advisor.1.t:0 "Delegate a Search for Foreign Talent"
 qing_advisor.1.desc:0 "The work of self-strengthening outruns the men who can direct it. Arsenals want engineers, the fleets want drillmasters, the counting-houses want honest accountants — skills the empire does not yet grow in sufficient number. The Zongli Yamen proposes to hire them abroad, as Li Hongzhang and Shen Baozhen have done: a Frenchman to run the dockyard, a German to drill the columns, an Englishman for the ledgers, an American for the wires and the mines.\n\nEach such man is a gift of expertise — and a thread that draws his home government's interest deeper into China. Whom shall we seek?"
 qing_advisor.1.naval:0 "Seek a naval expert (dockyards and fleet training)."
 qing_advisor.1.naval.tt:0 "Hire a #Y naval adviser#! — accelerates self-strengthening and improves the fleet, warming the expert's home power. (Needs a free post; the naval post must be unfilled.)"
 qing_advisor.1.army:0 "Seek an army drillmaster (Western drill and tactics)."
 qing_advisor.1.army.tt:0 "Hire an #Y army drillmaster#! — accelerates self-strengthening and sharpens the land forces, warming the expert's home power. (Needs a free post; the army post must be unfilled.)"
 qing_advisor.1.fiscal:0 "Seek a fiscal expert (accounts, customs, loans)."
 qing_advisor.1.fiscal.tt:0 "Hire a #Y fiscal adviser#! — accelerates self-strengthening, raises revenue and checks graft, warming the expert's home power. (Needs a free post; the fiscal post must be unfilled.)"
 qing_advisor.1.technical:0 "Seek a technical expert (arsenals, mines, telegraph)."
 qing_advisor.1.technical.tt:0 "Hire a #Y technical expert#! — accelerates self-strengthening and lifts research and industry, warming the expert's home power. (Needs a free post; the technical post must be unfilled.)"
 qing_advisor.1.decline:0 "Not now — hold the funds and the favours."

 # ---- .2 the expert arrives ----
 qing_advisor.2.t:0 "A Foreign Expert Presents Himself"
 qing_advisor.2.desc:0 "The search bears fruit: a foreigner of standing in his field arrives at the treaty port, references in hand, willing to take service under the dragon throne for a handsome salary. He will need his fee — and the forbearance of the mandarins who must work beside a barbarian — but the skill he brings cannot be bought at home at any price."
 qing_advisor.2.a:0 "Engage him (pay his fee)."
 qing_advisor.2.a.tt:0 "Costs #Y 50 treasury#!. #G Fill the advisor post: a lasting expertise bonus and a push of self-strengthening#!; his #Y home power warms#! to us (以夷制夷 nudges its rivals). He may be dismissed later to free the post."
 qing_advisor.2.b:0 "Think better of it; send him away."
