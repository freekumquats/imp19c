 QING_GC_OFFICE_JUSTICE:0 "Grand Minister of Justice (刑部)"
 QING_GC_OFFICE_WORKS:0 "Grand Minister of Works (工部)"
 QING_GC_OFFICE_CENSOR:0 "Grand Inspector of the Censorate (都察院)"
 QING_GC_OFFICE_LIFANYUAN:0 "Grand Director of the Lifan Yuan (理藩院)"
 QING_GC_OFFICE_GRAND_SECRETARY:0 "Grand Secretary of the Imperial Household (總管內務府大臣)"
 QING_GC_OFFICE_ZONGLI:0 "Grand Director of the Zongli Yamen (總理衙門)"

 QING_GC_HEADER_CANDIDATES:0 "Eligible Courtiers (候選)"
 QING_GC_OPEN_CANDIDATES:0 "Open Eligible Courtiers (候選)"
 QING_GC_OPEN_CANDIDATES_TT:0 "Open the Eligible Courtiers roster in a separate, movable window. Appoint an able official to a vacant great office, or replace a sitting minister with a worthier candidate. The window can be dragged aside so it does not cover the Grand Council office boxes."
 QING_GC_CHANCELLOR:0 "Grand Chancellor (領班軍機大臣)"
 QING_GC_EMERITUS:0 "Emperor Emeritus (太上皇)"

 QING_GC_SEATS_TT:0 "#Y Great offices filled#! — of the eleven appointable offices. The Grand Council IS the office-holders (軍機處): each vacant office strains its domain and drags council effectiveness."
 QING_GC_EFFECTIVENESS_TT:0 "#Y Council effectiveness#! (0–100). Rises with the combined talent of its members, a named Grand Chancellor, and a balanced Manchu-Han mix; falls with empty seats and mediocre appointees. Drives the whole abstracted bureaucracy."
 QING_GC_BALANCE_TT:0 "#Y Manchu#! / #Y Han#! councillors. The dynasty's founding compact of dual appointment (滿漢並用) rewards a balanced table; a bloc-dominated council forfeits the balance bonus."

 QING_GC_VACANT:0 "#I Vacant#!"
 QING_GC_CHANCELLOR_VACANT:0 "#I No Grand Chancellor named.#!"
 QING_GC_NO_CANDIDATES:0 "#I No eligible courtiers at present. Every able official already sits on the council or holds a great office.#!"

# ####################################################################
# [#110] DYNASTIC HEALTH PANEL (gui/government_view.gui) — eight read-only
# gauges surfacing the se_QING_DECLINE.txt state so the player can see, at a
# glance, what is eating the dynasty. Each reads its 0..100 country variable
# and its tooltip names the band thresholds the decline pulse actually uses
# (verified against se_QING_DECLINE.txt / se_QING_GOVERNANCE.txt).
# ####################################################################

 QING_GC_HEADER_HEALTH:0 "Dynastic Health (國勢)"

 QING_HEALTH_REFORM_TT:0 "#Y Reform Pressure#! (0–100) — the accumulated case for self-strengthening, averaged from corruption, currency stress, ethnic tension and banner decay. At #Y 50#! the #Y Self-Strengthening reform track unlocks#!; the throne feels no urgency to change while it stays low, and no room to resist it once it climbs high."

 QING_HEALTH_CORRUPTION_TT:0 "#Y Corruption (吏治敗壞)#! (0–100) — venality in the bureaucracy. #Y 30#!: endemic (捐納冗濫 begins to bite); #Y 60#!: rampant (官場糜爛). A clean court sits at #Y 10#! or below. Drags bureaucratic capacity and feeds reform pressure."

 QING_HEALTH_CURRENCY_TT:0 "#Y Currency Stress (銀荒)#! (0–100) — strain on the silver–copper system as opium drains bullion. #Y 30#!: silver drain (銀荒); #Y 60#!: monetary crisis (銀貴錢賤), starving the treasury and inflaming unrest."

 QING_HEALTH_SECT_TT:0 "#Y Sectarian Pressure (教亂)#! (0–100) — the spread of heterodox sects (White Lotus 白蓮教, and the soil a Hong Xiuquan grows from). At #Y 50#! infiltration turns to open sectarian revolt. Rises with corruption and misrule."

 QING_HEALTH_BANNER_TT:0 "#Y Banner Decay (八旗生計)#! (0–100) — the decline of the hereditary Eight Banners from a conquering host into a pensioned, idle garrison caste. #Y 30#!: mild; #Y 60#!: severe. A high value hollows out the dynasty's own martial core."

 QING_HEALTH_GREENSTANDARD_TT:0 "#Y Green Standard Decay (綠營廢弛)#! (0–100) — the rot of the Han provincial army: padded muster rolls, absent soldiers, sold equipment. #Y 30#!: mild; #Y 60#!: severe. When it fails, the throne must lean on militia and regional armies it cannot fully control."

 QING_HEALTH_BUREAU_TT:0 "#Y Bureaucratic Capacity (吏治)#! (0–100) — how much the civil administration can actually get done. #Y 70#!+: capable (吏治清明); below #Y 30#!: paralysed (壅蔽), with memorials unanswered and the throne's writ barely leaving the capital. Corruption is its chief drag."

 QING_HEALTH_SELFSTR_TT:0 "#Y Self-Strengthening Progress (自強)#! (0–100) — how far the empire has carried modernisation: arsenals, shipyards, a modern army and modern schooling. Unlocked once reform pressure reaches 50; it drives the modern-army and civic-modernisation tracks. The dynasty's race against its own decline."


 # ####################################################################
