 # [Bug 7] Per-office name tooltips (office description + when-filled modifier bonus).
 QING_GC_OFFICE_CHANCELLOR_TT:0 "#Y The Grand Chancellor (領班軍機大臣)#! is the leader of the Grand Council and wields outsized influence over its operations, the summit office judged on all four skills.\n\n#Y Grants:#! #G +0.05#! stability / month, #G −0.05#! tyranny / month"
 QING_GC_OFFICE_PERSONNEL_TT:0 "#Y The Grand Minister of Personnel (吏部)#! oversees all civil appointments, the examination system, and official performance reviews.\n\n#Y Grants:#! #G +0.10#! civil-war threshold"
 QING_GC_OFFICE_REVENUE_TT:0 "#Y The Grand Minister of Revenue (戶部)#! commands the imperial treasury, the population census, grain logistics, and all taxation.\n\n#Y Grants:#! #G +8%#! tax, #G +5%#! commerce"
 QING_GC_OFFICE_RITES_TT:0 "#Y The Grand Minister of Rites (禮部)#! directs state ceremony, the examination and degree system, tributary protocol, and religious conversion.\n\n#Y Grants:#! #G +0.05#! legitimacy / month, #G +5%#! conversion speed"
 QING_GC_OFFICE_WAR_TT:0 "#Y The Grand Minister of War (兵部)#! administers military appointments, troop movements, the courier system, and the imperial arsenals.\n\n#Y Grants:#! #G +10%#! supply limit, #G −10%#! army maintenance"
 QING_GC_OFFICE_JUSTICE_TT:0 "#Y The Grand Minister of Justice (刑部)#! enforces the legal code, oversees criminal punishments, and handles appellate review.\n\n#Y Grants:#! #G −1#! unrest, #G +0.05#! state loyalty / month"
 QING_GC_OFFICE_WORKS_TT:0 "#Y The Grand Minister of Works (工部)#! manages public works, imperial construction projects, water conservancy, and state workshops.\n\n#Y Grants:#! #G −10%#! build cost, #G +0.05#! civilization / month"
 QING_GC_OFFICE_CENSOR_TT:0 "#Y The Grand Inspector of the Censorate (都察院)#! conducts surveillance of officials, investigates corruption, and ensures bureaucratic discipline.\n\n#Y Grants:#! #G −0.06#! corruption / month, #G +loyalty#! to fellow councillors"
 QING_GC_OFFICE_LIFANYUAN_TT:0 "#Y The Grand Director of the Lifan Yuan (理藩院)#! governs Inner Asian and frontier affairs, managing tributary relations with Mongol, Tibetan, and Turkic peoples.\n\n#Y Grants:#! #G +5#! subject loyalty, #G +10%#! integration speed"
 QING_GC_OFFICE_CHAMBERLAIN_TT:0 "#Y The Grand Chamberlain (內務府)#! oversees the Imperial Household Department, managing palace finances, succession protocol, and the imperial lineage.\n\n#Y Grants:#! #G +0.15#! next-ruler legitimacy, #G +15#! primary-heir attraction"
 QING_GC_OFFICE_ZONGLI_TT:0 "#Y The Grand Director of the Zongli Yamen (總理衙門)#! handles all foreign affairs and treaty negotiations with Western powers.\n\n#Y Grants:#! #G +2#! diplomatic reputation, #G −0.02#! aggressive expansion / month"
 QING_GC_OFFICE_GRAND_SECRETARIAT_TT:0 "#Y The Grand Secretary of the Secretariat (內閣)#! manages the central paperwork apparatus, drafting imperial edicts and coordinating ministerial memorials.\n\n#Y Grants:#! #G −10%#! all power costs, #G +0.10#! political influence / month"
