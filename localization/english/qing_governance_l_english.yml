l_english:

# ============================================================================
# Localization for the Qing GOVERNANCE suite: the Grand Council (軍機處), the
# abstracted bureaucracy, and the character-held great offices.
#   modifiers:  common/modifiers/qing_governance_modifiers.txt
#   effects:    common/scripted_effects/se_QING_COUNCIL.txt / se_QING_GOVERNANCE.txt
#   GUI verbs:  common/scripted_guis/QING_governance_actions.txt
# Flavor is grounded in real Qing institutional history and cites its sources
# inline, matching qing_mechanics_l_english.yml. Chinese terms are given in
# traditional characters as the court itself used them.
#
# Sources drawn on for the institutional detail below:
#   Bartlett, Beatrice S. "Monarchs and Ministers: The Grand Council in
#     Mid-Ch'ing China, 1723–1820" (California, 1991).
#   Hucker, Charles O. "A Dictionary of Official Titles in Imperial China"
#     (Stanford, 1985).
#   Metzger, Thomas A. "The Internal Organization of Ch'ing Bureaucracy" (1973).
#   Kuhn, Philip A. "Soulstealers" (Harvard, 1990) — on Manchu-Han dyarchy.
# ============================================================================

# ####################################################################
# BUREAUCRACY BANDS (qing_bureau_*) — the abstracted civil administration.
# The Six Boards and the provincial hierarchy are modelled as two 0..100
# meters: CAPACITY (can the state get things done?) and INTEGRITY (is it
# honest and merit-staffed, or venal and clogged with purchased ranks?).
# ####################################################################

 qing_bureau_capable:0 "Capable Bureaucracy (吏治清明)"
 qing_bureau_capable_desc:0 "The boards and provincial yamens are staffed and functioning: memorials are answered, taxes assessed, and edicts carried into the counties. A civil service working near its potential."

 qing_bureau_strained:0 "Strained Bureaucracy (政務叢脞)"
 qing_bureau_strained_desc:0 "Understaffed boards and overworked magistrates let business pile up. Routine matters still move, but reform and crisis alike overwhelm an administration stretched too thin."

 qing_bureau_paralysed:0 "Paralysed Bureaucracy (壅蔽)"
 qing_bureau_paralysed_desc:0 "The machinery of government has seized. Memorials go unanswered for months, appointments sit vacant, and the throne's writ barely reaches beyond the capital. A state that cannot govern itself."

 qing_bureau_meritocratic:0 "Meritocratic Service (科甲正途)"
 qing_bureau_meritocratic_desc:0 "Office is won through the examination system (科舉) and held by talent. Honest, examined officials — the 'proper path' (正途) — dominate the boards, and the administration commands the throne's trust."

 qing_bureau_venal:0 "Venal Officialdom (捐納冗濫)"
 qing_bureau_venal_desc:0 "The sale of ranks (捐納) and the customary 'gifts' that grease every transaction have hollowed out the service. Purchased degree-holders crowd the 'irregular path' (異途), and every office is first a private investment to be recouped."

# ####################################################################
# GRAND COUNCIL BANDS (qing_council_*) — the 軍機處 as effectiveness engine.
# ####################################################################

 qing_council_effective:0 "Effective Grand Council (軍機處得人)"
 qing_council_effective_desc:0 "The councillors (軍機大臣) are able men who work in concert; the throne's decisions are drafted, deliberated, and dispatched with speed. The council as the Yongzheng and Qianlong emperors intended it."

 qing_council_dysfunctional:0 "Dysfunctional Grand Council (軍機廢弛)"
 qing_council_dysfunctional_desc:0 "Empty seats, feuding cliques, and mediocre appointees have reduced the council to a rubber stamp. Business that should take days takes seasons, and the throne governs half-blind."

 qing_council_overmighty:0 "Overmighty Grand Councillor (權臣當國)"
 qing_council_overmighty_desc:0 "A single councillor has gathered the threads of power into his own hands — the pattern of Heshen (和珅) under Qianlong. Efficient, perhaps, but the throne now depends on a man who answers to no one, and corruption follows power like a shadow."

 qing_council_dyarchic_balance:0 "Manchu-Han Balance (滿漢並用)"
 qing_council_dyarchic_balance_desc:0 "Both Manchu and Han councillors sit at the table, as the dynasty's founding compact of dual appointment (滿漢複職) intended. Neither bloc feels shut out, and the council draws on the whole talent of the realm."

# ####################################################################
# GREAT OFFICES (qing_office_*_active) — a capable holder grants these.
# The Six Boards (六部), the Censorate (都察院), the Court of Colonial Affairs
# (理藩院), the Imperial Household Department (內務府), and — post-1861 — the
# Zongli Yamen (總理各國事務衙門).
# ####################################################################

 qing_office_personnel_active:0 "Grand Minister of Personnel Appointed (吏部尚書)"
 qing_office_personnel_active_desc:0 "The Board of Personnel (吏部) controls appointment, evaluation, and promotion across the entire civil service. A capable minister here means office goes to merit and the administration answers to the throne."

 qing_office_revenue_active:0 "Grand Minister of Revenue Appointed (戶部尚書)"
 qing_office_revenue_active_desc:0 "The Board of Revenue (戶部) holds the census, the land tax, the salt monopoly, and the granaries. A sound minister here keeps the treasury honest and the tax rolls current."

 qing_office_rites_active:0 "Grand Minister of Rites Appointed (禮部尚書)"
 qing_office_rites_active_desc:0 "The Board of Rites (禮部) governs ceremony, the examinations, and relations with tributary states. A capable minister here upholds the ritual order on which the dynasty's legitimacy rests."

 qing_office_war_active:0 "Grand Minister of War Appointed (兵部尚書)"
 qing_office_war_active_desc:0 "The Board of War (兵部) administers the Green Standard Army, the courier relays, and the military examinations. A sound minister here keeps the empire's forces supplied and its roads secure."

 qing_office_justice_active:0 "Grand Minister of Justice Appointed (刑部尚書)"
 qing_office_justice_active_desc:0 "The Board of Punishments (刑部) is the empire's high court and keeper of the penal code (大清律例). A capable minister here means the law is applied evenly and appeals do not rot in the files."

 qing_office_works_active:0 "Grand Minister of Works Appointed (工部尚書)"
 qing_office_works_active_desc:0 "The Board of Works (工部) maintains the palaces, the Grand Canal, the river dikes, and the state workshops. A sound minister here keeps the waterways open and the flood defences whole."

 qing_office_censor_active:0 "Grand Inspector of the Censorate Appointed (都察院左都御史)"
 qing_office_censor_active_desc:0 "The Censorate (都察院) is the throne's eyes: censors impeach corrupt officials and remonstrate even with the emperor. A fearless chief censor is the sharpest check on venality the dynasty possesses."

 qing_office_lifanyuan_active:0 "Grand Director of the Lifan Yuan Appointed (理藩院尚書)"
 qing_office_lifanyuan_active_desc:0 "The Lifan Yuan (理藩院) manages Mongolia, Tibet, Xinjiang, and relations with Russia — the whole Inner Asian dominion. A capable minister here holds the frontier together by diplomacy rather than by garrisons alone."

 qing_office_grand_secretary_active:0 "Grand Secretary of the Imperial Household Appointed (總管內務府大臣)"
 qing_office_grand_secretary_active_desc:0 "The Superintendent of the Imperial Household Department (總管內務府大臣) governs the throne's personal establishment — its treasury, its guards, its servants. No official stands closer to the Emperor's person, and a capable holder lightens the daily burden of rule and sharpens the sovereign's own judgement."

 qing_office_zongli_active:0 "Grand Director of the Zongli Yamen Appointed (總理衙門)"
 qing_office_zongli_active_desc:0 "The Office for the General Management of Affairs with Foreign Nations (總理各國事務衙門), founded 1861, is the Qing's first foreign ministry. A capable director here can turn the humiliation of the treaty ports into the leverage of modern diplomacy."

 qing_officeholder:0 "Holder of High State Office (大員)"
 qing_officeholder_desc:0 "This character holds one of the great offices of the realm — a seat on the Grand Council or the head of a board — and enjoys the prominence, income, and loyalty that flow from serving at the summit of the state."

 qing_office_vacancy_strain:0 "Vacant Ministry (曠職)"
 qing_office_vacancy_strain_desc:0 "A great office stands empty. Its business falls on overburdened deputies and neighbouring boards, and the administration frays a little more with every month the seat goes unfilled."

# ####################################################################
# SCRIPTED-GUI TOOLTIPS (custom_tooltip text keys)
# ####################################################################

 qing_gov_council_needs_pi_tt:0 "Requires sufficient #Y Political Influence#!."
 qing_gov_council_seat_valid_tt:0 "Must be a living adult of your court who is not already a grand councillor, and a council seat must be free."
 qing_gov_council_chief_valid_tt:0 "Must be a living adult of your court who is not already the Grand Chancellor (領班軍機大臣)."
 qing_gov_office_valid_tt:0 "Must be a living adult of your court who does not already hold this office."

# ####################################################################
# SCRIPTED-GUI BUTTON NAMES + TOOLTIPS (referenced from the .gui widgets)
# ####################################################################

 QING_GOV_COUNCIL_CONVENE:0 "Convene the Grand Council (開軍機處)"
 QING_GOV_COUNCIL_CONVENE_TT:0 "#Y Fill Grand Council Vacancies (開軍機處)#!\nSummon the ablest men of your court to the Grand Council (軍機處), filling every vacant seat with the most talented available officials and naming a chief councillor.\n\nThe Grand Council is the #Y true seat of decision-making#! — since the Yongzheng reign it has eclipsed the old formal ministries, drafting the throne's edicts in secret. The court Ministers listed on the #Y Offices#! tab keep only their ancient ceremonial titles and personal honours; real policy is settled here.\n\nA well-staffed, balanced council raises its #Y effectiveness#!, which strengthens the whole abstracted bureaucracy.\n\nCost: #R 20 Political Influence#!."

 QING_GOV_COUNCIL_SEAT:0 "Seat as Grand Councillor (入直軍機)"
 QING_GOV_COUNCIL_SEAT_TT:0 "Appoint this courtier to a seat on the Grand Council (軍機大臣). Council effectiveness rises with the combined talent of its members and with a balanced mix of Manchu and Han.\n\nCost: #R 10 Political Influence#!."

 QING_GOV_COUNCIL_MAKE_CHIEF:0 "Name Grand Chancellor (領班軍機大臣)"
 QING_GOV_COUNCIL_MAKE_CHIEF_TT:0 "Elevate this councillor to Grand Chancellor (領班軍機大臣), first among the ministers who draft the throne's decisions. A capable chief sharpens the council; an overmighty one risks becoming a Heshen.\n\nSeats the character first if not already a councillor.\n\nCost: #R 15 Political Influence#!."

 QING_GOV_COUNCIL_UNSEAT:0 "Dismiss from Grand Council (罷直)"
 QING_GOV_COUNCIL_UNSEAT_TT:0 "Remove this councillor from the Grand Council. If they were the chief, the office falls vacant until you name a successor."

 QING_GOV_OFFICE_VACATE:0 "Relieve of Office (開缺)"
 QING_GOV_OFFICE_VACATE_TT:0 "Relieve this official of the great office they hold. The office falls vacant and its domain is strained until a successor is appointed."

 QING_GOV_OFFICE_APPOINT_PERSONNEL:0 "Appoint Grand Minister of Personnel (吏部尚書)"
 QING_GOV_OFFICE_APPOINT_REVENUE:0 "Appoint Grand Minister of Revenue (戶部尚書)"
 QING_GOV_OFFICE_APPOINT_RITES:0 "Appoint Grand Minister of Rites (禮部尚書)"
 QING_GOV_OFFICE_APPOINT_WAR:0 "Appoint Grand Minister of War (兵部尚書)"
 QING_GOV_OFFICE_APPOINT_JUSTICE:0 "Appoint Grand Minister of Justice (刑部尚書)"
 QING_GOV_OFFICE_APPOINT_WORKS:0 "Appoint Grand Minister of Works (工部尚書)"
 QING_GOV_OFFICE_APPOINT_CENSOR:0 "Appoint Grand Inspector of the Censorate (都察院)"
 QING_GOV_OFFICE_APPOINT_LIFANYUAN:0 "Appoint Grand Director of the Lifan Yuan (理藩院)"
 QING_GOV_OFFICE_APPOINT_GRAND_SECRETARY:0 "Appoint Grand Secretary of the Imperial Household (總管內務府大臣)"
 QING_GOV_OFFICE_APPOINT_ZONGLI:0 "Appoint Grand Director of the Zongli Yamen (總理衙門)"
 QING_GOV_OFFICE_APPOINT_TT:0 "Appoint this courtier to head one of the great offices of state. A capable holder grants a lasting benefit to that domain of government; leaving the seat vacant strains it.\n\nCost: #R 15 Political Influence#!."

# ####################################################################
# OFFICE / COUNCIL EVENT modifiers (qing_office_events.txt)
# ####################################################################

 qing_censorate_vigilant:0 "Vigilant Censorate (都察院振作)"
 qing_censorate_vigilant_desc:0 "An impeachment upheld has emboldened the remonstrance censors (言官). For a time, no official is too highly placed to escape scrutiny, and the fear of the censor's brush keeps venality in check."

 qing_zongli_yamen_founded:0 "Zongli Yamen Founded (總理衙門開辦)"
 qing_zongli_yamen_founded_desc:0 "The Office for the General Management of Affairs with Foreign Nations (總理各國事務衙門) is established, as Prince Gong (恭親王奕訢) founded it in 1861. The empire now has an institution to treat with the Western powers on their own terms — the first machinery of a modern foreign policy."

# ####################################################################
# IMPERIAL EXAMINATION (科舉) modifiers (qing_keju_events.txt)
# ####################################################################

 qing_keju_fresh_intake:0 "Fresh Examination Intake (科甲得人)"
 qing_keju_fresh_intake_desc:0 "A well-run examination cycle has just conferred its degrees, and a cohort of able, merit-selected men enters the service. The bureaucracy is renewed with talent that owes its rise to the throne alone."

 qing_keju_scandal:0 "Examination Scandal (科場舞弊)"
 qing_keju_scandal_desc:0 "The examination halls have been fouled by bought degrees, leaked questions, and rigged rankings. The gentry's faith in the ladder of advancement — the very bond that ties the elite to the dynasty — is shaken, and the merit ideal rings hollow."

 qing_keju_grace_exam:0 "Grace Examination (恩科)"
 qing_keju_grace_exam_desc:0 "A special examination has been proclaimed beyond the regular triennial cycle, marking an imperial jubilee or accession. The throne's largesse widens the road to office and wins the gratitude of the scholar-gentry across the realm."

# ####################################################################
# LOWER EXAM-LADDER bands (生員/舉人 tiers, abstracted; se_QING_GOVERNANCE.txt)
# ####################################################################

 qing_exam_ladder_vigorous:0 "Vigorous Examination Ladder (科途暢達)"
 qing_exam_ladder_vigorous_desc:0 "The prefectural and provincial examinations (院試・鄉試) run cleanly and on schedule; able men rise from shengyuan (生員) to juren (舉人) on merit. The local gentry are invested in the system, and the throne's talent-pool runs deep."

 qing_exam_ladder_clogged:0 "Clogged Examination Ladder (科途壅塞)"
 qing_exam_ladder_clogged_desc:0 "The lower examinations have silted up with bought places and rigged grades; able men are shut out at the base while the well-connected buy their shengyuan degrees. The disaffected scholar-class — the soil from which a Hong Xiuquan grows — swells year by year."

# ####################################################################
# CHARACTER-WINDOW GOVERNANCE BUTTONS (task #10; gui/characterwindow.gui)
# Tooltips for the Grand Council / great-office verbs surfaced as icon
# buttons on a courtier's character sheet. The scripted GUIs enforce the
# is_valid gates (PInf cost, seat cap, already-held); these tips explain
# the verb and cost. Historical office names in Chinese.
# ####################################################################

 QING_GOV_CHAR_HEADER:0 "Grand Council & Offices (軍機處・部院)"
 QING_GOV_OFFICE_CHANCELLOR_BTN_TT:0 "Raise this courtier to #Y Grand Chancellor#! (領班軍機大臣), head of the Grand Council and first among the ministers who draft the throne's decisions. As its own great office, the chancellorship steadies the realm and restrains arbitrary rule — but a capable, overmighty holder risks becoming a Heshen. Appointing him vacates any office he already holds.\n\nCost: #R 20 Political Influence#!."
 QING_GOV_OFFICE_PERSONNEL_BTN_TT:0 "Appoint this courtier as #Y Grand Minister of Personnel#! (吏部尚書), who governs the appointment, ranking and evaluation of officials. A capable holder benefits the bureaucracy; a vacant seat strains it.\n\nCost: #R 15 Political Influence#!."
 QING_GOV_OFFICE_REVENUE_BTN_TT:0 "Appoint this courtier as #Y Grand Minister of Revenue#! (戶部尚書), who governs taxation, census and the granaries. A capable holder benefits the treasury; a vacant seat strains it.\n\nCost: #R 15 Political Influence#!."
 QING_GOV_OFFICE_RITES_BTN_TT:0 "Appoint this courtier as #Y Grand Minister of Rites#! (禮部尚書), who governs ceremony, the examinations and relations with tributaries. A capable holder benefits the rites; a vacant seat strains them.\n\nCost: #R 15 Political Influence#!."
 QING_GOV_OFFICE_WAR_BTN_TT:0 "Appoint this courtier as #Y Grand Minister of War#! (兵部尚書), who governs the military bureaucracy, garrisons and post-roads. A capable holder benefits the armies; a vacant seat strains them.\n\nCost: #R 15 Political Influence#!."
 QING_GOV_OFFICE_JUSTICE_BTN_TT:0 "Appoint this courtier as #Y Grand Minister of Justice#! (刑部尚書), who governs law, the courts and the penal code. A capable holder benefits justice; a vacant seat strains it.\n\nCost: #R 15 Political Influence#!."
 QING_GOV_OFFICE_WORKS_BTN_TT:0 "Appoint this courtier as #Y Grand Minister of Works#! (工部尚書), who governs public works, waterways and coinage. A capable holder benefits construction; a vacant seat strains it.\n\nCost: #R 15 Political Influence#!."
 QING_GOV_OFFICE_CENSOR_BTN_TT:0 "Appoint this courtier as #Y Grand Inspector of the Censorate#! (都察院), head of the surveillance organ that impeaches corrupt officials and remonstrates with the throne. A capable holder curbs corruption; a vacant seat lets it fester.\n\nCost: #R 15 Political Influence#!."
 QING_GOV_OFFICE_LIFANYUAN_BTN_TT:0 "Appoint this courtier to serve as #Y Grand Director of the Lifan Yuan#! (理藩院), which governs Mongolia, Tibet, Xinjiang and relations with Russia. A capable holder steadies the inner-Asian frontier; a vacant seat unsettles it.\n\nCost: #R 15 Political Influence#!."
 QING_GOV_OFFICE_GRAND_SECRETARY_BTN_TT:0 "Appoint this courtier as #Y Grand Secretary of the Imperial Household#! (總管內務府大臣), superintendent of the throne's personal establishment and its closest attendant. A capable holder sharpens the Emperor's judgement and eases the labour of rule; a vacant post leaves the sovereign's household adrift.\n\nCost: #R 15 Political Influence#!."
 QING_GOV_OFFICE_ZONGLI_BTN_TT:0 "Appoint this courtier to serve as #Y Grand Director of the Zongli Yamen#! (總理衙門), the office for the general management of relations with foreign nations. A capable director benefits modern diplomacy; a vacant seat leaves the powers unanswered.\n\nCost: #R 15 Political Influence#!."
 QING_GOV_OFFICE_VACATE_BTN_TT:0 "#Y Relieve#! this official of whatever great office they hold (開缺). The office falls vacant and its domain is strained until a successor is appointed."

# ####################################################################
# [#91 items I & J] CONCRETE GOVERNANCE BUILDINGS (common/buildings/
# qing_governance_buildings.txt). The bureaucracy-capacity and exam-ladder
# 0..100 counters are KEPT as the summary layer; the governance pulse hangs one
# of these REAL buildings off each counter on a band cross (衙門 for capacity,
# 書院 for the exam ladder). Name + _desc for each, as the build UI expects.
# ####################################################################

 qing_yamen_building:0 "Yamen (衙門)"
 qing_yamen_building_desc:0 "The yamen (衙門) is the seat of local government — the magistrate's court, tax office, records room and granary rolled into one walled compound. It is the concrete face of the empire's administrative capacity: as the bureaucracy grows more capable, new yamens rise in the great administrative centres to carry the throne's writ into the counties; as it collapses, they fall silent and empty."

 qing_shuyuan_building:0 "Academy (書院)"
 qing_shuyuan_building_desc:0 "The shuyuan (書院) is an endowed academy of classical learning where the local literati gather and candidates are drilled for the prefectural and provincial examinations. It is the concrete face of the examination ladder: while the ladder runs clean and vigorous, academies flourish and able men rise through them; when it silts up with bought places, the halls dwindle and close."

