 QING_GC_FAVOR_EMPEROR_TT:0 "#Y Imperial Favor#! — the Son of Heaven IS the throne, so he stands in perfect favour with himself. His square is always the deepest green."
# [#308/user] faction-tint tooltip on the office name (yellow=conservative, blue=reformist).
 QING_GC_FACTION_COLOR_TT:0 "#Y Faction alignment#! — this chip marks where the office-holder stands in the reform struggle.\n\n#qing_reformist Blue#! (維新派): he leans #Y reformist#! — pressing for self-strengthening and change.\n#qing_conservative Yellow#! (保守派): he leans #Y conservative#! — defending the ancestral ways.\n#Y Grey#!: he holds no strong line, or has yet to declare one.\n\nAn official's alignment is not fixed: it shifts with his temper, his age, the tide of the court, and the events he lives through — the chip appears, changes, or flips as he does. A council whose chips run mostly one colour is a united (if partisan) court; a chamber split between blue and yellow is heading for deadlock."
