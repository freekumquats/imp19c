 QING_GC_OFFICE_PERSONNEL:0 "Grand Minister of Personnel (吏部)"
 QING_GC_OFFICE_REVENUE:0 "Grand Minister of Revenue (戶部)"
 QING_GC_OFFICE_RITES:0 "Grand Minister of Rites (禮部)"
