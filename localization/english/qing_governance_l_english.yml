 QING_ACTION_SECLUSION_TT:0 "#T Retreat into Seclusion#!\nThe Emperor withdraws from the daily burden of rule — as the Qianlong Emperor did in his final years — and a #Y Grand Regent#! (攝政) is named to govern in his name. The court names the Empress Dowager (垂簾聽政) or a senior prince to the regency.\n#R Costs 10 Legitimacy#! — the throne governs at one remove. He may resume personal rule at any time."
