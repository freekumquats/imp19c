 # --- Regency events (namespace qing_regency) ---
 qing_regency.1.t:0 "A Regency Must Be Named"
 qing_regency.1.desc:0 "The Son of Heaven cannot govern in his own person — a child upon the Dragon Throne, or a sovereign laid low. The Grand Council looks to a regent to wield the imperial authority until the Emperor can resume it. By precedent the Empress Dowager (皇太后) rules from behind the screen (垂簾聽政); but an imperial prince or a senior grand councillor might as readily be raised."
 qing_regency.1.a:0 "Install [scope:qing_regent_pick.GetName] as Grand Regent"
 qing_regency.1.a.tt:0 "[scope:qing_regent_pick.GetName] assumes the regency (攝政). The realm is governed in the Emperor's name until he comes of age or recovers."
 qing_regency.1.b:0 "Let the Grand Council govern — name no regent"
 qing_regency.1.b.tt:0 "No single hand holds the regency. The council governs collectively — but legitimacy leaks while the throne stands unoccupied, and the imperial princes will be tempted to contend."
 qing_regency.3.t:0 "The Regency Ends"
 qing_regency.3.desc:0 "The Emperor is now fit to rule in his own person — come of age, or recovered from his affliction. The regent who wielded his authority must yield it up. Whether he does so with grace, or clings to the power he has tasted, is the measure of the man — and the memory of Dorgon and of the Dowager Cixi hangs over the court."
 qing_regency.3.a:0 "Receive the regent's homage as he yields power"
 qing_regency.3.a.tt:0 "[scope:qing_outgoing_regent.GetName] surrenders the regency freely and is honoured for it. Legitimacy is restored."
 qing_regency.3.b:0 "Dissolve the regency by decree"
 qing_regency.3.b.tt:0 "The regency is ended by imperial edict. [scope:qing_outgoing_regent.GetName] returns to the ranks of the ministers."
 qing_regency.3.c:0 "The regent will not let go"
 qing_regency.3.c.tt:0 "[scope:qing_outgoing_regent.GetName] contrives to retain his grip — the Emperor reigns but does not yet rule. A resentful sovereign and a lingering regency."

 # --- Succession events (namespace qing_succession) ---
 qing_succession.1.t:0 "The Princes Contend (九子奪嫡)"
 qing_succession.1.desc:0 "The Emperor's grown sons circle the succession like the Nine Lords who tore at the Kangxi Emperor's peace. Each prince gathers a faction; ministers hedge their loyalties; the court divides against itself. The Yongzheng Emperor's answer to this very danger was 秘密立儲 — to seal the heir's name in a casket behind the 正大光明 tablet in the Palace of Heavenly Purity, to be read only when the Emperor is no more."
 qing_succession.1.a:0 "Institute the secret succession (秘密立儲)"
 qing_succession.1.a.tt:0 "The heir's name is sealed behind the 正大光明 tablet. With no public crown prince to rally to, the factions lose their object; the transfer of power, when it comes, will be smooth and unquestioned."
 qing_succession.1.b:0 "Name a Crown Prince openly (立太子)"
 qing_succession.1.b.tt:0 "An heir is proclaimed before the court. One faction is satisfied — and every other is inflamed. This is the very path that bred the 九子奪嫡; the jockeying goes on."
 qing_succession.1.c:0 "Stand aloof — let them contend"
 qing_succession.1.c.tt:0 "The throne names no heir and stills no faction. The princes are left to their intrigues, and the court to its divisions."
 qing_succession.2.t:0 "The Tablet Is Opened"
 qing_succession.2.desc:0 "The old Emperor is gone. The court gathers beneath the 正大光明 tablet as the sealed casket is brought down and broken open — or, if no name was ever sealed within it, as the princes and their factions look to their swords."
 qing_succession.2.a:0 "The succession is resolved"
