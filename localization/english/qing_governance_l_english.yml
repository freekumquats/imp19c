 # [#312] Succession-law reforms
 SUCCESSION_REFORM_AGNATIC_BTN:0 "Succession: Agnatic (男系繼承)"
 SUCCESSION_REFORM_AGNATIC_TT:0 "#T Adopt Agnatic Succession#!\nOnly #Y male#! members of the dynasty may inherit the throne (the Salic norm). Restricting the line is uncontested abroad but disruptive at home.\n#R Costs 10 Legitimacy#!. One succession reform per #Y 5#! years."
 SUCCESSION_REFORM_AGNATIC_COGNATIC_BTN:0 "Succession: Agnatic-Cognatic (男系優先)"
 SUCCESSION_REFORM_AGNATIC_COGNATIC_TT:0 "#T Adopt Agnatic-Cognatic Succession#!\nMales are preferred, but a #Y daughter may inherit#! if the male line fails — the norm of most European monarchies. Opening the female line invites the #Y Pragmatic Sanction#! contest: rival great-power neighbours may refuse to recognise it (opinion + reputation hit) until the dispute cools.\n#R Costs 15 Legitimacy#!. One succession reform per #Y 5#! years."
 SUCCESSION_REFORM_ABSOLUTE_COGNATIC_BTN:0 "Succession: Absolute Cognatic (絕對繼承)"
 SUCCESSION_REFORM_ABSOLUTE_COGNATIC_TT:0 "#T Adopt Absolute-Cognatic Succession#!\nThe #Y eldest child inherits regardless of sex#! — full gender equality in the line. (Mechanically the realm follows cognatic law; the equal-succession doctrine grants a small legitimacy and reputation bonus for a modern, uncontested line.) The most radical break with tradition — it triggers the #Y Pragmatic Sanction#! contest.\n#R Costs 20 Legitimacy#!. One succession reform per #Y 5#! years."
