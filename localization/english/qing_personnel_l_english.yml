l_english:
 qing_personnel.1.t:0 "The 大計 — Great Reckoning of Officials"
 qing_personnel.1.desc:0 "The triennial 大計 (Great Reckoning) is upon us. The Grand Minister of Personnel [qing_office_personnel_holder.GetName] has compiled reports on every governor (總督/巡撫) across the realm. The able will be rewarded, the venal cashiered. How shall we conduct the review?"
 qing_personnel.1.a:0 "Conduct a rigorous 大計 under [qing_office_personnel_holder.GetName]."
 qing_personnel.1.a.tt:0 "The Personnel minister's finesse ensures thorough evaluation. Able governors are rewarded, corrupt ones purged."
 qing_personnel.1.b:0 "Conduct the 大計, but with modest outcomes."
 qing_personnel.1.b.tt:0 "The review proceeds, but without a strong Personnel minister, results are limited."
 qing_personnel.1.c:0 "The review is perfunctory — no minister oversees it."
 qing_personnel.1.c.tt:0 "Without a Personnel minister, governors are merely noted. Loyalty drifts."
 
 qing_personnel.2.t:0 "Clash: [personnel_minister.GetName] vs. [clashing_governor.GetName]"
 qing_personnel.2.desc:0 "The Grand Minister of Personnel [personnel_minister.GetName] and the governor [clashing_governor.GetName] have come to loggerheads. [clashing_governor.GetName] resents the minister's oversight; [personnel_minister.GetName] questions the governor's loyalty. The court awaits our decision."
 qing_personnel.2.a:0 "Recall [clashing_governor.GetName] — appease the minister."
 qing_personnel.2.a.tt:0 "[clashing_governor.GetName] is disciplined. [personnel_minister.GetName]'s authority is upheld."
 qing_personnel.2.b:0 "Indulge [clashing_governor.GetName] — preserve his service."
 qing_personnel.2.b.tt:0 "[clashing_governor.GetName] is grateful, but [personnel_minister.GetName] is strained."
 qing_personnel.2.c:0 "Balance them — both must compromise."
 qing_personnel.2.c.tt:0 "Both are discontent, but the throne holds the middle ground."
 
 qing_personnel.3.t:0 "Talented Governor Identified: [talented_governor.GetName]"
 qing_personnel.3.desc:0 "The Grand Minister of Personnel [personnel_minister.GetName] has flagged [talented_governor.GetName], a provincial governor of exceptional ability, for advancement. [talented_governor.GetName] is congenial with the throne and capable. Shall we promote this talent?"
 qing_personnel.3.a:0 "Promote [talented_governor.GetName] to a great office."
 qing_personnel.3.a.tt:0 "[talented_governor.GetName] is appointed to the first vacant great office."
 qing_personnel.3.b:0 "Reward [talented_governor.GetName] but leave him in his post."
 qing_personnel.3.b.tt:0 "[talented_governor.GetName] is enriched and honoured."
 qing_personnel.3.c:0 "Decline — no action taken."
 qing_personnel.3.c.tt:0 "Both [talented_governor.GetName] and [personnel_minister.GetName] are disappointed."
 
 qing_personnel.4.t:0 "捐納 Scandal: [venal_governor.GetName]"
 qing_personnel.4.desc:0 "Word has reached the court that [venal_governor.GetName], a provincial governor, purchased his office through 捐納 (the sale of posts). The practice is widespread in corrupt times, but this case has become public. How shall we respond?"
 qing_personnel.4.a:0 "Investigate rigorously — purge corruption."
 qing_personnel.4.a.tt:0 "[venal_governor.GetName] is cleansed. Corruption is reduced, but at political cost."
 qing_personnel.4.b:0 "Ignore the scandal — it is commonplace."
 qing_personnel.4.b.tt:0 "[venal_governor.GetName] is relieved, but corruption worsens."
 qing_personnel.4.c:0 "Make an example — execute [venal_governor.GetName]."
 qing_personnel.4.c.tt:0 "Harsh, but effective. Corruption is purged; other corrupt officials grow wary."
 
 qing_personnel_daji_rigorous:0 "Rigorous 大計"
 qing_personnel_daji_rigorous_desc:0 "The realm benefits from the Personnel minister's thorough evaluation of provincial officials."
 qing_personnel_daji_perfunctory:0 "Perfunctory 大計"
 qing_personnel_daji_perfunctory_desc:0 "Without a Personnel minister, the Great Reckoning was merely a formality. Officials drift."
