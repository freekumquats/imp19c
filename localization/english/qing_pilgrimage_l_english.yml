l_english:
 qing_pilgrimage.1.t:0 "A Mongol Noble Sets Out on Pilgrimage"
 qing_pilgrimage.1.desc:0 "Word reaches the court: [scope:pilgrim.GetName], a noble of the [scope:pilgrim.GetCulture.GetName] people, has announced his intention to journey to the holy city of Lhasa — to the Jokhang, to the Potala, to prostrate himself before the Dalai Lama and receive the blessing of the faith. The pilgrimage is an act of devotion, but it is also a thread running back to Peking: Tibetan Buddhism (藏傳佛教) is the ideological cement of Our Inner Asian realm. The throne, which controls the routes and the recognition of reincarnations (the 金瓶掣籤 Golden Urn lottery), can turn this devotion into a concrete bond of loyalty — or see it turn elsewhere."
 qing_pilgrimage.1.sponsor:0 "Sponsor the pilgrimage — grant him an escort and the throne's blessing."
 qing_pilgrimage.1.sponsor.tt:0 "The throne backs the pilgrim's journey (§Y-50§! gold, §G+20§! prestige). [scope:pilgrim.GetName] is bound to the throne (§Gloyalty§!, §Ghonour family§!). §GFaith-as-cement: sect_pressure -6§!."
 qing_pilgrimage.1.aloof:0 "Acknowledge the pilgrimage, but stay aloof."
 qing_pilgrimage.1.aloof.tt:0 "The throne neither sponsors nor hinders. Modest §Gsect_pressure -2§!. The pilgrim proceeds unbound."
 qing_pilgrimage.1.suppress:0 "Block the pilgrimage — a hostile sectarian stance."
 qing_pilgrimage.1.suppress.tt:0 "Suppress the journey (§Rsect_pressure +12§!, §R-5 legitimacy§!). [scope:pilgrim.GetName] is §Restranged§!. The Mongol elite resents it."

 qing_pilgrimage.2.t:0 "En Route: An Incident on the Pilgrimage Road"
 qing_pilgrimage.2.desc:0 "[scope:pilgrim.GetName] has passed into the dependency — the long caravan trail toward Lhasa. Word comes of an incident: bandits threaten the caravan, or a rival sect challenges the Gelug pilgrim, or (if he is Buryat) a Russian envoy approaches with an offer of protection. The throne's response tests its reach across Inner Asia."
 qing_pilgrimage.2.guard:0 "Dispatch an escort — secure the route."
 qing_pilgrimage.2.guard.tt:0 "Send a guard detachment or an amban escort (§Y-30§! gold). The throne's reach is affirmed (§G+10 popularity§!, §Gsect_pressure -3§!)."
 qing_pilgrimage.2.proceed:0 "Let him proceed on his own — the faith will protect him."
 qing_pilgrimage.2.proceed.tt:0 "No cost, but the throne gains no prestige from the incident. The pilgrim proceeds unguarded."
 qing_pilgrimage.2.rival:0 "A Russian overture — [scope:pilgrim.GetName] is approached by St Petersburg."
 qing_pilgrimage.2.rival.tt:0 "Russia, encroaching over the Buryat, offers protection. Devotion §Rturns away§! from Peking (§Rloyalty loss§!, §Rsect_pressure +8§!, §R-15 popularity§!). The pilgrimage ends here."

 qing_pilgrimage.3.t:0 "Arrival: The Pilgrim Reaches Lhasa"
 qing_pilgrimage.3.desc:0 "[scope:pilgrim.GetName] has reached the holy city — the Potala rises above him, the Jokhang bell tolls, the Dalai Lama (or his regent) awaits in audience. Or perhaps the pilgrim has journeyed instead to the imperial temples at 承德 Chengde, where the throne itself is patron of the faith. The throne can grant recognition (a title, a lama's blessing, the legitimacy of the Golden Urn lottery) and bind the pilgrim as a real person-to-throne thread — or treat it as a formality and gain little."
 qing_pilgrimage.3.recognize:0 "Grand recognition — the Golden Urn blessing, a title, the throne's favour."
 qing_pilgrimage.3.recognize.tt:0 "Invest §Y-15§! political influence. [scope:pilgrim.GetName] is §Gbound to the throne§! (loyalty, §Ghonour family +50§!, §G+15 popularity§!). The emperor as patron of the faith: §G+30 prestige§!, §Gsect_pressure -10§!."
 qing_pilgrimage.3.formal:0 "A formal audience — acknowledge, but no special favour."
 qing_pilgrimage.3.formal.tt:0 "Modest §G+10 popularity§!, §Gsect_pressure -4§!. The pilgrim is honoured but not bound."

 qing_pilgrimage.4.t:0 "Return: The Pilgrim's Devotion Endures or Fades"
 qing_pilgrimage.4.desc:0 "[scope:pilgrim.GetName] has returned from Lhasa (or from Chengde), bearing the blessing of the faith and the memory of the throne's reception. A well-received pilgrim spreads the throne's prestige among the Mongols; a loyal Mongol notable remains bound to the emperor. But if the throne was aloof, the devotion may simply fade — neither hostile nor loyal, just indifferent."
 qing_pilgrimage.4.bind:0 "The thread holds — a lasting bond of loyalty."
 qing_pilgrimage.4.bind.tt:0 "[scope:pilgrim.GetName] becomes a lasting asset (§Gloyalty§!, §G+4 loyal veterans§! — a clientele of Mongol adherents). The throne's prestige among Mongols: §G+1 stability§!."
 qing_pilgrimage.4.fade:0 "The devotion fades — neither bound nor hostile, just neutral."
 qing_pilgrimage.4.fade.tt:0 "No lasting bond. Modest §Rsect_pressure +3§! (faith not leveraged)."

 qing_pilgrim_patron_of_faith:0 "Patron of the Faith"
 qing_pilgrim_patron_of_faith_desc:0 "The throne's sponsorship of a Mongol pilgrimage to Lhasa (or to the imperial temples at Chengde) cements Inner Asian loyalty. The emperor as patron of Tibetan Buddhism (Qianlong's 1780 Panchen Lama reception; the Golden Urn lottery) binds the Mongol elite to the throne."
 qing_pilgrim_devotion_to_rival:0 "Devotion Turns to a Rival"
 qing_pilgrim_devotion_to_rival_desc:0 "A neighbouring power (Russia over the Buryat, or another rival) has successfully wooed a Mongol pilgrim away from Peking's orbit. The faith-as-cement bond weakens; devotion no longer runs to the throne."
