l_english:
 QING_RELIGION_PANEL_TITLE:0 "Faith & Sedition"
 QING_RELIGION_PANEL_DESC:0 "The throne surveys the religious temper of the realm — the anti-Christian feeling the treaty missions stir (仇教情緒), the sectarian pressure among the frontier faithful, the reach of the foreign missions, and the reformist ferment their disorder feeds."
 QING_RELIGION_METERS_TITLE:0 "#Y Religious Tension#!"
 QING_RELIGION_ANTICHR_LABEL:0 "Anti-Foreign (仇教)"
 QING_RELIGION_ANTICHR_TT:0 "#Y 仇教情緒#! — the POLITICAL anti-missionary, anti-foreign grievance (0–100). This is a #Y treaty-era#! meter: it rises only once the unequal treaties put foreign consuls and gunboats behind the missions (treaty burden + sectarian pressure + each aggressive mission station); before then it stays near zero, because a missionary dispute carries no diplomatic stake. Falls when incidents are indulged. At #R 66#! the populace turns to open fury (扶清滅洋); at #R 85#! it boils over into the Boxer rising."
 QING_RELIGION_SOCIAL_LABEL:0 "Social Friction (民教)"
 QING_RELIGION_SOCIAL_TT:0 "#Y 民教相爭#! — the SOCIAL, ever-present friction of a foreign faith (0–100, capped low). Christianity was physically present for centuries before the treaties; the literati despised it as heterodoxy (邪教) and local scares flared, but there were #G no diplomatic stakes#! — the throne could tolerate or suppress at will. Tracks the on-the-ground mission footprint and a share of sectarian pressure. High friction can spark a purely #Y domestic#! crackdown incident, never a foreign crisis."
 QING_RELIGION_SECT_LABEL:0 "Sectarian Pressure"
 QING_RELIGION_SECT_TT:0 "Unrest among the sects and frontier faithful (0–100). Fed by pilgrimage disputes, missionary encroachment and misrule; eased by sponsoring orthodox devotion. High pressure feeds the anti-Christian meters and reformist ferment."
 QING_RELIGION_MISSION_LABEL:0 "Missionary Reach"
 QING_RELIGION_MISSION_TT:0 "The count of active foreign mission stations in the interior, recomputed yearly. A #Y small, tolerated#! presence exists even in the pre-treaty era (underground/semi-tolerated communities); the treaty system then lets it radiate aggressively inland from the ports. Every station converting a traditional-faith heartland raises social friction — and, in the treaty era, the political anti-foreign meter."
 QING_RELIGION_REFORM_LABEL:0 "Reform Pressure"
 QING_RELIGION_REFORM_TT:0 "The ferment for reform (0–100). Fed by disorder and the humiliations of the missionary question; drives the Self-Strengthening and reform tracks."
 QING_RELIGION_BAND_FEVER:0 "#R 扶清滅洋 — Anti-foreign fury at fever pitch.#! The missions and their converts are in open danger; the populace has a grim martial temper."
 QING_RELIGION_BAND_SIMMERING:0 "#Y 仇教情緒 — Anti-Christian feeling simmers.#! Incidents grow frequent; the gentry quietly encourage the crowds."
 QING_RELIGION_BAND_CALM:0 "#G The religious peace holds.#! No anti-Christian band is in force."
 QING_RELIGION_AGITATOR_DESC:0 "A 仇教 firebrand preaches against the missions and the converts — a face for the fury the throne can no longer ignore."
 QING_RELIGION_TAIPING_TITLE:0 "#Y The Heavenly Kingdom (太平天國)#!"
 QING_RELIGION_TAIPING_LABEL:0 "Taiping Progress"
 QING_RELIGION_TAIPING_TT:0 "Progress of the Christian / Heavenly-Kingdom movement (0–100), leaning on Western backing — missionaries and arms. Shown once the overture has opened the tree."
 QING_RELIGION_OPEN_BUTTON:0 "Faith & Sedition (信仰與亂)"
 QING_RELIGION_OPEN_BUTTON_TT:0 "Open the Qing religion panel: anti-Christian sentiment, sectarian pressure, missionary reach, reform pressure, and Taiping progress."
