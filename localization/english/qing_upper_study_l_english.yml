l_english:
 # [#337] Upper Study (上書房) — the palace school that tutors the imperial princes.
 QING_US_OPEN_BTN:0 "Upper Study (上書房)"
 QING_US_OPEN_TT:0 "Open the Upper Study — the palace school that tutors the imperial princes: the Grand Tutor (上書房總師傅), the corps of masters (師傅), the schooling of the succession, and the levers to draw in learned men, drill the crown prince, or elevate the Grand Tutor to high office."
 QING_US_PANEL_TITLE:0 "Upper Study — 上書房"
 QING_US_PANEL_DESC:0 "The Upper Study (上書房), founded by the Yongzheng Emperor in 1725, is the palace school where the imperial princes are schooled from dawn — in the Confucian classics and letters by Han masters, and in the Manchu tongue, the bow and mounted archery (國語騎射) by Manchu grandees. It is the twin of secret succession (密建): because the school makes ALL the princes fit to reign, the throne passes safely to whichever the sealed tablet names. Its head, the Grand Tutor (上書房總師傅), answers to the throne for the competence of the heirs — a school of able masters steadies the dynasty and sharpens the crown prince himself."
 QING_US_CHIEF_TITLE:0 "Grand Tutor of the Upper Study (上書房總師傅)"
 QING_US_EMPTY:0 "The Upper Study stands empty. No master schools the princes, and the succession is left untaught."
 QING_US_DEPTH_LABEL:0 "Masters Serving (師傅)"
 QING_US_DEPTH_TT:0 "The number of tutor-masters serving in the Upper Study (capped at six). A full school of learned and martial men schools the princes well; an empty school leaves the succession untaught."
 QING_US_SCHOOLING_LABEL:0 "Schooling of the Heirs"
 QING_US_SCHOOLING_TT:0 "How well the imperial princes are being schooled (0–100), drifting toward the teaching strength of the master corps. A well-schooled house is a secure one: high schooling steadily raises the realm's dynastic harmony, a neglected school lets it fray."
 QING_US_HEIR_TITLE:0 "The Crown Prince (皇太子)"
 QING_US_HEIR_HIDDEN:0 "No crown prince stands in the open — either the succession is sealed in secret (密建), the tablet in the 正大光明 frame naming no public heir, or no heir is yet designated. The school still teaches the princes, but the throne cannot be seen to single one out."
 QING_US_ADMIN_TITLE:0 "The School's Governance"
 QING_US_CHOOSE_BTN:0 "Choose a Master (擇師)"
 QING_US_CHOOSE_TT:0 "Summon the ablest scholar waiting in the examination pool (天子門生) into the Upper Study as a master. Requires a waiting scholar and a school below its cap of six."
 QING_US_WILDCARD_BTN:0 "Recruit a Renowned Master"
 QING_US_WILDCARD_TT:0 "Bring a renowned scholar-soldier — learned in the classics and a master of the bow — straight into the school. Requires only that the school stands below its cap of six."
 QING_US_INTENSIVE_BTN:0 "Intensive Schooling (勤學不輟)"
 QING_US_INTENSIVE_TT:0 "Set the masters to drill the reigning crown prince intensively — sharpening his finesse (the classics) and martial (國語騎射) toward a competent ceiling, and gladdening the house. Requires a master corps of real teaching strength and a visible crown prince to school; not available while the succession is sealed in secret. Once per year."
 QING_US_ELEVATE_BTN:0 "Elevate the Grand Tutor (擢用)"
 QING_US_ELEVATE_TT:0 "Promote the Grand Tutor of the Upper Study into the first vacant great office — the tutor-to-council arc that carried Cai Xin from the princes' schoolroom to the Grand Secretariat. Requires a Grand Tutor in place and a genuinely vacant office to fill."
 QING_US_ROSTER_TITLE:0 "The Tutor-Masters"
 QING_US_ROSTER_EMPTY:0 "No master serves in the Upper Study. Choose a scholar from the examination pool or recruit a renowned master to school the imperial princes."
 # nickname keys for the 1763 Upper Study masters + the renowned-master wildcard.
 NICKNAME_QING_US_CAIXIN:0 "Cai Xin"
 NICKNAME_QING_US_GUANBAO:0 "Guanbao"
 NICKNAME_QING_US_WILDCARD:0 "a Master of the Upper Study"
