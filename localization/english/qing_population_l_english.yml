l_english:
 # [#369] Population Pressure / Famine (人口壓力 / 人地矛盾 / 饑荒).
 QING_POPULATION_OPEN_BTN:0 "Population & Famine (人口壓力)"
 QING_POPULATION_OPEN_TT:0 "Open the population ledger (人口壓力 / 人地矛盾): the standing tension between the empire's swelling millions and its finite land, which Hong Liangji (洪亮吉) warned of before Malthus. Watch the pressure mount as the people outrun the fields, the granary reserve that stands between a bad harvest and famine, and set the relief policy — resettlement, tax remission, frontier settlement — that the Board of Revenue (戶部) will answer for."
 QING_POPULATION_PANEL_TITLE:0 "Population & Famine — 人口壓力"
 QING_POPULATION_PANEL_DESC:0 "The long peace of the High Qing has bred a multitude. Where the early Kangxi reign counted perhaps a hundred and fifty million souls, the realm now strains toward three hundred million and beyond — and the land does not grow with them. Hong Liangji (洪亮吉) set it down plainly a generation before the Westerner Malthus: households multiply, but fields and dwellings do not, and so peace itself breeds a surplus of people whom nature culls by flood, plague and famine unless ruler and ministers open new land, resettle the crowded provinces, remit the taxes of the stricken, and hold grain in reserve against the lean years. This is the 人地矛盾 — the contradiction of people and land — and the Board of Revenue (戶部), keeper of the census and the ever-normal granaries (常平倉), is judged on it: the pressure the throne fails to relieve folds directly into the Revenue Minister's standing on the Grand Council. Relieve and resettle, remit the taxes, promote settlement of the frontier — or let nature take its course, as Hong Liangji feared it must."
 QING_POPULATION_STATE_TITLE:0 "The State of the Realm"
 QING_POPULATION_PRESSURE_LABEL:0 "Population Pressure (人口壓力)"
 QING_POPULATION_PRESSURE_TT:0 "The mounting tension between people and land (0–100). It climbs as the population swells past what the fields can feed, as the crop frontier is exhausted, and as famine bites; it eases when the granaries are full, when the frontier is opened to resettlement, and when a golden harvest brings relief. Left to mount, it breeds unrest, saps population growth and tax, and — at its worst — feeds the destitute into the secret societies. This is the engine of the Malthusian crisis."
 QING_POPULATION_GRANARY_LABEL:0 "Granary Reserve (常平倉)"
 QING_POPULATION_GRANARY_TT:0 "The grain held in the ever-normal granaries (常平倉) against a bad harvest (0–100). A full reserve steadies the realm and eases the pressure; an empty one leaves the crowded provinces one failed harvest from famine. Relief draws the reserve down; peace and good administration build it back up."
 QING_POPULATION_SECT_LABEL:0 "Sectarian Pressure (教亂)"
 QING_POPULATION_SECT_TT:0 "The ferment among the secret societies and heterodox sects (0–100) — the White Lotus and their kin. The landless and the famine-struck swell their ranks, so unrelieved population pressure feeds this meter directly. Shown here because the two crises are one: a famine the throne cannot answer is the surest recruiter the sects have."
 QING_POPULATION_RESETTLING_BANNER:0 "A standing resettlement policy (移民實邊) is in force: the crowded heartland is pushing its surplus toward the open frontiers of Xinjiang, the southwest, and the northwest."
 QING_POPULATION_POLICY_TITLE:0 "The Relief of the People"
 QING_POPULATION_POLICY_NOTE:0 "Against the pressure the throne has the old instruments of famine administration: relief and resettlement (賑濟移墾) to feed the stricken and move them to open land, the remission of taxes (蠲免) to spare the burdened, and a standing policy of frontier settlement (移民實邊) to draw the surplus off the crowded heartland for good."
 QING_POPULATION_RELIEVE_BTN:0 "Relieve & Resettle (賑濟移墾)"
 QING_POPULATION_RELIEVE_TT:0 "Open the granaries to feed the stricken and fund the resettlement of the crowded provinces onto open frontier land. A costly but powerful relief: it fills the granary reserve, sharply eases the pressure and the sectarian ferment, opens the frontier valve, and steadies the realm. Requires a treasury of 60."
 QING_POPULATION_REMIT_BTN:0 "Remit the Taxes (蠲免)"
 QING_POPULATION_REMIT_TT:0 "Remit the land tax of the stricken provinces — the classic imperial mercy. It eases the pressure and firms stability at a cost to the treasury, but changes nothing structural: the people still outnumber the land. Requires a treasury of 30."
 QING_POPULATION_RESETTLE_BTN:0 "Promote Frontier Settlement (移民實邊)"
 QING_POPULATION_RESETTLE_TT:0 "Proclaim a standing policy of resettling the crowded heartland onto the open frontiers — the military-agricultural colonies (屯田) of Xinjiang, the newly-administered southwest (改土歸流), and the northwest. It draws the surplus population off the heartland for good, easing the pressure at the cost of some prestige and the effort of the move. A standing policy, set once."
 # --- .1 the memorial on population ---
 qing_population.1.t:0 "The Memorial on Population (治平之憂)"
 qing_population.1.desc:0 "A censor lays before the throne a memorial that has been passing among the scholars — the work of Hong Liangji (洪亮吉), a Hanlin academician of unsettling clarity. In an age of unbroken peace, he writes, the people have multiplied beyond all precedent: a household that was five souls in the grandfather's day is fifty in the grandson's, yet the fields that fed the five must now feed the fifty, for the land does not multiply as the people do. Prices rise, wages fall, the young cannot find land to till nor work to do, and the surplus millions drift toward vagrancy and worse. Nature, he warns, has its own brutal remedies — flood, plague, and famine — and unless the throne acts to open land, resettle the crowded, remit the taxes of the poor, and hold grain against the lean years, those remedies will come unbidden. He begs the throne to heed the warning while there is yet time."
 qing_population.1.relieve:0 "Relieve and resettle (賑濟移墾)"
 qing_population.1.relieve.tt:0 "Heed the memorial in full: open the granaries, relieve the stricken, and fund the resettlement of the crowded provinces onto open frontier land. A costly but powerful answer that eases the pressure and the ferment together. Requires a treasury of 60."
 qing_population.1.remit:0 "Remit the taxes (蠲免)"
 qing_population.1.remit.tt:0 "Grant the classic imperial mercy: remit the land tax of the burdened provinces. It eases the immediate strain and firms stability, but the deeper contradiction of people and land remains. Requires a treasury of 30."
 qing_population.1.resettle:0 "Promote frontier settlement (移民實邊)"
 qing_population.1.resettle.tt:0 "Proclaim a standing policy of resettling the crowded heartland onto the open frontiers of Xinjiang, the southwest and the northwest — drawing the surplus population off the heartland for good."
 qing_population.1.nothing:0 "Let nature take its course (聽其自然)"
 qing_population.1.nothing.tt:0 "Set the memorial aside. There is no easy answer to Hong Liangji's arithmetic, and the treasury has other calls — but the pressure mounts unrelieved, and the reformers will remember that the throne was warned and did nothing."
 # --- .2 famine in the provinces ---
 qing_population.2.t:0 "Famine in the Provinces (歲饑)"
 qing_population.2.desc:0 "The harvest has failed in the crowded provinces, and there is no reserve to meet it. The ever-normal granaries, drawn down over years of strain, stand near empty; the price of grain has trebled in a month; and the roads fill with the starving, driven from villages that can no longer feed them. Reports reach the capital of the dead by the roadside, of families selling their children, of whole districts on the move — and, more ominous still, of the preachers of the secret societies moving among the desperate, promising bread and a kingdom to come. The Board of Revenue confesses the granaries cannot answer the need. The throne must decide how, or whether, it can respond."
 qing_population.2.relief:0 "Open the granaries (賑災)"
 qing_population.2.relief.tt:0 "Throw the full weight of the state into relief: open what granaries remain, buy grain from the unstricken provinces, and feed the starving directly. The costliest answer and the most benevolent — it steadies the realm, refills the reserve, and firms the throne's legitimacy as the father of the people. Requires a treasury of 60."
 qing_population.2.workrelief:0 "Work-relief and resettlement (以工代賑)"
 qing_population.2.workrelief.tt:0 "Set the able-bodied famine-struck to paid labour on the dykes and canals, and resettle those you can onto open frontier land — a cheaper relief than the granaries and a more durable one, for it moves the surplus off the exhausted land for good. Requires a treasury of 30."
 qing_population.2.helpless:0 "The throne cannot respond"
 qing_population.2.helpless.tt:0 "The reserves are empty and the treasury bare; there is nothing to give. The stricken are left to starve or to move, and the preachers of the sects reap the harvest of the throne's helplessness. Sectarian ferment surges, the pressure mounts, and stability breaks — this is the road to rebellion."
