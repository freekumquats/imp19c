l_english:
 # qing_tribute_l_english.yml — [#322] the tribute-embassy rhythm (朝貢體系).
 # se_QING_TRIBUTE.txt + qing_tribute_events.txt. BOM + LF.

 qing_tribute.1.t:0 "A Tribute Embassy at Peking (朝貢入覲)"
 qing_tribute.1.desc:0 "An embassy has come to the capital from [scope:trib_sender.GetName], bearing tribute for the Son of Heaven — the ritual homage by which the tributary states of the realm acknowledge the centre of the world. The envoy, [scope:trib_envoy.GetName], waits in the antechambers of the [ROOT.Custom('get_country_formal_adjective')] court with his gifts and his memorial of submission. By ancient custom the throne receives such a mission in full ceremony and returns imperial largesse many times the tribute's worth — for the tribute was never about the goods, but about the ORDER it affirmed: that all under Heaven look to Peking. Yet the ceremony is costly, and a hard-pressed treasury may prefer to take the tribute and spare the spectacle."
 qing_tribute.1.a:0 "Receive them in full ceremony (賜宴頒賞)."
 qing_tribute.1.a.tt:0 "The lavish audience: a banquet, the return-gifts, the whole ritual of suzerainty. #R Costs 20 Treasury#!; #G collects the tribute-trade profit#!, #G firms the tributary order (保藩威望)#!, #G +8 Ruler Prestige#!, #G +1 Stability#!."
 qing_tribute.1.b:0 "Take the tribute; dismiss the mission curtly."
 qing_tribute.1.b.tt:0 "Spare the expense and the ceremony — the goods are taken, but the perfunctory reception is noted, and the order's prestige slips. #G Collects the tribute-trade profit#!, #G +5 Political Influence#!; #R the tributary order weakens#!."
