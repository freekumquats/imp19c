l_english:
 # qing_tribute_l_english.yml — [#322] the tribute-embassy rhythm (朝貢體系).
 # se_QING_TRIBUTE.txt + qing_tribute_events.txt. BOM + LF.

 # ---- modifier name/desc (subject-side, applied by the investiture/breakaway/GP options) ----
 qing_tributary_invested:0 "Invested by the Son of Heaven (冊封)"
 qing_tributary_invested_desc:0 "The Qing throne has confirmed this court's ruler with the imperial patent of investiture and seal — the ritual bond of the tributary order. The vassal is bound the tighter to Peking while the honour is fresh."

 qing_tribute.1.t:0 "A Tribute Embassy at Peking (朝貢入覲)"
 qing_tribute.1.desc:0 "An embassy has come to the capital from [scope:trib_sender.GetName], bearing tribute for the Son of Heaven — the ritual homage by which the tributary states of the realm acknowledge the centre of the world. The envoy, [scope:trib_envoy.GetName], waits in the antechambers of the [ROOT.GetCountry.Custom('get_country_formal_adjective')] court with his gifts and his memorial of submission. By ancient custom the throne receives such a mission in full ceremony and returns imperial largesse many times the tribute's worth — for the tribute was never about the goods, but about the ORDER it affirmed: that all under Heaven look to Peking. Yet the ceremony is costly, and a hard-pressed treasury may prefer to take the tribute and spare the spectacle."
 qing_tribute.1.a:0 "Receive them in full ceremony (賜宴頒賞)."
 qing_tribute.1.a.tt:0 "The lavish audience: a banquet, the return-gifts, the whole ritual of suzerainty. #R Costs 20 Treasury#!; #G collects the tribute-trade profit#!, #G firms the tributary order (保藩威望)#!, #G +8 Ruler Popularity#!, #G +1 Stability#!."
 qing_tribute.1.b:0 "Take the tribute; dismiss the mission curtly."
 qing_tribute.1.b.tt:0 "Spare the expense and the ceremony — the goods are taken, but the perfunctory reception is noted, and the order's prestige slips. #G Collects the tribute-trade profit#!, #G +5 Political Influence#!; #R the tributary order weakens#!."

 # ---- .2 A Tributary's New Ruler Awaits Investiture (冊封) [#322 deferred] ----------
 qing_tribute.2.t:0 "A Patent of Investiture Sought (冊封)"
 qing_tribute.2.desc:0 "The throne of [scope:trib_invest_vassal.GetName] has passed to a new sovereign, [scope:trib_invest_vassal.current_ruler.GetName], and by the custom of the tributary order he cannot be held a lawful king until the Son of Heaven confirms him — with a patent of investiture, a seal of office, and the calendar of the imperial dynasty. It was this ritual of 冊封, renewed each reign, that made the tributary bond a living thing rather than a dead letter. To invest him promptly affirms that Peking remains the fount of legitimacy in all the world; to withhold it is a calculated snub — one that a restless court, or a watching rival, will not fail to notice."
 qing_tribute.2.a:0 "Invest him promptly — confer the patent and seal."
 qing_tribute.2.a.tt:0 "The ritual affirmed without delay: #G firms the tributary order (保藩威望)#!, #G +5 Ruler Prestige#!, #G +1 Stability#!, and #G binds [scope:trib_invest_vassal.GetName] the tighter to Peking#! (loyalty to the overlord)."
 qing_tribute.2.b:0 "Confer it — but let the recognition be bought."
 qing_tribute.2.b.tt:0 "The patent granted, but a price extracted for it: #G a lesser affirmation of the order#! and #G a tribute-gift collected#! from [scope:trib_invest_vassal.GetName]."
 qing_tribute.2.c:0 "Withhold recognition — let him prove his submission."
 qing_tribute.2.c.tt:0 "The new sovereign is left unrecognised, to earn the patent by his loyalty: #G +10 Political Influence#! held in reserve, but #R the tie strains and the order's prestige slips#!."

 # ---- .3 A Restless Tributary Tests the Bond (breakaway crisis) [#322 deferred] -----
 qing_tribute.3.t:0 "A Tributary Grows Restless"
 qing_tribute.3.desc:0 "[scope:trib_restless.GetName], sensing the centre weaken, has grown slack in its obligations — a tribute mission not sent, a border courtesy withheld, an envoy received from a rival court. It is the oldest test of a fraying suzerainty: does the bond still hold, or is it now only a form? The throne may answer with an overawing show of strength on the marches, purchase the vassal's renewed loyalty with largesse, or judge that the empire cannot chase down every insolence — and let it drift toward the open door of independence."
 qing_tribute.3.a:0 "Overawe it — a show of strength on the marches."
 qing_tribute.3.a.tt:0 "A costly demonstration of the empire's long reach. #R Costs 60 Treasury#!; #G firms the tributary order strongly (保藩威望)#!, #G +1 Stability#!, #G binds [scope:trib_restless.GetName] back to Peking#!."
 qing_tribute.3.b:0 "Buy its loyalty back — largesse and remitted tribute."
 qing_tribute.3.b.tt:0 "Silver where the sword would cost more. #R Costs 30 Treasury#!; #G firms the order#! and #G binds [scope:trib_restless.GetName] back to Peking#!."
 qing_tribute.3.c:0 "Let it drift — the empire cannot answer every insolence."
 qing_tribute.3.c.tt:0 "The tributary is left to its restlessness: #R the order's prestige falls#! and #R reform pressure builds#! as the frontier watches the centre fail to answer."

 # ---- .4 A Great Power Meddles in a Qing Tributary (以夷制夷) [#322 deferred] --------
 qing_tribute.4.t:0 "Barbarian Hands on a Tributary"
 qing_tribute.4.desc:0 "Word comes from the frontier that a Western power presses into the affairs of [scope:trib_meddled.GetName] — a treaty offered behind Peking's back, a gunboat at a tributary harbour, a consul where none should be. This is the new danger of the age: the Sinocentric order, which for centuries knew no rival, now finds the outer barbarians reaching past the throne to deal with its vassals as sovereign states. The throne may warn the meddler off and reassert that the tributary is the empire's own, strike a face-saving bargain that cedes a measure of influence, or acquiesce — and watch another stone fall from the wall of the old order."
 qing_tribute.4.a:0 "Warn the meddler off — the tributary is ours."
 qing_tribute.4.a.tt:0 "A firm reassertion of suzerainty over [scope:trib_meddled.GetName]: #G firms the tributary order#! and #G binds the vassal to Peking#!, but #R raises tension with the meddling power#! (以夷制夷 pushback)."
 qing_tribute.4.b:0 "Strike a bargain — cede a measure of influence."
 qing_tribute.4.b.tt:0 "A face-saving accommodation: #G eases tension with the meddling power#! and #G +10 Political Influence#!, but #R the tributary order slips#! as a rival's hand settles on the vassal."
 qing_tribute.4.c:0 "Acquiesce — the empire cannot contest them here."
 qing_tribute.4.c.tt:0 "The throne yields the ground: #R the tributary order's prestige falls sharply#! and #R reform pressure builds#! as the old world gives way to the new."

 # ---- .5 A Tributary Defaults on its Tribute — Punish or Forgive (理藩院裁決) [BT-11] --
 qing_tribute.5.t:0 "A Tributary Defaults on its Tribute"
 qing_tribute.5.desc:0 "The quarterly reckoning of the Court of Colonial Affairs (理藩院) brings unwelcome news: [scope:trib_defaulter.GetName] has failed to render the tribute it owes — its treasury exhausted, its obligation unmet. In the language of the tributary order this is no small thing: the rendering of tribute is the visible sign of submission, and a default left unanswered invites every other vassal to test the same slackness. Yet the Son of Heaven has long cloaked hard power in the garment of grace — 懷柔遠人, to cherish men from afar. The ministers of the Lifan Yuan await the throne's judgment: shall the defaulter be brought to heel, or its arrears forgiven as an act of imperial magnanimity?"
 qing_tribute.5.a:0 "Bring it to heel — a default cannot go unanswered."
 qing_tribute.5.a.tt:0 "The Lifan Yuan tightens its grip on [scope:trib_defaulter.GetName]: #G the tributary order is reasserted (保藩威望)#!, but #R the defaulter's loyalty falls#! and #R it resents the overbearing hand#!."
 qing_tribute.5.b:0 "Forgive the arrears — cherish men from afar (懷柔遠人)."
 qing_tribute.5.b.tt:0 "An act of imperial grace toward [scope:trib_defaulter.GetName]: #G +3 Legitimacy#!, #G the defaulter's loyalty and goodwill rise#!, but #R the order's standing slips#! as the throne lets a default pass."
