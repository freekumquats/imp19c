l_english:
 # [#349] Ministry of War (兵部) panel.
 QING_WAR_MINISTRY_OPEN_BTN:0 "Ministry of War (兵部)"
 QING_WAR_MINISTRY_OPEN_TT:0 "Open the Ministry of War — the Grand Minister of War (兵部尚書), the officer corps he commands, and how well the ministry is run."
 QING_WAR_MINISTRY_PANEL_TITLE:0 "Ministry of War — 兵部"
 QING_WAR_MINISTRY_PANEL_DESC:0 "The Ministry of War (兵部) administers the standing army — the appointment of officers, the garrisons of the realm, and the logistics of the frontier campaigns. Its Grand Minister answers to the Grand Council for how the army is kept; a well-run Board lifts his standing there, a neglected one drags it down."
 QING_WAR_MINISTRY_MINISTER_TITLE:0 "Grand Minister of War (兵部尚書)"
 QING_WAR_MINISTRY_VACANT:0 "The Ministry of War stands without a Minister. The army drifts without a head."
 QING_WAR_MINISTRY_PERF_LABEL:0 "Ministry Performance"
 QING_WAR_MINISTRY_PERF_TT:0 "How well the Ministry of War is run (0–100), from the Minister's martial competence and the quality of the serving officer corps, docked for any banner garrisons left without a commander (up to -15 when the whole garrison establishment stands unofficered). A vacant Board floors this low."
 QING_WAR_MINISTRY_ROSTER_TITLE:0 "The Officer Corps"
 QING_WAR_MINISTRY_ROSTER_EMPTY:0 "No commanders currently serve with the standing army."
 QING_WAR_GROUP_INLAND:0 "#Y Inland Commandants (提督)#!  — banner garrisons on imperial soil"
 QING_WAR_GROUP_FRONTIER:0 "#Y Frontier Commandants (駐防將軍)#!  — garrisons on subject territory"
 QING_WAR_GROUP_ADMIRAL:0 "#Y Admirals (水師提督)#!  — commanders of the fleets"
 QING_WAR_GROUP_MARSHAL:0 "#Y Field Marshals (大將軍)#!  — commanders of the raised host"

 # Shared ministry-panel keys (used by every Grand Council bureaucracy panel).
 QING_MINISTRY_COUNCIL_CONTRIB_LABEL:0 "Ministries' net effect on the Grand Council"
 QING_MINISTRY_COUNCIL_CONTRIB_TT:0 "This office's OWN net effect (±) on the Grand Council's effectiveness this quarter: its performance deviation from adequate (50), scaled to a ±10 band. The council's actual effectiveness moves with the AVERAGE of every office's contribution, so a single office shifts it only in part — but a chronically weak office still drags the whole council. This office's own performance is the meter above."
 QING_WAR_COUNCIL_CONTRIB_LABEL:0 "The Ministry of War's net effect on the Grand Council"
