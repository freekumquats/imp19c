l_english:
 # [#349] Ministry of War (兵部) panel.
 QING_WAR_MINISTRY_OPEN_BTN:0 "Ministry of War (兵部)"
 QING_WAR_MINISTRY_OPEN_TT:0 "Open the Board of War — the Grand Minister of War (兵部尚書), the officer corps he commands, and how well the ministry is run."
 QING_WAR_MINISTRY_PANEL_TITLE:0 "Ministry of War — 兵部"
 QING_WAR_MINISTRY_PANEL_DESC:0 "The Board of War (兵部) administers the standing army — the appointment of officers, the garrisons of the realm, and the logistics of the frontier campaigns. Its Grand Minister answers to the Grand Council for how the army is kept; a well-run Board lifts his standing there, a neglected one drags it down."
 QING_WAR_MINISTRY_MINISTER_TITLE:0 "Grand Minister of War (兵部尚書)"
 QING_WAR_MINISTRY_VACANT:0 "The Board of War stands without a Minister. The army drifts without a head."
 QING_WAR_MINISTRY_PERF_LABEL:0 "Ministry Performance"
 QING_WAR_MINISTRY_PERF_TT:0 "How well the Board of War is run (0–100), from the Minister's martial competence and the quality of the serving officer corps. A vacant Board floors this low."
 QING_WAR_MINISTRY_ROSTER_TITLE:0 "The Officer Corps"
 QING_WAR_MINISTRY_ROSTER_EMPTY:0 "No commanders currently serve with the standing army."

 # Shared ministry-panel keys (used by every Grand Council bureaucracy panel).
 QING_MINISTRY_COUNCIL_CONTRIB_LABEL:0 "Ministries' net effect on the Grand Council"
 QING_MINISTRY_COUNCIL_CONTRIB_TT:0 "The COMBINED net effect (±) of ALL the ministries' performance on the Grand Council's effectiveness this quarter (not this ministry alone). A well-run set of ministries lifts the council; a poorly-run set drags it. This ministry's own performance is the meter above."
