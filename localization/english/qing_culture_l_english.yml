l_english:

# ============================================================================
# Localization for the Qing CULTURAL HAPPENINGS suite (task #15).
#   modifiers:  common/modifiers/qing_culture_modifiers.txt
#   events:     events/imp19c_mod_events/qing_culture_events.txt
#   dispatch:   QING_culture_roll (common/scripted_effects/se_QING_DECLINE.txt)
# The great cultural monuments of the High Qing, offered anachronistically to
# the 1815 player: the imperial dictionaries and encyclopaedias, the vernacular
# novel, the literary inquisition (文字獄), and the luxury crafts that made
# "china" a byword for refinement. Chinese terms are given in traditional
# characters as the court itself used them.
#
# Sources drawn on for the cultural-historical detail below:
#   Elman, Benjamin A. "From Philosophy to Philology" (Harvard, 1984) and
#     "A Cultural History of Civil Examinations in Late Imperial China" (2000).
#   Guy, R. Kent. "The Emperor's Four Treasuries: Scholars and the State in the
#     Late Ch'ien-lung Era" (Harvard, 1987) — on the Siku Quanshu and 文字獄.
#   Spence, Jonathan D. "The Search for Modern China" (Norton, 1990).
#   Rawski, Evelyn S. "The Last Emperors" (California, 1998) — court patronage.
#   Clunas, Craig. "Art in China" (Oxford, 1997) — jade, porcelain, painting.
# ============================================================================

# ####################################################################
# MODIFIER DISPLAY NAMES (effects auto-generate the numeric tooltip).
# ####################################################################
 qing_culture_kangxi_dictionary:0 "The Kangxi Dictionary (康熙字典)"
 qing_culture_tang_poems:0 "The Complete Tang Poems (全唐詩)"
 qing_culture_encyclopaedia:0 "The Gujin Tushu Jicheng (古今圖書集成)"
 qing_culture_red_chamber:0 "Dream of the Red Chamber (紅樓夢)"
 qing_culture_siku_quanshu:0 "The Siku Quanshu (四庫全書)"
 qing_culture_literary_inquisition:0 "The Literary Inquisition (文字獄)"
 qing_culture_imperial_jade:0 "Imperial Jade (玉器)"
 qing_culture_porcelain:0 "The Kilns of Jingdezhen (景德鎮)"
 qing_culture_silk:0 "The Silk of Jiangnan (江南絲綢)"
 qing_culture_court_painting:0 "The Court Ateliers (宮廷繪畫)"
 qing_culture_jubilee:0 "A Grand Jubilee (萬壽盛典)"

# ####################################################################
# EVENT 1 — 康熙字典 THE KANGXI DICTIONARY
# ####################################################################
 qing_culture.1.t:0 "The Kangxi Dictionary (康熙字典)"
 qing_culture.1.desc:0 "The scholars of the Hanlin Academy (翰林院) come before the throne with a proposal worthy of a great reign: a dictionary to fix, once and for all, the form, sound and sense of every character in the language — more than forty thousand of them, ordered under the two hundred and fourteen radicals. Such a work, first commanded by the Kangxi Emperor, would be the standard of the literate world for centuries; to bear its imperial patronage is to make the throne the very arbiter of learning. But it will take an army of scholars, and years, and silver."
 qing_culture.1.a:0 "Command the scholars — let it be worthy of the age."
 qing_culture.1.a.tt:0 "Commission the #Y Kangxi Dictionary#! in full.\n\nCost: #R 60 Treasury#!.\nGain the lasting #G The Kangxi Dictionary#! modifier (#G research, assimilation speed and legitimacy#!) and #G +1 Stability#!."
 qing_culture.1.b:0 "The treasury is not yet equal to it."
 qing_culture.1.b.tt:0 "Defer the work. #G +5 Political Influence#! from the prudent husbanding of resources."

# ####################################################################
# EVENT 2 — 全唐詩 THE COMPLETE TANG POEMS
# ####################################################################
 qing_culture.2.t:0 "The Complete Tang Poems (全唐詩)"
 qing_culture.2.desc:0 "An editor of the Yangzhou printing office memorialises the throne: the verse of the Tang, the golden age of Chinese poetry, lies scattered across a thousand collections, much of it decaying and some already lost. Let the throne gather it whole — every surviving poem of Li Bai and Du Fu and the two thousand hands beside them, near fifty thousand verses, into one imperial corpus. To be the dynasty that saved the poetry of the Tang is to claim the very soul of Chinese letters for the Great Qing."
 qing_culture.2.a:0 "Gather the poetry of the Tang entire."
 qing_culture.2.a.tt:0 "Commission the #Y Complete Tang Poems#!.\n\nCost: #R 40 Treasury#!.\nGain the lasting #G The Complete Tang Poems#! modifier (#G population happiness, same-culture happiness and legitimacy#!)."
 qing_culture.2.b:0 "The poets need no imperial hand."
 qing_culture.2.b.tt:0 "Leave the work to private scholarship. #G +3 Political Influence#!."

# ####################################################################
# EVENT 3 — 古今圖書集成 THE GUJIN TUSHU JICHENG
# ####################################################################
 qing_culture.3.t:0 "A Compendium of All Knowledge (古今圖書集成)"
 qing_culture.3.desc:0 "There comes to court the design for a work almost beyond imagining: an illustrated encyclopaedia gathering all knowledge, ancient and modern (古今圖書集成) — the heavens and the calendar, geography and the realm's every prefecture, the natural world, the arts of governance, the whole inheritance of learning, ordered into ten thousand chapters. It would be the single greatest reference in the world, a treasure-house for statesman and scholar alike. Its cost is commensurate with its grandeur."
 qing_culture.3.a:0 "Let all knowledge be gathered under Heaven's throne."
 qing_culture.3.a.tt:0 "Fund the full #Y Gujin Tushu Jicheng#!.\n\nCost: #R 80 Treasury#!.\nGain the lasting #G The Gujin Tushu Jicheng#! modifier (#G research and civilization#!) and #G +1 Stability#!."
 qing_culture.3.b:0 "A smaller compilation of the practical arts alone."
 qing_culture.3.b.tt:0 "Fund only the sections of use to statecraft.\n\nCost: #R 25 Treasury#!.\nGain #G +1 Innovation#! at once."

# ####################################################################
# EVENT 4 — 紅樓夢 THE DREAM OF THE RED CHAMBER
# ####################################################################
 qing_culture.4.t:0 "Dream of the Red Chamber (紅樓夢)"
 qing_culture.4.desc:0 "A manuscript passes from hand to hand through the capital, copied and recopied faster than it can be read: the tale of the Jia household in its splendour and its ruin, of Baoyu and Daiyu and the garden of the Grand View. It is written not in the stately classical tongue but in the living vernacular, and men and women of every station weep over it. Some at court call it a masterpiece to stand with anything the Tang or Song produced; others mutter that a novel of love and idleness is no fit reading for a Confucian realm. Word of the throne's own view is awaited."
 qing_culture.4.a:0 "It is a masterpiece — let it be read openly."
 qing_culture.4.a.tt:0 "Embrace the #Y Dream of the Red Chamber#!.\n\nGain the lasting #G Dream of the Red Chamber#! modifier (#G population happiness and same-culture happiness#!)."
 qing_culture.4.b:0 "A vernacular trifle — proscribe it as a distraction from the Classics."
 qing_culture.4.b.tt:0 "Ban the novel. #G +10 Political Influence#! from the orthodox faction, but the ban breeds a whisper of resentment (#R sect pressure rises#!)."

# ####################################################################
# EVENT 5 — 四庫全書 THE SIKU QUANSHU + 文字獄
# ####################################################################
 qing_culture.5.t:0 "The Complete Library of the Four Treasuries (四庫全書)"
 qing_culture.5.desc:0 "The Grand Secretaries lay before the throne the most colossal literary undertaking ever conceived: to seek out every worthy book in the empire and copy the best of them — some three and a half thousand titles, near eight hundred million characters — by hand into a single imperial library, the #Y Complete Library of the Four Treasuries#!. It would crown the reign as the greatest patron of letters in the history of the world.\n\nYet the memorial carries a shadow. To gather every book is also to read every book — and among them are works that slight the dynasty, that mourn the fallen Ming, that carry the barb of sedition. The compilation may be made a net to catch such texts, their authors punished, their families broken, their words burned. Scholarship and the #Y literary inquisition (文字獄)#! are offered to the throne as one."
 qing_culture.5.a:0 "Compile the library — and let the seditious tremble (文字獄)."
 qing_culture.5.a.tt:0 "Found the #Y Siku Quanshu#! AND launch the literary inquisition.\n\nCost: #R 100 Treasury#!.\nGain the lasting #G The Siku Quanshu#! modifier (#G research, legitimacy and civilization#!). The inquisition cows the literati — #G sect pressure falls sharply#! — but it is order bought with fear: gain the #R The Literary Inquisition#! modifier for ten years (#R promotion speed and research fall#!, political influence rises) and #R +5 Tyranny#!."
 qing_culture.5.b:0 "Compile the library — but spare the authors."
 qing_culture.5.b.tt:0 "Found the #Y Siku Quanshu#! as an act of pure scholarship, harming no one.\n\nCost: #R 120 Treasury#!.\nGain the lasting #G The Siku Quanshu#! modifier and #G +1 Stability#!. The magnanimity wins the gentry's devotion (#G reform pressure eases#!)."
 qing_culture.5.c:0 "The realm cannot bear the cost now."
 qing_culture.5.c.tt:0 "Defer the great library. #G +5 Political Influence#!."

# ####################################################################
# EVENT 6 — 玉器 IMPERIAL JADE
# ####################################################################
 qing_culture.6.t:0 "Tribute Jade from Khotan (玉器)"
 qing_culture.6.desc:0 "A caravan arrives from the far west bearing boulders of mutton-fat jade from the rivers of Khotan, tribute of the newly pacified frontier. Raw, it is merely stone; but the lapidaries of the palace workshops (造辦處) could turn it into brush-washers and mountains and ruyi sceptres of a refinement that no other court on earth can equal — objects fit to overawe every envoy who beholds them."
 qing_culture.6.a:0 "Set the palace lapidaries to work."
 qing_culture.6.a.tt:0 "Patronise the #Y jade workshops#!.\n\nCost: #R 30 Treasury#!.\nGain the #G Imperial Jade#! modifier for five years (#G legitimacy and commerce#!)."
 qing_culture.6.b:0 "Store the jade against leaner years."
 qing_culture.6.b.tt:0 "Keep the tribute jade as treasure. #G +15 Treasury#!."

# ####################################################################
# EVENT 7 — 瓷器 PORCELAIN
# ####################################################################
 qing_culture.7.t:0 "The Kilns of Jingdezhen (景德鎮)"
 qing_culture.7.desc:0 "The superintendent of the imperial kilns at Jingdezhen reports both triumph and need. His potters have mastered the famille rose and the flambé glazes; their porcelain is so coveted that in the markets of Europe the very word for the country and the ware are one and the same, and silver flows east by the shipload to pay for it. But the kilns that feed this river of wealth must be renewed, their finest craftsmen kept, if the Qing is to hold its monopoly on the envy of the world."
 qing_culture.7.a:0 "Invest in the imperial kilns."
 qing_culture.7.a.tt:0 "Renew the #Y Jingdezhen kilns#!.\n\nCost: #R 40 Treasury#!.\nGain the #G The Kilns of Jingdezhen#! modifier for five years (#G commerce and export commerce#!)."
 qing_culture.7.b:0 "Simply tax the export trade."
 qing_culture.7.b.tt:0 "Take the immediate revenue instead. #G +25 Treasury#!."

# ####################################################################
# EVENT 8 — 絲綢 SILK
# ####################################################################
 qing_culture.8.t:0 "The Silk of Jiangnan (江南絲綢)"
 qing_culture.8.desc:0 "From Suzhou, Hangzhou and Nanjing come the memorials of the three Imperial Silk Manufactories (織造). Their looms clothe the court and the courts of half the world besides; their bolts of patterned satin and gauze are the oldest of the empire's luxuries and among the surest of its revenues. But the manufactories are ageing, and the private weavers press hard; a word from the throne would decide whether the imperial looms are renewed or left to the merchants."
 qing_culture.8.a:0 "Renew the imperial silk manufactories."
 qing_culture.8.a.tt:0 "Reinvest in the #Y Jiangnan silk works#!.\n\nCost: #R 35 Treasury#!.\nGain the #G The Silk of Jiangnan#! modifier for five years (#G commerce and tax#!)."
 qing_culture.8.b:0 "Leave the weavers to the private trade."
 qing_culture.8.b.tt:0 "Take a modest levy and let the merchants weave. #G +10 Treasury#!."

# ####################################################################
# EVENT 9 — 宮廷繪畫 COURT PAINTING
# ####################################################################
 qing_culture.9.t:0 "The Court Ateliers (宮廷繪畫)"
 qing_culture.9.desc:0 "In the painting academy of the palace, a remarkable fusion is underway. Chinese masters of the brush work beside foreign Jesuits — men in the mould of Giuseppe Castiglione (郎世寧), who serve the throne as painters — and from their meeting comes a new imperial manner: the perspective and shadow of the West laid over the line and spirit of Chinese art, in vast scrolls of the hunt, the campaign, and the imperial progress. To keep such an atelier is costly, and some at court grumble at the foreign hands within the palace."
 qing_culture.9.a:0 "Keep a brilliant atelier at court."
 qing_culture.9.a.tt:0 "Patronise the #Y court ateliers#!.\n\nCost: #R 25 Treasury#!.\nGain the #G The Court Ateliers#! modifier for five years (#G population happiness and legitimacy#!)."
 qing_culture.9.b:0 "Send the foreign painters home."
 qing_culture.9.b.tt:0 "Dismiss the Jesuit painters to satisfy the traditionalists. #G +5 Political Influence#!."

# ####################################################################
# EVENT 10 — 萬壽盛典 A GRAND IMPERIAL JUBILEE
# ####################################################################
 qing_culture.10.t:0 "A Grand Imperial Jubilee (萬壽盛典)"
 qing_culture.10.desc:0 "The imperial birthday approaches, and the Board of Rites (禮部) proposes a festival worthy of a long and glorious reign: the road from the palace to the summer gardens lined for miles with silk pavilions, opera stages, and lanterns; tribute and congratulation from every corner of the realm and every tributary beyond it; a great painted scroll to record the splendour for the ages. Such a spectacle would gladden the whole realm and blazon the Mandate of Heaven before all — at no small expense to the treasury."
 qing_culture.10.a:0 "Hold a magnificent jubilee."
 qing_culture.10.a.tt:0 "Stage a #Y grand jubilee#!.\n\nCost: #R 50 Treasury#!.\nGain #G +1 Stability#!, a marked #G easing of sect pressure#! as the realm rejoices, and the #G A Grand Jubilee#! modifier for two years (#G population happiness and legitimacy#!)."
 qing_culture.10.b:0 "A restrained, dignified observance."
 qing_culture.10.b.tt:0 "Mark the day with Confucian modesty. #G +10 Political Influence#!."
