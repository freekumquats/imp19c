l_english:
 # [#354/#357] Zongli Yamen (總理衙門) panel + diplomat corps.
 QING_ZONGLI_OPEN_BTN:0 "Zongli Yamen (總理衙門)"
 QING_ZONGLI_OPEN_TT:0 "Open the Office for the General Management of Affairs — the Grand Director, the diplomat corps he fields, and how well the foreign service advances the empire's diplomatic plays."
 QING_ZONGLI_PANEL_TITLE:0 "Zongli Yamen — 總理衙門"
 QING_ZONGLI_PANEL_DESC:0 "The Zongli Yamen (總理衙門) manages the empire's modern foreign relations — treaty diplomacy with the Western powers, the interpreters' college, and the resident ministers sent abroad. Its Grand Director answers to the Grand Council for how the foreign service is run, and a capable, well-staffed office advances every diplomatic play the empire pursues."
 QING_ZONGLI_DIRECTOR_TITLE:0 "Grand Director of the Zongli Yamen (總理衙門大臣)"
 QING_ZONGLI_VACANT:0 "The Zongli Yamen stands without a Director. No hand guides the empire's dealings with the powers."
 QING_ZONGLI_PERF_LABEL:0 "Directorate Performance"
 QING_ZONGLI_PERF_TT:0 "How well the Zongli Yamen is run (0–100), from the Director's diplomatic skill and the size + quality of the diplomat corps. A vacant office floors this low."
 QING_ZONGLI_PLAYFACTOR_NOTE:0 "A well-run Directorate (above 50) advances the empire's diplomatic plays; a poorly-run one (below 50) fumbles them. This factor applies to every play the Qing pursues."
 QING_ZONGLI_CORPS_TITLE:0 "The Diplomat Corps (駐外使臣)"
 QING_ZONGLI_CORPS_EMPTY:0 "No diplomats currently serve the Zongli Yamen. Appoint able courtiers to build a foreign service."
 QING_ZONGLI_APPOINT_BTN:0 "Appoint a diplomat…"
 QING_ZONGLI_APPOINT:0 "Appoint to the corps"
 QING_ZONGLI_APPOINT_TT:0 "Appoint this courtier to the diplomat corps (駐外使臣). A larger, abler corps raises the Directorate's performance and its diplomatic-play factor. Capped at six diplomats."
 QING_ZONGLI_RECALL_BTN:0 "Recall"
 QING_ZONGLI_RECALL_TT:0 "Recall this diplomat from the corps, returning him to ordinary court service."
