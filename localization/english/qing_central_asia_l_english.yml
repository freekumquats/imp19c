l_english:
 # ####################################################################
 # [#448] The Western Regions (經略西域) — the Qing expansion into
 # Central Asia beyond the Xinjiang consolidation: the Kazakh steppe
 # and the Silk Road khanates of the Ferghana and Transoxiana.
 # See common/missions/qing_central_asia_missions.txt,
 # common/scripted_effects/se_QING_CENTRAL_ASIA.txt,
 # common/modifiers/qing_central_asia_modifiers.txt.
 # ####################################################################

 qing_central_asia_mission:0 "The Western Regions (經略西域)"
 qing_central_asia_mission_DESCRIPTION:0 "The Qianlong conquest of Xinjiang has brought the empire to the doorstep of the Kazakh steppe and the caravan cities of the Silk Road. The three Juz of the Kazakhs and the khanates of the Ferghana — Kokand, Bukhara, Khiva — sit astride the old roads west. Push the empire's dominance past the pass: bring the steppe hordes into the tributary system, overawe the caravan cities, and hold the ground of Transoxiana itself. Let the Western Regions be pacified as they were in the days of the Han and the Tang."

 qing_ca_beyond_pass:0 "The Road Beyond the Pass (出關)"
 qing_ca_beyond_pass_DESC:0 "Commit the frontier armies and the caravan revenues to the westward push past Jiayuguan and the Ili valley — the point from which the empire reaches into the steppe and the khanates. Costs #Y 100#! treasury and #Y 25#! political influence."
 qing_ca_beyond_pass_tt:0 "Open the enterprise: the westward road is committed, and the court takes heart (#G ruler popularity#!)."

 qing_ca_kazakh:0 "The Kazakh Steppe (撫哈薩克)"
 qing_ca_kazakh_DESC:0 "Bring the three Juz — the Great, Middle and Little Hordes — into the tributary system, as they historically sent tribute to Qianlong after the fall of the Dzungars. Costs #Y 30#! political influence."
 qing_ca_needs_kazakh_tt:0 "At least one of the three #Y Kazakh hordes (哈薩克) must exist#! on the map to be reached."
 qing_ca_kazakh_tt:0 "The steppe bows: every extant Kazakh horde is brought under the wing as a #G sinosphere tributary#!, and the court exults (#G ruler popularity#!)."

 qing_ca_khanates:0 "The Caravan Cities (懾服浩罕)"
 qing_ca_khanates_DESC:0 "Overawe the khanates of the Silk Road — Kokand, Bukhara, Khiva — into the tributary system. Costs #Y 30#! political influence."
 qing_ca_needs_khanates_tt:0 "At least one of the #Y Silk Road khanates (浩罕/布哈拉/希瓦) must exist#! on the map to be reached."
 qing_ca_khanates_tt:0 "The caravan cities submit: every extant khanate is overawed into the fold as a #G sinosphere tributary#!, and the court exults (#G ruler popularity#!)."

 qing_ca_ferghana:0 "The Ferghana Valley (據費爾干納)"
 qing_ca_ferghana_DESC:0 "The deepest reach: hold the ground of the Ferghana — the rich valley of Kokand and Tashkent, the heart of Transoxiana's Silk Road. You must take and hold the ground yourself. Costs #Y 80#! treasury."
 qing_ca_needs_ferghana_tt:0 "The Qing must #Y control at least one province in the Fergana region#! (費爾干納)."
 qing_ca_ferghana_tt:0 "The valley is held — Qing arms stand in the heart of Transoxiana. The realm steadies (#G stability#!) and the court rejoices (#G ruler popularity#!)."

 qing_ca_capstone:0 "The Western Regions Pacified (西域大定)"
 qing_ca_capstone_DESC:0 "The steppe hordes and the caravan cities under the Son of Heaven, and Qing ground in the heart of Transoxiana. The Silk Road revived under the imperial peace — tribute and caravan trade flowing east — as in the days of the Han and the Tang."
 qing_ca_needs_pacified_tt:0 "The Qing must hold #Y at least two Central Asian tributaries#! (Kazakh hordes or khanates) AND #Y control ground in the Fergana#! (費爾干納)."
 qing_ca_capstone_tt:0 "The Western Regions are pacified. The lasting #G The Western Regions (qing_western_regions)#! is sealed — diplomatic weight, a revived caravan-commerce dividend, legitimacy and the manpower of the steppe frontier — the realm steadies (#G stability#!) and the emperor's glory rings across the western marches (#G ruler popularity#!)."

 # ---- modifiers ----
 qing_western_regions:0 "The Western Regions (西域大定)"
 qing_western_regions_desc:0 "The Kazakh steppe and the Silk Road khanates under the Son of Heaven, and Qing ground in the heart of Transoxiana. A lasting dividend of diplomatic weight, revived caravan commerce, legitimacy, and the manpower of the pacified western frontier."
