l_english:
 qing_amban.1.t:0 "Clash at the Residency"
 qing_amban.1.desc:0 "The resident commissioner (駐紮大臣) posted to [qing_amban_crisis_subject.GetName] and the minister of the Lifan Yuan (理藩院) in Peking have fallen into open dispute over the management of the dependency. [qing_amban_crisis_holder.GetName], who oversees the Court of Colonial Affairs, demands the recall of [qing_amban_crisis_resident.GetName], accusing the resident of exceeding his brief and inflaming local tensions. The resident, for his part, insists he alone understands the ground truth and that the Lifan Yuan's directives are impossibly rigid. The dependency simmers while Peking's agents bicker."
 qing_amban.1.a:0 "Recall the resident. The Lifan Yuan prevails."
 qing_amban.1.a.tt:0 "The resident is recalled; the dependency stabilizes. The Lifan holder gains standing; the resident loses face and loyalty."
 qing_amban.1.b:0 "Back the resident. He stays."
 qing_amban.1.b.tt:0 "The resident remains in post; the friction persists and the dependency drifts further. The Lifan holder loses face and loyalty."
 qing_amban.2.t:0 "Gone Native"
 qing_amban.2.desc:0 "The resident commissioner posted to [qing_amban_native_subject.GetName], [qing_amban_native.GetName], has been in post for so many years that he has, in the Lifan Yuan's assessment, 'gone native.' He has married into the local elite, adopted their customs, and no longer reliably represents Peking's interests. The dependency regards him as one of their own rather than the throne's man. Shall we recall him, or accept that the residency has become a local sinecure?"
 qing_amban.2.a:0 "Recall him. The post must answer to Peking."
 qing_amban.2.a.tt:0 "Replace the resident. The dependency stabilizes briefly; costs silver (turnover)."
 qing_amban.2.b:0 "Let him stay. It is what it is."
 qing_amban.2.b.tt:0 "Accept the drift. The dependency slips further; the resident's affinity with the throne falls."
 qing_amban.3.t:0 "Able Governance"
 qing_amban.3.desc:0 "Our resident commissioner in [qing_amban_able_subject.GetName], [qing_amban_able.GetName], has deftly suppressed a brewing unrest and mediated a local dispute, keeping the march stable. The Lifan Yuan commends his conduct. A capable man in a difficult post is worth his weight in silver."
 qing_amban.3.a:0 "Commend him and grant a reward."
 qing_amban.3.a.tt:0 "The resident gains loyalty, standing, and a silver grant. Costs the treasury."
 qing_amban.3.b:0 "Note his service."
 qing_amban.3.b.tt:0 "The resident gains modest standing; no cost."
 qing_amban.4.t:0 "A Resident's Last Days"
 qing_amban.4.desc:0 "Our resident commissioner in [qing_amban_old_subject.GetName], [qing_amban_old.GetName], is aged and failing. The Lifan Yuan recommends his recall and replacement. Shall we appoint a successor, or leave the post vacant for now?"
 qing_amban.4.a:0 "Appoint a replacement."
 qing_amban.4.a.tt:0 "Recall the old resident and post a new one. Costs silver (appointment)."
 qing_amban.4.b:0 "Leave the post vacant."
 qing_amban.4.b.tt:0 "Recall without replacement. The dependency drifts until a new resident is posted."
 qing_amban_resident:0 "Resident Commissioner (駐紮大臣)"
 qing_amban_resident_desc:0 "This character is posted as the Qing throne's resident commissioner to an Inner Asian dependency, overseeing it on behalf of the Lifan Yuan (理藩院)."
 qing_amban_clash_opinion:0 "Resident's friction with Beijing"
 qing_amban_capable_opinion:0 "Capable resident"
 qing_amban_ineffective_opinion:0 "Ineffective resident"
 qing_amban_cooperation_opinion:0 "Resident governs by cooperation"
