l_english:
 # qing_guard.* — Imperial Guard (領侍衛內大臣) office events (#273)
 qing_guard.1.t:0 "The Guard Reviewed"
 qing_guard.1.desc:0 "The Grand Commandant [scope:commandant.GetName] parades the palace guard corps — the banner elite of the 侍衛, the emperor's own fighting men — before the throne for review (閱侍衛). [ROOT.GetRuler.GetName] takes the measure of the men who stand between his person and the world."
 qing_guard.1.a:0 "A corps in fighting trim."
 qing_guard.1.a.tt:0 "Under an able commandant the guard stands in fighting trim — the throne's person is secure (loyal veterans to the ruler) and its prestige rises (+25); the commandant's standing rises."
 qing_guard.1.b:0 "They go through the motions."
 qing_guard.1.b.tt:0 "A perfunctory parade under a lax hand — a little prestige (+8), no more."

 qing_guard.2.t:0 "A Plot Against the Throne"
 qing_guard.2.desc:0 "The guard has caught the scent of a conspiracy reaching toward the emperor's person (宮廷陰謀). Whether it is run to ground depends on the man who commands the corps — the Grand Commandant [scope:commandant.GetName]. [ROOT.GetRuler.GetName]'s safety may rest on his competence and his loyalty both."
 qing_guard.2.a:0 "The commandant runs it down."
 qing_guard.2.a.tt:0 "A loyal, capable commandant runs the plot to ground — the throne is safe, the realm steadied (stability +1), and the emperor's prestige rises (+15); the commandant is bound closer."
 qing_guard.2.b:0 "The throne must act over his head."
 qing_guard.2.b.tt:0 "The guard failed and the throne must act over its commandant's head — a shaken court (stability -1) and the commandant shamed (his prominence -5)."

 qing_guard.3.t:0 "The Overmighty Commandant"
 qing_guard.3.desc:0 "The danger has turned inward. The Grand Commandant [scope:commandant.GetName] has grown too powerful — an armed household in the hands of a disloyal grandee is the praetorian nightmare, and the Aisin Gioro never forgot Oboi (跋扈之將). [ROOT.GetRuler.GetName] can break his power now or bind him closer with honours."
 qing_guard.3.a:0 "Break his power. Remember Oboi."
 qing_guard.3.a.tt:0 "The commandant's base is stripped and he is brought to heel (his veterans and loyalty cut) — the throne is safe again (stability +1), though his kin and clients bristle."
 qing_guard.3.b:0 "Bind him with honours."
 qing_guard.3.b.tt:0 "The commandant is placated with honours (his loyalty and standing rise), but a mighty guard chief remains a standing risk (throne prestige -10)."

 # ============================================================
 # [#364] Imperial Guard panel — the guard_commandant bureaucracy (gui/qing_guard.gui).
 # A Grand-Council-clone dashboard: the Commandant, his ministry-performance meter (which
 # folds into his Grand Council standing), the corps of 侍衛 guardsmen, and the Bayara Guard.
 # ============================================================
 QING_GUARD_OPEN_BTN:0 "Imperial Guard"
 QING_GUARD_OPEN_TT:0 "Open the #Y Imperial Guard#! (領侍衛內大臣) dashboard.\n\nReview the #Y Commandant of the Imperial Guard#!, the corps of #Y 侍衛 guardsmen#! enrolled to ward the throne, and muster the elite #Y Bayara Guard#! (巴牙喇). The guard's readiness folds into the Commandant's standing on the #Y Grand Council#!."
 QING_GUARD_PANEL_TITLE:0 "The Imperial Guard"
 QING_GUARD_PANEL_DESC:0 "The #Y Commandant of the Imperial Guard#! (領侍衛內大臣) commands the elite Manchu palace guard drawn from the Upper Three Banners (上三旗) — the #Y 侍衛 guardsmen#! who ward the emperor's person and the #Y Bayara braves#! (巴牙喇), the banner armies' shock troops. A guard in fighting trim keeps the throne secure; a strong corps and a mustered Bayara Guard raise the Commandant's standing on the #Y Grand Council#!."
 QING_GUARD_COMMANDANT_TITLE:0 "Commandant of the Imperial Guard"
 QING_GUARD_VACANT:0 "#R No Commandant commands the guard.#! The office stands vacant and the corps drills without a head — appoint a Commandant of the Imperial Guard from the #Y Grand Council#! to restore the throne's watch."
 QING_GUARD_PERF_LABEL:0 "Guard readiness"
 QING_GUARD_PERF_TT:0 "The #Y Commandant's ministry performance#! (0–100, 50 neutral): his #Y martial#! skill, the depth of the #Y 侍衛 corps#! serving under him, his loyalty to the throne, and whether the #Y Bayara Guard#! stands mustered.\n\nThis folds directly into his standing on the #Y Grand Council#! — a weak or headless guard drags the whole council down."
 QING_GUARD_CORPS_LABEL:0 "侍衛 guardsmen enrolled"
 QING_GUARD_CORPS_TT:0 "The number of #Y courtiers enrolled#! into the guard corps to ward the emperor's person (capped at 6). A fuller corps means a readier guard and a stronger Commandant on the #Y Grand Council#!."
 QING_GUARD_BAYARA_LABEL:0 "Bayara Guard (巴牙喇)"
 QING_GUARD_BAYARA_TT:0 "Whether the elite #Y Bayara Guard#! shock legion stands mustered at the capital. Once raised it bolsters the Commandant's readiness for good."
 QING_GUARD_BAYARA_RAISED:0 "#G Under arms#!"
 QING_GUARD_BAYARA_UNRAISED:0 "#R Not mustered#!"
 QING_GUARD_ADMIN_TITLE:0 "The Commandant's Levers"
 QING_GUARD_ENROL_BTN:0 "Enrol a Guardsman"
 QING_GUARD_ENROL_TT:0 "Enrol a courtier into the #Y 侍衛 guard corps#! to ward the throne (capped at 6). Opens the court roster to pick the man. A great-office holder cannot also serve as a guardsman."
 QING_GUARD_BAYARA_BTN:0 "Muster the Bayara Guard"
 QING_GUARD_BAYARA_BTN_TT:0 "Muster the elite #Y Bayara Guard#! (巴牙喇) — a shock legion raised at the capital. #Y Raised once#!; requires a seated Commandant. Bolsters the guard's readiness for good."
 QING_GUARD_ROSTER_TITLE:0 "The Guard Corps (侍衛)"
 QING_GUARD_ROSTER_EMPTY:0 "#I No guardsmen are enrolled. The emperor's person stands unwarded — enrol 侍衛 from the court to man the guard.#!"
 QING_GUARD_DISCHARGE_BTN:0 "Discharge"
 QING_GUARD_DISCHARGE_TT:0 "Discharge this guardsman from the #Y 侍衛 corps#!, returning him to the ordinary court."
 # picker-row keys (shown on the shared court roster when enrolling a guardsman)
 QING_GUARD_ENROL_PICK:0 "Enrol as Guardsman"
 QING_GUARD_ENROL_PICK_TT:0 "Enrol this courtier into the #Y 侍衛 guard corps#! to ward the emperor's person."
