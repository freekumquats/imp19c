l_english:

######################################################################
# qing_vassal_l_english.yml — PROTECT THE VASSAL (保藩): the tributary crises.
# Covers the suzerain-prestige modifiers and the four vassal-crisis events
# (Korea, Vietnam, Ryukyu, Burma). See se_QING_VASSAL.txt / qing_vassal_events.txt.
######################################################################

 # ---- modifiers --------------------------------------------------------------
 qing_suzerain_ascendant:0 "保藩威望 — The Tributary Order Ascendant"
 qing_suzerain_crumbling:0 "藩籬盡撤 — The Tributary Order Crumbling"

 # ---- .1  Korea vs Japan ------------------------------------------------------
 qing_vassal.1.t:0 "The Question of Korea (朝鮮)"
 qing_vassal.1.desc:0 "Chosön Korea is the innermost jewel of the tributary crown — the vassal that has kept the ancestral forms most faithfully, and the shield of Manchuria beyond. Now Japan presses upon it: her ministers intrigue at the Korean court, her merchants and soldiers gather, and she asserts that Korea is no vassal of ours but a sovereign state — a direct challenge to the Son of Heaven's suzerainty. To defend Korea is to risk war with a Japan that has remade herself in the Western mould; to abandon her is to pull the first stone from the wall of the tributary order.\n\nWhat is the court's will?"
 qing_vassal.1.defend:0 "Defend Korea — the bond is inviolable."
 qing_vassal.1.defend.tt:0 "Costs #Y60 Treasury#!. Stand by Korea: raises suzerain prestige and national prestige, but sharply sharpens the rivalry with Japan — the road to war."
 qing_vassal.1.abandon:0 "We cannot fight for Korea."
 qing_vassal.1.abandon.tt:0 "Yield Korea to the Japanese sphere. Avoids the war, but the tributary order visibly crumbles: a heavy blow to suzerain prestige, national prestige, and legitimacy, and a jolt of reform pressure."

 # ---- .2  Vietnam vs France ---------------------------------------------------
 qing_vassal.2.t:0 "France in Annam (越南)"
 qing_vassal.2.desc:0 "France drives up the rivers into Tonkin, seizing the citadels of our southern tributary and declaring a protectorate over Annam. The court of Hué appeals to its ancient suzerain; the Black Flag irregulars already bleed the French in the hills. To send the banners south is to make war on a first-rank European power far from our strength; to stand aside is to watch Vietnam torn from the tributary fold.\n\nWhat is the court's will?"
 qing_vassal.2.defend:0 "Defend Vietnam — send aid to Tonkin."
 qing_vassal.2.defend.tt:0 "Costs #Y60 Treasury#!. Stand by Vietnam: raises suzerain prestige and national prestige, but sharply raises tension with France — the Sino-French War beckons."
 qing_vassal.2.abandon:0 "Vietnam is beyond our reach."
 qing_vassal.2.abandon.tt:0 "Yield Vietnam to France. Avoids the war, but a heavy blow to suzerain prestige, national prestige, and legitimacy, and a jolt of reform pressure."

 # ---- .3  Ryukyu vs Japan -----------------------------------------------------
 qing_vassal.3.t:0 "The Ryukyus Annexed (琉球)"
 qing_vassal.3.desc:0 "The kingdom of the Ryukyus has for centuries paid tribute to two masters — to Beijing and to Satsuma both. Now Japan moves to end the ambiguity: she abolishes the kingdom outright, exiles its king, and makes the islands a Japanese prefecture. The Ryukyuan envoys weep at our gates, begging the Son of Heaven to restore their king. The islands are small and far; but to let them go unchallenged is to concede the principle.\n\nWhat is the court's will?"
 qing_vassal.3.defend:0 "Protest and press — the Ryukyus are ours to protect."
 qing_vassal.3.defend.tt:0 "Costs #Y40 Treasury#!. Contest the annexation: raises suzerain prestige and national prestige, but raises the rivalry with Japan."
 qing_vassal.3.abandon:0 "Let the islands go."
 qing_vassal.3.abandon.tt:0 "Accept the Japanese annexation. Avoids friction, but a blow to suzerain prestige, national prestige, and legitimacy, and a jolt of reform pressure."

 # ---- .4  Burma vs Britain ----------------------------------------------------
 qing_vassal.4.t:0 "Britain in Burma (緬甸)"
 qing_vassal.4.desc:0 "Britain drives up from India into Upper Burma, deposes the king at Mandalay, and swallows our south-western tributary into her Indian empire. The court asks only that the old decennial tribute missions be allowed to continue as a face-saving form — but the substance is gone. To resist is to challenge the greatest of the sea powers at the far end of our reach; to accept is one more vassal struck from the roll.\n\nWhat is the court's will?"
 qing_vassal.4.defend:0 "Press Britain — insist on our suzerainty."
 qing_vassal.4.defend.tt:0 "Costs #Y40 Treasury#!. Contest the annexation: raises suzerain prestige and national prestige, but raises tension with Britain."
 qing_vassal.4.abandon:0 "Burma is lost — accept the forms."
 qing_vassal.4.abandon.tt:0 "Accept the British annexation (with a hollow tribute form). Avoids friction, but a blow to suzerain prestige, national prestige, and legitimacy, and a jolt of reform pressure."
