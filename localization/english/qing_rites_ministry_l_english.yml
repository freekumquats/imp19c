l_english:
 # [#353] Ministry of Rites (禮部) panel.
 QING_RITES_MINISTRY_OPEN_BTN:0 "Ministry of Rites (禮部)"
 QING_RITES_MINISTRY_OPEN_TT:0 "Open the Ministry of Rites — the Grand Minister of Rites (禮部尚書), the imperial examinations (科舉), the tributary embassies (朝貢), and how well the ministry is run."
 QING_RITES_MINISTRY_PANEL_TITLE:0 "Ministry of Rites — 禮部"
 QING_RITES_MINISTRY_PANEL_DESC:0 "The Ministry of Rites (禮部) governs the ceremony of empire — the imperial examinations (科舉) that recruit the scholar-officials, and the tributary embassies (朝貢) by which the vassal courts render their homage. Its Grand Minister answers to the Grand Council for how these are kept; a flourishing examination ladder and a full court of tributaries lift his standing there, a hollow ceremony drags it down."
 QING_RITES_MINISTRY_MINISTER_TITLE:0 "Grand Minister of Rites (禮部尚書)"
 QING_RITES_MINISTRY_VACANT:0 "The Ministry of Rites stands without a Minister. The ceremony lapses and the examinations drift."
 QING_RITES_MINISTRY_PERF_LABEL:0 "Ministry Performance"
 QING_RITES_MINISTRY_PERF_TT:0 "How well the Ministry of Rites is run (0–100), from the Minister's zeal, the number of tributary courts sending embassies, and the health of the examination ladder. A vacant Board floors this low."
 QING_RITES_MINISTRY_EXAM_LABEL:0 "Examination Pass Rate (科舉)"
 QING_RITES_MINISTRY_EXAM_TT:0 "The health of the triennial examinations (會試/殿試) — the share of candidates the ladder passes into the scholar-official pool. A high rate recruits fresh talent into the bureaucracy; a low one (corruption, blocked mobility) starves it."
 QING_RITES_MINISTRY_TRIBUTE_LABEL:0 "Tributary Courts (朝貢)"
 QING_RITES_MINISTRY_TRIBUTE_TT:0 "The number of tributary subjects that render homage through the Ministry of Rites — Korea (朝鮮), Ryukyu (琉球), Siam (暹羅), and the rest. A full court of vassals is the tributary order at its zenith."
 QING_RITES_MINISTRY_ROSTER_TITLE:0 "The Tributary Courts"
 QING_RITES_MINISTRY_ROSTER_EMPTY:0 "No tributary court renders homage. The tributary order has lapsed."
 QING_RITES_COUNCIL_CONTRIB_LABEL:0 "The Ministry of Rites' net effect on the Grand Council"
