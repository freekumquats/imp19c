l_english:

 # ######################################################################
 # qing_uscw_l_english.yml — The Qing and the American Civil War (#73).
 # ######################################################################

 # --- .1 news of the war + the three-way choice ------------------------
 qing_uscw.1.t:0 "The War Between the States (南北戰爭)"
 qing_uscw.1.desc:0 "Word crosses the Pacific on the tea clippers: the American republic has broken in two. The southern states, their wealth built on cotton and the men who are made to pick it, have declared themselves a separate confederacy; the northern Union has vowed to hold the nation whole by force. The war that follows will be as vast and terrible as the Taiping ruin that even now bleeds the empire's own heartland — two continents, two civil wars, burning at once across the width of the world's greatest ocean.\n\nAnd the Middle Kingdom, which has learned at last to reach that far shore, is not without a stake in it. The Pacific coast where our banner now flies, the silver road our galleons ply, the cotton the mills of the world cannot do without — all turn on how this war ends. The Grand Council asks where the dynasty's interest lies."
 qing_uscw.1.a:0 "Stand with the Union — the friendship of the rising republic."
 qing_uscw.1.a.tt:0 "Deepen the #Y Daoguang entente#! into open partnership: ship the labour that will bind the American continent with iron, extend recognition and credit. #G Mutual goodwill with the Union, a trade windfall, and a step toward self-strengthening#!; a lasting #G Union Amity#! modifier. #R Provokes Britain#!, which leans to the cotton South. (Requires the Daoguang Doctrine.)"
 qing_uscw.1.b:0 "Recognise the Confederacy — run its cotton, take its silver."
 qing_uscw.1.b.tt:0 "Extend recognition to the southern confederacy and run its cotton through the Union blockade. #G A great silver windfall from the world cotton famine, a Cotton Windfall modifier; a Confederacy is seceded from the Union's southern states#! (where the Union holds them). #R Affronts the Union#!."
 qing_uscw.1.c:0 "Stay neutral — sell to both, and profit."
 qing_uscw.1.c.tt:0 "Take no side. Arm and feed both belligerents and bank the profits of the world's hunger for cotton and war. #G The largest windfall of all and a Neutral Trade modifier, with prestige for the court's prudence#!. #Y No lasting tie to either side, and no enemies made#!."

 # --- .2 the war ends: a coda branching on the road taken --------------
 qing_uscw.2.t:0 "The Guns Fall Silent (戰爭之終)"
 qing_uscw.2.desc.union:0 "After four years the Confederacy is broken and the Union restored, its slaves freed by proclamation. The Qing stood with the winning side, and the friendship struck in the war's dark days now binds two rising Pacific powers. Chinese hands laid the rails that cross the American desert; Chinese silver moved in American banks. The old world of Europe watches the trans-Pacific accord and is uneasy — which is precisely as the court intended."
 qing_uscw.2.desc.confederacy:0 "The war grinds to its end. Whichever banner now flies over the ruined South, the dynasty's treasury has swollen on the cotton it ran through the blockade when every mill in the world stood idle for want of it. The Union, if it stands, remembers who traded with its enemy — a debt to be collected in some later reckoning. But silver spends the same, and the court's coffers have not been so full in a generation."
 qing_uscw.2.desc.neutral:0 "The war burns itself out across the ocean. The Qing took no side, and so has no friend and no enemy to show for it — only a treasury made fat by selling to both, in the cool calculation that a war between distant barbarians is best watched from behind a full strongbox. The mandarins call it wisdom. The merchants call it the finest years of trade they have ever known."
 qing_uscw.2.a:0 "The Pacific is a wide ocean, and its far shore now matters to us."

 # --- the dynamically-released Confederacy -----------------------------
 qing_uscw_csa_name:0 "the Confederacy (南方邦聯)"
 qing_uscw_csa_adj:0 "Confederate"

