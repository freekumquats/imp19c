l_english:
 # [#336] Southern Study (南書房) — the emperor's private literary cabinet.
 QING_SS_OPEN_BTN:0 "Southern Study (南書房)"
 QING_SS_OPEN_TT:0 "Open the Southern Study — the emperor's private literary cabinet: the Grand Preceptor (首席南書房行走), the corps of scholar-attendants (南書房行走), the luster their letters lend the throne, and the levers to draw in talent or elevate the Preceptor to high office."
 QING_SS_PANEL_TITLE:0 "Southern Study — 南書房"
 QING_SS_PANEL_DESC:0 "The Southern Study (南書房) is the emperor's private cabinet of letters — the ablest scholars of the realm summoned to serve at the throne's own side, drafting edicts, matching couplets, and lending the reign the burnish of high learning. It is no great office of state; it sits beside the Grand Council rather than upon it, and it FEEDS the council — a scholar who shines in the Study is the readiest candidate for a vacant great office. Its head is the Grand Preceptor of the Southern Study (首席南書房行走)."
 QING_SS_CHIEF_TITLE:0 "Grand Preceptor of the Southern Study (首席南書房行走)"
 QING_SS_EMPTY:0 "The Southern Study stands empty. No scholar serves at the throne's side, and the reign goes without the burnish of letters."
 QING_SS_DEPTH_LABEL:0 "Attendants Serving (南書房行走)"
 QING_SS_DEPTH_TT:0 "The number of scholar-attendants serving in the Southern Study (capped at eight). A full cabinet of able men is the height of the literary court; an empty Study lends the throne no luster at all."
 QING_SS_LUSTER_LABEL:0 "Literary Luster"
 QING_SS_LUSTER_TT:0 "The combined finesse and charisma of the serving attendants. The deeper the corps of talent, the greater the court prestige and dynastic legitimacy the Study confers — at its height it quickens the assimilation of the realm's peoples to the reigning culture."
 QING_SS_ADMIN_TITLE:0 "The Emperor's Favour"
 QING_SS_DRAW_BTN:0 "Draw a Scholar into the Study (掄才入直)"
 QING_SS_DRAW_TT:0 "Summon the ablest scholar waiting in the examination pool (天子門生) into the Southern Study. Requires a waiting scholar and a Study below its cap of eight."
 QING_SS_WILDCARD_BTN:0 "Recruit a Talent (高士奇)"
 QING_SS_WILDCARD_TT:0 "As the Kangxi Emperor raised the commoner Gao Shiqi to his side on the strength of his brush alone, mint a fresh prodigy straight into the Study. Requires only that the Study stands below its cap of eight."
 QING_SS_ELEVATE_BTN:0 "Elevate the Preceptor to Office (擢用)"
 QING_SS_ELEVATE_TT:0 "Promote the Grand Preceptor of the Southern Study into the first vacant great office — the Study's role as the antechamber to power. Requires a Preceptor in place and a genuinely vacant office to fill."
 QING_SS_ROSTER_TITLE:0 "The Scholar-Attendants"
 QING_SS_ROSTER_EMPTY:0 "No scholar serves in the Southern Study. Draw talent from the examination pool or recruit a prodigy to fill the emperor's cabinet of letters."
 # nickname keys for the 1763 Southern Study cabinet + the wildcard prodigy.
 NICKNAME_QING_SS_LIANGSHIZHENG:0 "Liang Shizheng"
 NICKNAME_QING_SS_YUMINZHONG:0 "Yu Minzhong"
 NICKNAME_QING_SS_WILDCARD:0 "a Scholar of the Southern Study"
