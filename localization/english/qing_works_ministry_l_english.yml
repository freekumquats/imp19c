l_english:
 # [#351] Ministry of Works (工部) panel.
 QING_WORKS_MINISTRY_OPEN_BTN:0 "Ministry of Works (工部)"
 QING_WORKS_MINISTRY_OPEN_TT:0 "Open the Board of Works — the Grand Minister of Works (工部尚書), the public works he maintains across the realm, and how well the ministry is run."
 QING_WORKS_MINISTRY_PANEL_TITLE:0 "Ministry of Works — 工部"
 QING_WORKS_MINISTRY_PANEL_DESC:0 "The Board of Works (工部) maintains the empire's arteries — the Yellow River dikes (黃河河堤), the Grand Canal grain-tribute depots (漕運倉), the Great Wall (長城), and the state manufactories. Its Grand Minister answers to the Grand Council for how the works are kept; a well-built realm lifts his standing there, silted canals and breached dikes drag it down."
 QING_WORKS_MINISTRY_MINISTER_TITLE:0 "Grand Minister of Works (工部尚書)"
 QING_WORKS_MINISTRY_VACANT:0 "The Board of Works stands without a Minister. The dikes silt and the canal chokes untended."
 QING_WORKS_MINISTRY_PERF_LABEL:0 "Ministry Performance"
 QING_WORKS_MINISTRY_PERF_TT:0 "How well the Board of Works is run (0–100), from the Minister's finesse, the number of public works standing across the realm, less the graft (河工) that saps a corrupt court's building budget. A vacant Board floors this low."
 QING_WORKS_MINISTRY_COVERAGE_LABEL:0 "Public Works Standing"
 QING_WORKS_MINISTRY_COVERAGE_TT:0 "The count of Board-of-Works buildings across the realm — river dikes, canal depots, Great Wall sections, and state manufactories. A healthy establishment is roughly eight; a Board that has built few has neglected the realm's infrastructure."
 QING_WORKS_MINISTRY_COMMISSION_TITLE:0 "Commission Public Works"
 QING_WORKS_MINISTRY_BUILD_DIKE_BTN:0 "Commission a River Dike (河堤)"
 QING_WORKS_MINISTRY_BUILD_DIKE_TT:0 "Raise a Yellow River flood-control dike in the realm's most populous province that lacks one. Requires a Minister of finesse 7+ and a treasury of 90. A truly expert Minister (finesse 9+) builds at reduced cost; a mediocre one incurs overruns and graft."
 QING_WORKS_MINISTRY_BUILD_CANAL_BTN:0 "Commission a Canal Depot (漕運倉)"
 QING_WORKS_MINISTRY_BUILD_CANAL_TT:0 "Raise a Grand Canal grain-tribute depot in a populous centre. Requires a Minister of finesse 7+ and a treasury of 85. Strengthens the grain lifeline (漕運) that feeds the capital and the banners."
 QING_WORKS_MINISTRY_BUILD_WALL_BTN:0 "Commission a Great Wall Section (長城段)"
 QING_WORKS_MINISTRY_BUILD_WALL_TT:0 "Rebuild a section of the Great Wall — a grand prestige project. Requires a Minister of finesse 7+, a treasury of 120, and stability of 40. Lifts stability; the costliest of the three works."
 QING_WORKS_MINISTRY_BUILD_GREAT_WALL_BTN:0 "Raise the Great Wall (長城)"
 QING_WORKS_MINISTRY_BUILD_GREAT_WALL_TT:0 "Undertake the great labour of the Great Wall (長城) proper — the monumental defensive wonder, far beyond a restored section. A vast corvée project: costs #Y 240 treasury AND 10 manpower#! (the levied labour of a generation), and requires a seated Minister of finesse 7+. Raised once; grants strong provincial defence, civilisation, and a lasting lift to legitimacy and stability. Shown only until it stands."
 QING_WORKS_MINISTRY_BUILD_GRAND_CANAL_BTN:0 "Cut the Grand Canal (大運河)"
 QING_WORKS_MINISTRY_BUILD_GRAND_CANAL_TT:0 "Undertake the great labour of the Grand Canal (大運河) proper — the empire's movement-and-trade artery, far beyond a single depot. A vast corvée project: costs #Y 220 treasury AND 10 manpower#! (the levied labour of a generation), and requires a seated Minister of finesse 7+. Raised once; speeds army movement, swells trade and food, and lifts legitimacy and stability. Shown only until it stands."
 QING_WORKS_MINISTRY_EXTEND_RAILWAY_BTN:0 "Extend the Railway Network (鐵路網)"
 QING_WORKS_MINISTRY_EXTEND_RAILWAY_TT:0 "Lay another length of the countrywide railway (全國鐵路網) — one more province joined to the iron grid. Costs #Y 60 treasury AND 5 manpower#! and requires a seated Minister of finesse 7+ and steam-locomotive technology. Repeatable while any core province still lacks rail. Each length speeds armies and counts as muster supply where it runs; as the network grows it crosses tiers — #Y trunk line (幹線, 3+), regional network (區域網, 8+), national grid (全國網, 15+)#! — each granting escalating movement, construction, commerce, tax and manpower bonuses across the realm."
 QING_WORKS_MINISTRY_ROSTER_TITLE:0 "Public Works of the Realm"
 QING_WORKS_MINISTRY_ROSTER_EMPTY:0 "No public works stand in the realm. The Board has built nothing."
 # [#335] canal / grain-tribute state (漕運) surfaced on the Works panel.
 QING_WORKS_MINISTRY_CANAL_LABEL:0 "Grand Canal Condition (漕運/河工)"
 QING_WORKS_MINISTRY_CANAL_TT:0 "The physical state of the Grand Canal and the Yellow River dikes (0–100) — the grain-tribute lifeline the Board of Works exists to keep. It rises with the canal depots (漕運倉) and dikes (河堤) the Minister raises and with his own skill at the works; it falls with a vacant Board, endemic 河工 graft, and neglect. A sound canal ships the grain north; a silted one starves the capital and the banners. This condition folds directly into the Minister's standing on the Grand Council."
 QING_WORKS_MINISTRY_GRAIN_LABEL:0 "Capital Grain Reserve (糧儲)"
 QING_WORKS_MINISTRY_GRAIN_TT:0 "The fill of the capital granaries (0–100). Each quarter the canal delivers grain (scaled by its condition and the Jiangnan quota) and the capital, the banner garrisons, and the frontier armies draw it down. The ever-normal granaries (常平倉/糧倉) standing across the realm buffer that draw. A reserve run low underfeeds the banners and accelerates their decay; run critical, it forces a famine-relief dilemma."
 QING_WORKS_MINISTRY_HYDRAULIC_LABEL:0 "Hydraulic Works (河工)"
 QING_WORKS_MINISTRY_HYDRAULIC_VALUE:0 "Dikes [Player.MakeScope.GetVariable('qing_dike_count').GetValue|0] · Depots [Player.MakeScope.GetVariable('qing_depot_count').GetValue|0] · Granaries [Player.MakeScope.GetVariable('qing_granary_count').GetValue|0]"
 QING_WORKS_MINISTRY_HYDRAULIC_TT:0 "The concrete waterworks standing across the realm: the Yellow River dikes (河堤) and Grand Canal depots (漕運倉) that hold up the canal condition, and the ever-normal granaries (糧倉) that buffer the capital grain draw. Raise more, through the commissions below and the decline-era granary building, to lift the lifeline."
 QING_WORKS_COUNCIL_CONTRIB_LABEL:0 "The Ministry of Works' net effect on the Grand Council"
