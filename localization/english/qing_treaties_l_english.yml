######################################################################
# qing_treaties_l_english.yml — UNEQUAL TREATIES & THE TREATY-PORT SYSTEM
# (條約口岸 / 租界). Covers the treaty modifiers, the imposition / port-demand /
# revision events, and the mechanics-panel verb.
# See se_QING_TREATIES.txt / qing_treaty_events.txt.
######################################################################

 # ---- modifiers --------------------------------------------------------------
 qing_treaty_system_active:0 "不平等條約 — The Unequal Treaty System"
 qing_treaty_ports_minor:0 "條約口岸 — Treaty Ports (a first network)"
 qing_treaty_ports_major:0 "條約口岸 — Treaty Ports (a national network)"
 qing_treaty_ports_dominant:0 "條約口岸 — Treaty Ports (the entrepôt economy)"
 qing_treaty_burden_heavy:0 "國恥 — The Weight of the Unequal Treaties"
 qing_treaty_burden_eased:0 "修約有成 — Treaty Revision Bears Fruit"
 # [#91 item B] the real on-map treaty port (province modifier)
 qing_treaty_port:0 "條約口岸 — Treaty Port"
 qing_treaty_port_desc:0 "A treaty port thrown open to foreign trade and residence. Its wharves and concessions make it a local engine of commerce and a magnet for immigration — but the foreign flag over the consular quarter is a standing affront the natives resent."

 # ---- the mechanics-panel verb -----------------------------------------------
 qing_action_treaty_revision:0 "Treaty Revision (修約)"
 qing_action_treaty_revision_desc:0 "Open negotiations to revise the unequal treaties — to reclaim tariff autonomy and, in time, to abolish extraterritoriality, the great prize. This is the payoff of a modern foreign policy: it can be pursued only once the dynasty has resident ministers abroad to press the case, and a sinicized, efficient Maritime Customs strengthens the hand at the tariff table."
 qing_action_treaty_needs_pi_tt:0 "Requires #Y40 Political Influence#!"

 # ---- .1  the treaty system imposed ------------------------------------------
 qing_treaty.1.t:0 "The Treaties of Shame"
 qing_treaty.1.desc:0 "The gunboats have spoken, and the Middle Kingdom must sign. The treaty flung upon the throne prises open our ports to foreign trade and residence; strips our courts of jurisdiction over the foreigners, who will answer only to their own consuls; fixes our tariff by their pen, not ours; and carves concessions from our own soil where their flags, not ours, will fly. The literati weep for the ancestors; the merchants of Canton count the coming trade. The humiliation is total — and the day of its undoing lies far off.\n\nHow shall the throne meet this?"
 qing_treaty.1.sign:0 "Sign, and husband the realm for the day of revision."
 qing_treaty.1.sign.tt:0 "Accept the unequal-treaty order. Opens the first five treaty ports as engines of commerce, but imposes a heavy standing humiliation that feeds reform pressure and drags legitimacy until the treaties can be revised."
 qing_treaty.1.defiant:0 "Sign — but let the affront harden into a spur for reform."
 qing_treaty.1.defiant.tt:0 "Accept the treaties, yet turn the grievance into resolve. As above, but a heavier jolt of reform pressure and a little pride salvaged (#G+10 prestige#!)."

 # ---- .2  a further port demanded --------------------------------------------
 qing_treaty.2.t:0 "A Further Port Demanded"
 qing_treaty.2.desc:0 "The foreign ministers press for another port to be thrown open — a new anchorage for their steamers, a new quarter for their merchants and missionaries. Their consuls cite the treaties; their gunboats ride at anchor to underline the point. To yield is to deepen the foreign presence upon our coast; to resist is to strain relations with powers we cannot yet defy in the field.\n\nWhat is the court's will?"
 qing_treaty.2.open:0 "Open the port."
 qing_treaty.2.open.tt:0 "Open a further treaty port. The entrepôt commerce grows, but the treaty burden rises a little."
 qing_treaty.2.resist:0 "Resist the demand — hold the line."
 qing_treaty.2.resist.tt:0 "Spend #Y30 Political Influence#! to refuse. The port stays closed and the burden spared, but the foreign powers are affronted — a touch of great-power tension with Britain."

 # ---- .10  the treaty-revision hub -------------------------------------------
 qing_treaty.10.t:0 "The Drive for Treaty Revision (修約)"
 qing_treaty.10.desc:0 "For a generation the unequal treaties have bound the dynasty. Now, with our ministers resident in the foreign capitals and our diplomacy conducted as an equal's, the moment has come to press for revision — to reclaim, clause by clause, what was taken at the point of a gun. First the tariff, that we may set our own rates and fund our own reforms; then, the greatest prize of all, the abolition of extraterritoriality, that a foreigner on Chinese soil shall answer to Chinese law.\n\nWhere shall we press?"
 qing_treaty.10.tariff:0 "Press for tariff autonomy."
 qing_treaty.10.tariff.tt:0 "Reclaim a measure of tariff autonomy from the treaty-fixed rate. Advances tariff autonomy, eases the treaty burden, and raises prestige. Repeatable."
 qing_treaty.10.extrality:0 "Abolish extraterritoriality — the great prize."
 qing_treaty.10.extrality.tt:0 "Negotiate away extraterritoriality itself: foreigners on Chinese soil shall answer to Chinese law. Requires tariff autonomy well advanced. Sharply eases the treaty burden and reform pressure, and greatly raises prestige. One-off."
 qing_treaty.10.decline:0 "Not yet — the powers are not ready to yield."
